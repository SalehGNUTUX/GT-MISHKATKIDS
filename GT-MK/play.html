<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<script>(function(){try{var t=localStorage.getItem('tilmithi_theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<style id="theme-crit">html[data-theme="dark"]{--bg:#15151b;--card:#23232c;--ink:#ECE7DD;--muted:#A39E94;--line:#34343f;--primary-d:#E8987E;--shadow:0 6px 20px rgba(0,0,0,.45)}html[data-theme="dark"] body{background:var(--bg);color:var(--ink)}</style>
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="مِشكاة" />
<meta name="theme-color" content="#E07A5F" />
<title>مِشكاة — ألعاب وأنشطة</title>
<style>
  :root{
    --bg:#FBF7EF; --card:#FFFFFF; --ink:#2B2B2B; --muted:#6B6B6B;
    --line:#ECE6DA; --primary:#E07A5F; --primary-d:#C7613F; --good:#7BB661; --bad:#E0566B;
    --sky:#6FB3D6; --gold:#F4C95D; --violet:#C9A0DC; --brick:#E0566B;
    --shadow:0 6px 20px rgba(0,0,0,.07);
    font-family:"Noto Sans Arabic","Segoe UI",Tahoma,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  button,a,input,textarea,select,.region,.toggle,.chip,.capbtn,[onclick]{touch-action:manipulation}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:640px;margin:0 auto;padding:16px 16px 48px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 10px}
  header h1{font-size:22px;margin:0}
  header .sub{color:var(--muted);font-size:13px}
  .topbtn{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;font-size:14px;cursor:pointer;text-decoration:none;color:var(--ink)}
  .acts{display:flex;gap:8px;flex-wrap:wrap;margin:0 2px 10px}
  /* أثناءَ اللعب: شاشةٌ مخصّصةٌ للّعبة — يُطوى العنوانُ والوصفُ وشريطُ التنقّل بين الأقسام */
  body.ingame .wrap{padding-top:8px}
  body.ingame header{padding:2px 2px 4px}
  body.ingame header h1{font-size:15px}
  body.ingame header .sub{display:none}
  body.ingame .acts{display:none}

  .chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:4px 2px 10px}
  .chips .lbl{font-size:12px;color:var(--muted)}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 14px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--muted)}
  .chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .pills{display:flex;gap:8px;margin-inline-start:auto}
  .pill{background:#F3EEE3;border-radius:999px;padding:5px 12px;font-size:13px;color:#555}
  .pill b{color:var(--primary-d)}

  /* ▪️ مربّعاتُ النقاط */
  .dt-wrap{position:relative;margin:10px auto;touch-action:manipulation}
  .dt-dot{position:absolute;width:9px;height:9px;border-radius:50%;background:var(--ink);opacity:.55;transform:translate(-4.5px,-4.5px)}
  .dt-ln{position:absolute;background:var(--line);border-radius:4px;cursor:pointer;transition:background .12s,transform .1s}
  .dt-ln.h{height:8px} .dt-ln.v{width:8px}
  .dt-ln:not(.on):hover{background:var(--primary);opacity:.6}
  .dt-ln:not(.on):active{transform:scale(1.06)}
  .dt-ln.on{cursor:default;opacity:1}
  .dt-box{position:absolute;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;animation:dtpop .18s ease-out}
  @keyframes dtpop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  .menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .gsec{font-size:16px;font-weight:800;margin:16px 2px 8px;color:var(--ink);border-bottom:2px solid var(--line);padding-bottom:4px}
  .ccard{position:relative;background:var(--card);border:2px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:20px 14px;text-align:center;cursor:pointer;transition:transform .12s,border-color .15s}
  .ccard:hover{transform:translateY(-3px);border-color:var(--primary)} .ccard:active{transform:scale(.97)}
  .ccard .ic{font-size:42px;line-height:1.2}
  .ccard .t{font-weight:800;font-size:16px;margin-top:6px;color:var(--ink)}
  .ccard .d{font-size:12.5px;color:var(--muted);margin-top:4px}
  .menu.cats{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
  .gcard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:16px 12px;text-align:center;cursor:pointer;transition:transform .12s,border-color .12s}
  .gcard:hover{transform:translateY(-3px);border-color:var(--primary)}
  .gcard.vs{border-color:color-mix(in srgb,var(--primary) 45%,var(--line))}
  .vsbadge{position:absolute;top:8px;inset-inline-start:8px;background:var(--primary);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;box-shadow:0 2px 6px rgba(0,0,0,.18)}
  .gcard{position:relative}
  .newbadge{position:absolute;top:8px;inset-inline-end:8px;background:#E8912D;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;box-shadow:0 2px 8px rgba(232,145,45,.5);animation:newpulse 1.5s ease-in-out infinite}
  @keyframes newpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  @media(prefers-reduced-motion:reduce){ .newbadge{animation:none} }
  .gcard .ic{font-size:40px}
  .gcard .t{font-size:16px;font-weight:800;margin-top:4px}
  .gcard .d{font-size:12px;color:var(--muted)}

  .back{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:7px 14px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--ink);margin-bottom:6px}
  .gbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:6px 2px}
  /* عجلة أدرْ وأجب */
  .sqwrap{display:flex;justify-content:center;margin:6px 0}
  .sqwheel{position:relative;width:240px;height:240px}
  .sqptr{position:absolute;top:-4px;left:50%;transform:translateX(-50%);font-size:26px;line-height:1;color:#E0566B;z-index:2;filter:drop-shadow(0 1px 2px rgba(0,0,0,.35))}
  .sqwheel #sqG{transform-box:fill-box;transform-origin:center}
  /* زرُّ «أدِرِ العجلة» — عصريٌّ جذّاب */
  .sqbtn{position:relative;display:inline-flex;align-items:center;gap:8px;border:none;cursor:pointer;font-family:inherit;font-size:18px;font-weight:800;color:#fff;
    padding:13px 30px;border-radius:999px;background:linear-gradient(135deg,#E0566B,#E8912D);
    box-shadow:0 6px 18px rgba(224,86,107,.45),inset 0 1px 0 rgba(255,255,255,.35);
    transition:transform .14s cubic-bezier(.34,1.56,.64,1),box-shadow .14s,filter .14s;animation:sqPulse 1.8s ease-in-out infinite}
  .sqbtn::before{content:"🎡";font-size:20px;animation:sqSpin 2.2s linear infinite;animation-play-state:paused}
  .sqbtn:hover{filter:brightness(1.06);box-shadow:0 10px 26px rgba(224,86,107,.55),inset 0 1px 0 rgba(255,255,255,.35)}
  .sqbtn:active{transform:scale(.95)}
  .sqbtn:disabled{opacity:.85;cursor:default;animation:none}
  .sqbtn.spinning::before{animation-play-state:running}
  .sqbtn.spinning{animation:none}
  @keyframes sqSpin{to{transform:rotate(360deg)}}
  @keyframes sqPulse{0%,100%{box-shadow:0 6px 18px rgba(224,86,107,.45),inset 0 1px 0 rgba(255,255,255,.35)}50%{box-shadow:0 6px 24px rgba(232,145,45,.6),inset 0 1px 0 rgba(255,255,255,.35)}}
  @media(prefers-reduced-motion:reduce){ .sqbtn,.sqbtn::before{animation:none} }
  .sqq{text-align:center;margin-top:6px}
  .sqcat{font-weight:800;font-size:15px;margin-bottom:2px}
  .sqp{font-size:19px;font-weight:800;margin:6px 2px}
  .sqopts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:360px;margin:8px auto}
  .sqopt{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:13px;font-size:18px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--ink)}
  .sqopt:hover{border-color:var(--primary)} .sqopt.ok{background:#EEF6E9;border-color:var(--good);color:#2f5a1f} .sqopt.bad{background:#FCEBEE;border-color:var(--bad)}
  /* لوحةُ تعلُّمِ الحرف (عجلة الحروف) */
  .lwlearn{max-width:420px;margin:6px auto 0;text-align:center;background:var(--card);border:1.5px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:16px 12px}
  .lwbig{display:flex;align-items:center;justify-content:center;gap:12px;font-size:72px;font-weight:800;color:var(--primary-d);line-height:1}
  .lwbig .saysm{font-size:15px;background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:6px 10px;cursor:pointer;font-family:inherit;color:var(--ink)}
  .lwsub{font-size:13px;color:var(--muted);margin:10px 0 6px}
  .lwsyl{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .lwchip{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:64px;background:color-mix(in srgb,var(--primary) 10%,var(--card));border:1.5px solid color-mix(in srgb,var(--primary) 35%,var(--line));border-radius:14px;padding:10px 8px;cursor:pointer;font-family:inherit;color:var(--ink)}
  .lwchip:hover{border-color:var(--primary);transform:translateY(-2px);transition:.12s} .lwchip:active{transform:scale(.94)}
  .lwchip b{font-size:34px;line-height:1} .lwchip span{font-size:11px;color:var(--muted)}
  .lwex{margin-top:14px;font-size:14px;color:var(--muted)}
  .lwword{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:8px 14px;font-size:20px;font-weight:800;color:var(--ink);cursor:pointer;font-family:inherit;margin-top:6px}
  .lwword:hover{border-color:var(--primary)} .lwword:active{transform:scale(.96)}

  .clue{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;text-align:center;margin-top:6px}
  .clue .emoji{font-size:66px;line-height:1.1}
  .clue .say{font-size:13.5px;color:var(--muted)}
  .flash{font-size:28px;font-weight:800;color:var(--good);height:0;overflow:hidden;transition:height .2s;letter-spacing:2px}
  .flash.on{height:40px}

  .row{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin:14px 2px}
  .slot{width:60px;height:60px;border-radius:14px;border:2.5px dashed #D8CFBE;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;position:relative}
  .slot.next{border-color:var(--primary);background:#FFF6F2}
  .slot.full{border-style:solid;cursor:pointer}
  .slot.ok{border-color:var(--good)!important;background:#EEF6E9!important;color:#2f5a1f}
  .slot.err{animation:shake .4s;border-color:var(--bad)!important;background:#FCEBEE!important}
  .tile{width:58px;height:58px;border-radius:14px;border:none;font-size:30px;font-weight:800;cursor:pointer;font-family:inherit;color:#fff;transition:transform .08s}
  .tile:active{transform:translateY(2px)}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .pool{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 2px 6px;padding:10px;border-radius:16px}

  .s-train .slot.full{border-color:var(--sky);background:#EAF4FA}
  .s-train .slot::after{content:"";position:absolute;bottom:-9px;width:9px;height:9px;border-radius:50%;background:#cdbfa6}
  .s-train .slot.full::after{background:var(--sky)} .s-train .slot.ok::after{background:var(--good)}
  .s-train .tile{background:linear-gradient(135deg,#F6BE3B,#E8A33D);box-shadow:0 4px 0 #cf8f2e}
  .s-pins .row{border-top:4px solid #b98a5a;padding-top:24px;margin-top:18px}
  .s-pins .peg{width:60px;height:60px;border-radius:14px;border:2px solid var(--line);background:var(--card);font-size:32px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
  .s-pins .peg::before{content:"";position:absolute;top:-26px;left:50%;transform:translateX(-50%);width:8px;height:26px;background:#dca85f;border-radius:3px}
  .s-pins .peg.sel{box-shadow:0 0 0 3px var(--primary);border-color:var(--primary)}
  .s-pins .peg.ok{background:#F1F8EC;border-color:var(--good);color:#2f5a1f}
  .s-blocks .slot{border-radius:8px}
  .s-blocks .slot.fixed{border-style:solid;border-color:#cdbfa6;background:#F6F0E6}
  .s-blocks .slot.gap.next{border-color:var(--brick);background:#FCEBEE}
  .s-blocks .slot::before{content:"";position:absolute;top:-6px;left:12px;right:12px;height:7px;background:rgba(0,0,0,.10);border-radius:6px}
  .s-blocks .cand{background:linear-gradient(135deg,#E0566B,#c8465a);box-shadow:0 4px 0 #a83b4d;border-radius:8px}
  .s-fish .pond{background:linear-gradient(#bfe3f5,#9ccbe6);min-height:120px}
  .s-fish .fish{background:linear-gradient(135deg,#6FB3D6,#4f9ec9);border-radius:50% 14px 50% 50%;animation:bob 2.4s ease-in-out infinite;position:relative}
  .s-fish .fish:nth-child(2n){animation-duration:3s} .s-fish .fish:nth-child(3n){animation-duration:2s}
  .s-fish .fish::after{content:"";position:absolute;margin-inline-start:-46px;margin-top:14px;border:9px solid transparent;border-inline-end-color:#4f9ec9}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .s-fish .caught .slot.full{border-color:var(--sky);background:#EAF4FA}
  .dart{animation:dart .45s forwards}
  @keyframes dart{to{transform:translateX(50px) rotate(20deg);opacity:0}}
  .choices{display:grid;gap:10px;margin:16px 2px}
  .choice{padding:16px;border:2px solid var(--line);border-radius:16px;background:var(--card);font-size:30px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:3px;color:var(--ink)}
  .choice:hover{border-color:var(--primary)}
  .choice.correct{background:#EEF6E9;border-color:var(--good);color:#2f5a1f}
  .choice.wrong{background:#FCEBEE;border-color:var(--bad);color:#8c2b3a}
  .choice:disabled{cursor:default}

  .controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
  .controls button{border:1px solid var(--line);background:var(--card);border-radius:12px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink)}
  .controls .go{background:var(--primary);color:#fff;border-color:var(--primary)}
  .controls .go:hover{background:var(--primary-d)}
  .win{background:#EEF6E9;border:1px solid #CDE6BE;color:#3f6b2c;border-radius:18px;padding:16px;text-align:center;margin-top:12px}
  .win .big{font-size:38px;font-weight:800;letter-spacing:3px}
  .win .em{font-size:32px}
  .fb{text-align:center;color:var(--muted);font-size:13px;margin-top:6px}

  /* memory game */
  .lvl{display:flex;gap:6px;margin-inline-start:auto}
  .lvl button{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 14px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--muted)}
  .lvl button.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .pill.turn{background:var(--primary);color:#fff} .pill.turn b{color:#fff}
  /* بطاقةُ إعداد لعبة الذاكرة */
  .memset{max-width:580px;margin:14px auto;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 16px;box-shadow:var(--shadow)}
  .memset .setrow{margin:0 0 16px}
  .memset .setlbl{font-weight:800;font-size:14px;color:var(--muted);margin-bottom:8px}
  .memset .lvl{margin-inline-start:0;flex-wrap:wrap}
  .memset .lvl button{font-size:15px;padding:9px 16px}
  /* الألعابُ التنافسيّة */
  .vsturn{font-weight:800;font-size:16px;margin:8px 0 12px;text-align:center}
  .vsscore{display:flex;justify-content:center;gap:14px;margin:8px 0 4px;flex-wrap:wrap}
  .vschip{font-weight:800;font-size:15px;border-radius:999px;padding:5px 14px;border:2px solid}
  .xob{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:300px;margin:6px auto}
  .xoc{aspect-ratio:1/1;background:var(--card);border:2px solid var(--line);border-radius:16px;font-size:46px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;user-select:none;transition:transform .08s}
  .xoc:hover{border-color:var(--primary)} .xoc:active{transform:scale(.95)}
  .xoc.wn{background:#EEF6E9;border-color:var(--good)}
  .ncq{font-size:36px;font-weight:800;text-align:center;margin:10px 0 14px;color:var(--primary-d)}
  .ncopts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:330px;margin:0 auto}
  .ncopt{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:15px;font-size:26px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--ink)}
  .ncopt:hover{border-color:var(--primary)} .ncopt.ok{background:#EEF6E9;border-color:var(--good);color:#2f5a1f} .ncopt.bad{background:#FCEBEE;border-color:var(--bad)}
  .hutarget{text-align:center;font-size:21px;font-weight:800;margin:6px 0;color:var(--ink)} .hutarget b{color:var(--primary-d);font-size:30px}
  .hubar{height:9px;background:var(--line);border-radius:99px;overflow:hidden;max-width:320px;margin:6px auto 12px}
  .hubar span{display:block;height:100%;background:var(--primary);width:100%}
  .hugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:8px;max-width:380px;margin:0 auto}
  .hucell{aspect-ratio:1/1;background:var(--card);border:2px solid var(--line);border-radius:12px;font-size:24px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--ink)}
  .hucell:hover{border-color:var(--primary)} .hucell.ok{background:#EEF6E9;border-color:var(--good);color:#2f5a1f} .hucell.bad{background:#FCEBEE;border-color:var(--bad)}
  .smtarget{text-align:center;margin:4px 0 6px} .smtarget svg{width:88px;height:88px}
  .smgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;max-width:380px;margin:0 auto}
  .smcell{aspect-ratio:1/1;background:var(--card);border:2px solid var(--line);border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:9px}
  .smcell svg{width:100%;height:100%} .smcell:hover{border-color:var(--primary)} .smcell.ok{background:#EEF6E9;border-color:var(--good)} .smcell.bad{background:#FCEBEE;border-color:var(--bad)}
  .wglist{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0}
  .wgw{padding:5px 12px;border-radius:999px;font-weight:800;font-size:15px;background:var(--card);border:2px solid var(--line);color:var(--ink)}
  .wgw.cur{border-color:var(--primary);color:var(--primary-d);box-shadow:0 0 0 2px var(--primary)} .wgw.done{text-decoration:line-through;opacity:.55}
  .wggrid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;max-width:330px;margin:10px auto}
  .wgc{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;border:2px solid var(--line);border-radius:10px;background:var(--card);cursor:pointer;font-family:inherit;color:var(--ink)}
  .wgc.sel{border-color:var(--primary);transform:scale(.9)} .wgc.own{color:#fff;border-color:transparent}
  #memStart,#vStart{width:100%;margin-top:4px;padding:14px;border:none;border-radius:14px;font-weight:800;font-family:inherit;font-size:16px;cursor:pointer;background:var(--primary);color:#fff;transition:transform .12s,background .12s}
  #memStart:hover,#vStart:hover{background:var(--primary-d)} #memStart:active,#vStart:active{transform:scale(.98)}
  .mgrid{display:grid;gap:10px;grid-template-columns:repeat(4,1fr);margin-top:10px}
  .mcard{aspect-ratio:1/1;border-radius:16px;cursor:pointer;position:relative;border:2px solid var(--line);background:var(--card);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .mcard .fback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#E07A5F,#E8A07F);color:#fff;font-size:30px;transition:opacity .15s}
  .mcard .fback svg{width:56%;height:56%;filter:drop-shadow(0 2px 5px rgba(0,0,0,.25))}
  .mcard .ffront{width:74%;height:74%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
  .mcard .ffront svg{width:100%;height:100%}
  .mcard .ffront .memoji{font-size:min(13vw,46px);line-height:1}
  .mcard.up .fback{opacity:0} .mcard.up .ffront{opacity:1}
  .mcard.matched{border-color:var(--good);background:#F1F8EC} .mcard.matched .ffront{opacity:1}

  /* maze */
  .mazewrap{display:flex;flex-direction:column;align-items:center}
  .guide{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:8px 0}
  .gchip{width:34px;height:34px;border-radius:9px;background:#F0EADF;color:#b3a98f;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800}
  .gchip.got{background:var(--good);color:#fff}
  .maze{display:grid;gap:6px;margin:10px auto}
  .cell{width:56px;height:56px;border-radius:12px;border:2px solid var(--line);background:var(--card);font-size:25px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .cell.start{border-color:var(--primary);box-shadow:0 0 0 3px #f3c9bb}
  .cell.path{background:var(--good);color:#fff;border-color:var(--good)}
  .cell.target{background:#FFF4D9;border-color:var(--gold)}
  .cell.bad{animation:shake .4s}

  /* wheel */
  .reels{display:flex;gap:10px;justify-content:center;align-items:center;margin:18px 2px}
  .reel{width:72px;height:88px;border-radius:16px;border:2px solid var(--line);background:var(--card);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:800;cursor:pointer}
  .reel.spin{animation:reelspin .5s linear}
  @keyframes reelspin{0%{transform:translateY(-10px);opacity:.3}100%{transform:translateY(0);opacity:1}}
  .eq{font-size:28px;color:var(--muted)}
  .blend{min-width:110px;height:88px;border-radius:16px;background:#F4EDF9;border:2px solid var(--violet);display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:800;color:#6b4a86;padding:0 12px;letter-spacing:2px}
  .wstatus{text-align:center;font-size:16px;font-weight:700;margin:8px 0;min-height:24px}
  .wstatus.real{color:var(--good)} .wstatus.fake{color:var(--muted)}

  .intro{color:var(--muted);font-size:14px;margin:4px 2px 12px}
  .acard{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:12px}
  .acard h3{margin:0 0 6px;font-size:18px}
  .acard .mat{font-size:13px;color:var(--primary-d);background:#FBEDE7;border-radius:8px;padding:6px 10px;margin:6px 0;display:inline-block}
  .acard ol{margin:6px 0 0;padding-inline-start:20px}
  .acard li{margin:3px 0;font-size:15px}
  .printbtn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:14px;padding:13px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin:4px 0 14px}

  .hint{text-align:center;color:var(--muted);font-size:13px;margin-top:10px}
  @media print{ .topbtn,.back,.printbtn,.acts,header .sub{display:none} .acard{break-inside:avoid;box-shadow:none} }

<script type="module">
import { wireThemeToggle } from "./src/theme.js";

import DATA from "./content/words.js";
import { WORLD_ART, MEMORY_ART } from "./src/art.js";

import * as sfx from "./src/sfx.js"; // أصواتٌ تفاعليّة (لمسة/نجاح/خطأ) للألعاب
import { GAME_REACTIONS as GR, GAME_INTROS as GI } from "./src/robo-phrases.js"; // تفاعلاتُ الألعاب (مُولَّدةٌ عبر Piper)
import { vsEndRound, vsWinsOf, vsTurnHtml, VS, setParentFemale, vsStartIndex, vsResetStarter } from "./src/versus.js"; // نافذةُ نهاية الجولة + سجلُّ الانتصارات + حبّةُ الدور (v1.4) + جنسُ الوالد (v1.5.5)
import { clockGame, AR_L } from "./src/clock-widget.js"; // تحدّي الساعة (v1.5)
import { playClipAsync } from "./src/tts-clips.js";      // نطقُ جُمَلِ الوقت (Piper العصبيّ)
import { listProfiles, getProfile, getCurrentUser, getParentName, getParentAvatar } from "./src/accounts.js";
import { attachReader } from "./src/reader-recorder.js"; // تسجيلُ نُطق الطفل للكلمة المُكوَّنة
import { smartPrint } from "./src/smart-print.js"; window.smartPrint = smartPrint; // طباعةٌ تعملُ على الهاتف أيضًا
// كلماتٌ شائعةٌ يُمكنُ تكوينُها من أحرف العجلة الـ20 (لتوسعة التعرّف على الكلمات ذات المعنى).
const EXTRA_WHEEL_WORDS = new Set(["بيت","بنت","باب","جبل","حبل","دار","رمل","سمك","شمس","قمر","قلم","كلب","لبن","نهر","نمر","ورد","جمل","حليب","سرير","كتاب","نار","ليل","نهار","شجر","حجر","بقر","سحب","ريح","برد","فرح","علم","نور","كرم","جسم","رمح","سيف","درع","حرب","سلم","قلب","شعر","فيل","ديك","حمل","نمل","سمن","لحم","تمر","عنب","تين","رمان","ليمون","جبن","سكر","ملح","عسل","شاي","بحر","حلم","نجم","عمل","رسم","قدم","سهل","فهد","ثعلب","دجاج","حمار","حوت","ريش","جناح","حقل","نبت","ثمر","فرع","نحل","رجل","عين","حر","حب","حق","دم","سن","دب","فم","يد","عش","شمع","نبع","سفر","حكم","لعب","كسر","فكر","نشر","حسن"]);
robo.mount();
const WORDS = DATA.words || [];
const WL = DATA.wheel_letters || [];
const view = document.getElementById("view");

const shuffle = a => { for(let k=a.length-1;k>0;k--){ const j=Math.floor(Math.random()*(k+1)); [a[k],a[j]]=[a[j],a[k]]; } return a; };
const rand = n => Math.floor(Math.random()*n);
let age=getChildAge(), score=0, streak=0, last=null, cur=null;
const filtered = () => WORDS.filter(w => age==="all" || w.age_band===age);
function pickWord(){ const p=filtered().filter(w=>w.id!==last); const a=p.length?p:filtered(); const w=pickAdaptive(a, x=>"W:"+x.word); last=w.id; return w; }
function distractors(exclude, n){ const p=shuffle(WL.filter(l=>!exclude.includes(l))); return p.slice(0,n); }

const ageChips = () => `<div class="chips"><span class="lbl">العمر:</span>
  <button class="chip ${age==="all"?"on":""}" data-age="all">الكل</button>
  <button class="chip ${age==="4-6"?"on":""}" data-age="4-6">4–6</button>
  <button class="chip ${age==="7-10"?"on":""}" data-age="7-10">7–10</button>
  <span class="pills"><span class="pill">⭐ <b>${score}</b></span><span class="pill">🔥 <b>${streak}</b></span></span></div>`;
function wireAge(reRender){ const c=view.querySelector(".chips"); if(c) c.addEventListener("click", e=>{ const b=e.target.closest("button[data-age]"); if(!b) return; age=b.getAttribute("data-age"); reRender(); }); }
const backBar = () => `<button class="backstep" id="back">الألعاب</button>`;
function wireBack(){ const b=document.getElementById("back"); if(b) b.onclick=renderMenu; }
const clueCard = (instruction, withFlash) => `<div class="clue"><div class="emoji">${cur.emoji}</div>${withFlash?`<div class="flash" id="flash">${cur.word}</div>`:""}<div class="say">${instruction}</div></div>`;
function winBanner(msg){ return `<div class="win"><div class="em">${cur.emoji}</div><div class="big" dir="rtl">${cur.word}</div>${msg}<div class="controls"><button class="go" id="cont">التالية ▶</button></div></div>`; }
function celebrate(){ score++; streak++; logEvent("word_win"); if(cur) recordMastery("W:"+cur.word,true);
  // ينطق الكلمةَ المبنيّةَ أوّلًا ثمّ ردّةَ الفعل (لا تتداخل الأصوات).
  if(cur && cur.word) robo.read(cur.word, { then:()=>robo.cheer() }); else robo.cheer(); }

/* ===================== MENU ===================== */
// cat: تصنيفٌ يفصلُ التعليميَّ عن الترفيهيّ ويوجّهُ المهامّ. letters=حروف/قراءة · math=أرقام · skill=مهارة تعليميّة · fun=ترفيهيّ · tool=أداة.
const GAMES = [
  { id:"train",  ic:"🚂", t:"قطار الكلمات", d:"رتّب الحروف من الأوّل", cat:"letters" },
  { id:"pins",   ic:"🧺", t:"مشابك الغسيل", d:"بدّل حرفين لتصحّح الترتيب", cat:"letters" },
  { id:"blocks", ic:"🧱", t:"بناء المكعّبات", d:"أكمِل الحرف الناقص", cat:"letters" },
  { id:"fish",   ic:"🎣", t:"صيد الحروف", d:"اصطَد الصحيح وتجنّب الدخيل", cat:"letters" },
  { id:"cards",  ic:"🧩", t:"بطاقات الصور", d:"اختر الكتابة الصحيحة", cat:"letters" },
  { id:"maze",   ic:"🌀", t:"متاهة الحروف", d:"امشِ على الحروف بالترتيب", cat:"letters" },
  { id:"wheel",  ic:"🎡", t:"عجلة الحروف", d:"أدِرِ العجلةَ ← تعلّمِ الحرفَ ومقاطعَه", nw:1, cat:"letters" },
  { id:"wgrid",  ic:"🔤", t:"شبكةُ الكلمات", d:"كوّنِ الكلماتِ وتنافسْ بالألوان", vs:1, cat:"letters" },
  { id:"numrace",ic:"🔢", t:"تحدّي الأعداد", d:"سابِقِ الآليَّ في الحساب", vs:1, cat:"math" },
  { id:"clock",  ic:"🕐", t:"تحدّي الساعة", d:"اقرأِ الساعةَ (عقارب ورقميّ) وتنافسْ — أنماطٌ متنوّعة", vs:1, nw:1, cat:"math" },
  { id:"hunt",   ic:"🔎", t:"صيدُ الحرف/الرقم", d:"اعثرْ على المطلوبِ بسرعة", vs:1, cat:"skill" },
  { id:"smatch", ic:"⚡", t:"سباقُ المطابقة", d:"جِدِ الصورةَ المطابقةَ أسرع", vs:1, cat:"skill" },
  { id:"spinq",  ic:"🎡", t:"عجلة أدرْ وأجب", d:"أدِرِ العجلةَ ثمّ أجِبْ عن سؤالِ القطاع", vs:1, nw:1, cat:"skill" },
  { id:"memory", ic:"🧠", t:"لعبة الذاكرة", d:"جِد الصورتين المتطابقتين — بمظاهرَ متعدّدة", vs:1, nw:1, cat:"fun" },
  { id:"xo",     ic:"⭕", t:"دائرةٌ وعلامة", d:"ثلاثةٌ في خطٍّ ضدّ الآليّ", vs:1, cat:"fun" },
  { id:"dots",   ic:"▪️", t:"مربّعاتُ النقاط", d:"صِلِ النقاطَ وأغلِقِ المربّعات", vs:1, nw:1, cat:"fun" },
  { id:"print",  ic:"🖨️", t:"ألعاب/أنشطة للطباعة", d:"ألعابٌ تُلعَبُ على الورق + أنشطةٌ حسّيّة", cat:"tool" },
];
// الترفيهيّةُ أوّلًا (طلبُ المستخدم): يفتحُ الطفلُ الصفحةَ فيجدُ ما يُمتِعُه في البداية.
const GAME_GROUPS = [
  { key:"fun",     label:"🎈 ألعابٌ ترفيهيّة" },
  { key:"letters", label:"🔤 ألعابُ الحروفِ والكلمات (تعليميّة)" },
  { key:"math",    label:"🔢 ألعابُ الأرقامِ والوقت (تعليميّة)" },
  { key:"skill",   label:"⚡ ألعابُ المهارةِ والتركيز (تعليميّة)" },
  { key:"tool",    label:"🖨️ أدوات" },
];
let curCat=null; // القسمُ المفتوحُ في لوحةِ الأقسام (null = لوحةُ الأقسام)
function renderMenu(){
  vsRun=false; // مغادرةُ اللعبة إلى قائمة الألعاب ⇒ أوقِفِ المؤقّتات
  document.body.classList.remove("ingame"); // إعادةُ الرأسِ الكامل في القائمة
  // فئةٌ من الرابط (المهامّ) أو من اختيارِ الطفلِ لبطاقةِ قسمٍ في هذه الجلسة.
  const only = new URLSearchParams(location.search).get("only") || curCat;
  const card = g=>`<div class="gcard${g.vs?" vs":""}${g.nw?" hasnew":""}" data-g="${g.id}">${g.vs?'<span class="vsbadge">⚔️ تنافسيّة</span>':''}${g.nw?'<span class="newbadge">🆕 جديد</span>':''}<div class="ic">${iconHtml(g.ic)}</div><div class="t">${g.t}</div><div class="d">${g.d}</div></div>`;
  if(!only){   // ===== لوحةُ الأقسام: بطاقةٌ لكلِّ صنفٍ يدخلُ منها الطفلُ إلى ألعابِه وحدَها =====
    const cats = GAME_GROUPS.map(gr=>{
      const gs=GAMES.filter(g=>g.cat===gr.key); if(!gs.length) return "";
      const vs=gs.filter(g=>g.vs).length, nw=gs.some(g=>g.nw);
      const e=gr.label.trim().slice(0,2), name=gr.label.trim().slice(2).trim();
      return `<div class="ccard" data-cat="${gr.key}">${nw?'<span class="newbadge">🆕 جديد</span>':''}
        <div class="ic">${e}</div><div class="t">${name}</div>
        <div class="d">${gs.length} ${gs.length===1?"لعبة":"ألعاب"}${vs?` · ⚔️ ${vs} تنافسيّة`:""}</div></div>`;
    }).join("");
    view.innerHTML = ageChips() + `<div class="menu cats">${cats}</div>` +
      `<div class="hint">🎓 اختَرْ قسمًا لتظهرَ ألعابُه. علامةُ ⚔️ تعني «تنافسيّة» (ضدّ الآليّ/الإخوة/الوالد).</div>`;
    wireAge(renderMenu);
    view.querySelector(".cats").addEventListener("click", e=>{ const c=e.target.closest("[data-cat]"); if(c){ curCat=c.getAttribute("data-cat"); renderMenu(); try{ scrollTo({top:0,behavior:"smooth"}); }catch(_){} } });

  }
  // ===== قسمٌ بعينِه: ألعابُه وحدَها + رجوعٌ للأقسام =====
  const gr = GAME_GROUPS.find(x=>x.key===only);
  const gs = GAMES.filter(g=>g.cat===only);
  const sections = `<h2 class="gsec">${gr?gr.label:"الألعاب"}</h2><div class="menu">${gs.map(card).join("")}</div>`;
  const bar = `<div class="hint" style="text-align:center;margin-bottom:6px"><button class="backstep" id="allCats">كلُّ الأقسام</button></div>`;
  view.innerHTML = ageChips() + bar + sections;
  wireAge(renderMenu);
  { const b=document.getElementById("allCats"); if(b) b.onclick=()=>{ curCat=null;
      // الرجوعُ من فئةٍ جاءت بالرابطِ (مهمّة) يُنظّفُ الرابطَ كي تظهرَ الأقسامُ لا الفئةُ نفسُها
      try{ if(new URLSearchParams(location.search).get("only")) history.replaceState(null,"","play.html"); }catch(_){}
      renderMenu(); }; }
  view.querySelectorAll(".menu").forEach(m=>m.addEventListener("click", e=>{ const c=e.target.closest("[data-g]"); if(c) open(c.getAttribute("data-g")); }));
}
function open(id){ if(id!=="print") document.body.classList.add("ingame"); // شاشةٌ مخصّصةٌ للّعبة: يُطوى رأسُ الصفحةِ وشريطُ التنقّل
  ({memory:startMemory,train:startTrain,pins:startPins,blocks:startBlocks,fish:startFish,cards:startCards,maze:startMaze,wheel:startWheel,spinq:startSpinQ,xo:startXO,dots:startDots,numrace:startNC,hunt:startHU,smatch:startSM,wgrid:startWG,clock:startClock,print:()=>location.assign("print.html")})[id](); }

/* ===================== 🕐 تحدّي الساعة (v1.5 · versus مشترَك) ===================== */
function startClock(){
  view.innerHTML = backBar()+`<div id="clockhost"></div>`; wireBack();
  clockGame(document.getElementById("clockhost"), { L:AR_L, lang:"ar", speakPhrase:t=>playClipAsync(t), onExit:startClock, onWin:()=>logEvent("clock_win") });
}

/* ===================== 🧠 MEMORY MATCH (وحدي · الإخوة · الوالد · الآليّ) ===================== */
// الصعوبة: 4 أزواج=8 بطاقات · 6=12 · 8=16. الخصم: solo | ai | parent | p:<id>. مستوى الآليّ: easy/medium/hard.
let m_pairs=6, m_deck=[], m_flip=[], m_match=new Set(), m_moves=0, m_lock=false;
let m_opp="solo", m_ai="medium", m_players=[], m_turn=0, m_seen=new Map(), m_timed=true, m_raf=null;
const MEM_MS=8000; // مهلةُ «ضدّ الوقت» لكلِّ حركةِ قلبٍ (في وضعِ اللاعبين)
function memCancelT(){ if(m_raf){ cancelAnimationFrame(m_raf); m_raf=null; } }
function memArmT(){ const t0=Date.now(); memCancelT();
  const tick=()=>{ if(!vsRun){ memCancelT(); return; } const left=MEM_MS-(Date.now()-t0), bar=document.getElementById("memtbar"); if(bar) bar.style.width=Math.max(0,left/MEM_MS*100)+"%";
    if(left<=0){ if(vsRun && m_players.length>1 && !m_lock && m_players[m_turn] && !m_players[m_turn].cpu){ m_flip=[]; m_lock=false; sfx.wrong(); m_turn=(m_turn+1)%m_players.length; renderMemory(); if(m_players[m_turn].cpu) aiTurn(); } return; }
    m_raf=requestAnimationFrame(tick); }; tick(); }
// مظاهرُ لعبة الذاكرة (v1.4): مجموعاتُ أيقوناتٍ مختلفةٌ يختارُها اللاعب — الأصلُ (رسومُ SVG) + مظاهرُ رموزٍ تعبيريّة.
const MEMORY_THEMES = [
  { id:"nature",    name:"مِشكاة",   ic:"🌿", pool:Object.keys(MEMORY_ART), art:k=>MEMORY_ART[k] },
  { id:"animals",   name:"حيوانات", ic:"🐶", pool:["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐸","🐵","🦉","🐷"], art:emojiArt },
  { id:"fruits",    name:"فواكه",   ic:"🍎", pool:["🍎","🍌","🍇","🍓","🍊","🥝","🍒","🍑","🍍","🥥","🍉","🍐","🍋","🥭","🫐"], art:emojiArt },
  { id:"shapes",    name:"أشكال",   ic:"🔷", pool:["🔴","🔵","🟢","🟡","🟣","🟠","🔺","🔷","🟥","🟦","🟩","🟨","🟪","🟧","⬛"], art:emojiArt },
  { id:"transport", name:"مركبات",  ic:"🚗", pool:["🚗","🚌","🚂","✈️","⛵","🚲","🚁","🚀","🚕","🚚","🏍️","🚑","🚒","🚜","🛵"], art:emojiArt },
  { id:"food",      name:"طعام",    ic:"🍕", pool:["🍕","🍔","🍟","🌭","🍩","🍪","🎂","🍰","🧁","🍫","🍿","🥨","🥐","🧀","🍦"], art:emojiArt },
  { id:"faces",     name:"وجوه",    ic:"😀", pool:["😀","😂","😍","🥰","😎","🤩","😐","😴","😡","🤔","😱","🥳","😇","🤗","😢"], art:emojiArt },

  { id:"plants",    name:"نباتات",  ic:"🌸", pool:["🌸","🌷","🌹","🌻","🌺","🌼","🌾","🌵","🌴","🌳","🍀","🍁","🍄","🌿","🪴"], art:emojiArt },

function emojiArt(k){ return `<span class="memoji">${k}</span>`; }
let m_theme="nature", m_art=null;

function startMemory(){ renderMemSetup(); try{speak(GI.memory);}catch(e){} }
function meCard(){ const u=getCurrentUser(); return (u && u.name) ? { name:u.name, avatar:u.avatar||"🙂" } : { name:"أنت", avatar:"🧒" }; }
function siblings(){ const u=getCurrentUser(); return listProfiles().filter(p=>!u||p.id!==u.id).map(p=>({ key:"p:"+p.id, name:p.name, avatar:p.avatar||"🙂" })); }

function renderMemSetup(){
  const sibs = siblings();
  const oppList = `<button data-opp="solo" class="${m_opp==="solo"?"on":""}">🧒 وحدي</button>`
    + `<button data-opp="ai" class="${m_opp==="ai"?"on":""}">🤖 ضدّ الآليّ</button>`
    + sibs.map(s=>`<button data-opp="${s.key}" class="${m_opp===s.key?"on":""}">${s.avatar} ${s.name}</button>`).join("")
    + `<button data-opp="parent" class="${m_opp==="parent"?"on":""}">${getParentAvatar()} ${getParentName()}</button>`;
  view.innerHTML = backBar()+
    `<div class="clue" style="padding:12px"><div class="say">${GI.memory}</div></div>
     <div class="memset">
       <div class="setrow"><div class="setlbl">🎚️ الصعوبة</div><div class="lvl" id="mlvl"><button data-p="4" class="${m_pairs===4?"on":""}">سهل · 8</button><button data-p="6" class="${m_pairs===6?"on":""}">متوسّط · 12</button><button data-p="8" class="${m_pairs===8?"on":""}">صعب · 16</button><button data-p="10" class="${m_pairs===10?"on":""}">خبير · 20</button></div></div>
       <div class="setrow"><div class="setlbl">🎨 المظهر</div><div class="lvl" id="mtheme">${MEMORY_THEMES.map(t=>`<button data-t="${t.id}" class="${m_theme===t.id?"on":""}">${t.ic} ${t.name}</button>`).join("")}</div></div>
       <div class="setrow"><div class="setlbl">👥 اللعبُ مع</div><div class="lvl" id="mopp">${oppList}</div></div>
       <div class="setrow" id="mprow" style="${m_opp==="parent"?"":"display:none"}"><div class="setlbl">👤 مَن سيلعب؟ (ليخاطبَه الآليُّ صحيحًا)</div><div class="lvl" id="mpg"><button data-pg="m" class="${!VS.parentFemale?"on":""}">👨 أب</button><button data-pg="f" class="${VS.parentFemale?"on":""}">👩 أم</button></div></div>
       <div class="setrow" id="airow" style="${m_opp==="ai"?"":"display:none"}"><div class="setlbl">🤖 مستوى الآليّ</div><div class="lvl" id="maint"><button data-ai="easy" class="${m_ai==="easy"?"on":""}">سهل</button><button data-ai="medium" class="${m_ai==="medium"?"on":""}">متوسّط</button><button data-ai="hard" class="${m_ai==="hard"?"on":""}">صعب</button></div></div>
       <div class="setrow"><div class="setlbl">⏱️ ضدّ الوقت</div><div class="lvl" id="mtimed"><button data-tm="1" class="${m_timed?"on":""}">مُفعَّل</button><button data-tm="0" class="${!m_timed?"on":""}">مُعطَّل</button></div></div>
       <button id="memStart">▶ ابدأ اللعب</button>
     </div>`;
  wireBack();
  document.getElementById("mlvl").addEventListener("click",e=>{ const b=e.target.closest("[data-p]"); if(!b)return; m_pairs=+b.getAttribute("data-p"); renderMemSetup(); });
  document.getElementById("mtheme").addEventListener("click",e=>{ const b=e.target.closest("[data-t]"); if(!b)return; m_theme=b.getAttribute("data-t"); renderMemSetup(); });
  document.getElementById("mopp").addEventListener("click",e=>{ const b=e.target.closest("[data-opp]"); if(!b)return; m_opp=b.getAttribute("data-opp"); renderMemSetup(); });
  { const mpg=document.getElementById("mpg"); if(mpg) mpg.addEventListener("click",e=>{ const b=e.target.closest("[data-pg]"); if(!b)return; setParentFemale(b.getAttribute("data-pg")==="f"); renderMemSetup(); }); }
  document.getElementById("maint").addEventListener("click",e=>{ const b=e.target.closest("[data-ai]"); if(!b)return; m_ai=b.getAttribute("data-ai"); renderMemSetup(); });
  document.getElementById("mtimed").addEventListener("click",e=>{ const b=e.target.closest("[data-tm]"); if(!b)return; m_timed=b.getAttribute("data-tm")==="1"; renderMemSetup(); });
  document.getElementById("memStart").onclick=newMemGame;
}

function newMemGame(){ vsRun=true;
  const T=MEMORY_THEMES.find(t=>t.id===m_theme)||MEMORY_THEMES[0]; m_art=T.art;
  const chosen=shuffle([...T.pool]).slice(0,m_pairs);
  m_deck=shuffle([...chosen,...chosen]); m_flip=[]; m_match=new Set(); m_moves=0; m_lock=false; m_seen=new Map(); m_turn=vsStartIndex(m_players);
  const me=meCard(); const u=getCurrentUser(); const meF=!!(u&&u.gender==="f");
  if(m_opp==="ai") m_players=[{...me,role:"me",female:meF,score:0,cpu:false},{name:"الآليّ",avatar:"🤖",role:"ai",score:0,cpu:true}];
  else if(m_opp==="parent") m_players=[{...me,role:"me",female:meF,score:0,cpu:false},{name:getParentName(),avatar:getParentAvatar(),role:"parent",score:0,cpu:false,female:VS.parentFemale}];
  else if(m_opp.startsWith("p:")){ const p=getProfile(m_opp.slice(2)); m_players=[{...me,role:"me",female:meF,score:0,cpu:false},{name:p?p.name:"اللاعب 2",avatar:(p&&p.avatar)||"🙂",role:"sibling",score:0,cpu:false,female:!!(p&&p.gender==="f")}]; }
  else m_players=[{...me,role:"me",female:meF,score:0,cpu:false}]; // وحدي
  renderMemory();
}

function renderMemory(){
  const multi=m_players.length>1;
  const board = multi
    ? m_players.map((p,k)=>`<span class="pill ${k===m_turn?"turn":""}">${p.avatar} ${p.name}: <b>${p.score}</b></span>`).join("")
    : `<span class="pill">المحاولات: <b>${m_moves}</b></span><span class="pill">المطابقات: <b>${m_match.size/2}</b></span>`;
  const turnNote = multi ? vsTurnHtml(m_players[m_turn]) : "";
  const armT = multi && m_timed && m_players[m_turn] && !m_players[m_turn].cpu && !m_lock && m_match.size < m_deck.length;
  view.innerHTML = backBar()+`<div class="gbar">${board}</div>${turnNote}${armT?`<div class="hubar" style="max-width:420px;margin:4px auto"><span id="memtbar"></span></div>`:""}<div class="mgrid" id="grid"></div><div id="msg"></div>`;
  wireBack();
  memCancelT(); if(armT) memArmT();   // «ضدّ الوقت»: عدّادٌ لحركةِ اللاعب
  const grid=document.getElementById("grid");
  const art=m_art||MEMORY_THEMES[0].art;
  grid.innerHTML=m_deck.map((k,i)=>{ const up=m_flip.includes(i)||m_match.has(i); return `<div class="mcard ${up?"up":""} ${m_match.has(i)?"matched":""}" data-i="${i}"><div class="fback">${ROBO_SVG}</div><div class="ffront">${art(k)}</div></div>`; }).join("");
  grid.querySelectorAll(".mcard").forEach(c=>c.addEventListener("click",()=>onMemCard(+c.getAttribute("data-i"))));
}
function onMemCard(i){
  if(m_lock||m_flip.includes(i)||m_match.has(i))return;
  if(m_players.length>1 && m_players[m_turn].cpu) return; // دورُ الآليّ
  flipCard(i);
}
function flipCard(i){
  m_flip.push(i); m_seen.set(i,m_deck[i]); sfx.tap(); renderMemory();
  if(m_flip.length<2) return;
  m_moves++; m_lock=true;
  const [a,b]=m_flip, multi=m_players.length>1;
  if(m_deck[a]===m_deck[b]){
    setTimeout(()=>{ if(!vsRun) return; m_match.add(a); m_match.add(b); if(multi) m_players[m_turn].score++; m_flip=[]; m_lock=false; renderMemory();
      const done = m_match.size===m_deck.length;
      if(!done){ // ردّةُ فعلِ الآليّ على المطابقة (بصوته العصبيّ)
        if(multi){ const cur=m_players[m_turn]; if(cur.cpu){ sfx.success(); if(Math.random()<0.4) robo.say(vP(VS_AIOK),"happy"); } else robo.cheer(vP(VS_OK), {female:cur.female}); }
        else sfx.success();
      }
      if(done){ memWin(); return; }
      if(multi && m_players[m_turn].cpu) aiTurn(); // الآليّ يطابقَ ⇒ يلعبُ ثانيةً
    },520);
  } else {
    setTimeout(()=>{ if(!vsRun) return; m_flip=[]; m_lock=false; if(multi) m_turn=(m_turn+1)%m_players.length; renderMemory();
      if(multi && m_players[m_turn].cpu) aiTurn();
    },820);
  }
}
function aiPickPair(){
  const avail=[...m_deck.keys()].filter(i=>!m_match.has(i));
  const knownByIcon={}; for(const i of avail){ if(m_seen.has(i)) (knownByIcon[m_deck[i]]=knownByIcon[m_deck[i]]||[]).push(i); }
  const knownPair=Object.values(knownByIcon).find(arr=>arr.length>=2);
  const useMem = m_ai==="hard" ? true : m_ai==="medium" ? Math.random()<0.6 : false;
  if(useMem && knownPair) return [knownPair[0],knownPair[1]];
  const a=avail[Math.floor(Math.random()*avail.length)];
  let b=null;
  if(useMem){ b=avail.find(i=>i!==a && m_seen.has(i) && m_deck[i]===m_deck[a]) || null; }
  if(b==null){ const rest=avail.filter(i=>i!==a); b=rest[Math.floor(Math.random()*rest.length)]; }
  return [a,b];
}
function aiTurn(){ if(!vsRun) return;
  m_lock=true;
  setTimeout(()=>{ const [a,b]=aiPickPair(); m_flip=[a]; m_seen.set(a,m_deck[a]); renderMemory();
    setTimeout(()=>{ m_lock=false; flipCard(b); }, 750);
  }, 750);
}
// ردودُ الآليّ التنافسيّة (لا «خطأٌ في اختبار») — يخسرُ بروحٍ رياضيّةٍ ويفوزُ بتواضع.
function memWin(){
  logEvent("memory_win");
  if(m_players.length>1){ vsEndRound(m_players, { game:"الذاكرة", diff:(m_pairs*2)+" بطاقة", onAgain:newMemGame, onExit:startMemory }); return; }
  robo.cheer();
  document.getElementById("msg").innerHTML=`<div class="win">🌟 أحسنت! وجدتَ كلَّ المطابقات في <b>${m_moves}</b> محاولة.<div class="controls"><button class="go" id="again">العب ثانيةً</button> <button id="reset2">↻ إعدادات</button></div></div>`;
  document.getElementById("again").onclick=newMemGame;
  document.getElementById("reset2").onclick=startMemory;
}

/* ===================== 🚂 TRAIN — ORDER ===================== */
let t_tiles=[], t_order=[], t_placed=[], t_solved=false;
function startTrain(){ cur=pickWord(); t_tiles=[...cur.word].map((l,i)=>({id:i,letter:l})); t_order=shuffle(t_tiles.map(t=>t.id)); t_placed=[]; t_solved=false; renderTrain(); }
function renderTrain(){
  const n=t_tiles.length;
  const slots=Array.from({length:n},(_,s)=> t_placed[s]!=null
    ? `<div class="slot full ${t_solved?"ok":""}" data-s="${s}">${t_tiles[t_placed[s]].letter}</div>`
    : `<div class="slot ${s===t_placed.length?"next":""}"></div>`).join("");
  const pool=t_order.filter(id=>!t_placed.includes(id)).map(id=>`<button class="tile" data-id="${id}">${t_tiles[id].letter}</button>`).join("");
  view.innerHTML = backBar()+`<div class="gbar">${ageChips()}</div>`+clueCard("رتّب عربات الحروف من أوّل الكلمة",true)+
    `<div class="row s-train" id="slots">${slots}</div><div class="pool s-train" id="pool">${pool}</div><div id="fb"></div>`+
    `<div class="controls"><button data-act="hint">💡 تلميح</button><button data-act="say">🔊 استمع</button><button data-act="clear">↺ أفرغ</button><button class="go" data-act="next">كلمة جديدة ⏭️</button></div>`;
  wireBack(); wireAge(startTrain);
  view.querySelector("#pool").addEventListener("click",e=>{ const b=e.target.closest("[data-id]"); if(b&&!t_solved){ t_placed.push(+b.getAttribute("data-id")); renderTrain(); if(t_placed.length===n) tValidate(); }});
  view.querySelector("#slots").addEventListener("click",e=>{ const d=e.target.closest(".slot.full"); if(d&&!t_solved){ t_placed.splice(+d.getAttribute("data-s"),1); renderTrain(); }});
  view.querySelector(".controls").addEventListener("click",e=>{ const b=e.target.closest("[data-act]"); if(!b)return; const a=b.getAttribute("data-act");
    if(a==="hint"){const f=document.getElementById("flash");f.classList.add("on");setTimeout(()=>f.classList.remove("on"),1300);}
    else if(a==="say")robo.read(cur.word); else if(a==="clear"){t_placed=[];t_solved=false;renderTrain();} else if(a==="next")startTrain(); });
}
function tValidate(){
  if(t_placed.map(id=>t_tiles[id].letter).join("")===cur.word){ t_solved=true; celebrate(); renderTrain(); document.getElementById("fb").innerHTML=winBanner("انطلق القطار! 🚂"); try{document.getElementById("fb").scrollIntoView({behavior:"smooth",block:"center"});}catch(_){} document.getElementById("cont").onclick=startTrain; }
  else { streak=0; robo.encourage(); document.querySelectorAll("#slots .slot.full").forEach(el=>el.classList.add("err")); document.getElementById("fb").innerHTML=`<div class="fb">ليست صحيحة — جرّب ترتيبًا آخر أو ↺ أفرغ.</div>`; setTimeout(()=>{ if(!t_solved) renderTrain(); },750); }
}

/* ===================== 🧺 PINS — SWAP ===================== */
let p_arr=[], p_sel=null, p_swaps=0, p_solved=false;
function startPins(){ cur=pickWord(); const L=[...cur.word]; do{ p_arr=shuffle(L.map((l,i)=>({l,k:i}))); }while(p_arr.map(x=>x.l).join("")===cur.word && L.length>1); p_sel=null; p_swaps=0; p_solved=false; renderPins(); }
function renderPins(){
  const pegs=p_arr.map((x,i)=>`<div class="peg ${p_sel===i?"sel":""} ${p_solved?"ok":""}" data-i="${i}">${x.l}</div>`).join("");
  view.innerHTML = backBar()+`<div class="gbar">${ageChips()}</div>`+clueCard("الحروف مبعثرة — اضغط حرفين ليتبادلا أماكنهما حتى تصحّ الكلمة",true)+
    `<div class="row s-pins" id="line">${pegs}</div><div class="fb">التبديلات: <b>${p_swaps}</b></div><div id="fb"></div>`+
    `<div class="controls"><button data-act="hint">💡 تلميح</button><button data-act="say">🔊 استمع</button><button data-act="shuffle">🔀 اخلط</button><button class="go" data-act="next">كلمة جديدة ⏭️</button></div>`;
  wireBack(); wireAge(startPins);
  view.querySelector("#line").addEventListener("click",e=>{ const d=e.target.closest(".peg"); if(!d||p_solved)return; const i=+d.getAttribute("data-i");
    if(p_sel===null){ p_sel=i; } else if(p_sel===i){ p_sel=null; } else { [p_arr[p_sel],p_arr[i]]=[p_arr[i],p_arr[p_sel]]; p_sel=null; p_swaps++; if(p_arr.map(x=>x.l).join("")===cur.word){ p_solved=true; celebrate(); renderPins(); document.getElementById("fb").innerHTML=winBanner("نشرتها بالترتيب! 🧺"); try{document.getElementById("fb").scrollIntoView({behavior:"smooth",block:"center"});}catch(_){} document.getElementById("cont").onclick=startPins; return; } }
    renderPins(); });
  view.querySelector(".controls").addEventListener("click",e=>{ const b=e.target.closest("[data-act]"); if(!b)return; const a=b.getAttribute("data-act");
    if(a==="hint"){const f=document.getElementById("flash");f.classList.add("on");setTimeout(()=>f.classList.remove("on"),1300);}
    else if(a==="say")robo.read(cur.word); else if(a==="shuffle"||a==="next")startPins(); });
}

/* ===================== 🧱 BLOCKS — FILL ===================== */
let b_L=[], b_gaps=[], b_filled={}, b_cands=[], b_solved=false;
function startBlocks(){ cur=pickWord(); b_L=[...cur.word]; const gc=(age==="7-10"&&b_L.length>=4)?2:1;
  b_gaps=shuffle(b_L.map((_,i)=>i)).slice(0,gc).sort((a,b)=>a-b); b_filled={}; b_solved=false;
  const need=b_gaps.map(i=>b_L[i]); b_cands=shuffle(need.concat(distractors(b_L, Math.max(2,4-need.length))).map((l,i)=>({l,id:i,used:false}))); renderBlocks(); }
function nextGap(){ return b_gaps.find(g=>b_filled[g]==null); }
function renderBlocks(){
  const ng=nextGap();
  const word=b_L.map((l,i)=>{ if(b_gaps.includes(i)){ const f=b_filled[i]; return `<div class="slot gap ${f!=null?"full ok":(i===ng?"next":"")}">${f!=null?f:""}</div>`; } return `<div class="slot fixed">${l}</div>`; }).join("");
  const cands=b_cands.filter(c=>!c.used).map(c=>`<button class="tile cand" data-id="${c.id}">${c.l}</button>`).join("");
  view.innerHTML = backBar()+`<div class="gbar">${ageChips()}</div>`+clueCard("الكلمة ينقصها حرف — اختر المكعّب الصحيح لإكمالها",false)+
    `<div class="row s-blocks" id="word">${word}</div><div class="pool s-blocks" id="cands">${cands}</div><div id="fb"></div>`+
    `<div class="controls"><button data-act="say">🔊 استمع</button><button class="go" data-act="next">كلمة جديدة ⏭️</button></div>`;
  wireBack(); wireAge(startBlocks);
  view.querySelector("#cands").addEventListener("click",e=>{ const b=e.target.closest("[data-id]"); if(!b||b_solved)return; const c=b_cands.find(x=>x.id===+b.getAttribute("data-id")); const g=nextGap();
    if(g!=null && c.l===b_L[g]){ b_filled[g]=c.l; c.used=true; if(nextGap()==null){ b_solved=true; celebrate(); renderBlocks(); document.getElementById("fb").innerHTML=winBanner("بنيتَ الكلمة! 🧱"); try{document.getElementById("fb").scrollIntoView({behavior:"smooth",block:"center"});}catch(_){} document.getElementById("cont").onclick=startBlocks; return;} renderBlocks(); }
    else { b.classList.add("dart"); streak=0; robo.encourage(); setTimeout(()=>b.classList.remove("dart"),450); }});
  view.querySelector(".controls").addEventListener("click",e=>{ const b=e.target.closest("[data-act]"); if(!b)return; if(b.getAttribute("data-act")==="say")robo.read(cur.word); else startBlocks(); });
}

/* ===================== 🎣 FISH — SELECT among distractors ===================== */
let f_word=[], f_prog=0, f_pond=[], f_solved=false;
function startFish(){ cur=pickWord(); f_word=[...cur.word]; f_prog=0; f_solved=false;
  const dis=distractors(f_word, Math.min(4, Math.max(2, 6-f_word.length))).map((l,i)=>({l,id:"d"+i}));
  f_pond=shuffle(f_word.map((l,i)=>({l,id:"w"+i})).concat(dis)); renderFish(); }
function renderFish(){
  const caught=f_word.map((l,i)=>`<div class="slot ${i<f_prog?"full ok":(i===f_prog?"next":"")}">${i<f_prog?l:""}</div>`).join("");
  const pond=f_pond.map(f=>`<button class="tile fish" data-id="${f.id}">${f.l}</button>`).join("");
  view.innerHTML = backBar()+`<div class="gbar">${ageChips()}</div>`+clueCard("اصطَد حروف الكلمة بالترتيب — وتجاهَل الحروف الدخيلة!",true)+
    `<div class="row s-fish caught">${caught}</div><div class="pool s-fish pond" id="pond">${pond}</div><div id="fb"></div>`+
    `<div class="controls"><button data-act="hint">💡 تلميح</button><button data-act="say">🔊 استمع</button><button class="go" data-act="next">كلمة جديدة ⏭️</button></div>`;
  wireBack(); wireAge(startFish);
  view.querySelector("#pond").addEventListener("click",e=>{ const b=e.target.closest(".fish"); if(!b||f_solved)return; const id=b.getAttribute("data-id"); const f=f_pond.find(x=>x.id===id);
    if(f.l===f_word[f_prog]){ b.classList.add("dart"); f_prog++; setTimeout(()=>{ f_pond=f_pond.filter(x=>x.id!==id); if(f_prog>=f_word.length){ f_solved=true; celebrate(); renderFish(); document.getElementById("fb").innerHTML=winBanner("اصطدتها كلّها! 🎣"); try{document.getElementById("fb").scrollIntoView({behavior:"smooth",block:"center"});}catch(_){} document.getElementById("cont").onclick=startFish; } else renderFish(); },300); }
    else { streak=0; robo.encourage(); b.classList.add("dart"); setTimeout(()=>b.classList.remove("dart"),450); }});
  view.querySelector(".controls").addEventListener("click",e=>{ const b=e.target.closest("[data-act]"); if(!b)return; const a=b.getAttribute("data-act");
    if(a==="hint"){const f=document.getElementById("flash");f.classList.add("on");setTimeout(()=>f.classList.remove("on"),1300);} else if(a==="say")robo.read(cur.word); else startFish(); });
}

/* ===================== 🧩 CARDS — MULTIPLE CHOICE ===================== */
let c_opts=[], c_done=false;
function spellingVariants(word){ const set=new Set(); let g=0;
  while(set.size<2 && g++<60){ const a=[...word]; const i=Math.floor(Math.random()*(a.length-1)); [a[i],a[i+1]]=[a[i+1],a[i]]; const s=a.join(""); if(s!==word) set.add(s); }
  while(set.size<2 && g++<120){ const a=[...word]; const i=Math.floor(Math.random()*a.length); a[i]=WL[Math.floor(Math.random()*WL.length)]; const s=a.join(""); if(s!==word) set.add(s); }
  return [...set].slice(0,2); }
function startCards(){ cur=pickWord(); c_done=false; c_opts=shuffle([cur.word, ...spellingVariants(cur.word)]); renderCards(); }
function renderCards(){
  view.innerHTML = backBar()+`<div class="gbar">${ageChips()}</div>`+clueCard("أيُّ كتابةٍ صحيحةٌ لهذه الصورة؟",false)+
    `<div class="choices" id="choices">${c_opts.map((o,i)=>`<button class="choice" data-i="${i}" dir="rtl">${o}</button>`).join("")}</div><div id="fb"></div>`+
    `<div class="controls"><button data-act="say">🔊 استمع</button><button class="go" data-act="next">صورة جديدة ⏭️</button></div>`;
  wireBack(); wireAge(startCards);
  view.querySelector("#choices").addEventListener("click",e=>{ const b=e.target.closest(".choice"); if(!b||c_done)return; c_done=true; const pick=c_opts[+b.getAttribute("data-i")];
    view.querySelectorAll(".choice").forEach(el=>{ el.disabled=true; if(c_opts[+el.getAttribute("data-i")]===cur.word) el.classList.add("correct"); });
    if(pick===cur.word){ celebrate(); document.getElementById("fb").innerHTML=winBanner("اختيارٌ صحيح! 🧩"); try{document.getElementById("fb").scrollIntoView({behavior:"smooth",block:"center"});}catch(_){} document.getElementById("cont").onclick=startCards; }
    else { streak=0; b.classList.add("wrong"); robo.encourage(); document.getElementById("fb").innerHTML=`<div class="controls"><button class="go" id="cont">صورة أخرى ▶</button></div>`; document.getElementById("cont").onclick=startCards; }});
  view.querySelector(".controls").addEventListener("click",e=>{ const b=e.target.closest("[data-act]"); if(!b)return; if(b.getAttribute("data-act")==="say")robo.read(cur.word); else startCards(); });
}

/* ===================== 🌀 MAZE ===================== */
let mz=null, mzP=0;
const nbrs=(c,N)=>{ const r=Math.floor(c/N),col=c%N,o=[]; if(r>0)o.push(c-N); if(r<N-1)o.push(c+N); if(col>0)o.push(c-1); if(col<N-1)o.push(c+1); return o; };
function walk(N,len){ const s=Math.floor(Math.random()*N*N),v=[s]; let c=s; for(let i=1;i<len;i++){ const nb=nbrs(c,N).filter(x=>!v.includes(x)); if(!nb.length)return null; c=nb[Math.floor(Math.random()*nb.length)]; v.push(c);} return v; }
function startMaze(){ cur=pickWord(); const L=[...cur.word], N=L.length<=3?4:5; let path=null,t=0; while(!path&&t++<500)path=walk(N,L.length); if(!path){startMaze();return;}
  const grid=Array(N*N).fill(null); path.forEach((c,i)=>grid[c]=L[i]); for(let i=0;i<N*N;i++) if(grid[i]==null) grid[i]=WL[Math.floor(Math.random()*WL.length)];
  mz={N,grid,path,target:path[path.length-1],L}; mzP=0; renderMaze(); }
function renderMaze(){
  const {N,grid,path,target,L}=mz, done=mzP>=L.length;
  const guide=L.map((l,i)=>`<span class="gchip ${i<mzP?"got":""}">${l}</span>`).join("");
  const cells=grid.map((ch,i)=>{ let cls="cell"; const idx=path.indexOf(i); if(idx>-1&&idx<mzP)cls+=" path"; if(i===path[0]&&mzP===0)cls+=" start"; if(i===target&&done)cls+=" target"; return `<div class="${cls}" data-i="${i}">${(i===target&&done)?cur.emoji:ch}</div>`; }).join("");
  view.innerHTML = backBar()+`<div class="gbar">${ageChips()}</div>`+`<div class="clue" style="padding:12px"><div class="emoji">${cur.emoji}</div><div class="say">امشِ على الحروف بالترتيب لتصل إلى الصورة</div></div>`+
    `<div class="mazewrap"><div class="guide">${guide}</div><div class="maze" id="maze" style="grid-template-columns:repeat(${N},1fr);max-width:${N*62}px">${cells}</div></div><div id="fb"></div>`+
    `<div class="controls"><button data-act="hint">💡 تلميح</button><button data-act="reset">↺ من جديد</button><button class="go" data-act="new">🔀 متاهة جديدة</button></div>`;
  wireBack(); wireAge(startMaze);
  view.querySelector("#maze").addEventListener("click",e=>{ const d=e.target.closest(".cell"); if(!d||done)return; const i=+d.getAttribute("data-i");
    if(i===path[mzP]){ mzP++; if(mzP>=L.length){ celebrate(); renderMaze(); document.getElementById("fb").innerHTML=winBanner("وصلت! 🌟"); try{document.getElementById("fb").scrollIntoView({behavior:"smooth",block:"center"});}catch(_){} document.getElementById("cont").onclick=startMaze; } else renderMaze(); }
    else { streak=0; robo.encourage(); d.classList.add("bad"); setTimeout(()=>d.classList.remove("bad"),400); }});
  view.querySelector(".controls").addEventListener("click",e=>{ const b=e.target.closest("[data-act]"); if(!b)return; const a=b.getAttribute("data-act");
    if(a==="hint"){ const el=view.querySelector(`.cell[data-i="${path[mzP]}"]`); if(el){el.classList.add("start");setTimeout(()=>el.classList.remove("start"),900);} }
    else if(a==="reset"){ mzP=0; renderMaze(); } else if(a==="new")startMaze(); });
}

/* ===================== 🎡 WHEEL ===================== */
// عجلةٌ دوّارةٌ بأسلوب «أدرْ وأجب» (تُعيدُ استخدامَ sqSvg): تقفُ على حرفٍ فيتعلّمُ الطفلُ صوتَه ودمجَه بالحركات ومثالًا عليه.
const LW_COLORS=["#6FB3D6","#E0566B","#7BB661","#F4B740","#C9A0DC","#E08E45","#4C8BF5","#E8912D"];
let lw_letters=[], lw_rot=0;
function startWheel(){ lw_letters = shuffle([...WL]).slice(0, 8); lw_rot=0; renderLetterWheel(); }
function renderLetterWheel(){
  const cats = lw_letters.map((ch,i)=>({ic:ch, color:LW_COLORS[i%LW_COLORS.length]}));
  view.innerHTML = backBar()+`<div class="clue" style="padding:10px"><div class="say">🎡 أدِرِ العجلةَ لتقفَ على حرفٍ، ثمّ تعلّمْ صوتَه ومقاطعَه!</div></div>`
    + `<div class="sqwrap">${sqSvg(cats)}</div>`
    + `<div style="text-align:center;margin:10px 0"><button class="sqbtn" id="sqBtn">أدِرِ العجلة</button> <button class="secbtn" id="lwNew" style="margin-inline-start:8px">🔤 حروفٌ جديدة</button></div>`
    + `<div id="lwBox"></div>`;
  wireBack();
  const g=document.getElementById("sqG"); if(g) g.style.transform=`rotate(${lw_rot}deg)`;
  document.getElementById("sqBtn").onclick=lwSpin;
  document.getElementById("lwNew").onclick=startWheel;

function lwSpin(){ const g=document.getElementById("sqG"), btn=document.getElementById("sqBtn"); if(!g) return;
  btn.disabled=true; btn.classList.add("spinning"); const box=document.getElementById("lwBox"); if(box) box.innerHTML="";
  const N=lw_letters.length, i=rand(N), want=(360-(i+0.5)*(360/N))%360;
  lw_rot = lw_rot - (lw_rot%360) + want + 360*5;
  g.style.transition="transform 3.4s cubic-bezier(.15,.68,.2,1)"; g.style.transform=`rotate(${lw_rot}deg)`;
  sfx.tap();
  setTimeout(()=>{ const b=document.getElementById("sqBtn"); if(b){ b.disabled=false; b.classList.remove("spinning"); } lwLearn(lw_letters[i]); }, 3500);
}
function lwLearn(ch){ const box=document.getElementById("lwBox"); if(!box) return;
  const H=[["فتحة","َ"],["ضمّة","ُ"],["كسرة","ِ"]];   // حرف + حركة = مقطع (أساسُ القراءة)
  const ex = shuffle(WORDS.filter(w=>[...w.word].includes(ch)))[0];
  box.innerHTML = `<div class="lwlearn">
      <div class="lwbig">${ch}<button class="saysm" data-say="${ch}" title="اسمع الحرف">🔊</button></div>
      <div class="lwsub">ادمجِ الحرفَ بالحركات — اضغطْ لتسمعَ المقطع:</div>
      <div class="lwsyl">${H.map(([nm,hk])=>`<button class="lwchip" data-say="${ch+hk}"><b>${ch+hk}</b><span>${nm}</span></button>`).join("")}</div>
      ${ex?`<div class="lwex"><span>مثالٌ فيه الحرف:</span><button class="lwword" data-say="${ex.word}">${ex.emoji} <b>${ex.word}</b> 🔊</button></div>`:""}
    </div>`;
  box.querySelectorAll("[data-say]").forEach(b=>b.onclick=()=>robo.read(b.getAttribute("data-say")));
  try{ box.scrollIntoView({behavior:"smooth", block:"center"}); }catch(e){} // انتقالٌ تلقائيٌّ إلى لوحةِ تعلُّمِ الحرف
  robo.read(ch); sfx.success();
}

/* ===================== الإطارُ التنافسيُّ المشترك (خصم + صعوبة + ردود + ألوان) ===================== */
// يتقاسمُه ألعابُ: دائرةٌ وعلامة · سباقُ المطابقة · سباقُ الأعداد · صيدُ الحرف · شبكةُ الكلمات.
let vs_opp="ai", vs_ai="medium";
// النصوصُ من robo-phrases (GAME_REACTIONS) — مُولَّدةٌ عبر Piper فتُعرَض وتُنطَق بالنصّ نفسِه عصبيًّا.
const VS_BEATAI=GR.beatai, VS_AIWON=GR.aiwon, VS_TIE=GR.tie, VS_KIDS=GR.kids, VS_OK=GR.ok, VS_NO=GR.no, VS_AIOK=GR.aiok;
const vP=a=>a[Math.floor(Math.random()*a.length)];
const VS_COLA="#E0566B", VS_COLB="#4C8BF5";
const AIDIFF=x=>({easy:"سهل",medium:"متوسّط",hard:"صعب"}[x]||"");   // صعوبةُ الآليّ عربيًّا (لسجلِّ الألعاب)
function vsMakePlayers(forceTwo){
  const u=getCurrentUser();
  const me=meCard(), m={...me,role:"me",female:!!(u&&u.gender==="f"),score:0,cpu:false,color:VS_COLA};
  if(vs_opp==="ai") return [m,{name:"الآليّ",avatar:"🤖",role:"ai",score:0,cpu:true,color:VS_COLB}];
  if(vs_opp==="parent") return [m,{name:getParentName(),avatar:getParentAvatar(),role:"parent",score:0,cpu:false,female:VS.parentFemale,color:VS_COLB}];
  if(vs_opp.startsWith("p:")){ const p=getProfile(vs_opp.slice(2)); return [m,{name:p?p.name:"اللاعب 2",avatar:(p&&p.avatar)||"🙂",role:"sibling",score:0,cpu:false,female:!!(p&&p.gender==="f"),color:VS_COLB}]; }
  return forceTwo ? [m,{name:"الآليّ",avatar:"🤖",role:"ai",score:0,cpu:true,color:VS_COLB}] : [m]; // وحدي (أو إجبارُ خصمٍ للألعاب الثنائيّة)
}
function vsReact(p0,p1){ if(!p1){ robo.cheer(); return; } if(p1.cpu){ if(p0.score>p1.score) robo.read(vP(VS_BEATAI)); else if(p1.score>p0.score) robo.read(vP(VS_AIWON)); else robo.read(vP(VS_TIE)); } else robo.read(vP(VS_KIDS)); }
function vsScoreHtml(ps){ return `<div class="vsscore">`+ps.map((p,i)=>{ const w=vsWinsOf(p.name); return `<span class="vschip" style="border-color:${p.color};color:${p.color}">${p.avatar} ${p.name}: ${p.score}${w?` <b style="opacity:.8">🏅${w}</b>`:""}</span>`; }).join("")+`</div>`; }
// شاشةُ إعدادٍ عامّة: cfg={ say, diffLabel?, diffs:[{v,label}], getDiff, setDiff, start, soloOk? }
// حارسٌ يوقفُ اللعبةَ عند مغادرتها فلا تبقى مؤقّتاتُها/ذكاءُ الآليّ يعملُ في الخلفيّة ويُرجِعُ للّعب قسرًا.
let vsRun=false;
function vsSetup(cfg){
