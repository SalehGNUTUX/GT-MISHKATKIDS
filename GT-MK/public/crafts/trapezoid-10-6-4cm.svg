  <text x="105" y="105" text-anchor="middle" font-size="4" fill="#C7613F">6 سم</text>
  <text x="105" y="161" text-anchor="middle" font-size="4" fill="#C7613F">10 سم</text>
  <text x="40" y="133" text-anchor="end" font-size="4" fill="#C7613F">4</text>

  <circle cx="105" cy="116" r="1.5" fill="none" stroke="#5E9A47" stroke-width="0.4" stroke-dasharray="0.6,0.6"/>
