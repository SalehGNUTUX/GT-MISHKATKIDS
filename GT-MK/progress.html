<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<script>(function(){try{var t=localStorage.getItem('tilmithi_theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<style id="theme-crit">html[data-theme="dark"]{--bg:#15151b;--card:#23232c;--ink:#ECE7DD;--muted:#A39E94;--line:#34343f;--primary-d:#E8987E;--shadow:0 6px 20px rgba(0,0,0,.45)}html[data-theme="dark"] body{background:var(--bg);color:var(--ink)}</style>
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="مِشكاة" />
<meta name="theme-color" content="#E07A5F" />
<title>مِشكاة — تقدّمي</title>
<style>
  :root{
    --bg:#FBF7EF; --card:#FFFFFF; --ink:#2B2B2B; --muted:#6B6B6B;
    --line:#ECE6DA; --primary:#E07A5F; --primary-d:#C7613F; --good:#7BB661; --gold:#F4C95D;
    --shadow:0 6px 20px rgba(0,0,0,.07);
    font-family:"Noto Sans Arabic","Segoe UI",Tahoma,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  button,a,input,textarea,select,.region,.toggle,.chip,.capbtn,[onclick]{touch-action:manipulation}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:640px;margin:0 auto;padding:16px 16px 48px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 12px}
  header h1{font-size:22px;margin:0}
  header .sub{color:var(--muted);font-size:13px}
  .topbtn{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;font-size:14px;cursor:pointer;text-decoration:none;color:var(--ink)}
  h2{font-size:16px;color:var(--primary-d);margin:20px 4px 8px}

  .mission{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:14px 16px}
  .mission.done{background:#EEF6E9;border-color:#CDE6BE}
  .mtitle{font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .mrow{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;padding:8px 6px;border-top:1px solid var(--line)}
  .mrow .ic{font-size:24px}
  .mrow .lbl{flex:1;font-weight:700}
  .mrow .ck{font-size:20px}
  .mrow.done .lbl{color:var(--muted);text-decoration:line-through}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:12px 6px;text-align:center}
  .stat .v{font-size:26px;font-weight:800;color:var(--primary-d)}
  .stat .l{font-size:11.5px;color:var(--muted)}

  .secs{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
  .sec{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;display:flex;justify-content:space-between;font-size:14px}
  .sec b{color:var(--primary-d)}

  /* سجلُّ مبارياتي (قراءةٌ فقط) — مطويّةٌ لكلِّ خصمٍ وهي حصريّة */
  .vsgrp{border:1px solid var(--line);border-radius:12px;margin:6px 0;overflow:hidden;background:var(--card)}
  .vsgrp>summary{cursor:pointer;padding:10px 12px;list-style:none;display:flex;align-items:center;gap:8px;flex-wrap:wrap;user-select:none}
  .vsgrp>summary::-webkit-details-marker{display:none}
  .vsgrp>summary::after{content:"▾";margin-inline-start:auto;font-size:11px;color:var(--muted);transition:transform .15s}
  .vsgrp[open]>summary::after{transform:rotate(180deg)}
  .vsg-t{font-size:14px;font-weight:800;color:var(--ink)}
  .vsg-s{font-size:12.5px;font-weight:800;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:2px 10px;white-space:nowrap}
  .vsg-b{padding:8px 12px 10px;border-top:1px solid var(--line);max-height:260px;overflow:auto}
  .vsm-row{display:flex;align-items:flex-start;gap:8px;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:12.5px;color:var(--ink)}
  .vsm-row:last-child{border-bottom:none}
  .badges{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:10px}
  .badge{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:12px 6px;text-align:center;opacity:.45;filter:grayscale(1)}
  .badge.earned{opacity:1;filter:none;border-color:var(--gold)}
  .badge .bic{font-size:34px}
  .badge .bl{font-size:12px;font-weight:700;margin-top:2px}

  .cert{background:linear-gradient(135deg,#FFFDF6,#FBF3E4);border:3px double var(--gold);border-radius:20px;padding:24px 20px;text-align:center;margin-top:10px}
  .cert .crown{font-size:44px}
  .cert .ct{font-size:20px;font-weight:800;color:var(--primary-d)}
  .cert .cname{font-size:30px;font-weight:800;margin:8px 0;border-bottom:2px dashed var(--line);display:inline-block;padding:0 18px 4px;min-width:160px}
  .cert .cline{font-size:15px;color:#5a5346}
  .cert .cdate{font-size:13px;color:var(--muted);margin-top:8px}
  .namefield{display:flex;gap:8px;margin:8px 2px}
  .namefield input{flex:1;font-family:inherit;font-size:15px;padding:10px 12px;border:1px solid var(--line);border-radius:12px}
  .btn{background:var(--primary);color:#fff;border:none;border-radius:12px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn:hover{background:var(--primary-d)}
  .btn.ghost{background:var(--card);border:1px solid var(--line);color:var(--ink)}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:10px}

  @media print{ .noprint{display:none!important} body{background:var(--card)} .cert{box-shadow:none} }
</style>
</head>
<body>
<div class="wrap">
  <header class="noprint">
    <div>
      <h1>تقدّمي 🏆</h1>
      <div class="sub">كلّ ما أنجزتَه — محفوظٌ على جهازك فقط</div>
    </div>
    <span class="topbtns"><button class="iconbtn" id="themeBtn" title="الوضع الداكن" aria-label="الوضع الداكن">🌙</button><a class="topbtn" href="home.html">🏠 الفهرس</a></span>
  </header>

  <div class="noprint">
    <h2>مهمّة اليوم</h2>
    <div id="mission"></div>

    <h2>إنجازاتي</h2>
    <div class="stats" id="stats"></div>

    <h2>حسب القسم</h2>
    <div class="secs" id="secs"></div>

    <h2>الأوسمة</h2>
    <div class="badges" id="badges"></div>

    <!-- سجلُّ مبارياتي: يراهُ الطفلُ في حسابِه (مبارياتُه وحدَه) — بلا تصفيرٍ (التصفيرُ للوالدَين في اللوحة) -->
    <div id="vsWrap" style="display:none">
      <h2>🏆 مبارياتي</h2>
      <div id="vsMine"></div>
    </div>

    <h2>شهادة إنجاز</h2>
    <div class="namefield">
      <input id="name" placeholder="اكتب اسم الطفل هنا…" maxlength="40" />
      <button class="btn" id="saveName">حفظ</button>
    </div>
  </div>

  <div id="cert"></div>

  <div class="noprint" style="display:flex;gap:8px;margin-top:12px">
    <button class="btn" onclick="smartPrint('cert','شهادة-إنجاز.pdf')">🖨️ اطبع الشهادة</button>
    <button class="btn ghost" id="reset">تصفير التقدّم</button>
  </div>
</div>

<script type="module">
import { wireThemeToggle } from "./src/theme.js";
import { smartPrint } from "./src/smart-print.js"; window.smartPrint = smartPrint; // طباعةٌ تعملُ على الهاتف أيضًا
wireThemeToggle(document.getElementById("themeBtn"));
import { getStats, getBadges, getDailyMission, getName, setName, resetProgress, SECTION_OF } from "./src/progress.js";
import { confirmWithPassword, undoable } from "./src/confirm-action.js";
import { getVsHistory } from "./src/versus.js";   // سجلُّ المباريات (قراءةٌ فقط — لا تصفيرَ في حسابِ الطفل)
import { getCurrentUser } from "./src/accounts.js";

const SEC_LABEL = {
  memory_heal:"ذكريات الآليّ 🤖", story_open:"قصص قُرئت 📖", comprehension_ok:"أسئلة فهم ✅",
  puzzle_seen:"ألغاز 🧩", quiz_done:"اختبارات 🎯", word_win:"ألعاب حروف 🔤",
  memory_win:"لعبة الذاكرة 🧠", basics_correct:"تدريبات الأساسيّات 🔍", read_practice:"سُلّم القراءة 📖",
  math_correct:"أرقام وهندسة 📐", craft_done:"ورشة الورق ✂️", quran_listen:"القرآن الكريم 📖",
};
const fmtDate = () => { const d=new Date(); return d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear(); };

// سجلُّ مبارياتِ الطفلِ نفسِه (بلا تصفير): يُرشَّحُ من السجلِّ المشترَكِ باسمِ اللاعبِ الحاليّ.
// مطويّةٌ لكلِّ خصمٍ وهي حصريّة — نفسُ أسلوبِ لوحةِ الأهل، بلا زرِّ تصفيرٍ (ذاك للوالدَينِ وحدَهما).
function renderMyMatches(){
  const wrap=document.getElementById("vsWrap"), host=document.getElementById("vsMine");
  if(!wrap||!host) return;
  let hist=[], me="";
  try{ hist=(getVsHistory()||[]).slice().reverse(); }catch(e){}
  try{ const u=getCurrentUser(); me=(u&&u.name)||""; }catch(e){}
  const mine = me ? hist.filter(e=>e.me===me) : [];
  if(!mine.length) return;                                  // لا مباريات ⇒ يبقى القسمُ مخفيًّا
  wrap.style.display="";
  const oppKeyOf=e=> e.opp ? (e.opp.role==="ai"?"ai":e.opp.role==="parent"?(e.opp.female?"mom":"dad"):"sib:"+(e.opp.name||"")) : "?";
  const oppLabel=o=> !o ? "خصم" : o.role==="ai" ? "🤖 الآليّ" : o.role==="parent" ? (o.female?"👩 الأم":"👨 الأب") : `${o.avatar||"🙂"} ${o.name||"اللاعب"}`;
  const fmt=ts=>{ try{ const d=new Date(ts); return d.toLocaleDateString("ar-EG-u-nu-latn")+" "+d.toLocaleTimeString("ar-EG-u-nu-latn",{hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } };
  const agg={};
  for(const e of mine){ const k=oppKeyOf(e); const a=agg[k]||(agg[k]={opp:e.opp,w:0,l:0,t:0}); if(!e.winner)a.t++; else if(e.winner===me)a.w++; else a.l++; }
  host.innerHTML=Object.entries(agg).map(([k,a])=>{
    const rows=mine.filter(e=>oppKeyOf(e)===k).map(e=>`<div class="vsm-row">
      <span><b>${e.game||"لعبة"}</b>${e.diff?` <span class="muted">· ${e.diff}</span>`:""}<br><span class="muted">${fmt(e.ts)}</span></span>
      <span style="white-space:nowrap">${!e.winner?"🤝 تعادُل":(e.winner===me?"🏆 فُزتُ":`🏆 ${e.winner}`)}</span>
    </div>`).join("");
    return `<details class="vsgrp"><summary>
      <span class="vsg-t">ضدّ ${oppLabel(a.opp)}</span>
      <span class="vsg-s">فُزتُ ${a.w} — ${a.l}${a.t?` <span class="muted">(تعادُل ${a.t})</span>`:""}</span>
    </summary><div class="vsg-b">${rows}</div></details>`;
  }).join("");
  const gs=[...host.querySelectorAll("details.vsgrp")];
  gs.forEach(d=>d.addEventListener("toggle",()=>{ if(d.open) gs.forEach(o=>{ if(o!==d) o.open=false; }); }));
}

function render(){
  const s = getStats();

  // mission
  const m = getDailyMission();
  document.getElementById("mission").innerHTML =
    `<div class="mission ${m.complete?"done":""}">
      <div class="mtitle">${m.complete?"🎉 أكملتَ مهمّة اليوم!":"✨ ثلاث مهامّ لهذا اليوم"}</div>
      ${m.tasks.map(t=>{ const sep=t.href.includes("?")?"&":"?"; return `<a class="mrow ${t.done?"done":""}" href="${t.done?t.href:t.href+sep+"mission=1"}">
        <span class="ic">${t.ic}</span><span class="lbl">${t.label}</span><span class="ck">${t.done?"✅":"⬜"}</span></a>`; }).join("")}
    </div>`;

  // stats
  document.getElementById("stats").innerHTML = [
    ["🔥", s.streak, "أيّام متتالية"],
    ["⭐", s.total, "مجموع النجوم"],
    ["📅", s.activeDays, "أيّام نشاط"],
    ["🧭", s.sections+"/7", "أقسام جُرّبت"],
  ].map(([i,v,l])=>`<div class="stat"><div class="v">${i} ${v}</div><div class="l">${l}</div></div>`).join("");

  // sections
  const entries = Object.keys(SEC_LABEL).filter(k=>(s.counts[k]||0)>0);
  document.getElementById("secs").innerHTML = entries.length
    ? entries.map(k=>`<div class="sec"><span>${SEC_LABEL[k]}</span><b>${s.counts[k]}</b></div>`).join("")
    : `<div class="empty">ابدأ اللعب والتعلّم لتظهر إنجازاتك هنا 🌱</div>`;

  // badges
  const badges = getBadges();
  document.getElementById("badges").innerHTML = badges.map(b=>
    `<div class="badge ${b.earned?"earned":""}"><div class="bic">${b.ic}</div><div class="bl">${b.label}</div></div>`).join("");

  // certificate
  const earned = badges.filter(b=>b.earned).length;
  const name = getName();
  document.getElementById("cert").innerHTML =
    `<div class="cert">
      <div class="crown">🏆</div>
      <div class="ct">شهادة إنجاز</div>
      <div class="cname">${name || "..........."}</div>
      <div class="cline">أنجزَ <b>${earned}</b> وسامًا، وجمعَ <b>${s.total}</b> نجمة، بسلسلةٍ من <b>${s.streak}</b> يوم.</div>
      <div class="cdate">تلميذي 🤖 · ${fmtDate()}</div>
    </div>`;
  document.getElementById("name").value = name;
}

document.getElementById("saveName").onclick = ()=>{ setName(document.getElementById("name").value); render(); };
document.getElementById("name").addEventListener("keydown", e=>{ if(e.key==="Enter"){ setName(e.target.value); render(); }});
document.getElementById("reset").onclick = async ()=>{ if(await confirmWithPassword("تصفير كلّ التقدّم والأوسمة؟ ستظهر مهلةُ تراجع.")) undoable("سيُصفَّر التقدّم…", ()=>{ resetProgress(); render(); }); };

render();
renderMyMatches();
</script>
</body>
</html>
