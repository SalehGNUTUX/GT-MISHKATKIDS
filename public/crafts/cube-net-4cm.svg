<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="297mm" viewBox="0 0 210 297" font-family="Arial,sans-serif">
  <rect width="210" height="297" fill="#ffffff"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#E0566B"/></marker>
  </defs>
  <text x="105" y="22" text-anchor="middle" font-size="6" font-weight="bold" fill="#000">شبكة مكعّب — ضلع 4 سم</text>
  <text x="105" y="32" text-anchor="middle" font-size="3.3" fill="#555">قُصّ على المتقطّع الأحمر (—) · اطوِ على المتقطّع الأخضر · ألصِق الألسنة</text>

  <!-- الوجوه السّتّة بألوانٍ مختلفة (تخطيط صليبيّ): T فوق، L F R Bk صفّ، B تحت -->
  <rect x="65" y="80"  width="40" height="40" fill="#FFF6DD"/>
  <rect x="25" y="120" width="40" height="40" fill="#FBEFF4"/>
  <rect x="65" y="120" width="40" height="40" fill="#E9F5E0"/>
  <rect x="105" y="120" width="40" height="40" fill="#E4F0F8"/>
  <rect x="145" y="120" width="40" height="40" fill="#F0E9F7"/>
  <rect x="65" y="160" width="40" height="40" fill="#FDF1E2"/>

  <!-- خطوط الطيّ (متقطّعة خضراء بين الوجوه) -->
  <g stroke="#7BB661" stroke-width="0.5" stroke-dasharray="2,1.5">
    <line x1="65" y1="120" x2="105" y2="120"/>
    <line x1="65" y1="120" x2="65" y2="160"/>
    <line x1="105" y1="120" x2="105" y2="160"/>
    <line x1="145" y1="120" x2="145" y2="160"/>
    <line x1="65" y1="160" x2="105" y2="160"/>
  </g>

  <!-- ألسنة لصق (مستطيلات 8 مم) — بألوان أخفّ -->
  <g fill="#FFE9C2" stroke="#F4A03A" stroke-width="0.5" stroke-dasharray="1.5,1">
    <rect x="25"  y="112" width="40" height="8"/>
    <rect x="105" y="112" width="40" height="8"/>
    <rect x="145" y="112" width="40" height="8"/>
    <rect x="25"  y="160" width="40" height="8"/>
    <rect x="105" y="160" width="40" height="8"/>
    <rect x="145" y="160" width="40" height="8"/>
    <rect x="185" y="120" width="8"  height="40"/>
  </g>

  <!-- المحيط الخارجيّ — خطّ القصّ المتقطّع الأحمر -->
  <path d="M65,80 L105,80 L105,112 L145,112 L185,112 L185,120 L193,120 L193,160 L185,160 L185,168 L145,168 L105,168 L105,200 L65,200 L65,168 L25,168 L25,160 L65,160 L65,120 L25,120 L25,112 L65,112 Z"
        fill="none" stroke="#E0566B" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- مقصّ + سهم عند زاوية البداية -->
  <text x="56" y="83" font-size="9" fill="#E0566B">✂</text>
  <line x1="66" y1="80" x2="88" y2="80" stroke="#E0566B" stroke-width="0.6" marker-end="url(#arr)"/>
  <text x="78" y="76" text-anchor="middle" font-size="3" fill="#E0566B">ابدأ من هنا</text>

  <!-- وسوم الوجوه -->
  <g font-size="4.5" fill="#3a4250" text-anchor="middle">
    <text x="85" y="103">فوق</text>
    <text x="45" y="143">يسار</text>
    <text x="85" y="143">أمام</text>
    <text x="125" y="143">يمين</text>
    <text x="165" y="143">خلف</text>
    <text x="85" y="183">أسفل</text>
  </g>
  <text x="85" y="115" text-anchor="middle" font-size="3" fill="#5E9A47">4×4</text>
  <text x="85" y="155" text-anchor="middle" font-size="3" fill="#5E9A47">4×4</text>

  <!-- وسم لسان لصق -->
  <text x="45" y="118" text-anchor="middle" font-size="2.5" fill="#C7613F">ألصِق</text>

  <!-- مفتاح الألوان -->
  <g transform="translate(15,75)" font-size="3" fill="#555">
    <rect x="0" y="-3" width="3" height="3" fill="none" stroke="#E0566B" stroke-width="0.5" stroke-dasharray="1.5,1"/><text x="4" y="-0.5">قُصّ</text>
    <rect x="0" y="3" width="3" height="3" fill="none" stroke="#7BB661" stroke-width="0.5" stroke-dasharray="1.5,1"/><text x="4" y="5.5">اطوِ</text>
    <rect x="0" y="9" width="3" height="3" fill="#FFE9C2" stroke="#F4A03A" stroke-width="0.5"/><text x="4" y="11.5">ألصِق</text>
  </g>

  <!-- ═══════════════ رسوم التجميع بالخيط ═══════════════ -->
  <text x="105" y="218" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#000">كيف تُجمّعه وتُعلّقه بخيط؟</text>

  <!-- لوحة 1: بعد القصّ -->
  <g transform="translate(8,222)">
    <text x="22" y="6" text-anchor="middle" font-size="4" font-weight="bold" fill="#C7613F">1</text>
    <text x="22" y="11" text-anchor="middle" font-size="3" fill="#555">بعد القصّ</text>
    <g transform="translate(0,14) scale(0.27)">
      <rect x="25" y="30" width="40" height="40" fill="#FFF6DD" stroke="#3a4250" stroke-width="2"/>
      <rect x="-15" y="70" width="40" height="40" fill="#FBEFF4" stroke="#3a4250" stroke-width="2"/>
      <rect x="25" y="70" width="40" height="40" fill="#E9F5E0" stroke="#3a4250" stroke-width="2"/>
      <rect x="65" y="70" width="40" height="40" fill="#E4F0F8" stroke="#3a4250" stroke-width="2"/>
      <rect x="105" y="70" width="40" height="40" fill="#F0E9F7" stroke="#3a4250" stroke-width="2"/>
      <rect x="25" y="110" width="40" height="40" fill="#FDF1E2" stroke="#3a4250" stroke-width="2"/>
    </g>
  </g>

  <!-- لوحة 2: اطوِ -->
  <g transform="translate(60,222)">
    <text x="22" y="6" text-anchor="middle" font-size="4" font-weight="bold" fill="#C7613F">2</text>
    <text x="22" y="11" text-anchor="middle" font-size="3" fill="#555">اطوِ الأضلاع 90°</text>
    <g transform="translate(2,18)">
      <polygon points="2,30 22,15 42,30 22,45" fill="#FFF6DD" stroke="#3a4250" stroke-width="0.6"/>
      <polygon points="2,30 2,42 22,57 22,45" fill="#FBEFF4" stroke="#3a4250" stroke-width="0.6"/>
      <polygon points="22,45 42,30 42,42 22,57" fill="#E4F0F8" stroke="#3a4250" stroke-width="0.6"/>
      <path d="M30,16 q3,-4 8,-2" fill="none" stroke="#E0566B" stroke-width="0.5" marker-end="url(#arr)"/>
    </g>
  </g>

  <!-- لوحة 3: ألصِق -->
  <g transform="translate(112,222)">
    <text x="22" y="6" text-anchor="middle" font-size="4" font-weight="bold" fill="#C7613F">3</text>
    <text x="22" y="11" text-anchor="middle" font-size="3" fill="#555">ألصِق الألسنة</text>
    <g transform="translate(2,18)">
      <polygon points="2,30 22,15 42,30 22,45" fill="#FFF6DD" stroke="#3a4250" stroke-width="0.6"/>
      <polygon points="2,30 2,42 22,57 22,45" fill="#FBEFF4" stroke="#3a4250" stroke-width="0.6"/>
      <polygon points="22,45 42,30 42,42 22,57" fill="#E4F0F8" stroke="#3a4250" stroke-width="0.6"/>
      <text x="32" y="40" font-size="6">💧</text>
    </g>
  </g>

  <!-- لوحة 4: علّق بالخيط -->
  <g transform="translate(164,222)">
    <text x="22" y="6" text-anchor="middle" font-size="4" font-weight="bold" fill="#C7613F">4</text>
    <text x="22" y="11" text-anchor="middle" font-size="3" fill="#555">اثقب وعلّق 🧵</text>
    <g transform="translate(2,15)">
      <line x1="22" y1="0" x2="22" y2="15" stroke="#3a4250" stroke-width="0.4" stroke-dasharray="1.5,1"/>
      <polygon points="2,30 22,15 42,30 22,45" fill="#FFF6DD" stroke="#3a4250" stroke-width="0.6"/>
      <polygon points="2,30 2,42 22,57 22,45" fill="#FBEFF4" stroke="#3a4250" stroke-width="0.6"/>
      <polygon points="22,45 42,30 42,42 22,57" fill="#E4F0F8" stroke="#3a4250" stroke-width="0.6"/>
      <circle cx="22" cy="15" r="1" fill="none" stroke="#5E9A47" stroke-width="0.5"/>
    </g>
  </g>

  <text x="105" y="278" text-anchor="middle" font-size="3.2" fill="#5E9A47">💡 اثقب نقطةً صغيرةً في وجهٍ من الوجوه، مرّر الخيطَ، واربط عُقدةً داخل المكعّب — تَلتذُّ بزينةٍ معلّقة</text>
  <text x="105" y="285" text-anchor="middle" font-size="2.8" fill="#777">تلميذي — ورشة الورق · مكعّب 4 سم</text>
</svg>
