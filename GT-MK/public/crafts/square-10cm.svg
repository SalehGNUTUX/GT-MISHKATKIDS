<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="297mm" viewBox="0 0 210 297" font-family="Arial,sans-serif">
  <rect width="210" height="297" fill="#ffffff"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#E0566B"/></marker>
  </defs>
  <text x="105" y="22" text-anchor="middle" font-size="6" font-weight="bold" fill="#000">مربّع 10×10 سم — قُصَّ على الخطّ المتقطّع</text>
  <text x="105" y="32" text-anchor="middle" font-size="3.5" fill="#555">اطبع على A4 بمقياس 100% — تحقّق بالمسطرة قبل القصّ</text>

  <!-- المربّع بلونٍ فاتح + خط قصّ متقطّع أحمر عريض -->
  <rect x="55" y="80" width="100" height="100" fill="#FFF6DD" stroke="#E0566B" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- مقصّ + سهم: ابدأ القصّ من الزاوية اليُسرى العُلوية -->
  <text x="46" y="83" font-size="10" fill="#E0566B">✂</text>
  <line x1="56" y1="80" x2="78" y2="80" stroke="#E0566B" stroke-width="0.6" marker-end="url(#arr)"/>
  <text x="65" y="76" text-anchor="middle" font-size="3" fill="#E0566B">ابدأ من هنا</text>

  <!-- المقاسات -->
  <text x="105" y="75" text-anchor="middle" font-size="5" fill="#C7613F">10 cm</text>
  <text x="50" y="133" text-anchor="end" font-size="5" fill="#C7613F">10</text>

  <!-- نقطة الثقب للتعليق -->
  <circle cx="105" cy="86" r="1.5" fill="none" stroke="#5E9A47" stroke-width="0.4" stroke-dasharray="0.6,0.6"/>
  <text x="111" y="88" font-size="3" fill="#5E9A47">اثقب هنا</text>

  <!-- تعليمة التعليق بالخيط -->
  <g transform="translate(28,210)">
    <text x="77" y="0" text-anchor="middle" font-size="4.5" fill="#000" font-weight="bold">🧵 بعد القصّ: اثقب نقطةً في الأعلى ومرّر خيطًا للتعليق</text>
    <!-- توضيح مرئيّ -->
    <line x1="77" y1="6" x2="77" y2="22" stroke="#3a4250" stroke-width="0.5" stroke-dasharray="2,1.5"/>
    <rect x="60" y="22" width="34" height="34" fill="#FFF6DD" stroke="#E0566B" stroke-width="0.6" stroke-dasharray="2,1.5"/>
    <circle cx="77" cy="22" r="1" fill="none" stroke="#5E9A47"/>
  </g>

  <!-- مسطرة فحص -->
  <text x="105" y="280" text-anchor="middle" font-size="3" fill="#555">مسطرة فحص (5 cm)</text>
  <line x1="80" y1="285" x2="130" y2="285" stroke="#000" stroke-width="0.5"/>
  <g stroke="#000" stroke-width="0.3">
    <line x1="80" y1="282" x2="80" y2="288"/><line x1="105" y1="283" x2="105" y2="287"/><line x1="130" y1="282" x2="130" y2="288"/>
  </g>
  <text x="80" y="293" text-anchor="middle" font-size="2.5" fill="#555">0</text>
  <text x="130" y="293" text-anchor="middle" font-size="2.5" fill="#555">5 cm</text>
</svg>
