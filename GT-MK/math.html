<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<script>(function(){try{var t=localStorage.getItem('tilmithi_theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<style id="theme-crit">html[data-theme="dark"]{--bg:#15151b;--card:#23232c;--ink:#ECE7DD;--muted:#A39E94;--line:#34343f;--primary-d:#E8987E;--shadow:0 6px 20px rgba(0,0,0,.45)}html[data-theme="dark"] body{background:var(--bg);color:var(--ink)}</style>
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="مِشكاة" />
<meta name="theme-color" content="#E07A5F" />
<title>مِشكاة — أرقام وهندسة</title>
<style>
  :root{
    --bg:#FBF7EF; --card:#FFFFFF; --ink:#2B2B2B; --muted:#6B6B6B;
    --line:#ECE6DA; --primary:#E07A5F; --primary-d:#C7613F; --good:#7BB661; --bad:#E0566B;
    --sky:#6FB3D6; --gold:#F4C95D; --violet:#C9A0DC;
    --shadow:0 6px 20px rgba(0,0,0,.07);
    font-family:"Noto Sans Arabic","Segoe UI",Tahoma,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  button,a,.tile,.gcard,.scard,.craftrow,[onclick]{touch-action:manipulation}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:680px;margin:0 auto;padding:16px 16px 56px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 10px}
  header h1{font-size:22px;margin:0}
  header .sub{color:var(--muted);font-size:13px}
  .topbtn{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;font-size:14px;cursor:pointer;text-decoration:none;color:var(--ink);font-family:inherit}
  .back{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:7px 14px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--ink)}

  .menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:8px}
  .gcard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px 12px;text-align:center;cursor:pointer;transition:transform .12s,border-color .12s}
  .gcard:hover{transform:translateY(-3px);border-color:var(--primary)}
  .gcard.hasnew{border-color:color-mix(in srgb,#E8912D 55%,var(--line))}
  .nbadge{position:absolute;top:6px;inset-inline-end:6px;z-index:2;background:#E8912D;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:999px;box-shadow:0 2px 8px rgba(232,145,45,.5);animation:newpulse 1.5s ease-in-out infinite}
  .vbadge{position:absolute;top:6px;inset-inline-start:6px;z-index:2;background:var(--primary);color:#fff;font-size:11px;font-weight:800;padding:1px 6px;border-radius:999px}
  @keyframes newpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  @media(prefers-reduced-motion:reduce){ .nbadge{animation:none} }
  .gcard .ic{font-size:42px}
  .gcard .t{font-size:16px;font-weight:800;margin-top:4px}
  .gcard .d{font-size:12px;color:var(--muted)}

  .gbar{display:flex;gap:8px;align-items:center;margin:8px 2px}
  .pill{background:#F3EEE3;border-radius:999px;padding:5px 12px;font-size:13px;color:#555;margin-inline-start:auto}
  .pill b{color:var(--primary-d)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:18px;text-align:center;margin-top:8px}
  .bignum{font-size:120px;font-weight:800;line-height:1;color:var(--sky)}
  .name{font-size:22px;font-weight:800;margin-top:2px}
  .sayb{background:var(--primary);color:#fff;border:none;border-radius:12px;padding:8px 16px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
  .sayb:hover{background:var(--primary-d)}
  .dots{font-size:30px;line-height:1.6;margin:8px 4px;min-height:40px;word-wrap:break-word}
  .nav{display:flex;gap:10px;align-items:center;justify-content:center;margin-top:14px}
  .nav button{border:none;border-radius:12px;padding:10px 18px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  .nav .prev{background:var(--card);border:1px solid var(--line);color:var(--ink)} .nav .prev:disabled{opacity:.4}
  .nav .next{background:var(--primary);color:#fff}
  .pos{font-size:13px;color:var(--muted);min-width:60px}

  .prompt{text-align:center;font-size:18px;font-weight:800;margin:10px 2px 6px}
  .prompt button{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px 10px;font-size:15px;cursor:pointer;font-family:inherit;margin-inline-start:6px}
  .opvis{font-size:34px;font-weight:800;text-align:center;color:var(--primary-d);margin:8px 0}
  .picview{background:#F6F3EC;border-radius:14px;padding:14px 10px;margin:6px 0 12px;min-height:80px;text-align:center;font-size:32px;line-height:1.4}
  .opts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:6px 2px}
  .opts.hidden{display:none}
  .reveal{background:color-mix(in srgb,var(--primary) 12%,var(--card));border:1.5px dashed var(--primary);color:var(--primary-d);border-radius:14px;padding:10px 16px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin:8px auto 4px;display:block;transition:background .12s,transform .08s}
  .reveal:hover{background:color-mix(in srgb,var(--primary) 20%,var(--card))}
  .reveal:active{transform:scale(.98)}
  .opt{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:12px 18px;font-size:30px;font-weight:800;color:var(--ink);cursor:pointer;font-family:inherit;min-width:64px}
  .opt:hover{border-color:var(--primary)}
  .opt.ok{background:#EEF6E9;border-color:var(--good);color:#2f5a1f}
  .opt.bad{background:#FCEBEE;border-color:var(--bad);animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

  .ageb{display:flex;gap:6px;margin:6px 2px;flex-wrap:wrap}
  .ageb button{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit;color:#666}
  .ageb button.on{background:var(--primary);color:#fff;border-color:var(--primary)}

  /* أزرار فهرس العشرات في شاشة الأرقام */
  .dec{background:var(--card);border:1.5px solid var(--line);border-radius:999px;padding:6px 12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--ink);min-width:42px}
  .dec:hover{border-color:var(--sky);color:var(--sky)}
  .dec.on{background:var(--sky);color:#fff;border-color:var(--sky)}

  /* ألعاب: عثور · مقارنة · نمط · حجم */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:14px 2px}
  .tile{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;min-height:96px}
  .tile:hover{border-color:var(--primary)}
  .tile.ok{background:#EEF6E9;border-color:var(--good)}
  .tile.bad{background:#FCEBEE;border-color:var(--bad);animation:shake .4s}
  .tile svg{width:64px;height:64px;display:block}
  .objbox{background:#F6F3EC;border-radius:16px;padding:14px;font-size:34px;line-height:1.5;text-align:center;min-height:78px;cursor:pointer;border:2px solid var(--line)}
  .objbox:hover{border-color:var(--primary)}
  .objbox.ok{background:#EEF6E9;border-color:var(--good)} .objbox.bad{background:#FCEBEE;border-color:var(--bad);animation:shake .4s}
  .seq{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;font-size:40px;margin:14px 2px;min-height:56px}
  .seq .q{width:54px;height:54px;border:2px dashed var(--primary);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;color:var(--primary)}

  /* بطاقات الأشكال */
  .sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:8px}
  @media (min-width:520px){ .sgrid{grid-template-columns:repeat(3,1fr)} }
  .scard{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:10px;text-align:center;cursor:pointer;transition:.12s}
  .scard:hover{border-color:var(--primary);transform:translateY(-2px)}
  .scard svg{width:90px;height:90px;display:block;margin:0 auto}
  .scard .sname{font-weight:800;font-size:15px;margin-top:4px}
  .scard .sdim{font-size:11px;color:var(--muted)}

  /* بطاقة شكلٍ مفتوحة */
  .shape-detail{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px;margin-top:8px}
  .shape-detail .big{display:flex;justify-content:center;margin-bottom:8px}
  .shape-detail .big svg{width:160px;height:160px}
  .shape-detail .ttl{text-align:center;font-size:22px;font-weight:800;color:var(--primary-d)}
  .shape-detail ul{margin:8px 0;padding-inline-start:22px}
  .shape-detail .tad{background:#FFF6EE;border-right:3px solid var(--primary);border-radius:8px;padding:10px 12px;font-size:13.5px;color:#5b3b29;margin-top:10px}
  .shape-detail .ex{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .shape-detail .ex span{background:#F3EEE3;border-radius:999px;padding:4px 10px;font-size:13px}

  /* قائمة أنشطة الورق */
  .craftlist{display:grid;gap:10px;margin-top:8px}
  .craftrow{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;background:var(--card);border:2px solid var(--line);border-radius:16px;padding:12px 14px;cursor:pointer;text-align:start}
  .craftrow:hover{border-color:var(--primary)}
  .craftrow .thumb{width:54px;height:54px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:12px;flex:none}
  .craftrow .thumb svg{width:46px;height:46px;display:block}
  .craftrow .ic{font-size:32px}
  .craftrow .t{font-weight:800;font-size:16px}
  .craftrow .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .craftrow .go{color:var(--primary);font-size:18px;font-weight:800}

  /* تفصيل النشاط */
  .step{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;margin-top:10px;display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:start}
  .step .num{background:var(--primary);color:#fff;border-radius:999px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .step svg{width:100%;max-width:240px;background:var(--bg);border-radius:10px;display:block;margin-top:6px}
  .step .txt{font-size:14.5px;line-height:1.7}
  .materials{background:#F6F3EC;border-radius:14px;padding:12px 14px;font-size:13.5px;margin-top:8px}
  .materials b{color:var(--primary-d)}
  .materials ul{margin:6px 0;padding-inline-start:22px}
  .tip{background:#EEF6E9;border-right:3px solid var(--good);border-radius:8px;padding:10px 12px;font-size:13.5px;color:#2f5a1f;margin-top:12px}

  .tadabbur{text-align:center;color:#7a4fa0;background:#F6F0FB;border-radius:12px;padding:8px 12px;font-size:14px;margin:10px 2px}
  .hint{text-align:center;color:var(--muted);font-size:13px;margin-top:12px}

  /* قصّة الأرقام */
  .nintro{background:#FFF6EE;border:1px solid #F0DDC8;border-radius:14px;padding:12px 14px;font-size:14px;line-height:1.8;margin:8px 2px}
  .ncomic{display:flex;align-items:center;gap:12px;margin:10px 2px;padding:12px 14px;border-radius:16px;text-decoration:none;color:#fff;
    background:linear-gradient(135deg,#6FB3D6,#7B86E0);box-shadow:0 4px 14px rgba(99,102,200,.32);transition:transform .12s,box-shadow .12s}
  .ncomic:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(99,102,200,.42)}
  .ncomic:active{transform:scale(.98)}
  .ncomic .ico{font-size:30px;flex:0 0 auto}
  .ncomic .tx{flex:1;line-height:1.5} .ncomic .tx small{opacity:.92;font-size:12px}
  .ncomic .go{font-size:22px;font-weight:800;flex:0 0 auto}
  .nfams{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:10px 2px}
  .nfam{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:12px;text-align:center}
  .nfam .gl{font-size:24px;font-weight:800;letter-spacing:3px;color:var(--primary-d);direction:ltr}
  .nfam .ti{font-weight:800;font-size:14px;margin:4px 0}
  .nfam .nt{font-size:12px;color:var(--muted)}
  .ntl{margin:10px 2px;border-inline-start:3px solid var(--gold);padding-inline-start:12px}
  .ntl .row{margin:8px 0}
  .ntl .y{display:inline-block;background:#F4C95D;color:#5b3b29;border-radius:999px;padding:2px 10px;font-size:12px;font-weight:800;margin-inline-end:6px}
  .ntl .t{font-weight:800;font-size:14px}
  .ntl .d{font-size:13px;color:#555}
  .nzero{background:#EAF4E3;border:1px solid #CDE6BE;border-radius:16px;padding:14px;margin:10px 2px;font-size:14px;line-height:1.9}
  .nzero h3{margin:0 0 6px;color:#3f6b2c}
  .ndg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:8px 2px}
  .ndc{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:8px 4px;text-align:center}
  .ndc .dg{font-size:34px;font-weight:800;color:var(--primary-d);direction:ltr}
  .ndc .nm{font-size:11px;color:var(--muted)}
  .ndc .dots{min-height:14px;margin-top:2px}
  .ndc .dots i{display:inline-block;width:6px;height:6px;border-radius:50%;background:#E0566B;margin:0 1px}
  .nsch{display:grid;gap:8px;margin:8px 2px}
  .nsch .s{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px;font-size:13px}
  .nsch .s b{color:var(--primary-d)}
  .nnote{background:var(--bg);border:1px dashed #ECE6DA;border-radius:12px;padding:10px 12px;font-size:12.5px;color:#6B6B6B;margin:8px 2px;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>أرقام وهندسة 📐</h1>
      <div class="sub">الأرقام · الحساب · الأشكال · ورشة الورق بالمقاسات</div>
    </div>
    <span class="topbtns"><button class="iconbtn" id="themeBtn" title="الوضع الداكن" aria-label="الوضع الداكن">🌙</button><a class="topbtn" href="home.html">🏠 الفهرس</a></span>
  </header>
  <div id="view"></div>
</div>

<script type="module">
import { wireThemeToggle } from "./src/theme.js";
import { iconHtml } from "./src/icons.js";
wireThemeToggle(document.getElementById("themeBtn"));
import MATH from "./content/math.js";
import NUMERALS from "./content/numerals.js";
import { logEvent, recordMastery } from "./src/progress.js";
import { pickAdaptive } from "./src/adaptive.js";
import { speak } from "./src/speak.js";
import { robo } from "./src/robo-companion.js";
import { NOTICES, GAME_INTROS as GI } from "./src/robo-phrases.js";
import { vsSetup, vsMakePlayers, vsScoreHtml, vsTurnHtml, vsEndRound, vP, GAME as GR, sfx } from "./src/versus.js"; // الإطارُ التنافسيّ المشترك (v1.4)
import { downloadSvgAsPdf } from "./src/pdf-utils.js";
import { numberName as numAr } from "./src/numbers-ar.js";
import { autoToggleHtml, wireAuto, onCorrect, onWrong } from "./src/quiz-flow.js";
import { attachReader } from "./src/reader-recorder.js";
robo.mount();

const view = document.getElementById("view");
const NUM_MAX = 100;
const EMOJIS = ["🍎","⭐","🐟","🌸","🚗","🦋","🍌","🐝","🌷","🥕","🌽","🍇"];
const rand = n => Math.floor(Math.random()*n);
const shuffle = a => { for(let k=a.length-1;k>0;k--){ const j=rand(k+1); [a[k],a[j]]=[a[j],a[k]]; } return a; };
const backBar = () => `<button class="backstep" id="back">أرقام وهندسة</button>`;
function wireBack(){ const b=document.getElementById("back"); if(b) b.onclick=renderMenu; }

/* ===== أشكال صغيرة (SVG) لألعاب العثور ===== */
const C = ["#E07A5F","#6FB3D6","#7BB661","#F4C95D","#C9A0DC"];
const SHAPES = [
  { id:"circle", name:"دائرة",  svg:c=>`<svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="24" fill="${c}"/></svg>` },
  { id:"square", name:"مربّع",  svg:c=>`<svg viewBox="0 0 60 60"><rect x="8" y="8" width="44" height="44" rx="4" fill="${c}"/></svg>` },
  { id:"triangle", name:"مثلّث", svg:c=>`<svg viewBox="0 0 60 60"><path d="M30 7 L53 51 L7 51 Z" fill="${c}"/></svg>` },
  { id:"rect", name:"مستطيل",   svg:c=>`<svg viewBox="0 0 60 60"><rect x="5" y="17" width="50" height="26" rx="4" fill="${c}"/></svg>` },
  { id:"star", name:"نجمة",     svg:c=>`<svg viewBox="0 0 60 60"><path fill="${c}" d="M30 5l7 15 16 2-12 11 3 16-14-8-14 8 3-16-12-11 16-2z"/></svg>` },
];

/* ===== MENU ===== */
const GAMES = [
  { id:"numbers", ic:"🔢", t:"الأرقام (0–100)", d:"تعرّفْ على الأرقام واسمها" },
  { id:"numerals", ic:"📜", t:"قصّة الأرقام", d:"كيف طوّر المسلمون 0-9 والصِّفر" },
  { id:"add",     ic:"➕", t:"الجمع",          d:"تدرَّبْ على جمع الأعداد بصريّاً" },
  { id:"sub",     ic:"➖", t:"الطرح",          d:"تدرَّبْ على الطرح" },
  { id:"mul",     ic:"✖️", t:"الضرب",          d:"جدول الضرب البسيط" },
  { id:"div",     ic:"➗", t:"القسمة",         d:"تدرَّبْ على القسمة (نتائجُ صحيحة)" },
  { id:"arithvs", ic:"🧮", t:"تحدّي الحساب",  d:"تنافسْ في العمليّاتِ المختلطة", vs:1, nw:1 },
  { id:"find",    ic:"🔍", t:"اعثر على الشكل", d:"اسمعِ اسمَ الشكلِ واضغطْه" },
  { id:"compare", ic:"⚖️", t:"عُدّ وقارن",     d:"أيُّ مجموعةٍ أكثر؟" },
  { id:"pattern", ic:"🔁", t:"أكمل النمط",     d:"ما العنصرُ التالي؟" },
  { id:"patternvs", ic:"🧩", t:"تحدّي النمط",  d:"تنافسْ: ما العنصرُ التالي؟", vs:1, nw:1 },
  { id:"size",    ic:"📏", t:"الأكبر والأصغر", d:"قارن الأحجام" },
  { id:"basic",   ic:"🔵", t:"أشكالٌ بسيطة",   d:"دائرة · مربّع · مثلّث · مستطيل" },
  { id:"adv",     ic:"🔷", t:"أشكالٌ متقدّمة", d:"2D و3D — أمثلةٌ في خلق الله" },
  { id:"crafts",  ic:"✂️", t:"ورشة الورق",    d:"اصنع الأشكالَ بنفسك بالمقاسات" },
];
function renderMenu(){
  pvRun=false; // مغادرةُ أيِّ لعبةٍ تنافسيّةٍ ⇒ أوقِفْ مؤقّتاتِها/ذكاءَها
  view.innerHTML = `<div class="menu">` +
    GAMES.map(g=>`<div class="gcard${g.nw?" hasnew":""}" data-g="${g.id}">${g.nw?'<span class="nbadge">🆕 جديد</span>':''}${g.vs?'<span class="vbadge">⚔️</span>':''}<div class="ic">${iconHtml(g.ic)}</div><div class="t">${g.t}</div><div class="d">${g.d}</div></div>`).join("") +
    `</div>
    <div class="tadabbur">📐 الأشكالُ والأعدادُ من حولنا… ما أدقَّ نظامَ اللهِ في خلقه! تأمّلْ معي.</div>
    <div class="hint">الشاشةُ محفِّز، والعمل الحقيقيّ بيدك — هيّا لنصنعَ ونتعلّم 🌟</div>`;
  view.querySelector(".menu").addEventListener("click", e=>{
    const c=e.target.closest("[data-g]"); if(!c) return;
    ({numbers:startNumbers,numerals:startNumerals,add:()=>startArith("+"),sub:()=>startArith("-"),mul:()=>startArith("×"),div:()=>startArith("÷"),

/* ===== ➕➖✖ ARITHMETIC ===== */
// مستوياتٌ بحسب العمر: 1=أعداد صغيرة (4-6)، 2=متوسطة (7-8)، 3=أكبر (9-10)
let arOp = "+", arLevel = 1, arScore = 0;
function startArith(op){ arOp = op; arLevel = 1; arScore = 0; nextArith(); }
function genArith(){
  const max = arLevel===1 ? 5 : arLevel===2 ? 10 : 20;
  let a, b, ans, q;
  if (arOp === "+") { a = 1+rand(max); b = 1+rand(max); ans = a+b; q = `${a} + ${b} = ?`; }
  else if (arOp === "-") { a = 1+rand(max); b = rand(a); ans = a-b; q = `${a} − ${b} = ?`; } // لا نتائج سالبة
  else if (arOp === "×") {
    const m1 = arLevel===1 ? 5 : arLevel===2 ? 7 : 10;
    a = 1+rand(m1); b = 1+rand(m1); ans = a*b; q = `${a} × ${b} = ?`;
  }
  else { // ÷ — نتائجُ صحيحةٌ دائمًا: المقسومُ = القاسم × الناتج (لا كسور)
    const m1 = arLevel===1 ? 5 : arLevel===2 ? 7 : 10;
    b = 1+rand(m1); ans = 1+rand(m1); a = b*ans; q = `${a} ÷ ${b} = ?`;
  }
  // مشتّتات: مقاربةٌ للجواب ولكنّها مختلفة
  const pool = new Set([ans]);
  while (pool.size < 4) { const d = ans + (rand(7)-3); if (d>=0 && d!==ans) pool.add(d); }
  const opts = shuffle([...pool]);
  return { q, ans, opts, a, b };
}
function visualOp(p){
  if (arOp === "+") {
    const em = EMOJIS[rand(EMOJIS.length)];
    return Array.from({length:p.a},()=>em).join("") + " <span style='color:#C7613F;font-weight:800'>+</span> " + Array.from({length:p.b},()=>em).join("");
  }
  if (arOp === "-") {
    const em = EMOJIS[rand(EMOJIS.length)];
    const left = Array.from({length:p.a-p.b},()=>em).join("");
    const taken = Array.from({length:p.b},()=>"❌").join("");
    return left + " " + taken;
  }
  if (arOp === "×") { // مجموعات متكرّرة
    const em = EMOJIS[rand(EMOJIS.length)];
    return Array.from({length:p.a},()=>`<span style='display:inline-block;border:1px dashed #ECE6DA;border-radius:8px;padding:2px 4px;margin:2px'>${Array.from({length:p.b},()=>em).join("")}</span>`).join("");
  }
  // ÷: المقسومُ كاملًا (a رمزًا) ليوزّعَه الطفلُ ذهنيًّا على عددِ المجموعات (b) — لا يكشفُ الناتج
  const em = EMOJIS[rand(EMOJIS.length)];
  return Array.from({length:p.a},()=>em).join("") + ` <span style='color:#C7613F;font-weight:800'>÷ ${p.b}</span>`;
}
let curArith = null, arMissed = false;
function nextArith(){
  curArith = genArith(); arMissed = false;
  const p = curArith;
  view.innerHTML = backBar()+
    `<div class="gbar"><span class="pill">⭐ <b>${arScore}</b></span>${autoToggleHtml()}</div>
     <div class="ageb">${[1,2,3].map(L=>`<button data-l="${L}" class="${L===arLevel?'on':''}">${L===1?'صغير (4–6)':L===2?'متوسّط (7–8)':'كبير (9–10)'}</button>`).join("")}</div>
     <div class="card">
       <div class="prompt">${{["+"]:"كم المجموع؟",["-"]:"كم الباقي؟",["×"]:"كم الناتج؟",["÷"]:"كم ناتجُ القسمة؟"}[arOp]}</div>
       <div class="opvis">${p.q}</div>
       <div class="picview">${visualOp(p)}</div>
       <button class="reveal" id="reveal">🤔 احسُبْ… ثمّ أظهِرِ الخيارات</button>
       <div class="opts hidden" id="opts">${p.opts.map(o=>`<button class="opt" data-v="${o}">${o}</button>`).join("")}</div>
     </div>`;
  wireBack(); wireAuto(view);
  const rev = view.querySelector("#reveal");
  rev.addEventListener("click", ()=>{ view.querySelector("#opts").classList.remove("hidden"); rev.style.display="none"; });
  view.querySelector(".ageb").addEventListener("click", e=>{
    const b=e.target.closest("button[data-l]"); if(!b) return;

  });

// مجموعاتٌ متنوّعةٌ (ألوان · فواكه · حيوانات · أشكال) لإغناء أنماطِ الطفل.
const PATTERN_POOLS = [
  ["🔴","🔵","🟢","🟡","🟣","🟠"],
  ["🍎","🍌","🍇","🍓","🍊","🥝"],
  ["🐶","🐱","🐭","🐰","🦊","🐼"],
  ["⭐","❤️","🔶","🔷","🔺","⬛"],
];
const PATTERN_TYPES = ["AB","ABC","AAB","ABA"]; // تنوّعُ النمط لا الثنائيّ فقط
function startPattern(){ pScore=0; nextPattern(); }
function nextPattern(){
  const pool=shuffle(PATTERN_POOLS[rand(PATTERN_POOLS.length)].slice());
  const type=PATTERN_TYPES[rand(PATTERN_TYPES.length)];
  const base = type==="AB" ? [pool[0],pool[1]]
    : type==="ABC" ? [pool[0],pool[1],pool[2]]
    : type==="AAB" ? [pool[0],pool[0],pool[1]]
    : [pool[0],pool[1],pool[0]]; // ABA
  const show = 5 + rand(2); // 5 أو 6 عناصر معروضة
  const seq = []; for(let i=0;i<show;i++) seq.push(base[i%base.length]);
  const answer = base[show%base.length];
  const others = shuffle(pool.filter(x=>x!==answer)).slice(0,2);
  const opts = shuffle([answer,...others]);
  view.innerHTML = backBar()+
    `<div class="gbar"><span class="pill">⭐ <b>${pScore}</b></span>${autoToggleHtml()}</div>

/* ===== 🧩 تحدّي النمط (تنافسيّ · versus) — أنماطُ أشكالٍ + تسلسلاتُ أعداد ===== */
let pv_diff="easy", pv_ps=[], pv_turn=0, pv_lock=false, pv_q=null, pv_raf=null, pv_timed=true, pv_aiPick=null, pvRun=false; const PV_TARGET=5;
const PV_DIFF={ easy:{opts:3,ms:9000,pr:0.6,d:1500}, medium:{opts:4,ms:7000,pr:0.75,d:1200}, hard:{opts:4,ms:5500,pr:0.9,d:900} };
function startPatternVs(){ pvRun=false; view.innerHTML=backBar()+`<div id="pvhost"></div>`; wireBack();
  vsSetup(document.getElementById("pvhost"), { say:GI.pattern, soloOk:true,
    diffs:[{v:"easy",label:"سهل"},{v:"medium",label:"متوسّط"},{v:"hard",label:"صعب"}],
    getDiff:()=>pv_diff, setDiff:v=>{pv_diff=v;},
    toggle:{ label:"⏱️ اللعبُ ضدّ الوقت", get:()=>pv_timed, set:v=>{pv_timed=v;} },
    start:newPatternVs });
  try{speak(GI.pattern);}catch(e){} }
function newPatternVs(){ pvRun=true; pv_ps=vsMakePlayers(); pv_ps.forEach(p=>p.score=0); pv_turn=0; pv_lock=false; pvNext(); }
// يولّدُ سؤالًا: تسلسلٌ عدديّ (جمعٌ ثابتٌ أو مضاعفة) أو نمطُ أشكالٍ متكرّر.
function pvGen(){ const cfg=PV_DIFF[pv_diff], useNum = pv_diff==="easy" ? Math.random()<0.5 : Math.random()<0.62;
  if(useNum){ let seq, answer;
    if(pv_diff==="hard" && Math.random()<0.5){ const s=1+rand(3), r=2+rand(2); seq=[s]; for(let i=0;i<3;i++) seq.push(seq[seq.length-1]*r); answer=seq[seq.length-1]*r; } // هندسيّ ×2/×3
    else { const start=1+rand(pv_diff==="easy"?5:9), step=(pv_diff==="easy"?1+rand(2):2+rand(4)); seq=[]; for(let i=0;i<4;i++) seq.push(start+i*step); answer=start+4*step; } // حسابيّ +ثابت
    const set=new Set([answer]); let guard=0; while(set.size<cfg.opts && guard++<40){ const off=(1+rand(4))*(Math.random()<0.5?1:-1)*(pv_diff==="hard"?2:1); const v=answer+off; if(v>0) set.add(v); }
    return { kind:"num", seq, answer:String(answer), opts:shuffle([...set].map(String)) };
  }
  const pool=shuffle(PATTERN_POOLS[rand(PATTERN_POOLS.length)].slice()), type=PATTERN_TYPES[rand(PATTERN_TYPES.length)];
  const base = type==="AB"?[pool[0],pool[1]]:type==="ABC"?[pool[0],pool[1],pool[2]]:type==="AAB"?[pool[0],pool[0],pool[1]]:[pool[0],pool[1],pool[0]];
  const show=5+rand(2), seq=[]; for(let i=0;i<show;i++) seq.push(base[i%base.length]);
  const answer=base[show%base.length], others=shuffle(pool.filter(x=>x!==answer)).slice(0,cfg.opts-1);
  return { kind:"shape", seq, answer:String(answer), opts:shuffle([answer,...others].map(String)) };
}
function pvNext(){ if(!pvRun) return;
  if(pv_ps.some(p=>p.score>=PV_TARGET)){ pvEnd(); return; }
  pv_q=pvGen(); pv_lock=false; pvRender();
  const cur=pv_ps[pv_turn];
  if(cur.cpu) pvAI(); else if(pv_timed) pvTimer(PV_DIFF[pv_diff].ms, ()=>{ if(!pv_lock){ pv_lock=true; pvResolve(false,null); } });
}
function pvRender(){ const cur=pv_ps[pv_turn], host=document.getElementById("pvhost"); if(!host) return;
  host.innerHTML = `<div class="prompt">🧩 تحدّي النمط — أوّلُ من يبلغُ ${PV_TARGET} يفوز!</div>`
    + vsScoreHtml(pv_ps) + vsTurnHtml(cur)
    + `<div class="seq" style="${pv_q.kind==="num"?"font-size:30px":""}">${pv_q.seq.map(x=>`<span>${x}</span>`).join("")}<span class="q">؟</span></div>`
    + (pv_timed?`<div style="height:9px;background:var(--line);border-radius:99px;overflow:hidden;max-width:320px;margin:6px auto 12px"><span id="pvbar" style="display:block;height:100%;background:var(--primary);width:100%"></span></div>`:"")
    + `<div class="opts" id="pvopts">${pv_q.opts.map(o=>`<button class="opt" data-v="${o}">${o}</button>`).join("")}</div>`
    + `<div id="pvfb"></div>`;
  host.querySelector("#pvopts").addEventListener("click",e=>{ const b=e.target.closest("[data-v]"); if(!b||b.disabled) return; pvTap(b.getAttribute("data-v"), b); });
}
function pvTimer(ms,onEnd){ const start=Date.now(); cancelAnimationFrame(pv_raf);
  const tick=()=>{ if(!pvRun){ cancelAnimationFrame(pv_raf); return; } const left=ms-(Date.now()-start); const bar=document.getElementById("pvbar"); if(bar) bar.style.width=Math.max(0,left/ms*100)+"%"; if(left<=0){ onEnd&&onEnd(); return; } pv_raf=requestAnimationFrame(tick); }; tick(); }
function pvTap(v,btn){ if(pv_lock||pv_ps[pv_turn].cpu) return; cancelAnimationFrame(pv_raf); pv_lock=true; sfx.tap(); pvResolve(v===pv_q.answer, btn); }
function pvAI(){ pv_lock=true; const cfg=PV_DIFF[pv_diff], ok=Math.random()<cfg.pr;
  pv_aiPick = ok ? pv_q.answer : (shuffle(pv_q.opts.filter(v=>v!==pv_q.answer))[0] || pv_q.answer); // بطاقةُ اختيارِ الآليّ (تُلوَّن)
  if(pv_timed) pvTimer(cfg.d, ()=>pvResolve(ok,null)); else setTimeout(()=>pvResolve(ok,null), cfg.d); }
function pvResolve(ok,btn){ if(!pvRun) return;
  cancelAnimationFrame(pv_raf); const cur=pv_ps[pv_turn], human=!cur.cpu, cv=pv_q.answer;
  const mark=(val,cls)=>{ if(val==null) return; document.querySelectorAll("#pvopts [data-v]").forEach(b=>{ if(b.getAttribute("data-v")===val) b.classList.add(cls); }); };
  if(human){ if(btn) btn.classList.add(ok?"ok":"bad"); } else mark(pv_aiPick, ok?"ok":"bad"); // بطاقةُ مختارِ اللاعب/الآليّ
  if(!ok) mark(cv,"ok");                                                                   // وتُظهَرُ الصحيحة
  document.querySelectorAll("#pvopts .opt").forEach(x=>x.disabled=true);
  if(ok){ cur.score++; const won=cur.score>=PV_TARGET;
    if(won) sfx.success(); else if(human) robo.cheer(vP(GR.ok)); else { sfx.success(); if(Math.random()<0.4) robo.say(vP(GR.aiok),"happy"); } }
  else { if(human) robo.encourage(vP(GR.no)); else sfx.nope(); }
  const fb=document.getElementById("pvfb"); if(fb) fb.innerHTML=`<div class="hint">${ok?"✅ صحيح!":`الصحيحُ: <b>${cv}</b>`}</div>`;
  setTimeout(()=>{ if(!pvRun) return; pv_turn=(pv_turn+1)%pv_ps.length; pvNext(); }, 1200);
}
function pvEnd(){ logEvent("math_pattern_win"); vsEndRound(pv_ps, { onAgain:newPatternVs, onExit:startPatternVs }); }

/* ===== 🧮 تحدّي الحساب (تنافسيّ · versus) — عمليّاتٌ مختلطة (يشاركُ الحارسَ pvRun) ===== */
let ca_diff="easy", ca_ps=[], ca_turn=0, ca_lock=false, ca_q=null, ca_raf=null, ca_timed=true, ca_aiPick=null; const CA_TARGET=5;
const CA_MS={easy:9000,medium:7000,hard:5500}, CA_PR={easy:0.6,medium:0.75,hard:0.9}, CA_D={easy:1500,medium:1200,hard:900};
function startArithVs(){ pvRun=false; view.innerHTML=backBar()+`<div id="cahost"></div>`; wireBack();
  vsSetup(document.getElementById("cahost"), { say:GI.numrace, soloOk:true,
    diffs:[{v:"easy",label:"سهل"},{v:"medium",label:"متوسّط"},{v:"hard",label:"صعب"}],
    getDiff:()=>ca_diff, setDiff:v=>{ca_diff=v;},
    toggle:{ label:"⏱️ اللعبُ ضدّ الوقت", get:()=>ca_timed, set:v=>{ca_timed=v;} },
    start:newArithVs });
  try{speak(GI.numrace);}catch(e){} }
function newArithVs(){ pvRun=true; ca_ps=vsMakePlayers(); ca_ps.forEach(p=>p.score=0); ca_turn=0; ca_lock=false; caNext(); }
// يولّدُ مسألةً بعمليّةٍ عشوائيّةٍ حسبَ الصعوبة (سهل: جمع/طرح · متوسّط: +ضرب · صعب: +قسمةٌ صحيحة).
function caGen(){ const level=ca_diff==="easy"?1:ca_diff==="medium"?2:3;
  const ops=ca_diff==="easy"?["+","-"]:ca_diff==="medium"?["+","-","×"]:["+","-","×","÷"], op=ops[rand(ops.length)];
  const max=level===1?5:level===2?10:20; let a,b,ans,q;
  if(op==="+"){ a=1+rand(max); b=1+rand(max); ans=a+b; q=`${a} + ${b}`; }
  else if(op==="-"){ a=1+rand(max); b=rand(a+1); ans=a-b; q=`${a} − ${b}`; }
  else if(op==="×"){ const m=level===1?5:level===2?7:10; a=1+rand(m); b=1+rand(m); ans=a*b; q=`${a} × ${b}`; }
  else { const m=level===1?5:level===2?7:10; b=1+rand(m); ans=1+rand(m); a=b*ans; q=`${a} ÷ ${b}`; } // نتائجُ صحيحةٌ دائمًا
  const nopts=ca_diff==="easy"?3:4, set=new Set([ans]); let g=0;
  while(set.size<nopts && g++<40){ const d=ans+(rand(7)-3); if(d>=0 && d!==ans) set.add(d); }
  return { q:`${q} = ؟`, ans:String(ans), opts:shuffle([...set].map(String)) };
}
function caNext(){ if(!pvRun) return;
  if(ca_ps.some(p=>p.score>=CA_TARGET)){ caEnd(); return; }
  ca_q=caGen(); ca_lock=false; caRender();
  const cur=ca_ps[ca_turn];
  if(cur.cpu) caAI(); else if(ca_timed) caTimer(CA_MS[ca_diff], ()=>{ if(!ca_lock){ ca_lock=true; caResolve(false,null); } });
}
function caRender(){ const cur=ca_ps[ca_turn], host=document.getElementById("cahost"); if(!host) return;
  host.innerHTML = `<div class="prompt">🧮 تحدّي الحساب — أوّلُ من يبلغُ ${CA_TARGET} يفوز!</div>`
    + vsScoreHtml(ca_ps) + vsTurnHtml(cur)
    + `<div class="opvis" style="text-align:center;font-size:28px;font-weight:800;margin:14px 2px">${ca_q.q}</div>`
    + (ca_timed?`<div style="height:9px;background:var(--line);border-radius:99px;overflow:hidden;max-width:320px;margin:6px auto 12px"><span id="cabar" style="display:block;height:100%;background:var(--primary);width:100%"></span></div>`:"")
    + `<div class="opts" id="caopts">${ca_q.opts.map(o=>`<button class="opt" data-v="${o}">${o}</button>`).join("")}</div>`
    + `<div id="cafb"></div>`;
  host.querySelector("#caopts").addEventListener("click",e=>{ const b=e.target.closest("[data-v]"); if(!b||b.disabled) return; caTap(b.getAttribute("data-v"), b); });
}
function caTimer(ms,onEnd){ const start=Date.now(); cancelAnimationFrame(ca_raf);
  const tick=()=>{ if(!pvRun){ cancelAnimationFrame(ca_raf); return; } const left=ms-(Date.now()-start); const bar=document.getElementById("cabar"); if(bar) bar.style.width=Math.max(0,left/ms*100)+"%"; if(left<=0){ onEnd&&onEnd(); return; } ca_raf=requestAnimationFrame(tick); }; tick(); }
function caTap(v,btn){ if(ca_lock||ca_ps[ca_turn].cpu) return; cancelAnimationFrame(ca_raf); ca_lock=true; sfx.tap(); caResolve(v===ca_q.ans, btn); }
function caAI(){ ca_lock=true; const ok=Math.random()<CA_PR[ca_diff];
  ca_aiPick = ok ? ca_q.ans : (shuffle(ca_q.opts.filter(v=>v!==ca_q.ans))[0] || ca_q.ans);
  if(ca_timed) caTimer(CA_D[ca_diff], ()=>caResolve(ok,null)); else setTimeout(()=>caResolve(ok,null), CA_D[ca_diff]); }
function caResolve(ok,btn){ if(!pvRun) return;
  cancelAnimationFrame(ca_raf); const cur=ca_ps[ca_turn], human=!cur.cpu, cv=ca_q.ans;
  const mark=(val,cls)=>{ if(val==null) return; document.querySelectorAll("#caopts [data-v]").forEach(b=>{ if(b.getAttribute("data-v")===val) b.classList.add(cls); }); };
  if(human){ if(btn) btn.classList.add(ok?"ok":"bad"); } else mark(ca_aiPick, ok?"ok":"bad"); // بطاقةُ مختارِ اللاعب/الآليّ
  if(!ok) mark(cv,"ok");                                                                   // وتُظهَرُ الصحيحة
  document.querySelectorAll("#caopts .opt").forEach(x=>x.disabled=true);
  if(ok){ cur.score++; const won=cur.score>=CA_TARGET;
    if(won) sfx.success(); else if(human) robo.cheer(vP(GR.ok)); else { sfx.success(); if(Math.random()<0.4) robo.say(vP(GR.aiok),"happy"); } }
  else { if(human) robo.encourage(vP(GR.no)); else sfx.nope(); }
  const fb=document.getElementById("cafb"); if(fb) fb.innerHTML=`<div class="hint">${ok?"✅ صحيح!":`الصحيحُ: <b>${cv}</b>`}</div>`;
  setTimeout(()=>{ if(!pvRun) return; ca_turn=(ca_turn+1)%ca_ps.length; caNext(); }, 1200);
}
function caEnd(){ logEvent("math_arith_win"); vsEndRound(ca_ps, { onAgain:newArithVs, onExit:startArithVs }); }

/* ===== 📏 الأكبر والأصغر ===== */
let zScore=0;
// أشكالٌ متنوّعةٌ للمقارنة الحجميّة (نصف القطر r) — لا الدائرة فقط.
const SIZE_SHAPES = {
  دائرة:  (r,col)=>`<circle cx="45" cy="45" r="${r}" fill="${col}"/>`,
  مربّع:  (r,col)=>`<rect x="${45-r}" y="${45-r}" width="${2*r}" height="${2*r}" rx="5" fill="${col}"/>`,
  مثلّث:  (r,col)=>`<polygon points="45,${45-r} ${45+r},${45+r} ${45-r},${45+r}" fill="${col}"/>`,
  نجمة:   (r,col)=>{ let p=""; for(let k=0;k<10;k++){ const rad=k%2?r*0.45:r, a=-Math.PI/2+k*Math.PI/5; p+=(45+rad*Math.cos(a)).toFixed(1)+","+(45+rad*Math.sin(a)).toFixed(1)+" "; } return `<polygon points="${p.trim()}" fill="${col}"/>`; },
};
function startSize(){ zScore=0; nextSize(); }
function nextSize(){
  const wantBig = rand(2)===0;
  const col=C[rand(C.length)];
  const names=Object.keys(SIZE_SHAPES), shape=names[rand(names.length)], draw=SIZE_SHAPES[shape];
  const n = 3 + rand(2); // 3 أو 4 أحجام
  const sizes=shuffle([13,21,30,40]).slice(0,n).map((r,i)=>({r,i}));
  const target = wantBig ? sizes.reduce((m,s)=>s.r>m.r?s:m) : sizes.reduce((m,s)=>s.r<m.r?s:m);
  view.innerHTML = backBar()+
    `<div class="gbar"><span class="pill">⭐ <b>${zScore}</b></span>${autoToggleHtml()}</div>
     <div class="prompt">اضغطِ الشكلَ ${wantBig?"الأكبر":"الأصغر"}</div>
     <div class="grid" id="grid" style="grid-template-columns:repeat(${n},1fr)">${sizes.map(s=>`<button class="tile" data-i="${s.i}"><svg viewBox="0 0 90 90">${draw(s.r,col)}</svg></button>`).join("")}</div>
     <div class="hint">قارنِ الأحجامَ بعينك</div>`;
  wireBack(); wireAuto(view);
  robo.say(wantBig?NOTICES.askBigger:NOTICES.askSmaller,"ask");
  view.querySelector("#grid").addEventListener("click",e=>{ const b=e.target.closest(".tile"); if(!b||b.disabled)return;
    if(+b.getAttribute("data-i")===target.i){ b.classList.add("ok"); zScore++; logEvent("math_correct"); view.querySelectorAll(".tile").forEach(x=>x.disabled=true); onCorrect(robo, view, nextSize); }
    else { b.classList.add("bad"); setTimeout(()=>b.classList.remove("bad"),450); onWrong(robo, view, nextSize); } });
}

/* ===== 🔵 BASIC SHAPES ===== */
function startBasicShapes(){
  view.innerHTML = backBar()+
    `<div class="sgrid" id="grid">${MATH.shapes_basic.map(s=>`<div class="scard" data-id="${s.id}">${s.svg}<div class="sname">${s.name}</div><div class="sdim">2D</div></div>`).join("")}</div>`;
  wireBack();
  view.querySelector("#grid").addEventListener("click", e=>{
    const c=e.target.closest(".scard"); if(!c) return;
    openShape(c.getAttribute("data-id"), MATH.shapes_basic, startBasicShapes);
  });
}
function startAdvShapes(){
  view.innerHTML = backBar()+
    `<div class="sgrid" id="grid">${MATH.shapes_advanced.map(s=>`<div class="scard" data-id="${s.id}">${s.svg}<div class="sname">${s.name}</div><div class="sdim">${s.dim || "2D"}</div></div>`).join("")}</div>`;
  wireBack();
  view.querySelector("#grid").addEventListener("click", e=>{
    const c=e.target.closest(".scard"); if(!c) return;
    openShape(c.getAttribute("data-id"), MATH.shapes_advanced, startAdvShapes);
  });
}
function openShape(id, list, backFn){
  const s = list.find(x=>x.id===id); if(!s) return;
  view.innerHTML =
    `<button class="backstep" id="back2">القائمة</button>
     <div class="shape-detail">
       <div class="big">${s.svg}</div>
       <div class="ttl">${s.name}</div>
       <ul>${(s.facts||[]).map(f=>`<li>${f}</li>`).join("")}</ul>
       ${s.examples ? `<div style="font-weight:700;margin-top:6px">في حياتنا:</div><div class="ex">${s.examples.map(e=>`<span>${e}</span>`).join("")}</div>`:""}
       ${s.tadabbur ? `<div class="tad">🌿 <b>تدبّر:</b> ${s.tadabbur}</div>` : ""}
       <div class="nav"><button class="next" id="speakBtn">🔊 انطق الاسم</button></div>
     </div>`;
  document.getElementById("back2").onclick = backFn;
  document.getElementById("speakBtn").onclick = ()=>robo.read(s.name);
  speak(s.name);
}

/* ===== ✂️ PAPER CRAFTS ===== */
// لكلّ نشاطٍ ملفّ SVG مُلحَقٌ في public/crafts/. حين يضغط الأبُ «تنزيل PDF»،
// نُنقِّط الـSVG في Canvas ثمّ نُغلّفه بـjsPDF فيحصل على ملفّ PDF حقيقيٍّ بمقاس A4.
function pdfNameFor(c){ const base = (c.file || "").split("/").pop().replace(/\.svg$/i,""); return (base || c.id) + ".pdf"; }

async function downloadCraftPdf(c, btn){
  if (!c.file) return;
  const original = btn ? btn.innerHTML : null;
  if (btn) { btn.disabled = true; btn.innerHTML = "⏳ يُعدّ PDF…"; }
  try {
    await downloadSvgAsPdf(c.file, pdfNameFor(c));
  } catch (e) {
    alert("تعذّر إعداد ملفّ PDF: " + (e?.message || e));
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = original; }
  }
}

function startCrafts(){
  view.innerHTML = backBar()+
    `<div class="craftlist" id="cl">${MATH.crafts.map(c=>`
      <div class="craftrow" data-id="${c.id}">
        <div class="thumb">${c.thumb || '<div class="ic">✂️</div>'}</div>
        <div>
          <div class="t">${c.title}</div>
          <div class="meta">${c.shape} · حوالي ${c.mins} دقائق · ${c.steps.length} خطوات${c.file?' · <span style="color:#5E9A47;font-weight:700">📄 PDF جاهز</span>':''}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${c.file?`<button type="button" class="back dl-pdf" style="border-color:#7BB661;color:#5E9A47" data-id="${c.id}" title="تنزيل PDF">⤓ PDF</button>`:''}
          <span class="go">›</span>
        </div>
      </div>`).join("")}</div>
     <div class="hint">حضِّر الأدوات قبل أن نبدأ — والديك يساعدانك مع المقصّ. الملفّات المُنزَّلة PDF جاهزة للطباعة على A4 بمقياس 100%.</div>`;
  wireBack();
  view.querySelector("#cl").addEventListener("click", e=>{
    const dl = e.target.closest(".dl-pdf");
    if (dl) {
      e.stopPropagation();
      const c = MATH.crafts.find(x=>x.id===dl.getAttribute("data-id"));
      if (c) downloadCraftPdf(c, dl);
      return;
    }
    const b=e.target.closest(".craftrow"); if(!b) return;
    openCraft(b.getAttribute("data-id"));
  });
}
function openCraft(id){
  const c = MATH.crafts.find(x=>x.id===id); if(!c) return;
  view.innerHTML =
    `<button class="backstep" id="back2">الورشة</button>
     <div class="card" style="text-align:start;padding:16px">
       <div style="text-align:center">${c.thumb?`<div style="width:72px;height:72px;margin:0 auto;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:14px">${c.thumb.replace('<svg ','<svg width="60" height="60" ')}</div>`:`<div style="font-size:30px">✂️</div>`}<div style="font-weight:800;font-size:18px;margin-top:6px">${c.title}</div><div style="font-size:13px;color:var(--muted)">شكل: ${c.shape} · حوالي ${c.mins} دقائق</div></div>
       ${c.file?`
       <div style="background:#EAF4E3;border:1px solid #CDE6BE;border-radius:14px;padding:12px 14px;margin-top:10px;text-align:center">
         <div style="font-weight:800;color:#3f6b2c;font-size:14.5px;margin-bottom:6px">📄 ملفّ PDF جاهزٌ للقصّ بالمقاسات الحقيقيّة</div>
         <div style="font-size:13px;color:#3f6b2c;margin-bottom:8px">حمِّل الملفّ، اطبعه على A4 بمقياس 100%، ثم قُصَّ على الخطّ السميك.</div>
         <button type="button" id="dlPdf" class="sayb" style="background:#7BB661;border:none">⤓ تنزيل PDF</button>
       </div>`:""}
       <div class="materials"><b>الأدوات:</b><ul>${c.materials.map(m=>`<li>${m}</li>`).join("")}</ul></div>
       <div style="font-weight:800;margin:14px 2px 6px;color:var(--primary-d)">أو ارسم بنفسك بالخطوات التالية:</div>
       ${c.steps.map((s,i)=>`<div class="step"><div class="num">${i+1}</div><div><div class="txt">${s.txt}</div>${s.svg||""}</div></div>`).join("")}
       <div class="tip">💡 <b>نصيحة:</b> ${c.tip||""}</div>
       <div class="nav">
         <button class="prev" id="done">🌟 أنجزتُ!</button>
         <button class="next" id="readCraft">🔊 اقرأ الخطوات</button>
       </div>
     </div>`;
  document.getElementById("back2").onclick = startCrafts;
  document.getElementById("done").onclick = ()=>{ logEvent("craft_done"); robo.cheer(NOTICES.craftDone); };
  document.getElementById("readCraft").onclick = ()=>{ robo.say(NOTICES.craftSteps,"talk"); };
  const dl = document.getElementById("dlPdf"); if (dl) dl.onclick = () => downloadCraftPdf(c, dl);
}

renderMenu();
</script>
