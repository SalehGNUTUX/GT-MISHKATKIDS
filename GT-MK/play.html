/* ===================== ⭕✖ دائرةٌ وعلامة (ضدّ الآليّ بثلاث صعوبات · أو الحسابات) ===================== */
// حجمُ اللوحة (3/4/5) + صعوبةُ الآليّ (vs_ai). طولُ الفوز = min(N,4): 3×3→3، 4×4/5×5→4.
let xo_size=3, xo_win=3, xo_lines=[], xo_b=[], xo_ps=[], xo_turn=0, xo_lock=false, xo_done=false, xo_timed=true, xo_raf=null;
const XO_MK=["✖","◯"];
const XO_MS=9000; // مهلةُ «ضدّ الوقت» لكلِّ حركة
function xoCancelT(){ if(xo_raf){ cancelAnimationFrame(xo_raf); xo_raf=null; } }
function xoArmT(){ const t0=Date.now(); xoCancelT();
  const tick=()=>{ if(!vsRun){ xoCancelT(); return; } const left=XO_MS-(Date.now()-t0), bar=document.getElementById("xotbar"); if(bar) bar.style.width=Math.max(0,left/XO_MS*100)+"%";
    if(left<=0){ if(!xo_lock&&!xo_done&&xo_ps[xo_turn]&&!xo_ps[xo_turn].cpu){ const emp=[...xo_b.keys()].filter(i=>xo_b[i]==null); if(emp.length){ xo_b[emp[Math.floor(Math.random()*emp.length)]]=xo_turn; sfx.wrong(); afterXOMove(); } } return; }
    xo_raf=requestAnimationFrame(tick); }; tick(); }
function xoBuildLines(N,W){ const L=[];
  for(let r=0;r<N;r++)for(let c=0;c<=N-W;c++)L.push(Array.from({length:W},(_,k)=>r*N+c+k));       // أفقيّ
  for(let c=0;c<N;c++)for(let r=0;r<=N-W;r++)L.push(Array.from({length:W},(_,k)=>(r+k)*N+c));       // رأسيّ
  for(let r=0;r<=N-W;r++)for(let c=0;c<=N-W;c++)L.push(Array.from({length:W},(_,k)=>(r+k)*N+c+k));   // قُطريّ ↘
  for(let r=0;r<=N-W;r++)for(let c=W-1;c<N;c++)L.push(Array.from({length:W},(_,k)=>(r+k)*N+c-k));     // قُطريّ ↙
  return L; }
function startXO(){ xoCancelT(); vsSetup({ say:GI.xo, soloOk:true, diffLabel:"🔲 حجمُ اللوحة", diffs:[{v:3,label:"3×3"},{v:4,label:"4×4"},{v:5,label:"5×5"}], getDiff:()=>xo_size, setDiff:v=>{xo_size=+v;}, toggle:{ label:"⏱️ اللعبُ ضدّ الوقت", get:()=>xo_timed, set:v=>{xo_timed=v;} }, start:newXO }); try{speak(GI.xo);}catch(e){} }
function newXO(){ vsRun=true; const N=xo_size; xo_win=Math.min(N,4); xo_lines=xoBuildLines(N,xo_win); xo_b=Array(N*N).fill(null);
  xo_ps=vsMakePlayers(); // «وحدي» في دائرة-وعلامة = لعبٌ منفردٌ بالعلامتين (تُبادِلُ ✖ و◯ بنفسك)
  if(xo_ps.length<2){ const me=xo_ps[0]; xo_ps=[{...me,name:me.name+" ✖",avatar:"✖",color:VS_COLA},{...me,name:me.name+" ◯",avatar:"◯",color:VS_COLB}]; }
  xo_turn=vsStartIndex(xo_ps); xo_lock=false; xo_done=false; renderXO(); if(xo_ps[0].cpu) xoAI(); }
function xoWinner(b){ for(const L of xo_lines){ const p=b[L[0]]; if(p!=null && L.every(i=>b[i]===p)) return {p, line:L}; } return b.every(x=>x!=null)?{p:-1,line:null}:null; }
function renderXO(){
  const N=xo_size, w=xoWinner(xo_b), cur=xo_ps[xo_turn], cf=N===3?46:N===4?34:26;
  let turnHtml = xo_done ? "" : vsTurnHtml(cur);
  const cells = xo_b.map((v,i)=>{ const mk=v==null?"":XO_MK[v]; const col=v==null?"":xo_ps[v].color; const wn=w&&w.line&&w.line.includes(i)?" wn":""; return `<div class="xoc${wn}" data-i="${i}" style="color:${col};font-size:${cf}px">${mk}</div>`; }).join("");
  view.innerHTML = backBar()+`<div class="clue" style="padding:10px"><div class="say">دائرةٌ وعلامة ⭕✖ — ${xo_win} في خطٍّ تفوز!</div></div>`
    + vsScoreHtml(xo_ps) + turnHtml + ((xo_timed && !xo_done && cur && !cur.cpu)?`<div class="hubar" style="max-width:${N===3?300:N===4?340:360}px;margin:6px auto"><span id="xotbar"></span></div>`:"") + `<div class="xob" id="xob" style="grid-template-columns:repeat(${N},1fr);max-width:${N===3?300:N===4?340:360}px">${cells}</div>`
    + `<div id="xomsg"></div>`
    + `<div class="controls" style="margin-top:14px"><button class="go" id="xoagain">جولةٌ جديدة</button> <button id="xoreset">↻ إعدادات</button></div>`;
  wireBack();
  document.getElementById("xob").addEventListener("click",e=>{ const c=e.target.closest("[data-i]"); if(!c) return; xoPlay(+c.getAttribute("data-i")); });
  document.getElementById("xoagain").onclick=newXO;
  document.getElementById("xoreset").onclick=startXO;
  xoCancelT(); if(xo_timed && !xo_done && cur && !cur.cpu) xoArmT();   // «ضدّ الوقت»: عدّادٌ لدورِ اللاعب
}
function xoPlay(i){
  if(xo_lock||xo_done||xo_b[i]!=null) return;
  if(xo_ps[xo_turn].cpu) return;
  xo_b[i]=xo_turn; sfx.tap(); afterXOMove();
}
function afterXOMove(){ if(!vsRun) return; xoCancelT();
  const w=xoWinner(xo_b);
  if(w){ xoEnd(w); return; }
  xo_turn=(xo_turn+1)%xo_ps.length; renderXO();
  if(xo_ps[xo_turn].cpu) xoAI();
}
function xoAI(){
  xo_lock=true;
  setTimeout(()=>{ const me=xo_turn, opp=(xo_turn+1)%2; const mv=xoChoose(xo_b,me,opp); xo_b[mv]=me; sfx.tap(); xo_lock=false; afterXOMove(); }, 620);
}
function xoChoose(b,me,opp){
  const empty=[...b.keys()].filter(i=>b[i]==null), N=xo_size;
  if(vs_ai==="easy") return empty[Math.floor(Math.random()*empty.length)];
  for(const i of empty){ const t=[...b]; t[i]=me; const w=xoWinner(t); if(w&&w.p===me) return i; }   // اربحْ فورًا
  for(const i of empty){ const t=[...b]; t[i]=opp; const w=xoWinner(t); if(w&&w.p===opp) return i; }  // اسدُدْ فوزَ الخصم الفوريّ
  if(vs_ai==="hard"){
    if(N===3){ let best=-Infinity, bi=empty[0]; for(const i of empty){ const t=[...b]; t[i]=me; const s=xoMinimax(t,opp,me,opp,1); if(s>best){best=s;bi=i;} } return bi; } // مينيماكس مثاليّ للصغيرة
    const threat=who=>{ for(const L of xo_lines){ const mine=L.filter(i=>b[i]===who).length, emp=L.filter(i=>b[i]==null); if(mine===xo_win-1 && emp.length===1) return emp[0]; } return -1; };
    let t=threat(opp); if(t>=0) return t;   // احجُبْ تهديدَ الخصم القريب
    t=threat(me); if(t>=0) return t;         // أكملْ خطَّك
    let best=-1, bi=empty[0];               // خليّةٌ تُعظّمُ خطوطي المفتوحة
    for(const i of empty){ let sc=0; for(const L of xo_lines){ if(L.includes(i) && !L.some(j=>b[j]===opp)) sc+=L.filter(j=>b[j]===me).length+1; } if(sc>best){best=sc;bi=i;} }
    return bi;
  }
  const cen=Math.floor(N*N/2); if(Math.random()<0.5 && b[cen]==null) return cen;  // متوسّط
  return empty[Math.floor(Math.random()*empty.length)];
}
function xoMinimax(b,turn,me,opp,depth){
  const w=xoWinner(b);
  if(w){ if(w.p===me) return 10-depth; if(w.p===opp) return depth-10; return 0; }
  const empty=[...b.keys()].filter(i=>b[i]==null);
  if(turn===me){ let best=-Infinity; for(const i of empty){ const t=[...b]; t[i]=me; best=Math.max(best,xoMinimax(t,opp,me,opp,depth+1)); } return best; }
  let best=Infinity; for(const i of empty){ const t=[...b]; t[i]=opp; best=Math.min(best,xoMinimax(t,me,me,opp,depth+1)); } return best;
}
function xoEnd(w){
  xo_done=true; logEvent("xo_win");
  if(w.p!==-1) xo_ps[w.p].score++;
  renderXO();
  vsEndRound(xo_ps, { game:"دائرةٌ وعلامة", diff:`${xo_size}×${xo_size}`, onAgain:newXO, onExit:startXO });
}

/* ===================== ▪️ مربّعاتُ النقاط (v1.6 · نسخةٌ رقميّةٌ للّعبةِ الورقيّة) =====================
   لوحةٌ من نقاط: يصلُ اللاعبُ نقطتَينِ متجاورتَينِ بخطّ، ومن أغلقَ مربّعًا ملكَه **ولعبَ مرّةً أخرى**.
   تمثيلُ الخطوط: أفقيّةٌ H[r][c] (بين (r,c)-(r,c+1)) ورأسيّةٌ V[r][c] (بين (r,c)-(r+1,c)). */
let dt_n=4, dt_ps=[], dt_turn=0, dt_H=[], dt_V=[], dt_own=[], dt_lock=false, dt_done=false;
function startDots(){ vsSetup({ say:GI.dots, soloOk:true, diffLabel:"🔲 حجمُ اللوحة",
  diffs:[{v:3,label:"3×3"},{v:4,label:"4×4"},{v:5,label:"5×5"}], getDiff:()=>dt_n, setDiff:v=>{dt_n=+v;}, start:newDots }); try{speak(GI.dots);}catch(e){} }
function newDots(){
  vsRun=true; const N=dt_n;
  dt_H=Array.from({length:N+1},()=>Array(N).fill(-1));   // -1 = لا خطّ
  dt_V=Array.from({length:N},()=>Array(N+1).fill(-1));
  dt_own=Array(N*N).fill(-1);
  dt_ps=vsMakePlayers();
  if(dt_ps.length<2){ const me=dt_ps[0]; dt_ps=[{...me,name:me.name+" ١",color:VS_COLA},{...me,name:me.name+" ٢",color:VS_COLB}]; } // «وحدي» = بالدورَين
  dt_ps.forEach(p=>p.score=0);
  dt_turn=vsStartIndex(dt_ps); dt_lock=false; dt_done=false;
  renderDots(); if(dt_ps[dt_turn].cpu) setTimeout(dotsAI,600);
}
// المربّعاتُ التي تكتملُ بوضعِ هذا الخطّ (تُرجِعُ فهارسَها)
function dotsClosed(H,V,N){ const out=[]; for(let r=0;r<N;r++)for(let c=0;c<N;c++){ if(H[r][c]>=0&&H[r+1][c]>=0&&V[r][c]>=0&&V[r][c+1]>=0) out.push(r*N+c); } return out; }
function dotsPlay(kind,r,c){
  if(dt_lock||dt_done) return;
  const N=dt_n, arr=kind==="h"?dt_H:dt_V;
  if(arr[r][c]>=0) return;                       // الخطُّ مرسومٌ سلفًا
  const before=dotsClosed(dt_H,dt_V,N).length;
  arr[r][c]=dt_turn; sfx.tap();
  const after=dotsClosed(dt_H,dt_V,N);
  let gained=0;
  for(const i of after){ if(dt_own[i]<0){ dt_own[i]=dt_turn; gained++; } }
  if(gained){ dt_ps[dt_turn].score+=gained; sfx.success(); }
  else dt_turn=(dt_turn+1)%dt_ps.length;          // لم يُغلِقْ مربّعًا ⇒ ينتقلُ الدور
  const total=N*N, filled=dt_own.filter(x=>x>=0).length;
  renderDots();
  if(filled>=total){ dt_done=true; renderDots();
    vsEndRound(dt_ps,{ game:"مربّعاتُ النقاط", diff:`${N}×${N}`, onAgain:newDots, onExit:startDots }); return; }
  if(dt_ps[dt_turn].cpu) setTimeout(dotsAI,600);
}
// آليٌّ بسيطٌ ومحترم: يُغلِقُ مربّعًا إن أمكن، وإلّا يتجنّبُ إهداءَ مربّعٍ للخصمِ (خطٌّ يجعلُ للمربّعِ 3 أضلاع)، وإلّا عشوائيّ.
function dotsAI(){
  if(dt_done) return; const N=dt_n, moves=[];
  for(let r=0;r<=N;r++)for(let c=0;c<N;c++) if(dt_H[r][c]<0) moves.push(["h",r,c]);
  for(let r=0;r<N;r++)for(let c=0;c<=N;c++) if(dt_V[r][c]<0) moves.push(["v",r,c]);
  if(!moves.length) return;
  const sidesOf=(H,V,r,c)=>(H[r][c]>=0?1:0)+(H[r+1][c]>=0?1:0)+(V[r][c]>=0?1:0)+(V[r][c+1]>=0?1:0);
  const trial=m=>{ const H=dt_H.map(x=>x.slice()), V=dt_V.map(x=>x.slice()); (m[0]==="h"?H:V)[m[1]][m[2]]=99; return {H,V}; };
  const closes=m=>{ const {H,V}=trial(m); return dotsClosed(H,V,N).length > dotsClosed(dt_H,dt_V,N).length; };
  const gifts=m=>{ const {H,V}=trial(m); for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(sidesOf(H,V,r,c)===3 && sidesOf(dt_H,dt_V,r,c)!==3) return true; return false; };
  const win=moves.filter(closes); const safe=moves.filter(m=>!closes(m)&&!gifts(m));
  const pool = win.length?win : (safe.length?safe:moves);
  const m=pool[Math.floor(Math.random()*pool.length)];
  dotsPlay(m[0],m[1],m[2]);
}
function renderDots(){
  const N=dt_n, cur=dt_ps[dt_turn];
  const S=Math.min(78, Math.floor((Math.min(innerWidth-56,360))/N));   // مقاسٌ متجاوبٌ مع الشاشة
  let cells="";
  for(let r=0;r<=N;r++){
    for(let c=0;c<=N;c++){
      cells+=`<div class="dt-dot" style="left:${c*S}px;top:${r*S}px"></div>`;
      if(c<N){ const o=dt_H[r][c]; cells+=`<div class="dt-ln h${o>=0?" on":""}" data-k="h" data-r="${r}" data-c="${c}" style="left:${c*S+7}px;top:${r*S-4}px;width:${S-14}px${o>=0?`;background:${dt_ps[o].color}`:""}"></div>`; }
    }
    if(r<N) for(let c=0;c<=N;c++){ const o=dt_V[r][c]; cells+=`<div class="dt-ln v${o>=0?" on":""}" data-k="v" data-r="${r}" data-c="${c}" style="left:${c*S-4}px;top:${r*S+7}px;height:${S-14}px${o>=0?`;background:${dt_ps[o].color}`:""}"></div>`; }
  }
  for(let i=0;i<N*N;i++){ const o=dt_own[i]; if(o<0) continue; const r=Math.floor(i/N), c=i%N;
    cells+=`<div class="dt-box" style="left:${c*S+5}px;top:${r*S+5}px;width:${S-10}px;height:${S-10}px;background:${dt_ps[o].color}22;color:${dt_ps[o].color};font-size:${Math.round(S*.4)}px">${dt_ps[o].avatar||"●"}</div>`; }
  view.innerHTML = backBar()+`<div class="clue" style="padding:10px"><div class="say">▪️ مربّعاتُ النقاط — صِلْ نقطتين، ومن أغلقَ مربّعًا لعبَ مرّةً أخرى!</div></div>`
    + vsScoreHtml(dt_ps) + (dt_done?"":vsTurnHtml(cur))
    + `<div class="dt-wrap" style="width:${N*S+8}px;height:${N*S+8}px">${cells}</div>`;
  wireBack();
  const w=view.querySelector(".dt-wrap");
  if(w && !dt_done && cur && !cur.cpu) w.addEventListener("click", e=>{ const l=e.target.closest(".dt-ln:not(.on)"); if(l) dotsPlay(l.dataset.k,+l.dataset.r,+l.dataset.c); });
}

/* ===================== 🔢 تحدّي الأعداد (تناوبٌ · ضدّ الآليّ بثلاث صعوبات/الحسابات) ===================== */
let nc_diff="easy", nc_ps=[], nc_turn=0, nc_q=null, nc_lock=false, nc_aiPick=null; const NC_TARGET=5;
function startNC(){ vsSetup({ say:GI.numrace, soloOk:true, diffs:[{v:"easy",label:"جمع"},{v:"medium",label:"جمع وطرح"},{v:"hard",label:"ضرب"}], getDiff:()=>nc_diff, setDiff:v=>{nc_diff=v;}, start:newNC }); try{speak(GI.numrace);}catch(e){} }
function newNC(){ vsRun=true; nc_ps=vsMakePlayers(); nc_ps.forEach(p=>p.score=0); nc_turn=vsStartIndex(nc_ps); nc_lock=false; ncNext(); }
function ncGen(){
  const R=(a,b)=>a+Math.floor(Math.random()*(b-a+1)); let a,b,op,ans;
  if(nc_diff==="easy"){ a=R(1,9); b=R(1,9); op="+"; ans=a+b; }
  else if(nc_diff==="medium"){ if(Math.random()<0.5){ a=R(3,18); b=R(1,a); op="−"; ans=a-b; } else { a=R(1,15); b=R(1,15); op="+"; ans=a+b; } }
  else { a=R(2,9); b=R(2,9); op="×"; ans=a*b; }
  const opts=new Set([ans]); while(opts.size<4){ let d=ans+R(-5,5); if(d<0||d===ans) d=ans+opts.size+1; opts.add(d); }
  return { a,b,op,ans, opts:shuffle([...opts]) };
}
function ncNext(){ if(!vsRun) return;
  if(nc_ps.some(p=>p.score>=NC_TARGET)){ ncEnd(); return; }
  nc_q=ncGen(); nc_lock=false; renderNC();
  if(nc_ps[nc_turn].cpu) ncAI();
}
function renderNC(){
  const cur=nc_ps[nc_turn];
  view.innerHTML = backBar()+`<div class="clue" style="padding:10px"><div class="say">تحدّي الأعداد 🔢 — أوّلُ من يبلغُ ${NC_TARGET} يفوز!</div></div>`
    + vsScoreHtml(nc_ps)
    + vsTurnHtml(cur)
    + `<div class="ncq">${nc_q.a} ${nc_q.op} ${nc_q.b} = ؟</div>`
    + `<div class="ncopts" id="ncopts">`+nc_q.opts.map(o=>`<button class="ncopt" data-v="${o}">${o}</button>`).join("")+`</div>`
    + `<div id="ncfb"></div>`;
  wireBack();
  document.getElementById("ncopts").addEventListener("click",e=>{ const b=e.target.closest("[data-v]"); if(!b) return; ncAnswer(+b.getAttribute("data-v"), b); });
}
function ncAnswer(v, btn){ if(nc_lock||nc_ps[nc_turn].cpu) return; nc_lock=true; sfx.tap(); ncResolve(v===nc_q.ans, btn); }
function ncAI(){ nc_lock=true; const pr=nc_diff==="easy"?0.6:nc_diff==="medium"?0.78:0.9, ok=Math.random()<pr;
  nc_aiPick = ok ? nc_q.ans : (shuffle(nc_q.opts.filter(o=>o!==nc_q.ans))[0] ?? nc_q.ans); // بطاقةُ اختيارِ الآليّ (تُلوَّن)
  setTimeout(()=>{ ncResolve(ok, null); }, 950); }
function ncResolve(correct, btn){
  const cur=nc_ps[nc_turn], human=!cur.cpu;
  const mark=(val,cls)=>{ if(val==null) return; document.querySelectorAll("#ncopts [data-v]").forEach(b=>{ if(+b.getAttribute("data-v")===val) b.classList.add(cls); }); };
  if(human){ if(btn) btn.classList.add(correct?"ok":"bad"); } else mark(nc_aiPick, correct?"ok":"bad"); // بطاقةُ مختارِ اللاعب/الآليّ
  if(!correct) mark(nc_q.ans,"ok");                                                                   // وتُظهَرُ الإجابةُ الصحيحة
  if(correct){ cur.score++; const won=cur.score>=NC_TARGET;
    if(won) sfx.success(); else if(human) robo.cheer(vP(VS_OK), {female:cur.female}); else { sfx.success(); if(Math.random()<0.45) robo.say(vP(VS_AIOK),"happy"); } }
  else { if(human) robo.encourage(vP(VS_NO), {female:cur.female}); else sfx.nope(); }
  const fb=document.getElementById("ncfb"); if(fb) fb.innerHTML=`<div class="fb">${correct?`✅ صحيح! ${nc_q.a} ${nc_q.op} ${nc_q.b} = ${nc_q.ans}`:`❌ الصحيحُ هو ${nc_q.ans}`}</div>`;
  setTimeout(()=>{ nc_turn=(nc_turn+1)%nc_ps.length; ncNext(); }, 1150);
}
function ncEnd(){ logEvent("numrace_win"); vsEndRound(nc_ps, { game:"تحدّي الأعداد", diff:AIDIFF(vs_ai), onAgain:newNC, onExit:startNC }); }

/* ===================== 🔎 صيدُ الحرف/الرقم (تناوبٌ بمؤقّت · ضدّ الآليّ بثلاث صعوبات/الحسابات) ===================== */
let hu_diff="easy", hu_ps=[], hu_turn=0, hu_lock=false, hu_cells=[], hu_target="", hu_raf=null, hu_aiPick=null, hu_timed=true; const HU_TARGET=5;
const HU_CFG={ easy:{n:12,ms:6000,pr:0.6,d:1800}, medium:{n:16,ms:4500,pr:0.78,d:1300}, hard:{n:20,ms:3200,pr:0.9,d:900} };
const AR_LETTERS="ا ب ت ث ج ح خ د ذ ر ز س ش ص ض ط ظ ع غ ف ق ك ل م ن ه و ي".split(" ");
function startHU(){ vsSetup({ say:GI.hunt, soloOk:true, diffs:[{v:"easy",label:"سهل"},{v:"medium",label:"متوسّط"},{v:"hard",label:"صعب"}], getDiff:()=>hu_diff, setDiff:v=>{hu_diff=v;}, toggle:{ label:"⏱️ اللعبُ ضدّ الوقت", get:()=>hu_timed, set:v=>{hu_timed=v;} }, start:newHU }); try{speak(GI.hunt);}catch(e){} }
function newHU(){ vsRun=true; hu_ps=vsMakePlayers(); hu_ps.forEach(p=>p.score=0); hu_turn=vsStartIndex(hu_ps); hu_lock=false; huNext(); }
function huNext(){ if(!vsRun) return;
  if(hu_ps.some(p=>p.score>=HU_TARGET)){ huEnd(); return; }
  const cfg=HU_CFG[hu_diff], useNum=Math.random()<0.5;
  const pool=useNum ? shuffle(Array.from({length:40},(_,i)=>String(i+1))) : shuffle([...AR_LETTERS]);
  hu_cells=pool.slice(0,cfg.n); hu_target=hu_cells[Math.floor(Math.random()*hu_cells.length)]; hu_lock=false;
  renderHU();
  if(hu_ps[hu_turn].cpu) huAI(); else if(hu_timed) huTimer(cfg.ms, ()=>{ if(!hu_lock){ hu_lock=true; huResolve(false,null); } });
}
function renderHU(){
  const cur=hu_ps[hu_turn];
  view.innerHTML=backBar()+`<div class="clue" style="padding:10px"><div class="say">صيدُ الحرف/الرقم 🔎 — أوّلُ من يبلغُ ${HU_TARGET} يفوز!</div></div>`
    + vsScoreHtml(hu_ps)
    + vsTurnHtml(cur)
    + `<div class="hutarget">اعثرْ على: <b>${hu_target}</b></div>`
    + (hu_timed?`<div class="hubar"><span id="hubar"></span></div>`:"")
    + `<div class="hugrid" id="hugrid">`+hu_cells.map(c=>`<button class="hucell" data-c="${c}">${c}</button>`).join("")+`</div>`
    + `<div id="hufb"></div>`;
  wireBack();
  document.getElementById("hugrid").addEventListener("click",e=>{ const b=e.target.closest("[data-c]"); if(!b) return; huTap(b.getAttribute("data-c"), b); });
}
function huTimer(ms, onEnd){ const start=Date.now(), bar=document.getElementById("hubar"); cancelAnimationFrame(hu_raf);
  const tick=()=>{ if(!vsRun){ cancelAnimationFrame(hu_raf); cancelAnimationFrame(sm_raf); return; } const left=ms-(Date.now()-start); if(bar) bar.style.width=Math.max(0,left/ms*100)+"%"; if(left<=0){ onEnd&&onEnd(); return; } hu_raf=requestAnimationFrame(tick); }; tick();
}
function huTap(c,btn){ if(hu_lock||hu_ps[hu_turn].cpu) return; cancelAnimationFrame(hu_raf); hu_lock=true; sfx.tap(); huResolve(c===hu_target, btn); }
function huAI(){ hu_lock=true; const cfg=HU_CFG[hu_diff], ok=Math.random()<cfg.pr;
  hu_aiPick = ok ? hu_target : (shuffle(hu_cells.filter(c=>c!==hu_target))[0] || hu_target); // خليّةُ اختيارِ الآليّ (تُلوَّن)
  if(hu_timed) huTimer(cfg.d, ()=>huResolve(ok,null)); else setTimeout(()=>huResolve(ok,null), cfg.d); } // الشريطُ يَنزِفُ خلالَ تفكيرِ الآليّ أيضًا
function huResolve(ok,btn){
  cancelAnimationFrame(hu_raf); const cur=hu_ps[hu_turn], human=!cur.cpu;
  const mark=(val,cls)=>{ if(val==null) return; document.querySelectorAll("#hugrid [data-c]").forEach(b=>{ if(b.getAttribute("data-c")===val) b.classList.add(cls); }); };

let wg_diff="easy", wg_ps=[], wg_turn=0, wg_words=[], wg_found=0, wg_owner=[], wg_seq=[], wg_lock=false, wg_grid=[]; const WG_N=6;
const WG_CFG={ easy:{count:4,len:[3,3],pr:0.5}, medium:{count:5,len:[3,4],pr:0.68}, hard:{count:6,len:[3,5],pr:0.82} };
function startWG(){ vsSetup({ say:GI.wgrid, soloOk:true, diffs:[{v:"easy",label:"سهل"},{v:"medium",label:"متوسّط"},{v:"hard",label:"صعب"}], getDiff:()=>wg_diff, setDiff:v=>{wg_diff=v;}, start:newWG }); try{speak(GI.wgrid);}catch(e){} }
function wgGen(){
  const cfg=WG_CFG[wg_diff];
  const pool=[...EXTRA_WHEEL_WORDS].filter(w=>w.length>=cfg.len[0] && w.length<=cfg.len[1]);
  for(let attempt=0; attempt<40; attempt++){
    const words=shuffle(pool).slice(0,cfg.count);
    const grid=Array(WG_N*WG_N).fill(null), placed=[]; let ok=true;
    for(const w of words){
      const ch=[...w], len=ch.length; let done=false;
      for(let t=0;t<200 && !done;t++){
        const horiz=Math.random()<0.5;
        const r=Math.floor(Math.random()*(horiz?WG_N:WG_N-len+1));
        const c=Math.floor(Math.random()*(horiz?WG_N-len+1:WG_N));
        const path=[]; for(let k=0;k<len;k++) path.push(horiz?(r*WG_N+c+k):((r+k)*WG_N+c));
        if(path.every(idx=>grid[idx]===null)){ path.forEach((idx,k)=>grid[idx]=ch[k]); placed.push({word:w,path}); done=true; }
      }
      if(!done){ ok=false; break; }
    }
    if(ok){ for(let i=0;i<grid.length;i++) if(grid[i]===null) grid[i]=AR_LETTERS[Math.floor(Math.random()*AR_LETTERS.length)]; return {grid, words:placed}; }
  }
  return null;
}
function newWG(){ vsRun=true;
  wg_ps=vsMakePlayers(); wg_ps.forEach(p=>p.score=0);
  const g=wgGen(); if(!g){ view.innerHTML=backBar()+`<div class="clue"><div class="say">تعذّر توليدُ الشبكة، حاولْ ثانيةً.</div></div>`; wireBack(); return; }
  wg_grid=g.grid; wg_words=g.words; wg_found=0; wg_owner=Array(WG_N*WG_N).fill(null); wg_seq=[]; wg_turn=0; wg_lock=false;
  renderWG(); if(wg_ps[wg_turn].cpu) wgAI();
}
function renderWG(){
  const cur=wg_ps[wg_turn];
  const list=wg_words.map((w,i)=>`<span class="wgw ${i<wg_found?"done":""} ${i===wg_found?"cur":""}">${w.word}</span>`).join("");
  const cells=wg_grid.map((ch,i)=>{ const own=wg_owner[i], sel=wg_seq.includes(i)?" sel":"", oc=own!=null?" own":"", st=own!=null?`style="background:${wg_ps[own].color}"`:""; return `<button class="wgc${sel}${oc}" data-i="${i}" ${st}>${ch}</button>`; }).join("");
  view.innerHTML=backBar()+`<div class="clue" style="padding:10px"><div class="say">شبكةُ الكلمات 🔤 — كوّنِ الكلمةَ المُحدَّدة: انقرْ حروفَها بالترتيب (أفقيًّا أو رأسيًّا).</div></div>`
    + vsScoreHtml(wg_ps)
    + vsTurnHtml(cur)
    + `<div class="wglist">${list}</div>`
    + `<div class="wggrid" id="wggrid">${cells}</div>`
    + `<div id="wgfb"></div>`;
  wireBack();
  document.getElementById("wggrid").addEventListener("click",e=>{ const b=e.target.closest("[data-i]"); if(!b) return; wgTap(+b.getAttribute("data-i")); });
}
// تتبُّعُ الكلمة حرفًا حرفًا بالترتيب (تكوينُها فعليّاً)، صعودًا أو نزولًا على مسارها.
function wgTap(i){
  if(wg_lock||wg_ps[wg_turn].cpu||wg_owner[i]!=null) return;
  if(wg_seq.length && wg_seq[wg_seq.length-1]===i){ wg_seq.pop(); renderWG(); return; } // إعادةُ النقر = تراجُع
  if(wg_seq.includes(i)) return;
  wg_seq.push(i); sfx.tap();
  const cur=wg_words[wg_found], fwd=cur.path, rev=[...cur.path].reverse();
  const pre=(seq,path)=>seq.length<=path.length && seq.every((c,k)=>c===path[k]);
  if(!pre(wg_seq,fwd) && !pre(wg_seq,rev)){ // كسرَ التسلسل ⇒ خطأٌ وتمريرُ الدور
    wg_seq=[]; wg_lock=true; renderWG();
    const fb=document.getElementById("wgfb"); if(fb) fb.innerHTML=`<div class="fb">❌ ليست هي — ينتقلُ الدورُ للخصم.</div>`;
    robo.encourage(vP(VS_NO), {female:cur.female});
    setTimeout(()=>{ if(!vsRun) return; wg_turn=(wg_turn+1)%wg_ps.length; wg_lock=false; renderWG(); if(wg_ps[wg_turn].cpu) wgAI(); }, 1150);
    return;
  }
  if(wg_seq.length===cur.path.length){ // اكتملتِ الكلمة
    cur.path.forEach(idx=>wg_owner[idx]=wg_turn); wg_ps[wg_turn].score++; wg_found++; wg_seq=[];
    if(wg_found>=wg_words.length){ renderWG(); wgEnd(); return; } // الفوزُ: يتولّى wgEnd ردَّ الفعل (لا ازدواجَ صوت)
    robo.cheer(vP(VS_OK), {female:cur.female}); renderWG(); const fb=document.getElementById("wgfb"); if(fb) fb.innerHTML=`<div class="fb">✅ أحسنت! «${cur.word}» — تابِعْ بالكلمة التالية.</div>`;
  } else { renderWG(); }
}
function wgAI(){ if(!vsRun) return;
  wg_lock=true;
  setTimeout(()=>{
    const cfg=WG_CFG[wg_diff], cur=wg_words[wg_found];
    if(Math.random()<cfg.pr){ cur.path.forEach(idx=>wg_owner[idx]=wg_turn); wg_ps[wg_turn].score++; wg_found++; sfx.success(); wg_lock=false;
      if(Math.random()<0.4) robo.say(`كوّنتُ «${cur.word}» 🤖`, "happy");
      if(wg_found>=wg_words.length){ renderWG(); wgEnd(); return; }
      renderWG(); const fb=document.getElementById("wgfb"); if(fb) fb.innerHTML=`<div class="fb">🤖 كوّنَ الآليُّ «${cur.word}».</div>`; wgAI();
    } else { sfx.nope(); wg_lock=false; wg_turn=(wg_turn+1)%wg_ps.length; renderWG(); robo.say("أخطأتُ! دورُك الآن 🤖","ok"); const fb=document.getElementById("wgfb"); if(fb) fb.innerHTML=`<div class="fb">🤖 أخطأ الآليُّ — دورُك الآن!</div>`; if(wg_ps[wg_turn].cpu) wgAI(); }
  }, 950);
}
function wgEnd(){ logEvent("wordgrid_win"); vsEndRound(wg_ps, { game:"شبكةُ الكلمات", diff:AIDIFF(vs_ai), onAgain:newWG, onExit:startWG }); }

function renderPrint(){
  view.innerHTML = backBar()+`<div class="intro">النسخة الحسّيّة الورقيّة للأهل — «نشاطٌ واقعيّ أوّلًا». اطبعها وعلّقها.</div><button class="printbtn" onclick="smartPrint(document.getElementById('printActs'),'أنشطة-مِشكاة.pdf')">🖨️ اطبع الأنشطة</button>`+
    `<div id="printActs">`+ACTS.map(a=>`<div class="acard"><h3>${a.emoji} ${a.title}</h3><span class="mat">🧰 ${a.mat}</span><ol>${a.steps.map(s=>`<li>${s}</li>`).join("")}</ol></div>`).join("")+`</div>`;
  wireBack();
}

// زرُّ الرجوع في الهاتف (Capacitor، عبر theme.js): إن كان الطفلُ داخلَ لعبةٍ (زرُّ «الألعاب» ظاهر)
// نُعيدُه لقائمة الألعاب لا أن يخرجَ من البرنامج.
window.appBack = () => { if(document.getElementById("back")){ renderMenu(); return true; } if(curCat){ curCat=null; renderMenu(); return true; } return false; };
// ?g=<id> يفتحُ لعبةً بعينها مباشرةً (توجيهُ المهامّ)؛ وإلّا قائمةٌ مجمَّعة.
{ const _g=new URLSearchParams(location.search).get("g"); if(_g && GAMES.some(x=>x.id===_g)){ renderMenu(); open(_g); } else renderMenu(); }
</script>
