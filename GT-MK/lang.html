<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<script>/* منعُ وميض السمة */(function(){try{var t=localStorage.getItem('tilmithi_theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<style id="theme-crit">html[data-theme="dark"]{--bg:#15151b;--card:#23232c;--ink:#ECE7DD;--muted:#A39E94;--line:#34343f;--primary-d:#E8987E;--shadow:0 6px 20px rgba(0,0,0,.45)}html[data-theme="dark"] body{background:var(--bg);color:var(--ink)}</style>
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="مِشكاة" />
<meta name="theme-color" content="#6FB3D6" />
<title>مِشكاة — لغات أجنبيّة</title>
<style>
  :root{ --bg:#FBF7EF; --card:#FFFFFF; --ink:#2B2B2B; --muted:#6B6B6B; --line:#ECE6DA;
    --primary:#6FB3D6; --primary-d:#3a7da0; --good:#7BB661; --shadow:0 6px 20px rgba(0,0,0,.07);
    font-family:"Segoe UI",Tahoma,system-ui,"Noto Naskh Arabic",sans-serif; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:760px;margin:0 auto;padding:16px 16px 56px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 12px}
  header h1{font-size:21px;margin:0}
  header .sub{color:var(--muted);font-size:13px}
  .topbtn{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;font-size:14px;cursor:pointer;text-decoration:none;color:var(--ink);font-family:inherit}

  /* اختيار اللغة */
  .pick{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:10px}
  .langcard{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;cursor:pointer;
    background:var(--card);border:1.5px solid var(--line);border-radius:22px;padding:24px 14px;box-shadow:var(--shadow);
    font-family:inherit;color:var(--ink);transition:transform .16s cubic-bezier(.34,1.56,.64,1),box-shadow .16s}
  .langcard:hover{transform:translateY(-5px);box-shadow:0 12px 26px rgba(0,0,0,.16)}
  .langcard .fl{font-size:54px;line-height:1;transition:transform .25s}
  .langcard:hover .fl{transform:scale(1.15) rotate(-6deg)}
  .langcard .nm{font-size:20px;font-weight:800}
  .langcard .na{font-size:13px;color:var(--muted)}

  /* قائمة أقسام اللغة */
  .secs{display:flex;gap:10px;flex-wrap:wrap;margin:12px 2px}
  .secbtn{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 16px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--ink)}
  .secbtn.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .secbtn.soon{opacity:.55;cursor:default}

  /* شريطُ الرجوع + شبكةُ بطاقات التنقّل (أقسام/فئات) — بطاقاتٌ مدمجةٌ ملوّنةٌ متحرّكة */
  .topnav{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 2px 6px}
  .backbtn{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--ink)}
  .backbtn:hover{border-color:var(--primary)}
  .topnav .cur{font-size:16px;font-weight:800;color:var(--primary-d)}
  .lgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin-top:6px}
  .lcard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    background:var(--cc,var(--card));border:1.5px solid var(--cb,var(--line));border-radius:20px;padding:18px 8px;
    cursor:pointer;font-family:inherit;color:var(--ink);aspect-ratio:1/1;box-shadow:var(--shadow);
    transition:transform .16s cubic-bezier(.34,1.56,.64,1),box-shadow .16s}
  .lcard:hover{transform:translateY(-5px);box-shadow:0 12px 26px rgba(0,0,0,.16)}
  .lcard:hover .ic{transform:scale(1.22) rotate(-8deg)}
  .lcard:active{transform:scale(.97)}
  .lcard:active .ic{animation:icpop .45s ease}
  .lcard .ic{font-size:40px;line-height:1;transition:transform .25s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 2px 4px rgba(0,0,0,.12))}
  .lcard .lt{font-size:13.5px;font-weight:800;transition:opacity .26s ease;min-height:1.2em}
  .lcard .lt.fg{direction:ltr;unicode-bidi:isolate}
  /* العبارات والجمل المركّبة */
  .plist{display:flex;flex-direction:column;gap:10px;max-width:580px;margin:0 auto}
  .pcard{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:16px;background:var(--card);
    border:1.5px solid var(--line);cursor:pointer;text-align:right;transition:transform .15s,box-shadow .2s,border-color .2s}
  .pcard:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.1);border-color:var(--primary,#E07B54)}
  .pcard:active{transform:scale(.985)}
  .pcard .spk{font-size:19px;flex:none}
  .pcard .ptx{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
  .pcard .pt{font-size:17px;font-weight:800;color:var(--ink);direction:ltr;text-align:left;unicode-bidi:isolate}
  .pcard .pa{font-size:13.5px;color:var(--muted)}
  html[data-theme="dark"] .pcard{background:#23232c;border-color:#3a3a45}
  @keyframes icpop{0%{transform:scale(1)}35%{transform:scale(1.4) rotate(10deg)}70%{transform:scale(.9)}100%{transform:scale(1)}}
  @media(prefers-reduced-motion:reduce){ .lcard,.lcard .ic{transition:none} .lcard:active .ic{animation:none} }
  .lcard:nth-child(8n+1){--cc:#FDEBE7;--cb:#F1C7BA} .lcard:nth-child(8n+2){--cc:#E8F3EC;--cb:#BCDFC8}
  .lcard:nth-child(8n+3){--cc:#E7F0FB;--cb:#BBD6EE} .lcard:nth-child(8n+4){--cc:#FBF1DD;--cb:#EED8AB}
  .lcard:nth-child(8n+5){--cc:#F1EAF7;--cb:#D6C2E7} .lcard:nth-child(8n+6){--cc:#FCEAEF;--cb:#F1C4D1}
  .lcard:nth-child(8n+7){--cc:#E6F4F3;--cb:#B9DFDD} .lcard:nth-child(8n){--cc:#F0F0E4;--cb:#D6D6BE}
  html[data-theme="dark"] .lcard{background:#23232c;border-color:#3a3a45}

  /* شبكة الأحرف/الأرقام */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(98px,1fr));gap:12px;margin-top:8px}
  .gcard{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:14px 8px;cursor:pointer;
    box-shadow:var(--shadow);font-family:inherit;color:var(--ink);aspect-ratio:1/1;
    transition:transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow .15s}
  .gcard:hover{transform:translateY(-4px);box-shadow:0 10px 22px rgba(0,0,0,.14);border-color:var(--primary)}
  .gcard:active{transform:scale(.96)}
  .gcard .big{font-size:34px;font-weight:800;line-height:1;color:var(--primary-d)}
  .gcard .em{font-size:26px;line-height:1}
  .gcard .wd{font-size:12px;color:var(--muted)}
  .gcard .spk{position:absolute;inset-inline-start:6px;top:6px;font-size:13px;opacity:.6}
  .ltr{direction:ltr;unicode-bidi:isolate}
  .hint{text-align:center;color:var(--muted);font-size:13px;margin:10px 2px}
  /* القصص */
  .storycard .cover{width:100%;height:64px;overflow:hidden}
  .storycard .cover svg{width:100%;height:100%}
  .storyview{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:14px;margin-top:8px;text-align:center}
  .storyview .cover.big{max-width:320px;margin:0 auto}
  .storyview .cover.big svg{width:100%;height:auto;border-radius:12px}
  .storytext{font-size:17px;line-height:1.7;margin:12px 4px;text-align:start}
  .snav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}
  .snav .secbtn[disabled]{opacity:.4;cursor:default}
  .lesson{background:#EEF6E9;border-radius:12px;padding:8px 12px;margin-top:10px;font-weight:700;color:#3f6b2c}
  .dots{display:flex;gap:6px;justify-content:center;margin-top:10px}
  .dots span{width:8px;height:8px;border-radius:50%;background:var(--line)}
  .dots span.on{background:var(--primary)}
  /* اختبار + ألعاب */
  .qzn{text-align:center;color:var(--muted);font-size:13px;margin:4px}
  .qzprompt{text-align:center;margin:10px 2px}
  .qzemoji{font-size:64px;display:block;line-height:1}
  .qzar{font-size:20px;font-weight:800}
  .qzopt.ok{background:#EEF6E9;border-color:var(--good)}
  .qzopt.bad,.mcard.bad{background:#FCEBEE;border-color:#E0566B;animation:shk .4s}
  @keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .qzdone{text-align:center;font-size:22px;font-weight:800;margin:16px 2px}
  .qzdone .secbtn{display:inline-block;margin-top:10px;font-size:15px}
  .matchwrap{display:flex;gap:14px;justify-content:center;margin-top:8px}
  .mcol{display:flex;flex-direction:column;gap:10px;flex:1;max-width:200px}
  .mcard{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:12px;font-size:22px;cursor:pointer;font-family:inherit;color:var(--ink);min-height:52px}
  .mcard .ltr{font-size:16px;font-weight:800}
  .mcard.sel{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary) inset}
  .mcard.done{background:#EEF6E9;border-color:var(--good);opacity:.6;cursor:default}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div><h1 id="hTitle">🌍 لغات أجنبيّة</h1><div class="sub" id="hSub">تعلّمِ الإنجليزيّةَ والفرنسيّةَ بالنطق</div></div>
    <span class="topbtns">
      <button class="iconbtn" id="themeBtn" title="الوضع الداكن" aria-label="الوضع الداكن">🌙</button>
      <a class="topbtn" href="home.html">🏠 الفهرس</a>
    </span>
  </header>
  <div id="view"></div>
</div>

<script type="module">
import { wireThemeToggle } from "./src/theme.js";
import { iconHtml } from "./src/icons.js";
wireThemeToggle(document.getElementById("themeBtn"));
import EN from "./content/lang-en.js";
import FR from "./content/lang-fr.js";
import { STORY_ART } from "./src/story-art.js";
import { playClipForSet, playClipForSetAsync, stopClip } from "./src/tts-clips.js";
import { logEvent } from "./src/progress.js";

const LANGS = { en: EN, fr: FR };
const view = document.getElementById("view");
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");

/* ---------- النطق: مقطع Piper المُدمج إن وُجد، وإلّا Web Speech بلغة القسم ---------- */
let voicesPrimed = false;
function primeWS(){ try{ if("speechSynthesis" in window){ speechSynthesis.getVoices(); voicesPrimed=true; } }catch(e){} }
function webSpeak(text, code){
  if(!("speechSynthesis" in window)) return;
  const u = new SpeechSynthesisUtterance(String(text));
  u.lang = code; u.rate = 0.85;
  const vs = speechSynthesis.getVoices() || [];
  const pre = code.slice(0,2).toLowerCase();
  const v = vs.find(x => (x.lang||"").toLowerCase().replace("_","-").startsWith(pre));
  if(v) u.voice = v;
  try{ speechSynthesis.cancel(); speechSynthesis.resume(); speechSynthesis.speak(u); }catch(e){}
}
function say(text, L){
  if(!text) return;
  try{ if(playClipForSet(text, L.voice)) return; }catch(e){} // مقطع Piper المُدمج
  webSpeak(text, L.code);
}
// نسخةٌ وعديّة (لقراءة القصّة كاملةً): تُحَلّ عند انتهاء النطق.
function sayAsync(text, L){
  if(!text) return Promise.resolve();
  return playClipForSetAsync(text, L.voice).then(ok=>{
    if(ok) return; // عُزِف المقطعُ حتى نهايته
    return new Promise(res=>{ webSpeak(text, L.code); setTimeout(res, Math.min(7000, 1400 + text.length*55)); });
  });
}
let storyTok=0, reading=false;        // تتابعُ قراءة القصّة كاملةً
function cancelRead(){ storyTok++; reading=false; try{ stopClip(); }catch(e){} }

/* ---------- التوجيه ---------- */
function curLng(){ return new URLSearchParams(location.search).get("lng"); }
function goLng(k){ const u=new URL(location.href); u.searchParams.set("lng",k); u.searchParams.delete("sec"); history.replaceState(null,"",u); render(); }
function goHome(){ const u=new URL(location.href); u.searchParams.delete("lng"); u.searchParams.delete("sec"); history.replaceState(null,"",u); render(); }

/* ---------- شاشة الاختيار ---------- */
function renderPick(){
  document.getElementById("hTitle").textContent = "🌍 لغات أجنبيّة";
  document.getElementById("hSub").textContent = "اختر اللغةَ التي تتعلّمها";
  view.innerHTML = `<div class="pick">${Object.entries(LANGS).map(([k,L])=>
    `<button class="langcard" data-k="${k}"><div class="fl">${L.flag}</div><div class="nm ltr">${esc(L.name)}</div><div class="na">${esc(L.nameAr)}</div></button>`).join("")}</div>
    <div class="hint">كلُّ لغةٍ فيها: الأحرف · الأرقام · (الكلمات والقصص قريباً)</div>`;
  view.querySelectorAll(".langcard").forEach(b=>b.onclick=()=>goLng(b.getAttribute("data-k")));
}

/* ---------- قسم اللغة ---------- */
const SECTIONS = [
  { key:"letters", icon:"🔤", ar:"الأحرف",     en:"Letters",  fr:"Lettres" },
  { key:"numbers", icon:"🔢", ar:"الأرقام",     en:"Numbers",  fr:"Nombres" },
  { key:"words",   icon:"📝", ar:"الكلمات",     en:"Words",    fr:"Mots" },
  { key:"phrases", icon:"💬", ar:"عبارات وجمل", en:"Phrases",  fr:"Phrases" },
  { key:"stories", icon:"📚", ar:"قصص مصوّرة",  en:"Stories",  fr:"Histoires" },
  { key:"quiz",    icon:"🎯", ar:"اختبار",      en:"Quiz",     fr:"Quiz" },
  { key:"games",   icon:"🎮", ar:"ألعاب",       en:"Games",    fr:"Jeux" },
];
// رموزٌ تعبيريّةٌ + ترجماتٌ لفئات الكلمات (يتبدّل العنوانُ بين العربيّة ولغة القسم كلَّ 5ث)
const CAT_ICON = { animals:"🦁", colors:"🎨", family:"👪", food:"🍎", body:"🧒", greetings:"👋", school:"🏫", nature:"🌳", transport:"🚗", fruits:"🍇", clothes:"👕", weather:"🌦️", shapes:"🔷", days:"📅", actions:"🏃",
  hello:"👋", polite:"🙏", useful:"💬", questions:"❓", class:"🏫" };
const CAT_I18N = {
  animals:{en:"Animals",fr:"Animaux"}, colors:{en:"Colors",fr:"Couleurs"}, family:{en:"Family",fr:"Famille"},
  food:{en:"Food",fr:"Nourriture"}, body:{en:"Body",fr:"Corps"}, greetings:{en:"Greetings",fr:"Salutations"},
  school:{en:"School",fr:"École"}, nature:{en:"Nature",fr:"Nature"}, transport:{en:"Transport",fr:"Transport"},
  fruits:{en:"Fruits",fr:"Fruits"}, clothes:{en:"Clothes",fr:"Vêtements"}, weather:{en:"Weather",fr:"Météo"},
  shapes:{en:"Shapes",fr:"Formes"}, days:{en:"Days",fr:"Jours"}, actions:{en:"Actions",fr:"Verbes"},
  hello:{en:"Greetings",fr:"Salutations"}, polite:{en:"Politeness",fr:"Politesse"}, useful:{en:"Useful",fr:"Utiles"},
  questions:{en:"Questions",fr:"Questions"}, class:{en:"Classroom",fr:"En classe"},
};
const shuffle = a => { const r=a.slice(); for(let k=r.length-1;k>0;k--){ const j=Math.floor(Math.random()*(k+1)); [r[k],r[j]]=[r[j],r[k]]; } return r; };
const allWords = L => (L.words||[]).flatMap(c => (c.items||[]).map(it => ({ ...it, cat:c.id })));

// اختبار: صورة+معنى عربيّ ← اختر الكلمةَ الصحيحة بلغةِ القسم (تُنطَق عند الاختيار).
function renderQuiz(L, host){
  const pool = shuffle(allWords(L)); const N = Math.min(8, pool.length); const qs = pool.slice(0, N);
  let i = 0, score = 0;
  function ask(){
    if(i >= N){ host.innerHTML = `<div class="qzdone">🎉 <b>${score}/${N}</b><div class="hint">أحسنت!</div><button class="secbtn on" id="qzAgain">🔁 أعد الاختبار</button></div>`;
      host.querySelector("#qzAgain").onclick=()=>renderQuiz(L, host); return; }
    const correct = qs[i];
    const opts = shuffle([correct, ...shuffle(allWords(L).filter(w => w.w !== correct.w)).slice(0,3)]);
    host.innerHTML = `<div class="qzn">سؤال ${i+1}/${N} · ⭐ ${score}</div>
      <div class="qzprompt"><span class="qzemoji">${correct.emoji}</span><span class="qzar">${esc(correct.ar)}</span>
        <div class="hint">اختَرِ الكلمةَ الصحيحة (${esc(L.nameAr)})</div></div>
      <div class="grid">${opts.map(o=>`<button class="gcard qzopt" data-w="${esc(o.w)}"><span class="big ltr" style="font-size:17px">${esc(o.w)}</span></button>`).join("")}</div>`;
    host.querySelectorAll(".qzopt").forEach(b=>b.onclick=()=>{
      const w=b.getAttribute("data-w"); say(w, L);
      if(w===correct.w){ b.classList.add("ok"); score++; host.querySelectorAll(".qzopt").forEach(x=>x.disabled=true); setTimeout(()=>{ i++; ask(); }, 950); }
      else { b.classList.add("bad"); setTimeout(()=>b.classList.remove("bad"), 450); }
    });
  }
  ask();
}

// لعبة: طابِقِ الكلمةَ بصورتها (انقرِ الكلمةَ تُنطَق ثمّ صورتَها).
function renderGame(L, host){
  const set = shuffle(allWords(L)).slice(0, 6);
  const wordsCol = shuffle(set), emojiCol = shuffle(set);
  const matched = new Set(); let selWord = null;
  function draw(){
    const done = matched.size === set.length;
    host.innerHTML = `<div class="hint">انقرِ الكلمةَ (تُنطَق) ثمّ صورتَها المطابقة 🔊</div>
      <div class="matchwrap">
        <div class="mcol">${wordsCol.map(w=>`<button class="mcard mword ${matched.has(w.w)?'done':''}" data-w="${esc(w.w)}" ${matched.has(w.w)?'disabled':''}><span class="ltr">${esc(w.w)}</span></button>`).join("")}</div>
        <div class="mcol">${emojiCol.map(e=>`<button class="mcard memoji ${matched.has(e.w)?'done':''}" data-w="${esc(e.w)}" ${matched.has(e.w)?'disabled':''}>${e.emoji}</button>`).join("")}</div>
      </div>${done?`<div class="qzdone">🎉 أحسنت!<button class="secbtn on" id="gmAgain">🔁 جديد</button></div>`:""}`;
    if(done){ host.querySelector("#gmAgain").onclick=()=>renderGame(L, host); return; }
    host.querySelectorAll(".mword").forEach(b=>b.onclick=()=>{ selWord=b.getAttribute("data-w"); say(selWord, L); host.querySelectorAll(".mword").forEach(x=>x.classList.toggle("sel", x===b)); });
    host.querySelectorAll(".memoji").forEach(b=>b.onclick=()=>{ const w=b.getAttribute("data-w"); if(!selWord) return;
      if(w===selWord){ matched.add(w); selWord=null; draw(); } else { b.classList.add("bad"); setTimeout(()=>b.classList.remove("bad"), 450); } });
  }
  draw();
}
function renderLang(k){
  const L = LANGS[k]; if(!L){ goHome(); return; }
  document.getElementById("hTitle").innerHTML = `${L.flag} <span class="ltr">${esc(L.name)}</span>`;
  document.getElementById("hSub").textContent = L.nameAr + " — تعلّمْ بالنطق";
  const qp = new URLSearchParams(location.search);
  const sec = qp.get("sec");
  const setParam = (key,val) => { cancelRead(); const u=new URL(location.href); u.searchParams.set(key,val); history.replaceState(null,"",u); render(); };
  const nav = (label,go) => `<button class="backbtn" data-go="${go}">${label}</button>`;
  let topnav = "", body = "";

  if(!sec){
    // شبكةُ بطاقاتِ الأقسام
    topnav = nav("↩ اللغات","langs");
    body = `<div class="lgrid">${SECTIONS.map(s=>`<button class="lcard" data-sec="${s.key}"><span class="ic">${iconHtml(s.icon)}</span><span class="lt" data-ar="${esc(s.ar)}" data-fg="${esc(s[k]||s.ar)}">${esc(s.ar)}</span></button>`).join("")}</div>`;
  } else if(sec==="letters"){
    topnav = nav("↩ الأقسام","secs")+`<span class="cur">🔤 الأحرف</span>`;
    body = `<div class="grid">${L.letters.map(x=>
      `<button class="gcard" data-say="${esc(x.name||x.ch)}" data-word="${esc(x.word)}"><span class="spk">🔊</span>
        <span class="big ltr">${esc(x.ch)}</span><span class="em">${x.emoji}</span><span class="wd ltr">${esc(x.word)}</span></button>`).join("")}</div>
      <div class="hint">اضغطِ الحرفَ لسماعه، واضغطِ الكلمةَ لسماعها 🔊</div>`;
  } else if(sec==="numbers"){
    topnav = nav("↩ الأقسام","secs")+`<span class="cur">🔢 الأرقام</span>`;
    body = `<div class="grid">${L.numbers.map(x=>
      `<button class="gcard" data-say="${esc(x.word)}"><span class="spk">🔊</span>
        <span class="big ltr">${x.n}</span><span class="wd ltr">${esc(x.word)}</span></button>`).join("")}</div>
      <div class="hint">اضغطِ العددَ لسماع اسمه 🔊</div>`;
  } else if(sec==="words"){
    const cats = L.words || [], C = cats.find(x=>x.id===qp.get("cat"));
    if(!C){
      // شبكةُ بطاقاتِ الفئات
      topnav = nav("↩ الأقسام","secs")+`<span class="cur">📝 الكلمات</span>`;
      body = `<div class="lgrid">${cats.map(c=>`<button class="lcard" data-cat="${c.id}"><span class="ic">${iconHtml(CAT_ICON[c.id]||"📝")}</span><span class="lt" data-ar="${esc(c.ar)}" data-fg="${esc((CAT_I18N[c.id]||{})[k]||c.ar)}">${esc(c.ar)}</span></button>`).join("")}</div>`;
    } else {
      topnav = nav("↩ الفئات","cats")+`<span class="cur">${CAT_ICON[C.id]||""} ${esc(C.ar)}</span>`;
      body = `<div class="grid">${C.items.map(it=>
        `<button class="gcard" data-say="${esc(it.w)}"><span class="spk">🔊</span><span class="em">${it.emoji}</span>
          <span class="big ltr" style="font-size:18px">${esc(it.w)}</span><span class="wd">${esc(it.ar)}</span></button>`).join("")}</div>
        <div class="hint">اضغطِ الكلمةَ لسماعها 🔊 (تحتها معناها بالعربيّة)</div>`;
    }
  } else if(sec==="phrases"){
    const cats = L.phrases || [], C = cats.find(x=>x.id===qp.get("cat"));
    if(!C){
      // شبكةُ بطاقاتِ فئات العبارات
      topnav = nav("↩ الأقسام","secs")+`<span class="cur">💬 عبارات وجمل</span>`;
      body = `<div class="lgrid">${cats.map(c=>`<button class="lcard" data-cat="${c.id}"><span class="ic">${iconHtml(CAT_ICON[c.id]||"💬")}</span><span class="lt" data-ar="${esc(c.ar)}" data-fg="${esc((CAT_I18N[c.id]||{})[k]||c.ar)}">${esc(c.ar)}</span></button>`).join("")}</div>`;
    } else {
      topnav = nav("↩ الفئات","cats")+`<span class="cur">${CAT_ICON[C.id]||""} ${esc(C.ar)}</span>`;
      body = `<div class="plist">${C.items.map(it=>
        `<button class="pcard" data-say="${esc(it.t)}"><span class="spk">🔊</span>
          <span class="ptx"><span class="pt ltr">${esc(it.t)}</span><span class="pa">${esc(it.ar)}</span></span></button>`).join("")}</div>
        <div class="hint">اضغطِ العبارةَ لسماعها 🔊 (تحتها معناها بالعربيّة)</div>`;
    }
  } else if(sec==="stories"){
    const list = L.stories || [], st = list.find(x=>x.id===qp.get("story"));
    if(!st){
      topnav = nav("↩ الأقسام","secs")+`<span class="cur">📚 قصص مصوّرة</span>`;
      body = `<div class="grid">${list.map(s=>
        `<button class="gcard storycard" data-story="${s.id}"><div class="cover">${STORY_ART[s.cover]||"📖"}</div>
          <span class="wd ltr" style="font-size:12.5px;font-weight:800">${esc(s.title)}</span></button>`).join("")}</div>
        <div class="hint">اختر قصّةً لقراءتها بالنطق 🔊</div>`;
    } else {
      const pg = Math.max(0, Math.min(+qp.get("pg")||0, st.pages.length-1));
      const p = st.pages[pg], last = pg===st.pages.length-1;
      topnav = nav("↩ القصص","stlist")+`<span class="cur ltr">${esc(st.title)}</span>`;
      body = `<div class="storyview"><div class="cover big">${STORY_ART[p.art]||""}</div>
          <p class="storytext ltr">${esc(p.text)}</p>
          ${last?`<div class="lesson ltr">⭐ ${esc(st.lesson)}</div>`:""}
          <div class="snav">
            <button class="secbtn" data-pg="${pg-1}" ${pg===0?"disabled":""}>السابق</button>
            <button class="secbtn" id="stRead">🔊 اقرأ الصفحة</button>
            <button class="secbtn on" id="stReadAll">📖 القصّة كاملةً</button>
            <button class="secbtn" data-pg="${pg+1}" ${last?"disabled":""}>التالي ▶</button>
          </div>
          <div class="dots">${st.pages.map((_,i)=>`<span class="${i===pg?'on':''}"></span>`).join("")}</div></div>`;
    }
  } else if(sec==="quiz"){
    topnav = nav("↩ الأقسام","secs")+`<span class="cur">🎯 اختبار</span>`; body = `<div id="qz"></div>`;
  } else if(sec==="games"){
    topnav = nav("↩ الأقسام","secs")+`<span class="cur">🎮 ألعاب</span>`; body = `<div id="gm"></div>`;
  }
  view.innerHTML = `<div class="topnav">${topnav}</div>${body}`;
  // التنقّل بالرجوع
  view.querySelectorAll(".backbtn[data-go]").forEach(b=>b.onclick=()=>{ const a=b.getAttribute("data-go"); cancelRead();
    if(a==="langs"){ goHome(); return; }
    const u=new URL(location.href);
    if(a==="secs") ["sec","cat","story","pg"].forEach(p=>u.searchParams.delete(p));
    else if(a==="cats") u.searchParams.delete("cat");
    else if(a==="stlist"){ u.searchParams.delete("story"); u.searchParams.delete("pg"); }
    history.replaceState(null,"",u); render(); });
  view.querySelectorAll(".lcard[data-sec]").forEach(b=>b.onclick=()=>setParam("sec", b.getAttribute("data-sec")));
  view.querySelectorAll(".lcard[data-cat]").forEach(b=>b.onclick=()=>setParam("cat", b.getAttribute("data-cat")));
  // النطق: الكلمةُ عند الضغط على الاسم أو الصورة، والحرفُ عند الضغط على الحرف أو أيّ مكانٍ آخر.
  view.querySelectorAll(".gcard").forEach(b=>{
    b.onclick=(e)=>{ const sayWord = e.target.closest(".wd") || e.target.closest(".em");
      say(sayWord ? (b.getAttribute("data-word") || b.getAttribute("data-say")) : b.getAttribute("data-say"), L); };
  });
  // العبارات: انطق العبارة عند الضغط
  view.querySelectorAll(".pcard").forEach(b=>b.onclick=()=>say(b.getAttribute("data-say"), L));
  // فتحُ قصّة
  view.querySelectorAll(".storycard").forEach(b=>b.onclick=()=>{ cancelRead(); const u=new URL(location.href); u.searchParams.set("story", b.getAttribute("data-story")); u.searchParams.set("pg","0"); history.replaceState(null,"",u); render(); });
  view.querySelectorAll(".snav [data-pg]").forEach(b=>{ if(b.disabled)return; b.onclick=()=>setParam("pg", b.getAttribute("data-pg")); });
  if(sec==="stories" && qp.get("story")){
    const st=(L.stories||[]).find(x=>x.id===qp.get("story"))||(L.stories||[])[0];
    const pg=Math.max(0,Math.min(+qp.get("pg")||0, st.pages.length-1));
    const rd=document.getElementById("stRead"); if(rd) rd.onclick=()=>{ cancelRead(); say(st.pages[pg].text, L); };
    const showPage=i=>{ const sv=view.querySelector(".storyview"); if(!sv)return;
      const c=sv.querySelector(".cover.big"); if(c) c.innerHTML=STORY_ART[st.pages[i].art]||"";
      const t=sv.querySelector(".storytext"); if(t) t.textContent=st.pages[i].text;
      sv.querySelectorAll(".dots span").forEach((d,j)=>d.classList.toggle("on", j===i));
      const u=new URL(location.href); u.searchParams.set("pg", i); history.replaceState(null,"",u); };
    const rdAll=document.getElementById("stReadAll");
    async function readWhole(){ const my=++storyTok; reading=true; if(rdAll) rdAll.textContent="⏹ إيقاف";
      for(let i=pg;i<st.pages.length;i++){ if(my!==storyTok) return; showPage(i); await sayAsync(st.pages[i].text, L); if(my!==storyTok) return; await new Promise(r=>setTimeout(r,550)); }
      reading=false; render(); }
    if(rdAll) rdAll.onclick=()=>{ if(reading){ cancelRead(); render(); } else readWhole(); };
  }
  if(sec==="quiz"){ const h=document.getElementById("qz"); if(h) renderQuiz(L, h); }
  if(sec==="games"){ const h=document.getElementById("gm"); if(h) renderGame(L, h); }
  startTitleAlt();
  try{ logEvent("lang_open", {add:{}}); }catch(e){}
}

// تبديلُ عنوانِ بطاقاتِ الأقسام/الفئات بين العربيّة ولغة القسم كلَّ 5ث (تعزيزٌ للتعلّم)
let altTimer=null, altFg=false;
function startTitleAlt(){
  if(altTimer){ clearInterval(altTimer); altTimer=null; }
  altFg=false;
  const lts=()=>view.querySelectorAll(".lcard .lt[data-fg]");
  if(!lts().length) return;
  altTimer=setInterval(()=>{
    const els=lts(); if(!els.length){ clearInterval(altTimer); altTimer=null; return; }
    altFg=!altFg;
    els.forEach(el=>{ el.style.opacity="0";
      setTimeout(()=>{ el.textContent = altFg ? el.getAttribute("data-fg") : el.getAttribute("data-ar");
        el.classList.toggle("fg", altFg); el.style.opacity="1"; }, 260);
    });
  }, 5000);
}

function render(){
  if(altTimer){ clearInterval(altTimer); altTimer=null; }
  const k = curLng();
  if(k && LANGS[k]) renderLang(k); else renderPick();
}
primeWS();
if("speechSynthesis" in window) speechSynthesis.onvoiceschanged = primeWS;
render();
</script>
</body>
</html>
