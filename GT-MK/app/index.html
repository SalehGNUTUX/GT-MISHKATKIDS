<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#E07A5F" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<title>تلميذي — روبو يتعافى</title>
<style>
  :root{
    --bg:#FBF7EF; --card:#FFFFFF; --ink:#2B2B2B; --muted:#6B6B6B;
    --line:#ECE6DA; --primary:#E07A5F; --primary-d:#C7613F;
    --robo:#B8C0CC; --dim:#D3D8DF; --good:#7BB661; --good-d:#5E9A47;
    --shadow:0 6px 20px rgba(0,0,0,.07);
    font-family:"Segoe UI",Tahoma,system-ui,"Noto Naskh Arabic",sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:760px;margin:0 auto;padding:16px 16px 48px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 14px}
  header h1{font-size:22px;margin:0;letter-spacing:-.5px}
  header .sub{color:var(--muted);font-size:13px}
  .topbtn{background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 12px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--ink)}

  .stage{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;text-align:center}
  .robo-svg{width:200px;height:240px;max-width:60%}
  .part{fill:var(--dim);transition:fill .8s ease, filter .8s ease}
  .part.lit{filter:drop-shadow(0 0 6px currentColor)}
  .robo-base{fill:var(--robo)}
  .laugh{font-size:13px;color:var(--good-d);font-weight:700;min-height:18px;margin-top:4px}
  .progress{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:8px;flex-wrap:wrap}
  .pill{background:#F3EEE3;border-radius:999px;padding:4px 12px;font-size:13px;color:var(--muted)}
  .world{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:12px}
  .we{display:flex;flex-direction:column;align-items:center;width:52px;opacity:.28;filter:grayscale(1);transition:.6s}
  .we.on{opacity:1;filter:none}
  .we .ico{font-size:24px;line-height:1.2}
  .we .lbl{font-size:10px;color:var(--muted)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:20px;margin-top:16px}
  .stateTag{display:inline-block;font-size:12px;font-weight:700;color:var(--primary);background:#FBEDE7;border-radius:999px;padding:3px 12px;margin-bottom:10px}
  .badge-pair{display:inline-block;font-size:12px;font-weight:700;color:#5E9A47;background:#EEF6E9;border:1px solid #CDE6BE;border-radius:999px;padding:3px 10px;margin-bottom:10px;margin-inline-start:6px}
  .robo-says{font-size:19px;font-weight:700;margin:6px 0 4px}
  .cue{color:var(--muted);font-size:13px;margin-bottom:8px}
  .mtitle{font-size:16px;font-weight:800;margin:2px 0 8px}
  .prompt{font-size:16px;margin:8px 0}
  ol.steps{margin:8px 0;padding-inline-start:22px}
  ol.steps li{margin:4px 0}
  .meta{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  .chip{background:#F3EEE3;border-radius:10px;padding:6px 10px;font-size:13px}
  .parent{background:#F6F3EC;border-right:3px solid var(--primary);border-radius:8px;padding:10px 12px;font-size:14px;color:#444;margin-top:10px}
  .parent b{color:var(--primary-d)}
  .succ{font-size:13px;color:var(--muted);margin-top:10px}
  .capture{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}
  .capture .lbl{font-size:12px;color:var(--muted);margin-bottom:6px}
  .capbtn{background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 14px;font-size:14px;cursor:pointer;font-family:inherit;margin-inline-end:6px}
  .capbtn.rec{background:#FBEDE7;border-color:var(--primary);color:var(--primary-d)}
  .capbtn.done{background:#EEF6E9;border-color:var(--good);color:var(--good-d)}
  #capStatus{font-size:12px;color:var(--muted);margin-top:6px}

  .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  button.act{background:var(--primary);color:#fff;border:none;border-radius:14px;padding:13px 20px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(224,122,95,.3);font-family:inherit}
  button.act:hover{background:var(--primary-d)}
  button.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:14px;padding:13px 18px;font-size:15px;cursor:pointer;font-family:inherit}
  .filters{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
  .filters button{background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 16px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--muted)}
  .filters button.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .heal-reward{font-size:15px;font-weight:700;color:var(--good-d);margin-top:8px}
  .err{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:16px}
  .err code{background:#F3EEE3;padding:2px 7px;border-radius:6px;font-size:13px}
  .center{text-align:center}.muted{color:var(--muted)}

  /* Parent overlay */
  .overlay{position:fixed;inset:0;background:rgba(43,43,43,.45);display:none;align-items:flex-start;justify-content:center;padding:20px;z-index:50;overflow:auto}
  .overlay.show{display:flex}
  .panel{background:var(--card);border-radius:20px;box-shadow:var(--shadow);width:100%;max-width:680px;padding:22px;margin-top:10px}
  .panel h2{margin:0 0 2px;font-size:20px}
  .panel .close{float:left;background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
  .sec{margin-top:18px}
  .sec h3{font-size:15px;margin:0 0 8px;color:var(--primary-d)}
  .statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
  .stat{background:#F6F3EC;border-radius:14px;padding:12px;text-align:center}
  .stat .n{font-size:24px;font-weight:800}
  .stat .t{font-size:12px;color:var(--muted)}
  .dom-row{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;border-bottom:1px solid var(--line)}
  .dom-row .bar{height:8px;background:#EFEADD;border-radius:6px;flex:1;margin:0 10px;overflow:hidden}
  .dom-row .bar > i{display:block;height:100%;background:var(--good)}
  .toggle{width:46px;height:26px;border-radius:999px;background:#D9D3C6;border:none;position:relative;cursor:pointer;flex:none}
  .toggle.on{background:var(--good)}
  .toggle::after{content:"";position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
  .toggle.on::after{right:23px}
  .log{max-height:240px;overflow:auto}
  .logitem{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--line);font-size:14px}
  .logitem .when{color:var(--muted);font-size:12px;margin-inline-start:auto}
  .logitem audio{height:30px}
  .logitem img{width:42px;height:42px;object-fit:cover;border-radius:8px;cursor:pointer}
  .danger{background:#fff;border:1px solid #E5B5A8;color:#B5482F;border-radius:12px;padding:10px 16px;cursor:pointer;font-family:inherit}
  .gate{max-width:360px;text-align:center}
  .gate input{font-size:22px;text-align:center;width:120px;padding:8px;border:1px solid var(--line);border-radius:10px;font-family:inherit;margin:10px 0}
  .gate .q{font-size:20px;font-weight:700}
  .gate .bad{color:#B5482F;font-size:13px;min-height:18px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>تلميذي 🤖</h1>
      <div class="sub">علّمْ روبو… فيتذكّر ويتعافى</div>
    </div>
    <button class="topbtn" id="parentBtn">👪 لوحة الأهل</button>
  </header>

  <div class="stage">
    <svg class="robo-svg" viewBox="0 0 240 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="روبو">
      <line x1="120" y1="40" x2="120" y2="22" stroke="#8A93A0" stroke-width="3"/>
      <circle cx="120" cy="18" r="6" class="part" data-part="الدماغ"/>
      <rect x="70" y="44" width="100" height="84" rx="18" class="robo-base"/>
      <rect x="104" y="52" width="32" height="13" rx="4" class="part" data-part="الدماغ"/>
      <rect x="56" y="74" width="14" height="30" rx="6" class="part" data-part="الأذنان"/>
      <rect x="170" y="74" width="14" height="30" rx="6" class="part" data-part="الأذنان"/>
      <circle cx="98" cy="88" r="11" class="part" data-part="العينان"/>
      <circle cx="142" cy="88" r="11" class="part" data-part="العينان"/>
      <rect x="98" y="110" width="44" height="11" rx="5" class="part" data-part="الفم"/>
      <rect x="76" y="138" width="88" height="86" rx="16" class="robo-base"/>
      <path class="part" data-part="القلب" d="M120 196 l-15 -15 a9 9 0 0 1 13 -12 l2 2 l2 -2 a9 9 0 0 1 13 12 z"/>
      <line x1="76" y1="160" x2="52" y2="168" stroke="#8A93A0" stroke-width="6" stroke-linecap="round"/>
      <line x1="164" y1="160" x2="188" y2="168" stroke="#8A93A0" stroke-width="6" stroke-linecap="round"/>
      <circle cx="46" cy="170" r="11" class="part" data-part="اليدان"/>
      <circle cx="194" cy="170" r="11" class="part" data-part="اليدان"/>
      <rect x="92" y="224" width="18" height="40" rx="9" class="part" data-part="الساقان"/>
      <rect x="130" y="224" width="18" height="40" rx="9" class="part" data-part="الساقان"/>
    </svg>
    <div class="laugh" id="laugh"></div>
    <div class="progress">
      <span class="pill" id="pillCount">٠ ذكرى مُستعادة</span>
      <span class="pill" id="pillParts">٠ من ٧ أجزاء أضاءت</span>
    </div>
    <div class="world" id="world"></div>
  </div>

  <div class="filters" id="filters">
    <button data-f="all" class="on">الكلّ</button>
    <button data-f="4-6">٤–٦ سنوات</button>
    <button data-f="7-10">٧–١٠ سنوات</button>
  </div>

  <div id="cardHost"></div>
</div>

<!-- Parent overlay -->
<div class="overlay" id="parentOverlay">
  <div class="panel" id="panelBody"></div>
</div>

<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" />

<script>
const STORAGE_KEY = "tilmithi_progress_v1";
const PARTS = ["العينان","الأذنان","الفم","القلب","اليدان","الساقان","الدماغ"];
const DOMAINS = ["أرقام وهندسة","حروف ولغة","أخلاق ومشاعر","علوم وطبيعة","تفكير وحلّ مشكلات"];
const WORLD_EMOJI = {"قمر":"🌕","شمس":"☀️","شجرة":"🌳","صديق":"🧑‍🤝‍🧑","نهر":"🌊","نجمة":"⭐","طائر":"🐦"};
const STATE_TAG = {spark:"١) الشرارة", task:"٢) المهمة", teach:"٣) التلقين", heal:"٤) الشفاء"};
const AR = n => Number(n).toLocaleString("ar-EG");

let LIB=null, MEM=[], THRESH=8;
let filter="all", current=null, state="idle", pending=[];
let mediaRec=null, recChunks=[];
let progress = loadProgress();

function loadProgress(){
  let p; try{ p = JSON.parse(localStorage.getItem(STORAGE_KEY)); }catch(e){}
  p = p || {};
  p.completed = p.completed || [];
  p.parts = p.parts || {};
  p.world = p.world || {};
  p.log = p.log || [];
  p.settings = p.settings || {};
  p.settings.enabledDomains = p.settings.enabledDomains || {};
  DOMAINS.forEach(d=>{ if(p.settings.enabledDomains[d]===undefined) p.settings.enabledDomains[d]=true; });
  if(p.settings.showPair===undefined) p.settings.showPair=true;
  return p;
}
function saveProgress(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }

/* ---------- IndexedDB for local captures (audio/photo) ---------- */
function idb(){ return new Promise((res,rej)=>{ const r=indexedDB.open("tilmithi",1);
  r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains("captures")) r.result.createObjectStore("captures",{keyPath:"key"}); };
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function putCapture(rec){ const db=await idb(); return new Promise((res,rej)=>{ const tx=db.transaction("captures","readwrite"); tx.objectStore("captures").put(rec); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
async function allCaptures(){ try{ const db=await idb(); return await new Promise(res=>{ const tx=db.transaction("captures","readonly"); const rq=tx.objectStore("captures").getAll(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>res([]); }); }catch(e){ return []; } }
async function clearCaptures(){ try{ const db=await idb(); return await new Promise(res=>{ const tx=db.transaction("captures","readwrite"); tx.objectStore("captures").clear(); tx.oncomplete=()=>res(); tx.onerror=()=>res(); }); }catch(e){} }

async function fetchLibrary(){
  const paths=["../content/library.json","content/library.json","/content/library.json"];
  for(const p of paths){ try{ const r=await fetch(p); if(r.ok) return await r.json(); }catch(e){} }
  throw new Error("no library");
}

async function init(){
  try{ LIB=await fetchLibrary(); }
  catch(e){
    document.getElementById("cardHost").innerHTML =
      `<div class="err"><b>تعذّر تحميل مكتبة المحتوى.</b>
       <p class="muted">شغّل خادمًا محليًّا من <code>D:\\kidlearn</code>:</p>
       <p><code>python -m http.server 8123</code></p>
       <p class="muted">ثمّ افتح <code>http://localhost:8123/app/</code></p></div>`;
    return;
  }
  MEM=LIB.memories||[];
  THRESH=(LIB.healing_model&&LIB.healing_model.laughter_milestone&&LIB.healing_model.laughter_milestone.threshold)||8;
  renderRobo(); renderWorld(); renderProgress(); renderIdle();
}

function renderRobo(){
  document.querySelectorAll(".part").forEach(el=>{
    const c=progress.parts[el.getAttribute("data-part")];
    if(c){ el.style.fill=c; el.style.color=c; el.classList.add("lit"); }
    else { el.style.fill=""; el.classList.remove("lit"); }
  });
  document.getElementById("laugh").textContent =
    progress.completed.length>=THRESH ? "🎉 عادت ضحكة روبو! لقد أعدتَه إلى الحياة." : "";
}
function renderWorld(){
  document.getElementById("world").innerHTML = Object.keys(WORLD_EMOJI).map(w=>
    `<div class="we ${progress.world[w]?"on":""}"><div class="ico">${WORLD_EMOJI[w]}</div><div class="lbl">${w}</div></div>`).join("");
}
function renderProgress(){
  document.getElementById("pillCount").textContent = `${AR(progress.completed.length)} ذكرى مُستعادة`;
  document.getElementById("pillParts").textContent = `${AR(Object.keys(progress.parts).length)} من ٧ أجزاء أضاءت`;
}
function candidates(){
  const en=progress.settings.enabledDomains;
  return MEM.filter(m=>!progress.completed.includes(m.id) && (filter==="all"||m.age_band===filter) && en[m.domain]!==false && (progress.settings.showPair!==false || m.mode!=="pair"));
}
function renderIdle(){
  const left=candidates().length, host=document.getElementById("cardHost");
  if(left===0){
    host.innerHTML=`<div class="card center"><div class="robo-says">${progress.completed.length?"لا ذكريات متاحة الآن ضمن هذا الاختيار 🌟":"لا توجد ذكريات."}</div>
      <p class="muted">بدّل الفئة العمريّة، أو فعّل مجالاتٍ أخرى من لوحة الأهل.</p></div>`;
    return;
  }
  host.innerHTML=`<div class="card center"><div class="robo-says">روبو ينتظر ذكرى جديدة…</div>
    <p class="muted">في ذاكرته ${AR(left)} ذكرى ناقصة. هل تساعده؟</p>
    <div class="btns" style="justify-content:center"><button class="act" onclick="spark()">✨ شرارة ذكرى</button></div></div>`;
}
function spark(){
  const c=candidates(); if(!c.length){ renderIdle(); return; }
  current=c[Math.floor(Math.random()*c.length)]; pending=[]; state="spark"; renderCard();
}
function renderCard(){
  const m=current, host=document.getElementById("cardHost");
  const pairBadge = (m&&m.mode==="pair") ? '<span class="badge-pair">👯 لطفلين معًا</span>' : "";
  if(state==="spark"){
    host.innerHTML=`<div class="card"><span class="stateTag">${STATE_TAG.spark}</span>${pairBadge}
      <div class="robo-says">${m.spark.robo_line}</div>${m.spark.cue?`<div class="cue">📷 ${m.spark.cue}</div>`:""}
      <div class="btns"><button class="act" onclick="go('task')">هيّا نبدأ المهمّة ←</button>
      <button class="ghost" onclick="spark()">ذكرى أخرى</button></div></div>`;
  } else if(state==="task"){
    host.innerHTML=`<div class="card"><span class="stateTag">${STATE_TAG.task}</span>
      <div class="mtitle">${m.title} <span class="muted" style="font-weight:400">· ${m.domain} · ${m.age_band}</span></div>${pairBadge}
      <div class="prompt">${m.task.prompt}</div>
      <ol class="steps">${m.task.child_steps.map(s=>`<li>${s}</li>`).join("")}</ol>
      <div class="meta"><span class="chip">🧰 ${m.task.materials.join("، ")}</span>
        <span class="chip">📍 ${m.task.location}</span>
        <span class="chip">⏱️ ${AR(m.duration_min)} د${m.multi_day?" · عدّة أيّام":""}</span></div>
      <div class="parent"><b>للأهل:</b> ${m.task.parent_role}</div>
      <div class="btns"><button class="act" onclick="go('teach')">أنجزَ الطفلُ المهمّة ✋</button></div></div>`;
  } else if(state==="teach"){
    const caps=m.teach.capture||[];
    let capHtml="";
    if(caps.includes("voice")||caps.includes("photo_local")){
      capHtml=`<div class="capture"><div class="lbl">توثيق اختياريّ (يبقى على الجهاز فقط):</div>
        ${caps.includes("voice")?`<button class="capbtn" id="recBtn" onclick="toggleRec()">🎤 سجّل صوت الطفل</button>`:""}
        ${caps.includes("photo_local")?`<button class="capbtn" id="photoBtn" onclick="document.getElementById('photoInput').click()">📷 أضِف صورة</button>`:""}
        <div id="capStatus"></div></div>`;
    }
    host.innerHTML=`<div class="card"><span class="stateTag">${STATE_TAG.teach}</span>
      <div class="robo-says">${m.teach.robo_question}</div>
      <div class="succ">✅ علامة النجاح (يقرّرها الأهل): ${m.teach.success_signal}</div>
      ${capHtml}
      <div class="btns"><button class="act" onclick="heal()">نعم، علّمَ روبو! 💡</button>
      <button class="ghost" onclick="go('task')">→ لم نُنجِزها بعد</button></div></div>`;
    updateCapStatus();
  } else if(state==="heal"){
    const r=m.heal.reward;
    const label=r.type==="world"?`أضاء ${r.target} في عالم روبو ${WORLD_EMOJI[r.target]||""}`:`أضاء ${r.target} في روبو`;
    host.innerHTML=`<div class="card"><span class="stateTag">${STATE_TAG.heal}</span>
      <div class="robo-says">${m.heal.robo_reaction}</div>
      <div class="heal-reward">✨ ${label}</div>
      <div class="btns"><button class="act" onclick="spark()">ذكرى جديدة لروبو ←</button>
      <button class="ghost" onclick="renderIdle()">توقّف الآن</button></div></div>`;
  }
}
function go(s){ state=s; renderCard(); }

/* capture */
function updateCapStatus(){
  const el=document.getElementById("capStatus"); if(!el) return;
  const a=pending.filter(p=>p.type==="audio").length, ph=pending.filter(p=>p.type==="photo").length;
  el.textContent = (a||ph)?`جاهز للحفظ: ${a?AR(a)+" تسجيل ":""}${ph?AR(ph)+" صورة":""}`.trim():"";
  const pb=document.getElementById("photoBtn"); if(pb&&ph) pb.classList.add("done");
}
async function toggleRec(){
  const btn=document.getElementById("recBtn");
  if(mediaRec&&mediaRec.state==="recording"){ mediaRec.stop(); return; }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recChunks=[]; mediaRec=new MediaRecorder(stream);
    mediaRec.ondataavailable=e=>{ if(e.data.size) recChunks.push(e.data); };
    mediaRec.onstop=()=>{ pending.push({type:"audio",blob:new Blob(recChunks,{type:"audio/webm"})});
      stream.getTracks().forEach(t=>t.stop()); if(btn){btn.textContent="🎤 سجّل مجدّدًا";btn.classList.remove("rec");btn.classList.add("done");} updateCapStatus(); };
    mediaRec.start(); if(btn){btn.textContent="■ إيقاف التسجيل";btn.classList.add("rec");}
  }catch(e){ const el=document.getElementById("capStatus"); if(el) el.textContent="تعذّر الوصول إلى الميكروفون (التوثيق اختياريّ)."; }
}
document.getElementById("photoInput").addEventListener("change",e=>{
  const f=e.target.files&&e.target.files[0]; if(f){ pending.push({type:"photo",blob:f}); } e.target.value=""; updateCapStatus();
});

async function heal(){
  const m=current, r=m.heal.reward, ts=Date.now();
  if(!progress.completed.includes(m.id)) progress.completed.push(m.id);
  if(r.type==="robo_part") progress.parts[r.target]=r.color||"#E0566B";
  else if(r.type==="world") progress.world[r.target]=r.color||"#7BB661";
  const entry={id:m.id,title:m.title,domain:m.domain,age_band:m.age_band,ts,hasAudio:false,hasPhoto:false};
  let i=0;
  for(const c of pending){
    try{ await putCapture({key:ts+"-"+(i++)+"-"+c.type,ts,memId:m.id,title:m.title,type:c.type,blob:c.blob});
      if(c.type==="audio")entry.hasAudio=true; if(c.type==="photo")entry.hasPhoto=true; }catch(e){}
  }
  progress.log.push(entry); pending=[]; saveProgress();
  state="heal"; renderRobo(); renderWorld(); renderProgress(); renderCard();
}

/* filters */
document.getElementById("filters").addEventListener("click",e=>{
  const b=e.target.closest("button[data-f]"); if(!b) return;
  filter=b.getAttribute("data-f");
  document.querySelectorAll("#filters button").forEach(x=>x.classList.toggle("on",x===b));
  if(state==="idle"||state==="heal") renderIdle();
});

/* ---------- Parent dashboard (gated) ---------- */
const overlay=document.getElementById("parentOverlay"), panel=document.getElementById("panelBody");
document.getElementById("parentBtn").addEventListener("click", openGate);
overlay.addEventListener("click",e=>{ if(e.target===overlay) closePanel(); });
function closePanel(){ overlay.classList.remove("show"); panel.innerHTML=""; }

function openGate(){
  const a=4+Math.floor(Math.random()*6), b=3+Math.floor(Math.random()*7); // 4..9 × 3..9
  panel.innerHTML=`<div class="gate"><button class="close" onclick="closePanel()">✕</button>
    <h2>لوحة الأهل</h2><p class="muted">للتأكّد أنّك من الكبار:</p>
    <div class="q">كم يساوي ${AR(a)} × ${AR(b)}؟</div>
    <input id="gateAns" inputmode="numeric" autocomplete="off" />
    <div class="bad" id="gateBad"></div>
    <div class="btns" style="justify-content:center"><button class="act" id="gateGo">دخول</button></div></div>`;
  overlay.classList.add("show");
  const input=document.getElementById("gateAns"); input.focus();
  const check=()=>{ if(parseInt(input.value,10)===a*b) openDashboard(); else { document.getElementById("gateBad").textContent="إجابة غير صحيحة، حاول ثانيةً."; input.value=""; input.focus(); } };
  document.getElementById("gateGo").onclick=check;
  input.addEventListener("keydown",e=>{ if(e.key==="Enter") check(); });
}

async function openDashboard(){
  const caps=await allCaptures();
  const capByTs={}; caps.forEach(c=>{ (capByTs[c.ts]=capByTs[c.ts]||[]).push(c); });
  const done=progress.completed.length, litP=Object.keys(progress.parts).length, litW=Object.keys(progress.world).length;
  const perDom=DOMAINS.map(d=>{
    const tot=MEM.filter(m=>m.domain===d).length, dn=MEM.filter(m=>m.domain===d&&progress.completed.includes(m.id)).length;
    return {d,tot,dn,pct: tot?Math.round(dn/tot*100):0, on: progress.settings.enabledDomains[d]!==false};
  });
  const log=[...progress.log].sort((x,y)=>y.ts-x.ts);
  const fmt=ts=>{ const dt=new Date(ts); return dt.toLocaleDateString("ar-EG")+" "+dt.toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"}); };

  panel.innerHTML=`
    <button class="close" onclick="closePanel()">✕</button>
    <h2>لوحة الأهل</h2><div class="muted" style="font-size:13px">كلّ البيانات محليّة على هذا الجهاز.</div>

    <div class="sec"><h3>نظرة عامة</h3>
      <div class="statgrid">
        <div class="stat"><div class="n">${AR(done)}</div><div class="t">ذكرى مُستعادة</div></div>
        <div class="stat"><div class="n">${AR(litP)}/٧</div><div class="t">أجزاء روبو</div></div>
        <div class="stat"><div class="n">${AR(litW)}/٧</div><div class="t">عناصر العالم</div></div>
        <div class="stat"><div class="n">${done>=THRESH?"🎉":AR(Math.max(0,THRESH-done))}</div><div class="t">${done>=THRESH?"عادت الضحكة":"تبقّى للضحكة"}</div></div>
      </div>
    </div>

    <div class="sec"><h3>التقدّم حسب المجال (وتفعيله)</h3>
      ${perDom.map(p=>`<div class="dom-row">
        <span style="flex:none;width:130px;font-size:13px">${p.d}</span>
        <span class="bar"><i style="width:${p.pct}%"></i></span>
        <span class="muted" style="font-size:12px;width:54px;text-align:center">${AR(p.dn)}/${AR(p.tot)}</span>
        <button class="toggle ${p.on?"on":""}" data-dom="${p.d}" title="تفعيل/تعطيل"></button>
      </div>`).join("")}
    </div>

    <div class="sec"><h3>إعدادات</h3>
      <div class="dom-row">
        <span style="flex:none;width:210px;font-size:13px">👯 ذكريات الإخوة (لطفلين معًا)</span>
        <span class="muted" style="font-size:12px;flex:1">إظهارها ضمن ذكريات روبو</span>
        <button class="toggle ${progress.settings.showPair!==false?"on":""}" id="pairToggle" title="إظهار/إخفاء"></button>
      </div>
    </div>

    <div class="sec"><h3>سجلّ الجلسات (${AR(log.length)})</h3>
      <div class="log">${ log.length? log.map(e=>{
        const cs=capByTs[e.ts]||[];
        const media=cs.map(c=>{ const url=URL.createObjectURL(c.blob);
          return c.type==="audio"?`<audio controls src="${url}"></audio>`:`<img src="${url}" onclick="window.open('${url}')" />`; }).join("");
        return `<div class="logitem"><span>${e.title}</span><span class="muted" style="font-size:12px">· ${e.domain} · ${e.age_band}</span>${media}<span class="when">${fmt(e.ts)}</span></div>`;
      }).join(""):`<p class="muted">لا جلسات بعد.</p>` }</div>
    </div>

    <div class="sec"><h3>أدوات</h3>
      <a class="topbtn" href="print.html" target="_blank" style="text-decoration:none;display:inline-block;margin-inline-end:8px">🖨️ المطبوعات (بطاقات + ملصق)</a>
      <button class="danger" id="wipe">🗑️ مسح كل التقدّم والتسجيلات</button>
    </div>`;

  panel.querySelectorAll(".toggle[data-dom]").forEach(t=>t.addEventListener("click",()=>{
    const d=t.getAttribute("data-dom");
    progress.settings.enabledDomains[d]=!(progress.settings.enabledDomains[d]!==false);
    t.classList.toggle("on", progress.settings.enabledDomains[d]!==false);
    saveProgress(); if(state==="idle") renderIdle();
  }));
  const pt=document.getElementById("pairToggle");
  if(pt) pt.addEventListener("click",()=>{
    progress.settings.showPair = !(progress.settings.showPair!==false);
    pt.classList.toggle("on", progress.settings.showPair!==false);
    saveProgress(); if(state==="idle") renderIdle();
  });
  document.getElementById("wipe").addEventListener("click", async ()=>{
    if(confirm("مسح كل تقدّم روبو والتسجيلات نهائيًّا؟")){
      progress={completed:[],parts:{},world:{},log:[],settings:{enabledDomains:{},showPair:true}};
      DOMAINS.forEach(d=>progress.settings.enabledDomains[d]=true);
      saveProgress(); await clearCaptures();
      renderRobo(); renderWorld(); renderProgress(); renderIdle(); openDashboard();
    }
  });
  overlay.classList.add("show");
}

init();
</script>
</body>
</html>
