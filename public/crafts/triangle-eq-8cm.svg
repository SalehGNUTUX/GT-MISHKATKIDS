  <polygon points="105,80 65,149.28 145,149.28" fill="#E9F5E0" stroke="#E0566B" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- مقصّ عند قمّة المثلّث -->
  <text x="96" y="74" font-size="10" fill="#E0566B">✂</text>
  <line x1="106" y1="82" x2="121" y2="108" stroke="#E0566B" stroke-width="0.6" marker-end="url(#arr)"/>
  <text x="120" y="74" text-anchor="middle" font-size="3" fill="#E0566B">ابدأ من هنا</text>

  <text x="105" y="76" text-anchor="middle" font-size="4" fill="#C7613F">أ</text>
  <text x="62" y="155" text-anchor="end" font-size="4" fill="#C7613F">ب</text>
  <text x="148" y="155" text-anchor="start" font-size="4" fill="#C7613F">ج</text>
  <text x="85" y="110" text-anchor="middle" font-size="4.5" fill="#C7613F">8 cm</text>
  <text x="125" y="110" text-anchor="middle" font-size="4.5" fill="#C7613F">8 cm</text>
  <text x="105" y="162" text-anchor="middle" font-size="4.5" fill="#C7613F">8 cm</text>

  <circle cx="105" cy="86" r="1.5" fill="none" stroke="#5E9A47" stroke-width="0.4" stroke-dasharray="0.6,0.6"/>
  <text x="111" y="88" font-size="3" fill="#5E9A47">اثقب هنا</text>

  <g transform="translate(28,190)">
    <text x="77" y="0" text-anchor="middle" font-size="4.5" fill="#000" font-weight="bold">🧵 اثقب القمّة ومرّر خيطًا لتعليق المثلّث</text>
    <line x1="77" y1="6" x2="77" y2="20" stroke="#3a4250" stroke-width="0.5" stroke-dasharray="2,1.5"/>
    <polygon points="77,20 55,58 99,58" fill="#E9F5E0" stroke="#E0566B" stroke-width="0.6" stroke-dasharray="2,1.5"/>
    <circle cx="77" cy="22" r="1" fill="none" stroke="#5E9A47"/>
  </g>

  <text x="105" y="280" text-anchor="middle" font-size="3" fill="#555">مسطرة فحص (5 cm)</text>
  <line x1="80" y1="285" x2="130" y2="285" stroke="#000" stroke-width="0.5"/>
  <g stroke="#000" stroke-width="0.3"><line x1="80" y1="282" x2="80" y2="288"/><line x1="130" y1="282" x2="130" y2="288"/></g>
</svg>
