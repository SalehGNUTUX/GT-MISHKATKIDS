<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<script>(function(){try{var t=localStorage.getItem('tilmithi_theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<style id="theme-crit">html[data-theme="dark"]{--bg:#15151b;--card:#23232c;--ink:#ECE7DD;--muted:#A39E94;--line:#34343f;--primary-d:#E8987E;--shadow:0 6px 20px rgba(0,0,0,.45)}html[data-theme="dark"] body{background:var(--bg);color:var(--ink)}</style>
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="مِشكاة" />
<meta name="theme-color" content="#E07A5F" />
<title>مِشكاة — قصص مصوّرة</title>
<style>
  :root{
    --bg:#FBF7EF; --card:#FFFFFF; --ink:#2B2B2B; --muted:#6B6B6B;
    --line:#ECE6DA; --primary:#E07A5F; --primary-d:#C7613F; --good:#7BB661;
    --shadow:0 6px 20px rgba(0,0,0,.07);
    font-family:"Segoe UI",Tahoma,system-ui,"Noto Naskh Arabic",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  button,a,input,textarea,select,.region,.toggle,.chip,.capbtn,[onclick]{touch-action:manipulation}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:640px;margin:0 auto;padding:16px 16px 48px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 14px}
  header h1{font-size:22px;margin:0}
  header .sub{color:var(--muted);font-size:13px}
  .topbtn{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;font-size:14px;cursor:pointer;text-decoration:none;color:var(--ink)}

  /* covers */
  .covers{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
  .cover{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;cursor:pointer;text-align:center;transition:transform .12s,border-color .12s;border:1px solid var(--line)}
  .cover:hover{transform:translateY(-3px);border-color:var(--primary)}
  .cover .art svg{width:100%;height:auto;display:block;background:#FBF4EF}
  .cover .t{font-size:18px;font-weight:800;padding:10px 12px 2px}
  .cover .v{font-size:12px;color:var(--good);font-weight:700;padding-bottom:12px}

  /* reader */
  .reader{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;text-align:center}
  .reader .stage svg{width:100%;height:auto;display:block;border-radius:16px;background:#FBF4EF;border:1px solid var(--line)}
  .pimg{width:100%;max-width:520px;height:auto;display:block;margin:0 auto;border-radius:16px;border:1px solid var(--line);box-shadow:0 2px 12px rgba(0,0,0,.12);background:var(--card)}
  .rtitle{font-size:15px;color:var(--muted);margin:10px 0 0}
  .ptext{font-size:20px;line-height:1.9;margin:12px 6px;min-height:84px}
  .lesson{background:#EEF6E9;border:1px solid #CDE6BE;color:#3f6b2c;border-radius:14px;padding:12px;font-size:17px;font-weight:700;margin:10px 0}
  .dots{display:flex;gap:7px;justify-content:center;margin:8px 0}
  .dot{width:9px;height:9px;border-radius:50%;background:#E0D8C8}
  .dot.on{background:var(--primary)}
  .nav{display:flex;gap:10px;margin-top:12px}
  .nav button{flex:1;border:none;border-radius:14px;padding:14px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit}
  .prev{background:var(--card);border:1px solid var(--line);color:var(--ink)}
  .next{background:var(--primary);color:#fff}
  .next:hover{background:var(--primary-d)}
  .prev:disabled{opacity:.4;cursor:default}
  .back{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;margin-top:10px;text-decoration:underline;font-family:inherit}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>قصص مصوّرة 📚</h1>
      <div class="sub">قصصٌ أصيلة بصورٍ كبيرة — اقرأها مع طفلك</div>
    </div>
    <span class="topbtns"><button class="iconbtn" id="themeBtn" title="الوضع الداكن" aria-label="الوضع الداكن">🌙</button><a class="topbtn" href="home.html">🏠 الفهرس</a></span>
  </header>
  <div id="view"></div>
</div>

<script type="module">
import { wireThemeToggle } from "./src/theme.js";
wireThemeToggle(document.getElementById("themeBtn"));
import data from "./content/stories.js";
import { STORY_ART } from "./src/story-art.js";
import { attachReader } from "./src/reader-recorder.js";
import { isStoryReadOn, showTashkeel, setShowTashkeel, stripTashkeel } from "./src/sound-prefs.js";
import { attachStoryReader } from "./src/story-reader.js";
const disp = t => showTashkeel() ? t : stripTashkeel(t); // عرضٌ مع/بلا شكل (لا يؤثّر في القراءة)
const tashBtn = () => `<button class="back" id="tashToggle" style="font-size:13px">🔡 الشكل: ${showTashkeel()?"ظاهر":"مخفيّ"}</button>`;

const STORIES = data.stories || [];
let si = -1, pi = 0;
const view = document.getElementById("view");
const art = k => STORY_ART[k] || "";
const esc = s => String(s||"").replace(/"/g,"&quot;");
// وسائطُ الصفحة/الغلاف: صورةٌ جاهزةٌ (قصصٌ مصوّرةٌ بلوحاتٍ كـ«الكتاب السحريّ») أو فنُّ SVG البرمجيّ.
const pageMedia = p => p.img ? `<img class="pimg" src="${p.img}" alt="${esc(p.text)}" loading="lazy">` : art(p.art);
const coverMedia = s => s.coverImg ? `<img class="pimg" src="${s.coverImg}" alt="${esc(s.title)}" loading="lazy">` : art(s.cover);

function renderCovers(){
  si = -1;
  view.innerHTML = `<div class="covers">` + STORIES.map((s,i)=>
    `<div class="cover" data-i="${i}">
       <div class="art">${coverMedia(s)}</div>
       <div class="t">${s.title}</div>
       <div class="v">⭐ ${s.value} · ${s.age_band}</div>
     </div>`).join("") + `</div>`;
  view.querySelectorAll(".cover").forEach(c=>c.addEventListener("click",()=>openStory(+c.getAttribute("data-i"))));
}

function openStory(i){ si=i; pi=0; renderPage(); }

function renderPage(){
  const s = STORIES[si], last = pi === s.pages.length-1, p = s.pages[pi];
  // النصُّ المكتوبُ يظهرُ دائماً (حتى للقصص المصوّرة باللوحات) مع توگل التشكيل — كبقيّة القصص.
  view.innerHTML = `<div class="reader">
    <div class="stage">${pageMedia(p)}</div>
    <div class="rtitle">${disp(s.title)}</div>
    <div class="ptext">${disp(p.text)}</div>
    <div style="text-align:center;margin:4px 0">${tashBtn()}</div>
    ${isStoryReadOn() ? `<div id="srHost"></div>` : ""}
    <div id="rrHost"></div>
    ${last ? `<div class="lesson">الدرس: ${disp(s.lesson)}</div>` : ""}
    <div class="dots">${s.pages.map((_,k)=>`<span class="dot ${k===pi?"on":""}"></span>`).join("")}</div>
    <div class="nav">
      <button class="prev" id="prev" ${pi===0?"disabled":""}>السابقة</button>
      <button class="next" id="next">${last ? "🌟 تمّت — قصّة أخرى" : "التالية ▶"}</button>
    </div>
    <button class="back" id="back">▸ كل القصص</button>
  </div>`;
  document.getElementById("prev").onclick = ()=>{ if(pi>0){ pi--; renderPage(); } };
  document.getElementById("next").onclick = ()=>{ if(pi < s.pages.length-1){ pi++; renderPage(); } else { renderCovers(); } };
  document.getElementById("back").onclick = renderCovers;
  const tt = document.getElementById("tashToggle"); if(tt) tt.onclick = ()=>{ setShowTashkeel(!showTashkeel()); renderPage(); };
  attachReader(document.getElementById("rrHost"), p.text, { label:"قراءتك للصفحة" });
  // قراءةُ القصّة بصوتٍ (القارئ المختار) — صفحةً أو كاملةً مع الانتقال التلقائيّ. النصُّ المُقرَّر بالشكل الكامل.
  if(isStoryReadOn()) attachStoryReader(document.getElementById("srHost"), {
    text: p.text, pages: s.pages.map(x=>x.text), startIdx: pi,
    onPage: turnTo, rerender: renderPage,   // أثناء القراءة المتتابعة: حدّثِ الصورةَ في مكانها فقط (لا تُعِدْ بناءَ القارئ فتنقطعَ القراءة)
  });
}

// تحديثٌ خفيفٌ في المكان أثناء «اقرأ القصّة كاملةً»: نُبدّلُ الصورةَ والنصَّ والنقاطَ دون هدمِ القارئ
// النشِط (إعادةُ بناءِ srHost كانت تقطعُ القراءةَ عند كلّ انتقالِ صفحة).
function turnTo(i){
  pi = i;
  const s = STORIES[si], p = s.pages[pi];
  const st = view.querySelector(".stage"); if(st) st.innerHTML = pageMedia(p);
  const pt = view.querySelector(".ptext"); if(pt) pt.innerHTML = disp(p.text);
  view.querySelectorAll(".dots .dot").forEach((d,k)=>d.classList.toggle("on", k===pi));
}

// رابطٌ عميق: ?story=<id> يفتح القصّةَ مباشرةً (تُستعمَل من بطاقة «قصّة الأرقام» في الرياضيّات).
const wantStory = new URLSearchParams(location.search).get("story");
const wantIdx = wantStory ? STORIES.findIndex(s=>s.id===wantStory) : -1;
if(wantIdx>=0) openStory(wantIdx); else renderCovers();
</script>
</body>
</html>
