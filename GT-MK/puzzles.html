<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<script>(function(){try{var t=localStorage.getItem('tilmithi_theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<style id="theme-crit">html[data-theme="dark"]{--bg:#15151b;--card:#23232c;--ink:#ECE7DD;--muted:#A39E94;--line:#34343f;--primary-d:#E8987E;--shadow:0 6px 20px rgba(0,0,0,.45)}html[data-theme="dark"] body{background:var(--bg);color:var(--ink)}</style>
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="مِشكاة" />
<meta name="theme-color" content="#E07A5F" />
<title>مِشكاة — ألغاز ذكية</title>
<style>
  :root{
    --bg:#FBF7EF; --card:#FFFFFF; --ink:#2B2B2B; --muted:#6B6B6B;
    --line:#ECE6DA; --primary:#E07A5F; --primary-d:#C7613F; --good:#7BB661;
    --shadow:0 6px 20px rgba(0,0,0,.07);
    font-family:"Noto Sans Arabic","Segoe UI",Tahoma,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  button,a,input,textarea,select,.region,.toggle,.chip,.capbtn,[onclick]{touch-action:manipulation}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:600px;margin:0 auto;padding:16px 16px 48px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 12px}
  header h1{font-size:22px;margin:0}
  header .sub{color:var(--muted);font-size:13px}
  .topbtn{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;font-size:14px;cursor:pointer;text-decoration:none;color:var(--ink)}

  .chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:6px 2px}
  .chips .lbl{font-size:12px;color:var(--muted);margin-inline-end:2px}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 14px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--muted)}
  .chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .count{font-size:13px;color:var(--muted);margin:10px 2px 0}

  .card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:20px 18px;margin-top:8px}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .b{font-size:11px;background:#EFEADD;border-radius:999px;padding:2px 10px;color:#666}
  .b.type{background:#FBEDE7;color:var(--primary-d)}
  .ptitle{font-size:18px;font-weight:800;margin:2px 0 10px}
  .riddle{font-size:21px;line-height:1.95;margin:6px 2px 16px;min-height:80px}
  .reveal{display:flex;gap:10px;flex-wrap:wrap}
  .reveal button{flex:1;min-width:130px;border:none;border-radius:14px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  .bhint{background:#FFF4D9;color:#8a6d1d;border:1px solid #F1E3B8}
  .bsol{background:var(--good);color:#fff}
  .box{margin-top:12px;border-radius:14px;padding:12px 14px;font-size:17px;display:none}
  .box.show{display:block}
  .hintbox{background:#FFF7E3;border:1px solid #F1E3B8;color:#7a611a}
  .solbox{background:#EEF6E9;border:1px solid #CDE6BE;color:#3f6b2c;font-weight:700;font-size:19px;text-align:center}
  /* إدخالُ الحلّ المكتوب */
  .answer{display:flex;gap:10px;margin-top:14px}
  .answer input{flex:1;min-width:0;border:2px solid var(--line);border-radius:14px;padding:12px 14px;font-size:18px;font-family:inherit;background:var(--card);color:var(--ink)}
  .answer input:focus{outline:none;border-color:var(--primary)}
  .bcheck{border:none;border-radius:14px;padding:12px 20px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;background:var(--primary);color:#fff}
  .bcheck:active{transform:scale(.97)}
  .ansfb{font-weight:700;font-size:16px;text-align:center}
  .ansfb.ok{background:#EEF6E9;border:1px solid #CDE6BE;color:#3f6b2c}
  .ansfb.bad{background:#FCEBEE;border:1px solid #F1C4CC;color:#8c2b3a}

  .nav{display:flex;gap:10px;margin-top:16px}
  .nav button{flex:1;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
  .prev{background:var(--card);border:1px solid var(--line);color:var(--ink)}
  .next{background:var(--primary);color:#fff}
  .next:hover{background:var(--primary-d)}
  .prev:disabled{opacity:.4;cursor:default}
  .shuf{background:var(--card);border:1px solid var(--line);color:var(--primary-d);border-radius:14px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px;width:100%}
  .empty{padding:26px;text-align:center;color:var(--muted)}
  .src{margin-top:18px;text-align:center;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>ألغاز ذكية 🧩</h1>
      <div class="sub">فكّر، خمّن، ثمّ اكشف الحل — مع طفلك</div>
    </div>
    <span class="topbtns"><button class="iconbtn" id="themeBtn" title="الوضع الداكن" aria-label="الوضع الداكن">🌙</button><a class="topbtn" href="home.html">🏠 الفهرس</a></span>
  </header>

  <div class="chips" id="fType">
    <span class="lbl">النوع:</span>
    <button class="chip on" data-v="all">الكل</button>
    <button class="chip" data-v="riddle">فوازير 🔮</button>
    <button class="chip" data-v="logic">منطق 🧠</button>
  </div>
  <div class="chips" id="fAge">
    <span class="lbl">العمر:</span>
    <button class="chip on" data-v="all">الكل</button>
    <button class="chip" data-v="4-6">4–6</button>
    <button class="chip" data-v="6-8">6–8</button>
    <button class="chip" data-v="9-12">9–12</button>
  </div>
  <div class="count" id="count"></div>

  <div id="view"></div>

  <div class="src">الألغاز مستوحاة من مشروع GT-SARARIM (رخصة GPL-3.0)</div>
</div>

<script type="module">
import { wireThemeToggle } from "./src/theme.js";
wireThemeToggle(document.getElementById("themeBtn"));
import data from "./content/puzzles.js";
import { logEvent } from "./src/progress.js";
import { robo } from "./src/robo-companion.js";
import { NOTICES } from "./src/robo-phrases.js";
robo.mount();

const ALL = data.puzzles || [];
const LEVEL_AR = { beginner:"تمهيدي", intermediate:"مبتدئ", advanced:"متوسّط", expert:"متقدّم" };
const TYPE_AR  = { riddle:"فزّورة 🔮", logic:"منطق 🧠" };

let fType = "all", fAge = "all", list = [], i = 0;

// ===== مطابقةُ الحلّ المكتوب: تقبَلُ كلَّ صيغ الكتابة (ال/التشكيل/المسافات + الأرقام رقمًا أو كلمةً) =====
const NUMW = { "صفر":"0","واحد":"1","واحده":"1","اثنان":"2","اثنين":"2","ثنان":"2","ثلاثه":"3","اربعه":"4","خمسه":"5","سته":"6","سبعه":"7","ثمانيه":"8","ثمانيه":"8","تسعه":"9","عشره":"10" };
// مرادفاتٌ مقبولةٌ لكلّ حلٍّ (المفتاحُ = الحلُّ بعد التطبيع). يُكتَبُ بصيغٍ طبيعيّةٍ وتُطبَّعُ تلقائيًّا
// (فلا حاجةَ لكلّ مفرد/جمع: «سحابة» تُغطّيها «سحاب»). الهدف: قبولُ كلّ صيغةٍ ذاتِ معنًى لا رفضُها.
const SYN = {
  "سحاب":["غيم","غيوم","غيمة","سحب","غمام","بخار"], "مطر":["غيث","امطار","شتاء","ماء"],
  "شمس":["نهار","ضياء","ضوء"], "قمر":["بدر","هلال"], "طاير":["طير","عصفور","بلبل","حمامة","عصافير"],
  "بقر":["ثور","عجل","بقرة","ماشية"], "تفاح":["تفاحة","فاكهة"], "ماء":["ميه","سائل","مي"],
  "مرا":["مراية","مرآة","عاكس","زجاج"], "صدي":["رجع","صوت","رجع الصوت"], "شجر":["شجرة","نبات","غرسة","دوحة"],
  "نمل":["نملة","حشرة"], "كتاب":["مصحف","كتب","دفتر"], "وقت":["زمن","زمان","ساعة"],
  "حفر":["حفرة","جورة","بئر","نفق"], "قلم":["ريشة","رصاص","اقلام"], "ظل":["خيال","ظلال","فيء"],
  "مكتب":["مكتبة","كتب"], "صمت":["سكوت","سكون","هدوء"], "بحر":["محيط","يم"],
  "حاضر":["الان","حاليا"], "ماضي":["امس","سابق","ماض"], "كلب":["كليب","جرو","نباح"],
  "ساع":["وقت","زمن","ساعة"], "ثلج":["جليد","صقيع","برد"], "ضوء":["نور","ضو","اضاءة","شعاع"],
  "ذاكر":["ذاكرة","حافظة","عقل","ذهن"], "مربع":["مربعة","شكل مربع"], "ريح":["هواء","نسيم","عاصفة","هوا"],
  "ورد":["زهرة","زهر","وردة","زهور"], "شمع":["شمعة","شموع"], "قلع":["حصن","قصر","قلعة","حصون"],
  "ثق":["امان","امانة","ثقة"], "قران":["مصحف","كتاب الله","القران"], "بنفسجي":["بنفسج","ارجواني","موف","بنفسجية"],
};
function normAns(s){
  let n = String(s||"").trim();
  n = n.replace(/[ً-ْٰـ]/g, "");                 // تشكيل + تطويل
  n = n.replace(/[إأآا]/g,"ا").replace(/ى/g,"ي").replace(/ؤ/g,"و").replace(/ئ/g,"ي"); // توحيد الألف/الياء
  n = n.replace(/[‎‏]/g,"").replace(/[.,؟!،:'"«»]/g,"").replace(/\s+/g,""); // رموز ومسافات
  n = n.replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d));             // أرقام هنديّة → غربيّة
  n = n.replace(/^(وال|فال|بال|كال|ال)/, "");                        // أداةُ التعريف (ومعها واو/فاء/باء/كاف)
  n = n.replace(/ة$/, "");                                           // تاءُ التأنيث الختاميّة (مفرد↔جذر: سحابة↔سحاب)
  return n;
}
const canon = s => { const n = normAns(s); return NUMW[n] || n; };   // كلمةُ عددٍ → رقمُها
// مرادفاتٌ مشتركةٌ (مُطبَّعة) — يُضيفُها لكلّ لغزٍ حلُّه المُطبَّعُ مفتاحٌ هنا، فلا حاجةَ لتعديل كلّ لغز.
function puzzleMatches(input, p){
  const ci = canon(input);
  if(!ci.length) return false;
  let cands = [p.solution].concat(p.accept || []);
  const syn = SYN[canon(p.solution)]; if(syn) cands = cands.concat(syn);
  return cands.some(c => canon(c) === ci);
}

function shuffle(a){ for(let k=a.length-1;k>0;k--){ const j=Math.floor(Math.random()*(k+1)); [a[k],a[j]]=[a[j],a[k]]; } return a; }

function apply(){
  list = ALL.filter(p => (fType==="all"||p.type===fType) && (fAge==="all"||p.age_band===fAge));
  shuffle(list);
  i = 0; render();
}

function render(){
  const c = document.getElementById("count");
  const view = document.getElementById("view");
  if(!list.length){ c.textContent=""; view.innerHTML = `<div class="card"><div class="empty">لا ألغاز بهذا التصفية.</div></div>`; return; }
  c.textContent = `لغز ${i+1} من ${list.length}`;
  const p = list[i];
  view.innerHTML = `<div class="card">
    <div class="badges">
      <span class="b type">${TYPE_AR[p.type]||p.type}</span>
      <span class="b">${LEVEL_AR[p.level]||p.level}</span>
      <span class="b">${p.age_band} سنوات</span>
    </div>
    <div class="ptitle">${p.title}</div>
    <div class="riddle">${p.riddle}</div>
    <div class="answer">
      <input id="ans" type="text" inputmode="text" autocomplete="off" placeholder="اكتبِ الحلَّ هنا…" />
      <button class="bcheck" id="bcheck">تحقّقْ</button>
    </div>
    <div class="box ansfb" id="ansfb"></div>
    <div class="reveal">
      <button class="bhint" id="bhint">💡 تلميح</button>
      <button class="bsol" id="bsol">✅ أظهرِ الحلَّ</button>
    </div>
    <div class="box hintbox" id="hintbox">💡 ${p.hint}</div>
    <div class="box solbox" id="solbox">${p.solution}</div>
    <div class="nav">
      <button class="prev" id="prev" ${i===0?"disabled":""}>السابق</button>
      <button class="next" id="next">${i===list.length-1 ? "🔀 خلط جديد" : "التالي ▶"}</button>
    </div>
    <button class="shuf" id="shuf">🔀 لغز عشوائي آخر</button>
  </div>`;

  const hb=document.getElementById("hintbox"), sb=document.getElementById("solbox");
  const ai=document.getElementById("ans"), afb=document.getElementById("ansfb");
  function check(){
    const v=ai.value.trim(); if(!v) return;
    if(puzzleMatches(v, p)){
      afb.textContent="🎉 إجابةٌ صحيحة! أحسنتَ."; afb.className="box ansfb ok show";
      sb.classList.add("show"); ai.disabled=true; logEvent("puzzle_solved"); robo.say(NOTICES.puzzleReveal,"happy");
    } else {
      afb.textContent="ليست هي بعدُ — حاولْ ثانيةً 🌟 (أو اطلبْ تلميحًا)"; afb.className="box ansfb bad show"; robo.encourage();
    }
  }
  document.getElementById("bcheck").onclick = check;
  ai.addEventListener("keydown", e=>{ if(e.key==="Enter") check(); });
  document.getElementById("bhint").onclick = (e)=>{ hb.classList.toggle("show"); e.target.style.opacity = hb.classList.contains("show")?".6":"1"; };
  document.getElementById("bsol").onclick  = ()=>{ sb.classList.add("show"); logEvent("puzzle_seen"); robo.say(NOTICES.puzzleReveal, "happy"); };
  document.getElementById("prev").onclick = ()=>{ if(i>0){ i--; render(); } };
  document.getElementById("next").onclick = ()=>{ if(i<list.length-1){ i++; render(); } else { apply(); } };
  document.getElementById("shuf").onclick = ()=>{ if(list.length>1){ let n; do{ n=Math.floor(Math.random()*list.length); }while(n===i); i=n; render(); } };
}

function wire(id, set){
  document.getElementById(id).addEventListener("click", e=>{
    const b=e.target.closest("button[data-v]"); if(!b) return;
    document.querySelectorAll(`#${id} .chip`).forEach(x=>x.classList.toggle("on", x===b));
    set(b.getAttribute("data-v")); apply();
  });
}
wire("fType", v=>fType=v);
wire("fAge",  v=>fAge=v);

apply();
</script>
</body>
</html>
