<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<script>(function(){try{var t=localStorage.getItem('tilmithi_theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<style id="theme-crit">html[data-theme="dark"]{--bg:#15151b;--card:#23232c;--ink:#ECE7DD;--muted:#A39E94;--line:#34343f;--primary-d:#E8987E;--shadow:0 6px 20px rgba(0,0,0,.45)}html[data-theme="dark"] body{background:var(--bg);color:var(--ink)}</style>
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="مِشكاة" />
<meta name="theme-color" content="#1F7A5E" />
<title>مِشكاة — القرآن الكريم</title>
<style>
  @font-face{font-family:'amiri-quran';src:url('fonts/amiri-quran.ttf') format('truetype');font-display:swap}
  @font-face{font-family:'amiri-quran-colored';src:url('fonts/amiri-quran-colored.ttf') format('truetype');font-display:swap}
  @font-face{font-family:'uthmanic-hafs';src:url('fonts/uthmanic-hafs.otf') format('opentype');font-display:swap}
  :root{
    --bg:#FBF7EF; --card:#FFFFFF; --ink:#2B2B2B; --muted:#6B6B6B; --line:#ECE6DA;
    --primary:#1F7A5E; --primary-d:#155C46; --gold:#C99B3B; --hl:#FCEFC7;
    --shadow:0 6px 20px rgba(0,0,0,.07);
    font-family:"Noto Sans Arabic","Segoe UI",Tahoma,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  button,a,.scard,.ayah{touch-action:manipulation}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:680px;margin:0 auto;padding:16px 16px 56px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 10px}
  header h1{font-size:21px;margin:0;color:var(--primary-d)}
  header .sub{color:var(--muted);font-size:13px}
  .topbtn{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;font-size:14px;cursor:pointer;text-decoration:none;color:var(--ink);font-family:inherit}
  .back{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:7px 14px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--ink)}

  .filters{display:flex;gap:6px;flex-wrap:wrap;margin:8px 2px}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit;color:#555}
  .chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}

  .slist{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:8px}
  .scard{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:12px;cursor:pointer;text-align:center;transition:.12s}
  .scard:hover{transform:translateY(-2px);border-color:var(--primary)}
  .scard .nm{font-family:'amiri-quran';font-size:22px;color:var(--primary-d);font-weight:700}
  .scard .meta{font-size:12px;color:var(--muted);margin-top:3px}
  .scard .lvl{display:inline-block;font-size:11px;border-radius:999px;padding:1px 8px;margin-top:4px}
  .lvl.s{background:#EAF4E3;color:#3f6b2c} .lvl.m{background:#FBF0DC;color:#8a5a2a} .lvl.h{background:#F3EAF6;color:#6e3f7a}

  .stitle{text-align:center;margin:6px 2px 10px}
  .stitle .nm{font-family:'amiri-quran';font-size:30px;color:var(--primary-d);font-weight:700}
  .stitle .meta{font-size:12px;color:var(--muted)}
  .fontbar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;align-items:center;margin:6px 2px}
  /* حجمُ الخطّ: «أ» صغيرةٌ للتصغيرِ و«أ» كبيرةٌ للتكبير — دلالةٌ بصريّةٌ بلا شرح */
  .fszoom{display:inline-flex;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:2px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
  .fsbtn{width:34px;height:34px;border-radius:50%;border:none;background:transparent;color:var(--ink);font-family:'amiri-quran',inherit;font-weight:800;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;transition:background .12s,transform .1s}
  .fsbtn.sm{font-size:15px} .fsbtn.lg{font-size:23px}
  /* التمريرُ/النقر: خلفيّةٌ أساسيّةٌ ونصٌّ أبيضُ صريحٌ — لا var(--hl) الفاتحُ الذي يُخفي الحرفَ في الوضعِ الداكن */
  .fsbtn:hover,.fsbtn:focus-visible{background:var(--primary);color:#fff} .fsbtn:active{background:var(--primary-d);color:#fff;transform:scale(.9)}
  .fsdiv{width:1px;height:18px;background:var(--line);margin:0 1px}
  .toolbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 2px}
  .tbtn{border:none;border-radius:999px;padding:9px 15px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 3px 10px rgba(0,0,0,.1)}
  .tbtn.play{background:var(--primary);color:#fff} .tbtn.stop{background:#E0566B;color:#fff}
  .tbtn.rep{background:var(--card);border:1px solid var(--line);color:#555} .tbtn.rep.on{background:var(--gold);color:#fff}
  .memrange{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;margin:0 2px 8px;padding:10px 12px;background:var(--card);border:1px solid var(--line);border-radius:14px}
  .mr-lbl{font-size:14px;font-weight:700;color:var(--ink)}
  .mr-sel{padding:6px 10px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink);font:inherit;font-weight:800;font-size:15px}
  .mr-hint{flex-basis:100%;text-align:center;font-size:12px;color:var(--muted);margin-top:2px}

  .mushaf{background:#FFFDF6;border:1px solid #EFE6CF;border-radius:18px;box-shadow:var(--shadow);padding:18px 16px;margin:8px 2px;
    font-size:30px;line-height:2.35;text-align:center;direction:rtl;color:#1c2b25;word-spacing:normal}
  .mushaf.f-amiri{font-family:'amiri-quran'} .mushaf.f-amiric{font-family:'amiri-quran-colored'} .mushaf.f-uthmani{font-family:'uthmanic-hafs'}
  .ayah{cursor:pointer;border-radius:8px;padding:0 2px;transition:background .15s}
  .ayah.on{background:var(--hl);box-shadow:0 0 0 2px var(--gold) inset}
  .ayah .num{font-family:'amiri-quran';color:var(--gold);font-size:.8em;margin:0 4px;font-weight:700}
  .bism{display:block;text-align:center;color:var(--primary-d);font-size:.95em;margin-bottom:10px;cursor:pointer;border-radius:8px;padding:2px}
  .bism.on{background:var(--hl);box-shadow:0 0 0 2px var(--gold) inset}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 2px;box-shadow:var(--shadow)}
  .panel .ay{font-family:'amiri-quran';font-size:24px;color:var(--primary-d);text-align:center;margin-bottom:8px;line-height:2}
  .hint{text-align:center;color:var(--muted);font-size:13px;margin-top:10px}
  /* المشغّلُ العائم (نفسُ «القرآن الكامل»): تمرير + تشغيل/إيقاف + حفظُ الموضع + رجوع/فهرس */
  .qplayer{position:fixed;left:0;right:0;bottom:0;z-index:80;background:var(--card);border-top:1px solid var(--line);box-shadow:0 -4px 16px rgba(0,0,0,.14);padding:8px 12px calc(8px + env(safe-area-inset-bottom))}
  .qp-nav{display:flex;align-items:center;gap:6px;max-width:680px;margin:0 auto 6px}
  .qp-row{display:flex;align-items:center;gap:8px;max-width:680px;margin:0 auto}
  .qp-btn{border:none;background:var(--bg);color:var(--ink);border-radius:50%;width:38px;height:38px;font-size:15px;cursor:pointer;font-family:inherit;flex:none;display:flex;align-items:center;justify-content:center}
  .qp-btn:active{transform:scale(.92)}
  .qp-btn.qp-play{background:var(--primary);color:#fff;width:46px;height:46px;font-size:19px}
  .qp-btn.qp-sm{width:32px;height:32px;font-size:15px;border:1px solid var(--line)}
  .qp-seek{flex:1;accent-color:var(--primary);height:6px;cursor:pointer;min-width:60px}
  .qp-pos{font-size:12px;color:var(--muted);font-weight:800;flex:none;min-width:64px;text-align:center;font-variant-numeric:tabular-nums}
  .qp-title{flex:1;text-align:center;font-size:13px;color:var(--primary-d);font-weight:800}
  body.qp-open .wrap{padding-bottom:132px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div><h1>القرآن الكريم ﷽</h1><div class="sub">تعلَّمْ واقرأْ واحفَظْ — بتلاوة الشيخ محمود خليل الحصري</div></div>
    <span class="topbtns"><button class="iconbtn" id="themeBtn" title="الوضع الداكن" aria-label="الوضع الداكن">🌙</button><a class="topbtn" href="home.html">🏠 الفهرس</a></span>
  </header>
  <div id="view"></div>
</div>

<script type="module">
import { wireThemeToggle } from "./src/theme.js";
wireThemeToggle(document.getElementById("themeBtn"));
import QURAN from "./content/quran.js";
import { logEvent, recordMastery, getChildAge } from "./src/progress.js";
import { robo } from "./src/robo-companion.js";
import { NOTICES } from "./src/robo-phrases.js";
import { attachReader } from "./src/reader-recorder.js";
robo.mount();

const view = document.getElementById("view");
const pad3 = n => String(n).padStart(3, "0");
const ayNum = n => String(n); // أرقام الآيات بالغربيّة (العربيّة) في كل الواجهة بطلب المستخدم
// خياراتُ «من/إلى» لنطاقِ الحفظ: 1..عددِ آياتِ السورة (يُحدَّدُ تلقائيًّا). المحدَّدُ = sel.
const ayOpts = sel => Array.from({ length: surah ? surah.ayahCount : 0 }, (_, k) => `<option value="${k + 1}" ${k + 1 === sel ? "selected" : ""}>${k + 1}</option>`).join("");
const BASMALA = "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ";
const audioSrc = (s, a) => `quran/husary/${pad3(s)}${pad3(a)}.mp3`;
const BASMALA_AUDIO = audioSrc(1, 1); // صوتُ البسملة المستقلّ = الفاتحة آية1 (تلاوةُ الحصري لا تضمّن البسملةَ في باقي السور)
// فصلُ البسملة من نصّ الآية الأولى (متينٌ غيرُ حسّاسٍ للتشكيل): يُرجِع نصَّ الآية دون البسملة.
const stripDia = s => String(s).replace(/[ً-ْٰـ]/g, "").replace(/ٱ/g, "ا");
const BASM_NORM = "بسم الله الرحمن الرحيم";
function verseNoBism(text) { const t = String(text).split(/\s+/); return (t.length >= 4 && stripDia(t.slice(0, 4).join(" ")) === BASM_NORM) ? t.slice(4).join(" ") : text; }

const FONTS = [{ id: "f-amiri", label: "أميري" }, { id: "f-amiric", label: "أميري ملوّن" }, { id: "f-uthmani", label: "عثماني" }];
const FKEY = "tilmithi_quran_font";
const getFont = () => { try { return localStorage.getItem(FKEY) || "f-amiri"; } catch (e) { return "f-amiri"; } };
const setFont = f => { try { localStorage.setItem(FKEY, f); } catch (e) {} };
// حجمُ خطِّ المصحف (تكبير/تصغير) — محفوظٌ محلّيًّا، ضمنَ 20–48 بكسل.
const FSKEY = "tilmithi_quran_fs";
const clampFS = px => Math.max(20, Math.min(48, px));
const getFS = () => { try { const v = parseInt(localStorage.getItem(FSKEY) || "30", 10); return clampFS(isNaN(v) ? 30 : v); } catch (e) { return 30; } };
const setFS = px => { try { localStorage.setItem(FSKEY, String(clampFS(px))); } catch (e) {} };

// المستوى بحسب طول السورة (الأقصر أسهل): s≤7 · m≤25 · h>25.
const levelOf = c => c <= 7 ? "s" : c <= 25 ? "m" : "h";
const LVL_LABEL = { s: "قصيرة", m: "متوسّطة", h: "طويلة" };
// تصفيةٌ بحسب العمر: الصغار يبدؤون بالأقصر.
function defaultFilter() { const a = getChildAge(); return a === "4-6" ? "s" : a === "7-10" ? "m" : "all"; }
let filter = defaultFilter();
let order = "len"; // len = الأقصر أولًا (تدرّجٌ في الحفظ) · mushaf = الترتيب القرآنيّ

// البسملة: إظهارٌ/إخفاء (لتكرار الآية الأولى بغرض الحفظ). الافتراض: ظاهرة.
const BKEY = "tilmithi_quran_basmala";
const showBasmala = () => { try { return localStorage.getItem(BKEY) !== "off"; } catch (e) { return true; } };
const setBasmala = on => { try { localStorage.setItem(BKEY, on ? "on" : "off"); } catch (e) {} };

const FATIHA = QURAN.surahs.find(s => s.n === 1);
// **الفاتحة دائمًا أولًا**، ثمّ البقيّة بالترتيب المختار (الأقصر أولًا أو الترتيب القرآنيّ).
function orderedSurahs() {
  const rest = QURAN.surahs.filter(s => s.n !== 1);
  rest.sort(order === "mushaf" ? (a, b) => a.n - b.n : (a, b) => a.ayahCount - b.ayahCount);
  return [FATIHA, ...rest];
}

/* ===== قائمة السور ===== */
function renderList() {
  stopAll(); surah = null; hidePlayer();
  const fbtn = (id, lbl) => `<button class="chip ${filter === id ? "on" : ""}" data-f="${id}">${lbl}</button>`;
  const obtn = (id, lbl) => `<button class="chip ${order === id ? "on" : ""}" data-o="${id}">${lbl}</button>`;
  // الفاتحة تُعرَض دائمًا؛ والبقيّة تُصفّى بالمستوى (في وضع «الأقصر أولًا»). في الترتيب القرآنيّ تُعرَض كلُّها.
  const list = orderedSurahs().filter(s => s.n === 1 || order === "mushaf" || filter === "all"
    || levelOf(s.ayahCount) === filter || (filter === "m" && levelOf(s.ayahCount) === "s"));
  view.innerHTML =
    `<div class="filters"><span style="font-size:13px;color:#6B6B6B;align-self:center">الترتيب:</span>
       ${obtn("len", "📏 الأقصر أولًا")}${obtn("mushaf", "📖 الترتيب القرآنيّ")}</div>
     ${order === "len" ? `<div class="filters"><span style="font-size:13px;color:#6B6B6B;align-self:center">المستوى:</span>
       ${fbtn("s", "🟢 قصيرة")}${fbtn("m", "🟡 متوسّطة")}${fbtn("all", "الكل")}</div>` : ""}
     <div class="slist">${list.map(s => `
       <div class="scard" data-n="${s.n}">
         <div class="nm">${s.name.replace(/^سُورَةُ\s*/, "")}</div>
         <div class="meta">${ayNum(s.ayahCount)} آية · ${s.type === "Meccan" ? "مكّيّة" : "مدنيّة"}</div>
         <div class="lvl ${levelOf(s.ayahCount)}">${LVL_LABEL[levelOf(s.ayahCount)]}</div>
       </div>`).join("")}</div>
     <div class="hint">ابدأْ بالأقصر، واستمعْ لكلِّ آيةٍ وكرِّرْها حتى تحفظَها بإذن الله 🌿</div>`;
  view.querySelectorAll(".filters").forEach(bar => bar.addEventListener("click", e => {
    const o = e.target.closest("[data-o]"); if (o) { order = o.getAttribute("data-o"); renderList(); return; }
    const f = e.target.closest("[data-f]"); if (f) { filter = f.getAttribute("data-f"); renderList(); }
  }));
  view.querySelector(".slist").addEventListener("click", e => { const c = e.target.closest("[data-n]"); if (c) openSurah(+c.getAttribute("data-n")); });
}

/* ===== عرض السورة ===== */
let surah = null, selIdx = 0;
function openSurah(n) { surah = QURAN.surahs.find(s => s.n === n); selIdx = 0; repeatAyah = false; repeatSurah = false; loopSeq = false; memOpen = false; memFrom = 1; memTo = Math.min(5, surah.ayahCount || 5); logEvent("quran_open"); // سورةٌ جديدةٌ = بلا تكرارٍ عالِق
  const pv = getPos(); if (pv && pv.s === n && pv.a > 1) { const idx = surah.ayahs.findIndex(x => x.a === pv.a); if (idx > 0) selIdx = idx; } // استئنافٌ من آخرِ موضع
  renderSurah();
  if (selIdx > 0) setTimeout(() => { const sp = view.querySelector(`.ayah[data-i="${selIdx}"]`); if (sp) sp.scrollIntoView({ block: "center", behavior: "smooth" }); }, 130);
}

// نصُّ الآية للعرض: بلا بسملةٍ للآية الأولى (لغير الفاتحة)، وبلا محرف BOM/علاماتٍ خفيّة.
function ayahText(ay) { const t = (surah.n !== 1 && ay.a === 1) ? verseNoBism(ay.text) : ay.text; return t.replace(/﻿/g, "").trim(); }
function ayahHtml(ay, i) {
  return `<span class="ayah" data-i="${i}" data-a="${ay.a}">${ayahText(ay)}<span class="num">﴿${ayNum(ay.a)}﴾</span></span> `;
}
function renderSurah() {
  stopAll();
  const f = getFont();
  view.innerHTML =
    `<button class="backstep" id="back">كل السور</button>
     <div class="stitle"><div class="nm">${surah.name}</div><div class="meta">${ayNum(surah.ayahCount)} آية · ${surah.type === "Meccan" ? "مكّيّة" : "مدنيّة"}</div></div>
     <div class="fontbar">${FONTS.map(x => `<button class="chip ${f === x.id ? "on" : ""}" data-font="${x.id}">${x.label}</button>`).join("")}
       <span class="fszoom" role="group" aria-label="حجمُ الخطّ"><button class="fsbtn sm" id="fsMinus" title="تصغيرُ الخطّ" aria-label="تصغيرُ الخطّ">أ</button><span class="fsdiv"></span><button class="fsbtn lg" id="fsPlus" title="تكبيرُ الخطّ" aria-label="تكبيرُ الخطّ">أ</button></span></div>
     <div class="toolbar">
       <button class="tbtn play" id="playAll">▶ اقرأ السورة</button>
       <button class="tbtn stop" id="stop">⏹️ إيقاف</button>
       <button class="tbtn rep ${repeatAyah ? "on" : ""}" id="repAyah">🔁 كرّر الآية</button>
       <button class="tbtn rep ${repeatSurah ? "on" : ""}" id="repSurah">🔁 كرّر السورة</button>
       <button class="tbtn rep ${memOpen ? "on" : ""}" id="memBtn">📖 حفظُ نطاق</button>
       ${surah.n !== 1 ? `<button class="tbtn rep ${showBasmala() ? "on" : ""}" id="basmala">🕌 البسملة</button>` : ""}
     </div>
     <div class="memrange" id="memRange" style="display:${memOpen ? "flex" : "none"}">
       <span class="mr-lbl">من الآية</span>
       <select id="mrFrom" class="mr-sel">${ayOpts(memFrom)}</select>
       <span class="mr-lbl">إلى</span>
       <select id="mrTo" class="mr-sel">${ayOpts(memTo)}</select>
       <button class="tbtn play" id="mrPlay">🔁 كرّرِ النطاق</button>
       <span class="mr-hint">اختَرِ الآياتِ التي تحفظُها فتتكرّرَ حتى تُتقِنَها. اضغطْ «⏹️ إيقاف» لتتوقّف.</span>
     </div>
     <div class="mushaf ${f}" id="mushaf" style="font-size:${getFS()}px">${(surah.n !== 1 && showBasmala()) ? `<span class="bism" data-bism>${BASMALA} <span class="num">🔊</span></span>` : ""}${surah.ayahs.map(ayahHtml).join("")}</div>
     <div id="practice"></div>
     <div class="hint">اضغطْ آيةً لتستمعَ إليها وتسجّلَ تلاوتك. «كرّر الآية» يعيدُها لتحفظَها. (تلاوةُ الحصري تتضمّن البسملةَ في أوّل السورة كما تُتلى.)</div>`;
  document.getElementById("back").onclick = renderList;
  view.querySelector(".fontbar").addEventListener("click", e => { const b = e.target.closest("[data-font]"); if (!b) return; setFont(b.getAttribute("data-font")); renderSurah(); });
  const applyFS = () => { const m = document.getElementById("mushaf"); if (m) m.style.fontSize = getFS() + "px"; };
  document.getElementById("fsPlus").onclick = () => { setFS(getFS() + 3); applyFS(); };
  document.getElementById("fsMinus").onclick = () => { setFS(getFS() - 3); applyFS(); };
  view.querySelector("#mushaf").addEventListener("click", e => {
    if (e.target.closest("[data-bism]")) { playAll(0); return; } // البسملةُ بدايةُ السورة: تُسمَع ثمّ تُكمَل السورةُ كاملةً تلقائياً
    const sp = e.target.closest(".ayah"); if (!sp) return; selIdx = +sp.getAttribute("data-i");
    if (repeatAyah) playSingle(selIdx); else playFrom(selIdx); // «كرّر الآية» = تكرارُ المنقورة؛ وإلّا أكمِلِ السورةَ منها
    renderPractice();
  });
  document.getElementById("playAll").onclick = () => playAll(0);
  document.getElementById("stop").onclick = stopAll;
  document.getElementById("repAyah").onclick = e => { repeatAyah = !repeatAyah; e.currentTarget.classList.toggle("on", repeatAyah); };
  document.getElementById("repSurah").onclick = e => { repeatSurah = !repeatSurah; e.currentTarget.classList.toggle("on", repeatSurah); };
  document.getElementById("memBtn").onclick = e => { memOpen = !memOpen; e.currentTarget.classList.toggle("on", memOpen); const mr = document.getElementById("memRange"); if (mr) mr.style.display = memOpen ? "flex" : "none"; };
  { const mf = document.getElementById("mrFrom"), mt = document.getElementById("mrTo");
    if (mf) mf.onchange = () => { memFrom = +mf.value; if (memTo < memFrom) { memTo = memFrom; mt.value = String(memTo); } };
    if (mt) mt.onchange = () => { memTo = +mt.value; if (memFrom > memTo) { memFrom = memTo; mf.value = String(memFrom); } };
    const mp = document.getElementById("mrPlay"); if (mp) mp.onclick = () => { const a = Math.min(memFrom, memTo), b = Math.max(memFrom, memTo); playRange(a - 1, b - 1); }; }
  const bb = document.getElementById("basmala"); if (bb) bb.onclick = () => { setBasmala(!showBasmala()); renderSurah(); };
  renderPractice();
  updatePlayerUI(); // إظهارُ المشغّلِ العائمِ وضبطُه على الموضعِ الحاليّ
}

/* ===== تمرّن وتسجيل لكل آية (مع تلاوة الحصري مرجعًا) ===== */
function renderPractice() {
  const host = document.getElementById("practice"); if (!host) return;
  const ay = surah.ayahs[selIdx];
  const dt = ayahText(ay); // نصُّ الآية بلا بسملة (يطابق الصوتَ المرجعيّ ومفتاحَ التسجيل)
  host.innerHTML = `<div class="panel"><div class="ay">${dt} <span style="color:var(--gold);font-family:'amiri-quran'">﴿${ayNum(ay.a)}﴾</span></div><div id="rrHost"></div></div>`;
  attachReader(document.getElementById("rrHost"), dt, {
    label: "تلاوتك للآية", helpLabel: "🔊 استمعْ للحصري", helpStatus: "تلاوةُ الشيخ الحصري 🔊",
    onHelp: () => playSingle(selIdx),
  });
}

/* ===== محرّك التشغيل والتظليل (عنصرُ صوتٍ واحدٌ + قائمةُ تشغيل؛ لا يتقدّم إلا عند انتهاءِ المقطعِ فعليّاً) ===== */
const player = new Audio(); player.preload = "auto";
let repeatAyah = false, repeatSurah = false, loopSeq = false, announceDone = false; // loopSeq: تكرارُ النطاقِ؛ announceDone: هل نُهنّئُ بإتمامِ السورةِ عند النهاية
let memOpen = false, memFrom = 1, memTo = 5;                   // لوحةُ «حفظِ نطاق» (تكرارُ آياتٍ من كذا إلى كذا)
let seq = [], seqPos = 0, mode = "idle"; // mode: idle | seq ؛ كلُّ عنصرٍ: {bism:true} أو {ayah:i}
function clearHL() { view.querySelectorAll(".ayah.on, .bism.on").forEach(x => x.classList.remove("on")); }
function hlAyah(i) { clearHL(); const sp = view.querySelector(`.ayah[data-i="${i}"]`); if (sp) { sp.classList.add("on"); sp.scrollIntoView({ block: "center", behavior: "smooth" }); } }
function hlBism() { clearHL(); const b = view.querySelector(".bism"); if (b) b.classList.add("on"); }
function stopAll() { mode = "idle"; seq = []; loopSeq = false; player.onended = null; try { player.pause(); } catch (e) {} clearHL(); updatePlayBtn(); }

const srcOf = st => st.bism ? BASMALA_AUDIO : audioSrc(surah.n, surah.ayahs[st.ayah].a);
function runSeq() {
  if (mode !== "seq") return;
  if (seqPos >= seq.length) { // انتهى التسلسل
    if ((repeatSurah || loopSeq) && seq.some(s => !s.bism)) { seqPos = 0; runSeq(); return; } // تكرارُ السورةِ أو نطاقِ الحفظ
    mode = "idle"; clearHL();
    const last = seq[seq.length - 1]; // تهنئةُ إتمامِ السورةِ فقط إذا بلغتِ القراءةُ آخرَ آيةٍ فعلًا (لا لآيةٍ مفردةٍ في الوسط)
    if (announceDone && last && !last.bism && last.ayah === surah.ayahs.length - 1) { logEvent("quran_listen"); recordMastery("S:" + surah.n, true); try { robo.cheer(NOTICES.quranSurahDone); } catch (e) {} }
    return;
  }
  const st = seq[seqPos];
  if (st.bism) hlBism(); else { selIdx = st.ayah; hlAyah(st.ayah); savePos(surah.n, surah.ayahs[st.ayah].a); }
  updatePlayerUI();
  player.onended = () => {
    if (mode !== "seq") return;
    if (seq.length === 1 && !seq[0].bism && repeatAyah) { runSeq(); return; } // تكرارُ الآيةِ المفردة للحفظ
    seqPos++; runSeq();
  };
  player.onerror = player.onended; // تخطّي مقطعٍ تعذّر تحميلُه (نادر؛ الملفّات محلّيّة)
  player.src = srcOf(st); try { player.currentTime = 0; } catch (e) {}
  const p = player.play(); if (p && p.catch) p.catch(() => {}); // تجاهلُ رفضِ التشغيل المؤقّت — التقدّمُ عند ended فقط
  updatePlayBtn();
}
// آيةٌ مفردة (تُكرَّر إن فُعِّل «كرّر الآية»؛ بلا تهنئةِ إتمامِ سورة).
function playSingle(i) { mode = "seq"; loopSeq = false; announceDone = false; seq = [{ ayah: i }]; seqPos = 0; selIdx = i; runSeq(); }
// النقرُ على آيةٍ (بلا «كرّر الآية»): يُكمِلُ قراءةَ السورةِ من تلكَ الآيةِ إلى آخرها.
function playFrom(i) {
  mode = "seq"; loopSeq = false; announceDone = true; seq = [];
  for (let k = i; k < surah.ayahs.length; k++) seq.push({ ayah: k });
  seqPos = 0; if (seq.length) { selIdx = i; runSeq(); }
}
// نطاقُ حفظٍ: الآياتُ [from..to] (فهارسُ 0) تتكرّرُ حتى الإيقاف.
function playRange(fromIdx, toIdx) {
  mode = "seq"; loopSeq = true; announceDone = false; seq = [];
  for (let i = fromIdx; i <= toIdx; i++) seq.push({ ayah: i });
  seqPos = 0; if (seq.length) { selIdx = fromIdx; runSeq(); }
}
// السورةُ كاملةً: البسملةُ أوّلًا (إن فُعِّلت، لغير الفاتحة) ثمّ كلُّ الآيات.
function playAll(from) {
  mode = "seq"; loopSeq = false; announceDone = true; seq = [];
  if (from === 0 && surah.n !== 1 && showBasmala()) seq.push({ bism: true });
  for (let i = from; i < surah.ayahs.length; i++) seq.push({ ayah: i });
  seqPos = 0; runSeq();
}

/* ===== المشغّلُ العائم (نفسُ مشغّلِ «القرآن الكامل»): تمرير + إيقاف + حفظُ موضعِ التوقّف + رجوع/فهرس ===== */
const shortName = nm => String(nm).replace(/^سُورَةُ\s*/, "");
const LPOS_KEY = "tilmithi_quran_local_pos"; // { s, a } — آخرُ موضعِ استماعٍ في القرآنِ المحلّيّ
function savePos(s, a) { try { localStorage.setItem(LPOS_KEY, JSON.stringify({ s, a })); } catch (e) {} }
function getPos() { try { return JSON.parse(localStorage.getItem(LPOS_KEY) || "null"); } catch (e) { return null; } }
let playerBar = null;
function ensurePlayerBar() {
  if (playerBar) return playerBar;
  playerBar = document.createElement("div"); playerBar.className = "qplayer"; playerBar.style.display = "none";
  playerBar.innerHTML = `<div class="qp-nav">
      <button class="qp-btn qp-sm" id="qpBack" title="رجوع" aria-label="رجوع">↩</button>
      <button class="qp-btn qp-sm" id="qpHome" title="الفهرس" aria-label="الفهرس">🏠</button>
      <span class="qp-title" id="qpTitle"></span>
    </div>
    <div class="qp-row">
      <button class="qp-btn" id="qpPrev" title="الآيةُ السابقة" aria-label="الآية السابقة">⏮</button>
      <button class="qp-btn qp-play" id="qpPlay" title="تشغيل/إيقاف" aria-label="تشغيل أو إيقاف">▶</button>
      <button class="qp-btn" id="qpNext" title="الآيةُ التالية" aria-label="الآية التالية">⏭</button>
      <input type="range" class="qp-seek" id="qpSeek" min="1" max="1" value="1" aria-label="تمريرُ الآيات">
      <span class="qp-pos" id="qpPos">0 / 0</span>
    </div>`;
  document.body.appendChild(playerBar);
  playerBar.querySelector("#qpBack").onclick = () => renderList();
  playerBar.querySelector("#qpHome").onclick = () => { location.href = "home.html"; };
  playerBar.querySelector("#qpPlay").onclick = togglePlay;
  playerBar.querySelector("#qpPrev").onclick = () => { if (surah && selIdx > 0) playFrom(selIdx - 1); };
  playerBar.querySelector("#qpNext").onclick = () => { if (surah && selIdx < surah.ayahs.length - 1) playFrom(selIdx + 1); };
  const seek = playerBar.querySelector("#qpSeek");
  seek.oninput = () => { if (!surah) return; const idx = Math.max(0, Math.min(surah.ayahs.length - 1, (+seek.value) - 1)); selIdx = idx; hlAyah(idx); const pos = document.getElementById("qpPos"); if (pos) pos.textContent = surah.ayahs[idx].a + " / " + surah.ayahCount; savePos(surah.n, surah.ayahs[idx].a); };
  seek.onchange = () => { if (!surah) return; playFrom(Math.max(0, Math.min(surah.ayahs.length - 1, (+seek.value) - 1))); };
  return playerBar;
}
function playerActive() { return mode === "seq" && !player.paused; }
function updatePlayBtn() { const b = playerBar && playerBar.querySelector("#qpPlay"); if (b) b.textContent = playerActive() ? "⏸" : "▶"; }
function updatePlayerUI() {
  ensurePlayerBar();
  if (!surah) { playerBar.style.display = "none"; document.body.classList.remove("qp-open"); return; }
  playerBar.style.display = ""; document.body.classList.add("qp-open");
  const cur = (surah.ayahs[selIdx] ? surah.ayahs[selIdx].a : 1);
  const seek = playerBar.querySelector("#qpSeek"), pos = playerBar.querySelector("#qpPos"), title = playerBar.querySelector("#qpTitle");
  if (seek) { seek.max = String(surah.ayahCount); seek.value = String(cur); }
  if (pos) pos.textContent = cur + " / " + surah.ayahCount;
  if (title) title.textContent = shortName(surah.name);
  updatePlayBtn();
}
function hidePlayer() { if (playerBar) playerBar.style.display = "none"; document.body.classList.remove("qp-open"); }
function togglePlay() {
  if (!surah) return;
  if (mode === "seq" && !player.paused) { try { player.pause(); } catch (e) {} updatePlayBtn(); return; }
  if (mode === "seq" && player.paused && seq.length) { const p = player.play(); if (p && p.catch) p.catch(() => {}); updatePlayBtn(); return; }
  playFrom(selIdx);
}

renderList();
</script>
