<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<script>(function(){try{var t=localStorage.getItem('tilmithi_theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<style id="theme-crit">html[data-theme="dark"]{--bg:#15151b;--card:#23232c;--ink:#ECE7DD;--muted:#A39E94;--line:#34343f;--primary-d:#E8987E;--shadow:0 6px 20px rgba(0,0,0,.45)}html[data-theme="dark"] body{background:var(--bg);color:var(--ink)}</style>
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="مِشكاة" />
<meta name="theme-color" content="#E07A5F" />
<title>مِشكاة — الآليّ يتعافى</title>
<style>
  :root{
    --bg:#FBF7EF; --card:#FFFFFF; --ink:#2B2B2B; --muted:#6B6B6B;
    --line:#ECE6DA; --primary:#E07A5F; --primary-d:#C7613F;
    --robo:#B8C0CC; --dim:#D3D8DF; --good:#7BB661; --good-d:#5E9A47;
    --shadow:0 6px 20px rgba(0,0,0,.07);
    font-family:"Noto Sans Arabic","Segoe UI",Tahoma,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  button,a,input,textarea,select,.region,.toggle,.chip,.capbtn,[onclick]{touch-action:manipulation}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:760px;margin:0 auto;padding:16px 16px 48px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 14px}
  header h1{font-size:22px;margin:0;letter-spacing:-.5px}
  header .sub{color:var(--muted);font-size:13px}
  .topbtn{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--ink)}

  .stage{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;text-align:center}
  .robo-svg{width:200px;height:240px;max-width:60%}
  .part{fill:var(--dim);transition:fill .8s ease, filter .8s ease}
  .part.lit{filter:drop-shadow(0 0 6px currentColor)}
  .robo-base{fill:var(--robo)}

  /* الآليّ متحرّك متجاوب: يتنفّس ويرمش وينبض هوائيُّه، ويتفاعل بمزاجه مع الطفل (لا يكون جامدًا) */
  .robo-svg{transform-origin:50% 82%}
  @media (prefers-reduced-motion: no-preference){
    .robo-svg{animation:robo-breathe 3.6s ease-in-out infinite}
    .robo-svg .eye{animation:robo-blink 5.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    .robo-svg .antenna{animation:robo-pulse 2.6s ease-in-out infinite}
    .robo-svg.thinking{animation:robo-think 1.8s ease-in-out infinite}
    .robo-svg.thinking .antenna{animation:robo-pulse 1s ease-in-out infinite}
    .robo-svg.happy{animation:robo-happy 1s ease-in-out}
    .robo-svg.curious{animation:robo-curious 1.4s ease-in-out}
  }
  @keyframes robo-breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-3px) scale(1.012)}}
  @keyframes robo-blink{0%,90%,100%{transform:scaleY(1)}94%{transform:scaleY(.12)}}
  @keyframes robo-pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes robo-think{0%,100%{transform:rotate(0)}50%{transform:rotate(-3.5deg)}}
  @keyframes robo-happy{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-13px) scale(1.05)}55%{transform:translateY(0) scale(1)}75%{transform:translateY(-6px)}100%{transform:translateY(0)}}
  @keyframes robo-curious{0%,100%{transform:rotate(0)}25%{transform:rotate(4deg)}60%{transform:rotate(-2deg)}}
  /* شفاءٌ مرئيّ فرديّ: الجزء/العنصر الذي يُضاء الآن ينبثق فرحًا */
  @keyframes pop-lit{0%{transform:scale(1)}45%{transform:scale(1.55)}100%{transform:scale(1)}}
  .part.just-lit{animation:pop-lit .8s ease;transform-box:fill-box;transform-origin:center}
  .we.just-lit{animation:pop-lit .8s ease}
  .laugh{font-size:13px;color:var(--good-d);font-weight:700;min-height:18px;margin-top:4px}
  .progress{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:8px;flex-wrap:wrap}
  .pill{background:#F3EEE3;border-radius:999px;padding:4px 12px;font-size:13px;color:var(--muted)}
  .world{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:12px}
  .we{display:flex;flex-direction:column;align-items:center;width:52px;opacity:.28;filter:grayscale(1);transition:.6s}
  .we.on{opacity:1;filter:none}
  .we .ico{font-size:24px;line-height:1.2}
  .we .ico svg{width:30px;height:30px;display:block;margin:0 auto}
  .mem-art{margin:4px auto 10px;display:flex;justify-content:center}
  .mem-art svg{height:94px;width:auto;max-width:100%;display:block;background:#FBF4EF;border-radius:14px;padding:6px}
  .we .lbl{font-size:10px;color:var(--muted)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:20px;margin-top:16px}
  .stateTag{display:inline-block;font-size:12px;font-weight:700;color:var(--primary);background:#FBEDE7;border-radius:999px;padding:3px 12px;margin-bottom:10px}
  .badge-pair{display:inline-block;font-size:12px;font-weight:700;color:#5E9A47;background:#EEF6E9;border:1px solid #CDE6BE;border-radius:999px;padding:3px 10px;margin-bottom:10px;margin-inline-start:6px}
  .robo-says{font-size:19px;font-weight:700;margin:6px 0 4px}
  .replay-btn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;margin-inline-start:8px;vertical-align:middle;border:2px solid var(--primary,#6FB3D6);border-radius:50%;background:var(--card,#fff);color:var(--ink);font-size:17px;line-height:1;cursor:pointer;padding:0;transition:transform .15s,background .15s}
  .replay-btn:hover,.replay-btn:active{transform:scale(1.12);background:var(--primary,#6FB3D6)}
  .cue{color:var(--muted);font-size:13px;margin-bottom:8px}
  .mtitle{font-size:16px;font-weight:800;margin:2px 0 8px}
  .prompt{font-size:16px;margin:8px 0}
  ol.steps{margin:8px 0;padding-inline-start:22px}
  ol.steps li{margin:4px 0}
  .meta{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  .chip{background:#F3EEE3;border-radius:10px;padding:6px 10px;font-size:13px}
  .parent{background:#F6F3EC;border-right:3px solid var(--primary);border-radius:8px;padding:10px 12px;font-size:14px;color:#444;margin-top:10px}
  .parent b{color:var(--primary-d)}
  .succ{font-size:13px;color:var(--muted);margin-top:10px}
  .capture{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}
  .capture .lbl{font-size:12px;color:var(--muted);margin-bottom:6px}
  .capbtn{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 14px;font-size:14px;cursor:pointer;font-family:inherit;margin-inline-end:6px}
  .capbtn.rec{background:#FBEDE7;border-color:var(--primary);color:var(--primary-d)}
  .capbtn.done{background:#EEF6E9;border-color:var(--good);color:var(--good-d)}
  #capStatus{font-size:12px;color:var(--muted);margin-top:6px}

  .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  button.act{background:var(--primary);color:#fff;border:none;border-radius:14px;padding:13px 20px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(224,122,95,.3);font-family:inherit}
  button.act:hover{background:var(--primary-d)}
  /* نبضةُ لفتِ النظر لزرّ البدء بعد اختيار المنطقة (تجربةُ الطفل) */
  button.act.pulse{animation:actpulse 1s ease 2}
  @keyframes actpulse{0%,100%{transform:scale(1);box-shadow:0 4px 12px rgba(224,122,95,.3)}50%{transform:scale(1.09);box-shadow:0 6px 22px rgba(224,122,95,.6)}}
  @media(prefers-reduced-motion:reduce){ button.act.pulse{animation:none} }
  button.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:14px;padding:13px 18px;font-size:15px;cursor:pointer;font-family:inherit}
  .filters{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
  .filters button{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 16px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--muted)}
  .filters button.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .heal-reward{font-size:15px;font-weight:700;color:var(--good-d);margin-top:8px}
  .works{display:flex;flex-direction:column;gap:10px;margin-top:10px;max-height:56vh;overflow:auto}
  .workitem{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px;display:block}
  .workhd{font-weight:800;margin-bottom:6px}
  /* كلُّ عملٍ مطويّ: العنوانُ ظاهرٌ والمحتوى عندَ الطلب */
  details.workitem>summary{cursor:pointer;list-style:none;user-select:none;margin-bottom:0;display:flex;align-items:baseline;gap:6px}
  details.workitem>summary::-webkit-details-marker{display:none}
  details.workitem>summary::after{content:"▾";font-size:12px;color:var(--muted);margin-inline-start:auto;transition:transform .15s}
  details.workitem[open]>summary::after{transform:rotate(180deg)}
  details.workitem[open]>summary{margin-bottom:6px}
  details.workitem>summary:active{transform:scale(.995)}
  /* أزرارُ الإضافةِ اللاحقةِ داخلَ كلِّ عمل */
  .workadd{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .wadd{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;transition:background .12s,color .12s}
  .wadd:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
  .wadd.rec{background:var(--bad,#E0566B);color:#fff;border-color:var(--bad,#E0566B)}
  /* حقلُ نصٍّ من التطبيقِ نفسِه (لا نافذةُ المتصفّح) — يتبعُ السمةَ فاتحةً وداكنة */
  .askov{position:fixed;inset:0;background:rgba(20,20,20,.55);display:flex;align-items:center;justify-content:center;z-index:130;padding:18px}
  .askbox{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:18px;box-shadow:0 14px 44px rgba(0,0,0,.4);padding:16px;width:100%;max-width:420px}
  .asklbl{font-weight:800;font-size:15px;margin-bottom:8px}
  .askta{width:100%;box-sizing:border-box;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:10px;font:inherit;font-size:14px;line-height:1.8;resize:vertical}
  .askta:focus{outline:none;border-color:var(--primary)}
  .askbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
  .askbtns button{border:none;border-radius:12px;padding:9px 18px;font:inherit;font-weight:800;font-size:14px;cursor:pointer}
  .askc{background:var(--bg);color:var(--ink);border:1px solid var(--line)!important}
  .asko{background:var(--primary);color:#fff}
  .capdel.wdel{font-size:14px;opacity:.6} .capdel.wdel:hover{opacity:1}
  .workitem audio{width:100%;margin-top:4px} .workimg{max-width:120px;border-radius:10px;margin-top:4px;cursor:pointer}
  .worknote{background:color-mix(in srgb,var(--gold,#F4C95D) 16%,var(--card));border-radius:10px;padding:6px 10px;font-size:13px;margin-top:4px;color:var(--ink);display:flex;align-items:center;gap:6px}
  .workrow{display:flex;align-items:center;gap:6px;margin-top:4px}
  .workrow audio{flex:1 1 auto;min-width:0;margin-top:0}
  .err{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:16px}
  .err code{background:#F3EEE3;padding:2px 7px;border-radius:6px;font-size:13px}
  .center{text-align:center}.muted{color:var(--muted)}

  /* Parent overlay */
  .overlay{position:fixed;inset:0;background:rgba(43,43,43,.45);display:none;align-items:flex-start;justify-content:center;padding:20px;z-index:50;overflow:auto}
  .overlay.show{display:flex}
  /* عارضُ الوسائط (صورة/فيديو) بملءِ الشاشة */
  .medialb{position:fixed;inset:0;background:rgba(20,20,20,.92);display:flex;align-items:center;justify-content:center;z-index:120;opacity:0;transition:opacity .15s;padding:16px}
  .medialb.show{opacity:1}
  .medialb-el{max-width:96vw;max-height:88vh;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  .medialb-x{position:fixed;top:14px;left:14px;width:48px;height:48px;border-radius:50%;border:none;background:rgba(255,255,255,.94);color:#2B2B2B;font-size:22px;font-weight:900;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;line-height:1}
  .panel{background:var(--card);border-radius:20px;box-shadow:var(--shadow);width:100%;max-width:680px;padding:22px;margin-top:10px}
  .panel h2{margin:0 0 2px;font-size:20px}
  .panel .close{float:left;background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
  .sec{margin-top:18px}
  .sec h3{font-size:15px;margin:0 0 8px;color:var(--primary-d)}
  /* مطويات لوحة التحكّم: العنوانُ زرُّ طيّ/فتح؛ المحتوى يختفي عند الطيّ */
  .sec.collapsible{border:1px solid var(--line);border-radius:14px;padding:8px 12px;margin-top:10px}
  .sec.collapsible>h3{cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0;user-select:none}
  .sec.collapsible>h3::after{content:"▾";color:var(--muted);font-size:12px;transition:transform .2s}
  .sec.collapsible.collapsed>h3::after{transform:rotate(-90deg)}
  .sec.collapsible.collapsed>*:not(h3){display:none}
  .sec.collapsible:not(.collapsed)>h3{margin-bottom:8px}
  .statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
  .stat{background:#F6F3EC;border-radius:14px;padding:12px;text-align:center}
  .stat .n{font-size:24px;font-weight:800}
  .stat .t{font-size:12px;color:var(--muted)}
  .dom-row{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;border-bottom:1px solid var(--line)}
  .dom-row .bar{height:8px;background:#EFEADD;border-radius:6px;flex:1;margin:0 10px;overflow:hidden}
  .dom-row .bar > i{display:block;height:100%;background:var(--good)}
  .toggle{width:46px;height:26px;border-radius:999px;background:#D9D3C6;border:none;position:relative;cursor:pointer;flex:none}
  .toggle.on{background:var(--good)}
  .toggle::after{content:"";position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:var(--card);transition:.2s}
  .toggle.on::after{right:23px}
  /* تجاوبُ صفوف لوحة التحكّم على الهاتف: العنوانُ ذو العرض الثابت يأخذ سطرًا كاملًا،
     فينتقل الوصفُ والزرُّ/القائمةُ للسطر التالي بدل التزاحم على الشاشات الضيّقة. */
  @media (max-width:560px){
    .panel .dom-row{flex-wrap:wrap; row-gap:4px}
    .panel .dom-row > span[style*="width:210px"],
    .panel .dom-row > span[style*="width:130px"],
    .panel .dom-row > span[style*="width:110px"]{width:100% !important; flex:1 1 100% !important}
    .panel .dom-row > select.vset,
    .panel .dom-row > select.storyvset{max-width:100% !important; flex:1 1 100% !important}
    .panel .dom-row .chips{justify-content:flex-start !important}
  }
  /* سجلُّ الجلسات: بطاقةٌ رأسيّةٌ (عنوانٌ+تاريخ ثمّ الوسائط) — الصفُّ الأفقيُّ الواحدُ كان يسحقُ الملاحظةَ
     إلى عمودٍ بكلمةٍ في السطر. تتجاوبُ على الهاتفِ والحاسوبِ معًا. */
  .log{max-height:300px;overflow:auto}
  /* مطويّةُ سجلِّ التنافسِ لكلِّ طرفَين (حصريّة: واحدةٌ مفتوحةٌ في كلِّ وقت) */
  .vsgrp{border:1px solid var(--line);border-radius:12px;margin:6px 0;overflow:hidden;background:var(--card)}
  .vsgrp>summary{cursor:pointer;padding:10px 12px;list-style:none;display:flex;align-items:center;gap:8px;flex-wrap:wrap;user-select:none}
  .vsgrp>summary::-webkit-details-marker{display:none}
  .vsgrp>summary::after{content:"▾";margin-inline-start:auto;font-size:11px;color:var(--muted);transition:transform .15s}
  .vsgrp[open]>summary::after{transform:rotate(180deg)}
  .vsgrp>summary:hover .vsg-t{color:var(--primary-d)}
  .vsg-t{font-size:13.5px;font-weight:800;color:var(--ink)}
  .vsg-s{font-size:12.5px;font-weight:800;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:2px 10px;white-space:nowrap}
  .vsg-b{padding:8px 12px 10px;border-top:1px solid var(--line);max-height:260px;overflow:auto}
  /* مطويّةُ حسابٍ في سجلِّ الجلسات */
  .loggrp{border:1px solid var(--line);border-radius:10px;margin:6px 0;overflow:hidden}
  .loggrp>summary{cursor:pointer;padding:8px 10px;font-size:13px;font-weight:800;color:var(--ink);list-style:none;display:flex;align-items:center;gap:6px;user-select:none}
  .loggrp>summary::-webkit-details-marker{display:none}
  .loggrp>summary::after{content:"▾";margin-inline-start:auto;font-size:11px;transition:transform .15s}
  .loggrp[open]>summary::after{transform:rotate(180deg)}
  .loggrp .log{padding:0 10px 6px;border-top:1px solid var(--line)}
  .logcount{color:var(--muted);font-weight:600;font-size:12px}
  .logitem{display:block;padding:9px 4px;border-bottom:1px solid var(--line);font-size:14px}
  .loghd{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
  .logtitle{font-weight:800;color:var(--ink)}
  .logmeta{color:var(--muted);font-size:12px}
  .loghd .when{color:var(--muted);font-size:12px;margin-inline-start:auto;white-space:nowrap}
  /* كلُّ جلسةٍ مطويّةٌ: العنوانُ والتاريخُ ظاهرانِ، والوسائطُ عندَ الطلب */
  details.logitem>summary{cursor:pointer;list-style:none;user-select:none}
  details.logitem>summary::-webkit-details-marker{display:none}
  details.logitem>summary::after{content:"▾";font-size:11px;color:var(--muted);margin-inline-start:6px;transition:transform .15s}
  details.logitem[open]>summary::after{transform:rotate(180deg)}
  details.logitem>summary:hover .logtitle{color:var(--primary-d)}
  .logmedia{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:8px}
  .logitem audio{height:32px;max-width:100%;flex:1 1 220px;min-width:0}
  .logitem img{width:44px;height:44px;object-fit:cover;border-radius:8px;cursor:pointer;flex:none}
  .capwrap{display:inline-flex;align-items:center;gap:4px;min-width:0;flex:1 1 auto}
  .capdel{background:none;border:none;cursor:pointer;font-size:15px;opacity:.55;padding:2px;flex:none}
  .capdel:hover{opacity:1}
  .lognote{background:var(--hl,#F6F3EC);border-radius:8px;padding:6px 10px;font-size:13px;color:var(--ink);line-height:1.7;flex:1 1 240px;min-width:0}
  @media(max-width:560px){ .loghd .when{margin-inline-start:0;flex-basis:100%} }
  /* حقل الجواب المكتوب في خطوة التلقين */
  .notefield{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;font-family:inherit;font-size:15px;resize:vertical;margin-top:6px;color:var(--ink)}
  /* شريط التراجع عن الحذف */
  .undobar{position:fixed;inset-inline:0;bottom:calc(18px + env(safe-area-inset-bottom));margin:0 auto;width:max-content;max-width:90%;display:none;align-items:center;gap:12px;
    background:#2B2B2B;color:#fff;border-radius:14px;padding:10px 16px;font-size:14px;z-index:80;box-shadow:0 6px 20px rgba(0,0,0,.25)}
  .undobar.show{display:flex}

function loadProgress(){
  let p; try{ p = JSON.parse(localStorage.getItem(STORAGE_KEY)); }catch(e){}
  p = p || {};
  p.completed = p.completed || [];
  p.parts = p.parts || {};
  p.world = p.world || {};
  p.log = p.log || [];
  p.settings = p.settings || {};
  p.settings.enabledDomains = p.settings.enabledDomains || {};
  DOMAINS.forEach(d=>{ if(p.settings.enabledDomains[d]===undefined) p.settings.enabledDomains[d]=true; });
  if(p.settings.showPair===undefined) p.settings.showPair=true;
  return p;
}
function saveProgress(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }

/* ---------- IndexedDB for local captures (audio/photo) ---------- */
function idb(){ return new Promise((res,rej)=>{ const r=indexedDB.open("tilmithi",1);
  r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains("captures")) r.result.createObjectStore("captures",{keyPath:"key"}); };
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function putCapture(rec){ const db=await idb(); return new Promise((res,rej)=>{ const tx=db.transaction("captures","readwrite"); tx.objectStore("captures").put(rec); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
async function allCaptures(){ try{ const db=await idb(); return await new Promise(res=>{ const tx=db.transaction("captures","readonly"); const rq=tx.objectStore("captures").getAll(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>res([]); }); }catch(e){ return []; } }
async function clearCaptures(){ try{ const db=await idb(); return await new Promise(res=>{ const tx=db.transaction("captures","readwrite"); tx.objectStore("captures").clear(); tx.oncomplete=()=>res(); tx.onerror=()=>res(); }); }catch(e){} }
async function delCapture(key){ try{ const db=await idb(); return await new Promise(res=>{ const tx=db.transaction("captures","readwrite"); tx.objectStore("captures").delete(key); tx.oncomplete=()=>res(); tx.onerror=()=>res(); }); }catch(e){} }

function init(){
  LIB=library;
  MEM=LIB.memories||[];
  THRESH=(LIB.healing_model&&LIB.healing_model.laughter_milestone&&LIB.healing_model.laughter_milestone.threshold)||8;
  const params=new URLSearchParams(location.search);
  const wantsParent = params.get("parent")==="1";
  const cu = getCurrentUser();
  // لا يُدخَل التطبيق دون حسابٍ نشط: غيابُ الحساب (ولا قصدَ للوحة الأهل) ⇒ شاشة الدخول.
  // (هذا يُغلق ثغرة «الحساب المجهول» = وضع «بلا حساب» الذي كان يظهر عند فتح اللوحة.)
  if(!cu && !wantsParent){ location.replace("home.html"); return; }
  // أيُّ قدومٍ بـ?parent=1 = لوحةُ التحكّم وحدها (حاجزة): لا نرسم حلقة «علّم الآليّ» خلفها،
  // والخروجُ يعيد لشاشة الدخول/الحساب الذي فُتحت منه. (لا يُترَك المستخدم في الحلقة.)
  parentOnly = wantsParent;
  if(parentOnly) overlay.style.background="#FBF7EF"; // خلفيّةٌ معتمةٌ فلا يظهر أيُّ شيءٍ خلف البوّابة
  const dom=params.get("domain");
  if(dom && DOMAINS.includes(dom)){ domFilter=dom; renderMap(); }
  document.querySelectorAll("#filters button").forEach(x=>x.classList.toggle("on", x.getAttribute("data-f")===filter));
  // المرافقُ العائمُ حاضرٌ في «علّم الآليّ» أيضًا (يُسحَبُ ويُنقَرُ للترحيب) — لا خلفَ بوّابةِ الأهل.
  if(!parentOnly){ try{ robo.mount(); }catch(e){} renderRobo(); renderWorld(); renderProgress(); renderIdle(); }
  const mid=params.get("memory");
  if(mid && !parentOnly){ const m=MEM.find(x=>x.id===mid); if(m){ current=m; pending=[]; state="spark"; renderCard(); } }
  else if(wantsParent){ openGate(); }
  // عند فتح القسم (دخولٌ عاديّ، لا لوحةَ أهلٍ ولا ذكرى بعينها): عبارةُ الترحيب — الشاشةُ محفِّز.
  if(!parentOnly && !mid){ try{ roboSay(NOTICES.teachIntro, {mood:"happy"}); }catch(e){} }
}

function renderRobo(){
  document.querySelectorAll(".part").forEach(el=>{
    const c=progress.parts[el.getAttribute("data-part")];
    if(c){ el.style.fill=c; el.style.color=c; el.classList.add("lit"); }
    else { el.style.fill=""; el.classList.remove("lit"); }
  });
  document.getElementById("laugh").textContent =
    progress.completed.length>=THRESH ? "🎉 عادت ضحكة الآليّ! لقد أعدتَ إليه كلّ ذكرياته." : "";
}
function renderWorld(){
  document.getElementById("world").innerHTML = Object.keys(WORLD_EMOJI).map(w=>
    `<div class="we ${progress.world[w]?"on":""}" data-w="${w}"><div class="ico">${WORLD_ART[w]||WORLD_EMOJI[w]}</div><div class="lbl">${w}</div></div>`).join("");
}
function renderProgress(){
  document.getElementById("pillCount").textContent = `${AR(progress.completed.length)} ذكرى مُستعادة`;
  document.getElementById("pillParts").textContent = `${AR(Object.keys(progress.parts).length)} من 7 أجزاء أضاءت`;
}
function candidates(){
  const en=progress.settings.enabledDomains;
  if(coopMode) return MEM.filter(m=>!progress.completed.includes(m.id) && m.mode==="pair" && (filter==="all"||m.age_band===filter));
  return MEM.filter(m=>!progress.completed.includes(m.id) && (filter==="all"||m.age_band===filter) && (domFilter==="all"||m.domain===domFilter) && en[m.domain]!==false && (progress.settings.showPair!==false || m.mode!=="pair"));
}
function renderIdle(){
  const left=candidates().length, host=document.getElementById("cardHost");
  setMood("");
  if(left===0){
    host.innerHTML=`<div class="card center"><div class="robo-says">${coopMode?"أتممتما كلّ أنشطة الإخوة! 🌟":(progress.completed.length?"لا ذكريات متاحة الآن ضمن هذا الاختيار 🌟":"لا توجد ذكريات.")}</div>
      <p class="muted">${coopMode?"اخرجا من وضع الإخوة لمتابعة بقيّة الذكريات.":"بدّل الفئة العمريّة، أو فعّل مجالاتٍ أخرى من لوحة الأهل."}</p>
      ${coopMode?'<div class="btns" style="justify-content:center"><button class="ghost" onclick="toggleCoop()">↩ خروج من وضع الإخوة</button></div>':""}</div>`;
    return;
  }
  const coopBar = coopMode
    ? `<div class="parent" style="border-right-color:var(--violet);background:#F6F0FB;margin-bottom:10px"><b style="color:#7a4fa0">👯 وضع الإخوة</b> — نشاطٌ لطفلين معًا${coopPartnerId?`، والنقاطُ تُضافُ لك ولـ${coopPartnerName()}.`:"."}</div>`
    : "";
  host.innerHTML=`<div class="card center">${coopBar}<div class="robo-says">${coopMode?"الآليّ وصديقُه ينتظران نشاطًا للأخوين…":"الآليّ ينتظر ذكرى جديدة…"}</div>
    <p class="muted">${coopMode?`أنشطةٌ للأخوين: ${AR(left)} متبقّية.`:`في ذاكرته ${AR(left)} ذكرى ناقصة. هل تساعده؟`}</p>
    <div class="btns" style="justify-content:center"><button class="act" onclick="spark()">✨ شرارة ذكرى</button>
    ${coopMode
      ? '<button class="ghost" onclick="toggleCoop()">↩ خروج من وضع الإخوة</button>'
      : `<button class="ghost" onclick="surprise()">🎲 فاجئني</button><button class="ghost" onclick="toggleCoop()">👯 وضع الإخوة</button>${progress.completed.length?`<button class="ghost" onclick="viewMyWorks()">📂 أعمالي (${AR(progress.completed.length)})</button>`:""}`}</div></div>`;
}

// معرضُ «أعمالي»: الذكرياتُ التي أنجزها الطفلُ + ما سجّله فيها (صوت/صورة/ملاحظة) — متاحٌ للطفلِ نفسِه.
async function viewMyWorks(){
  const host=document.getElementById("cardHost"); setMood("happy");
  host.innerHTML=`<div class="card center"><div class="robo-says">أُحضِرُ أعمالَك… 📂</div></div>`;
  const caps=await allCaptures(); const capByTs={}; caps.forEach(c=>{ (capByTs[c.ts]=capByTs[c.ts]||[]).push(c); });
  const esc=s=>String(s||"").replace(/[<>&]/g,x=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[x]));
  const log=[...progress.log].sort((x,y)=>y.ts-x.ts);
  const items = log.length ? log.map(e=>{
    const cs=capByTs[e.ts]||[];
    const media=cs.map(c=>{
      // زرُّ حذفٍ لكلِّ عنصر: يُصلحُ الالتقاطَ الخاطئَ (تسجيلٌ أُعيدَ فبقيَ الأوّل) دونَ الرجوعِ للوالدين.
      const del=`<button class="capdel wdel" data-del="${c.key}" title="حذفُ هذا العنصر">🗑️</button>`;
      if(c.type==="note") return `<div class="worknote">📝 ${esc(c.text)} ${del}</div>`;
      try{ const url=URL.createObjectURL(c.blob);
        if(c.type==="audio") return `<div class="workrow"><audio controls src="${url}"></audio>${del}</div>`;
        const isVid=c.type==="video"||(c.mime&&/^video\//.test(c.mime));
        return `<div class="workrow">${isVid?`<video class="workimg" src="${url}" muted playsinline onclick="openMedia('${url}','video')"></video>`:`<img class="workimg" src="${url}" onclick="openMedia('${url}','photo')" />`}${del}</div>`;
      }catch(_){ return ""; }
    }).join("");
    const hd=`✅ ${esc(e.title)} <span class="muted" style="font-size:12px">· ${esc(e.domain)}</span>`;
    // أزرارُ إضافةٍ لاحقةٍ لما نسيَه الطفلُ وقتَ المهمّة (تُربَطُ بالعملِ بطابعِ وقتِه نفسِه).
    const add=`<div class="workadd"><span class="muted" style="font-size:12px">أضِفْ ما نسيتَه:</span>
      <button class="wadd" data-ts="${e.ts}" data-t="note">📝 ملاحظة</button>
      <button class="wadd" data-ts="${e.ts}" data-t="photo">📸 صورة</button>
      <button class="wadd" data-ts="${e.ts}" data-t="audio">🎤 صوت</button></div>`;
    // كلُّ عملٍ مطويّ: عنوانُه ظاهرٌ، ومحتواه وأزرارُ الإضافةِ تُكشَفُ بنقرة.
    return `<details class="workitem"><summary class="workhd">${hd}</summary>
      ${media?`<div class="workmedia">${media}</div>`:`<span class="muted" style="font-size:12px">أُنجِزت — بلا توثيقٍ بعد.</span>`}
      ${add}</details>`;
  }).join("") : `<p class="muted" style="text-align:center">لم تُنجِزْ أعمالًا بعد — علّمِ الآليَّ ذكرى لتظهرَ هنا!</p>`;
  host.innerHTML=`<div class="card"><div class="robo-says">📂 أعمالي المنجَزة (${AR(progress.completed.length)})</div>
    <p class="muted">ذكرياتٌ علّمتَها الآليَّ وما سجّلتَه فيها. أحسنت! 🌟</p>
    <div class="works">${items}</div>
    <div class="btns" style="justify-content:center;margin-top:12px"><button class="act" onclick="renderIdle()">↩ رجوع</button></div></div>`;
  // ربطُ أزرارِ الإضافةِ اللاحقة (الحدثُ يُعرَفُ بطابعِ وقتِه من السجلّ).
  host.querySelectorAll(".wadd").forEach(b=>b.onclick=()=>{
    const ts=+b.getAttribute("data-ts"), ent=log.find(x=>x.ts===ts); if(!ent) return;
    addToWork(ts, ent.id, ent.title, b.getAttribute("data-t"), b);
  });
  // حذفُ عنصرٍ التقطَه الطفلُ خطأً (كتسجيلٍ أُعيدَ فبقيَ الأوّل) — بتأكيدٍ بسيطٍ بلا كلمةِ مرور.
  host.querySelectorAll(".capdel[data-del]").forEach(b=>b.onclick=async ev=>{
    ev.preventDefault(); ev.stopPropagation();
    if(!await confirmChoice("حذفُ هذا العنصر؟","🗑️ احذفْ","إبقاء")) return;
    const key=b.getAttribute("data-del"), box=b.closest(".workrow")||b.closest(".worknote");
    if(box) box.style.display="none"; // إخفاءٌ فوريّ؛ لا يُمَسُّ التخزينُ إلّا بعدَ انقضاءِ مهلةِ التراجع
    undoable("حُذِفَ العنصر.", async ()=>{ try{ await delCapture(key); }catch(e){} viewMyWorks(); }, 6000, ()=>{ if(box) box.style.display=""; });
  });
}
// حقلُ نصٍّ من داخلِ التطبيقِ (بديلُ prompt الذي يَعرضُ نافذةَ المتصفّحِ الغريبةَ عن التصميمِ والسمة).
function askText(label){
  return new Promise(res=>{
    const ov=document.createElement("div"); ov.className="askov";
    ov.innerHTML=`<div class="askbox"><div class="asklbl"></div><textarea class="askta" rows="3"></textarea>
      <div class="askbtns"><button class="askc" type="button">إلغاء</button><button class="asko" type="button">حفظ</button></div></div>`;
    ov.querySelector(".asklbl").textContent=label;
    document.body.appendChild(ov);
    const ta=ov.querySelector(".askta"); setTimeout(()=>{ try{ ta.focus(); }catch(e){} },50);
    const done=v=>{ ov.remove(); res(v); };
    ov.querySelector(".askc").onclick=()=>done(null);
    ov.querySelector(".asko").onclick=()=>done(ta.value.trim()||null);
    ov.addEventListener("click",e=>{ if(e.target===ov) done(null); });
    ta.addEventListener("keydown",e=>{ if(e.key==="Escape") done(null); });
  });
}
// اختيارُ صورةٍ عبرَ حقلٍ مؤقّتٍ (لا نُشارِكُ #photoInput الخاصَّ بحلقةِ التلقين كي لا تختلطَ الوجهتان).
function pickPhoto(){
  return new Promise(res=>{ const i=document.createElement("input"); i.type="file"; i.accept="image/*"; i.setAttribute("capture","environment");
    i.style.display="none"; document.body.appendChild(i);
    i.addEventListener("change",()=>{ const f=i.files&&i.files[0]; i.remove(); res(f||null); });
    i.addEventListener("cancel",()=>{ i.remove(); res(null); });
    i.click(); });
}
let _waddRec=null; // مُسجِّلُ الإضافةِ اللاحقة (نقرةٌ تبدأُ وأخرى تُنهي)
// إضافةٌ لاحقةٌ لعملٍ منجَز: تُحفَظُ بطابعِ وقتِ الجلسةِ نفسِه فتظهرُ داخلَها.
async function addToWork(ts, memId, title, type, btn){
  const stamp=Date.now();
  try{
    if(type==="note"){
      const t=await askText("اكتبْ ما تريدُ إضافتَه:"); if(!t||!t.trim()) return;
      await putCapture({key:ts+"-"+stamp+"-note", ts, memId, title, type:"note", text:t.trim()});
    } else if(type==="photo"){
      const f=await pickPhoto(); if(!f) return;
      await putCapture({key:ts+"-"+stamp+"-photo", ts, memId, title, type:"photo", blob:f});
    } else {
      if(_waddRec && _waddRec.state==="recording"){ _waddRec.stop(); return; } // نقرةٌ ثانيةٌ ⇒ إنهاءٌ وحفظ
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const chunks=[]; _waddRec=new MediaRecorder(stream);
      _waddRec.ondataavailable=ev=>{ if(ev.data.size) chunks.push(ev.data); };
      _waddRec.onstop=async ()=>{
        stream.getTracks().forEach(t=>t.stop()); _waddRec=null;
        try{ await putCapture({key:ts+"-"+stamp+"-audio", ts, memId, title, type:"audio", blob:new Blob(chunks,{type:"audio/webm"})}); }catch(e){}
        viewMyWorks();
      };
      _waddRec.start(); if(btn){ btn.textContent="■ إيقافٌ وحفظ"; btn.classList.add("rec"); }
      return; // الحفظُ والتحديثُ يجريانِ عند الإيقاف
    }
    viewMyWorks(); // أعِدْ رسمَ المعرضِ ليَظهرَ المُضاف
  }catch(e){ try{ alert("تعذّرت الإضافة: "+((e&&e.message)||e)); }catch(_){} }
}
// عارضُ الوسائطِ داخلَ التطبيق (صورة/فيديو) بملءِ الشاشة مع زرِّ إغلاقٍ ونقرٍ على الخلفيّةِ للإغلاق —
// بديلٌ عن window.open الذي كان يفتحُ رابطَ blob في نافذةٍ فيخرجُ من التطبيقِ بلا سبيلٍ للعودة (ولا زرُّ الرجوع).
function openMedia(url, type){
  closeMedia();
  const ov=document.createElement("div"); ov.id="mediaLightbox"; ov.className="medialb";
  ov.innerHTML = (type==="video")
    ? `<video src="${url}" controls autoplay playsinline class="medialb-el"></video>`
    : `<img src="${url}" class="medialb-el" alt="" />`;
  const x=document.createElement("button"); x.className="medialb-x"; x.type="button"; x.setAttribute("aria-label","إغلاق"); x.textContent="✕"; x.onclick=closeMedia;
  ov.appendChild(x);
  ov.addEventListener("click", e=>{ if(e.target===ov) closeMedia(); });
  document.body.appendChild(ov); requestAnimationFrame(()=>ov.classList.add("show"));
}
function closeMedia(){ const ov=document.getElementById("mediaLightbox"); if(!ov) return false; try{ const v=ov.querySelector("video"); if(v) v.pause(); }catch(_){} ov.remove(); return true; }
window.openMedia=openMedia; window.closeMedia=closeMedia;
// زرُّ الرجوعِ في أندرويد: إن كان عارضُ الوسائطِ مفتوحًا فأغلِقْه بدلَ الخروجِ من التطبيق (يُرجِعُ true فيُستهلَك).
window.appBack = () => closeMedia();
// وضع الإخوة: يقصر الذكريات على أنشطة «لطفلين معًا» ويؤطّرها لطفلين.
function coopOthers(){ const cu=getCurrentUser(); return listProfiles().filter(p=>!cu||p.id!==cu.id); }
function coopPartnerName(){ const p=coopPartnerId&&listProfiles().find(x=>x.id===coopPartnerId); return p?`${p.avatar||"🙂"} ${p.name}`:""; }
function toggleCoop(){
  if(coopMode){ coopMode=false; coopPartnerId=null; state="idle"; renderIdle(); return; }
  const others=coopOthers();
  if(others.length>1){ showCoopPicker(); return; }            // أكثرُ من حسابٍ → اختَرِ الشريك
  coopPartnerId = others.length===1 ? others[0].id : null;     // حسابٌ واحدٌ آخر → تلقائيّ
  coopMode=true; state="idle"; renderIdle();
}
// اختيارُ شريكِ الإخوة (عند وجود أكثرَ من حساب) — تُضافُ النقاطُ لكلا الحسابين.
function showCoopPicker(){
  const cu=getCurrentUser(), others=coopOthers(), host=document.getElementById("cardHost");
  host.innerHTML=`<div class="card center"><div class="robo-says">👯 وضع الإخوة — مع مَن يلعبُ ${cu&&cu.name?cu.name:"الطفل"}؟</div>
    <p class="muted">تُضافُ نقاطُ كلّ نشاطٍ لكلا الحسابين معًا.</p>
    <div class="map" style="margin-top:8px">${others.map(p=>`<div class="region coop-pick" data-id="${p.id}"><div style="font-size:30px;line-height:38px">${p.avatar||"🙂"}</div><div class="rt">${p.name}</div></div>`).join("")}</div>
    <div class="btns" style="justify-content:center;margin-top:10px"><button class="ghost" onclick="renderIdle()">إلغاء</button></div></div>`;
  host.querySelectorAll(".coop-pick").forEach(b=>b.onclick=()=>{ coopPartnerId=b.getAttribute("data-id"); coopMode=true; state="idle"; renderIdle(); });
  try{ host.scrollIntoView({behavior:"smooth",block:"center"}); }catch(_){}
}
// يَنسبُ الإنجازَ نفسَه لحساب الشريك (ذكرى مكتملةٌ + جزءُ الآلي/عنصرُ العالم + سجلّ).
function creditSibling(id, m, r, entry){
  if(!id) return;
  try{
    const key="tilmithi_progress_v1__"+id, sp=JSON.parse(localStorage.getItem(key)||"{}");
    sp.completed=sp.completed||[]; sp.parts=sp.parts||{}; sp.world=sp.world||{}; sp.log=sp.log||[];
    if(!sp.completed.includes(m.id)) sp.completed.push(m.id);
    if(r.type==="robo_part") sp.parts[r.target]=r.color||"#E0566B";
    else if(r.type==="world") sp.world[r.target]=r.color||"#7BB661";
    sp.log.push({...entry, coop:true});
    localStorage.setItem(key, JSON.stringify(sp));
  }catch(e){}
}
// فاجئني: ذكرى عشوائية من كلّ المناطق المُفعَّلة (تتجاوز اختيار المنطقة الحاليّ) — للاستكشاف.
function surprise(){
  const en=progress.settings.enabledDomains;
  const pool=MEM.filter(m=>!progress.completed.includes(m.id) && (filter==="all"||m.age_band===filter) && en[m.domain]!==false && (progress.settings.showPair!==false || m.mode!=="pair"));
  if(!pool.length){ renderIdle(); return; }
  logEvent("explore_surprise"); // وسام المُغامِر
  current=pool[Math.floor(Math.random()*pool.length)]; pending=[]; pendingNote=""; state="spark"; renderCard();
}
function spark(){
  const c=candidates(); if(!c.length){ renderIdle(); return; }
  current=c[Math.floor(Math.random()*c.length)]; pending=[]; state="spark"; renderCard();
}
// إعادةُ الاستماع: نغلّفُ نطقَ الآليِّ لنحفظَ آخرَ ما قاله، فيُعيدُه زرُّ 🔊 (يريدُ الطفلُ سماعَه ثانيةً).
let lastSpoken=null;
function sayOnce(content,opts){ lastSpoken={chain:false,content,opts:opts||{}}; roboSay(content,opts); }
function sayChainOnce(arr,opts){ const c=(arr||[]).filter(Boolean); lastSpoken={chain:true,content:c,opts:opts||{}}; roboSayChain(arr,opts); }
function replay(){ if(!lastSpoken) return; if(lastSpoken.chain) roboSayChain(lastSpoken.content,lastSpoken.opts); else roboSay(lastSpoken.content,lastSpoken.opts); }
// يحقنُ زرَّ إعادةِ الاستماعِ في فقاعةِ كلامِ الآليّ (يُستدعى بعدَ كلِّ رسمٍ للبطاقة).
function mountReplay(){
  const host=document.getElementById("cardHost");
  const bubble=host&&host.querySelector(".robo-says");
  if(!bubble||bubble.querySelector(".replay-btn")) return;
  const b=document.createElement("button");
  b.className="replay-btn"; b.type="button"; b.title="أعِدِ الاستماع"; b.setAttribute("aria-label","أعِدِ الاستماع");
  b.textContent="🔊";
  b.addEventListener("click",e=>{ e.stopPropagation(); replay(); });
  bubble.appendChild(b);
}
function renderCard(){

      <div class="mem-art">${ART[m.id]||DOMAIN_ART[m.domain]||""}</div>
      <div class="robo-says">${F(m.spark.robo_line)}</div>${m.spark.cue?`<div class="cue">📷 ${m.spark.cue}</div>`:""}

      <div class="succ">✅ علامة النجاح (يقرّرها الأهل): ${m.teach.success_signal}</div>
      ${capHtml}
      <div class="capture"><div class="lbl">✍️ اكتبْ جواب الطفل عن سؤال الآليّ (اختياريّ):</div>

    sayChainOnce([cheer, m.heal.robo_reaction, isl, td], {mood:"happy"}); // كلُّ جزءٍ بمقطعِه (الدمجُ يُفقِدُ المطابقةَ الحرفيّة)
  }
  mountReplay();

async function toggleRec(){
  const btn=document.getElementById("recBtn");
  if(mediaRec&&mediaRec.state==="recording"){ mediaRec.stop(); return; }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recChunks=[]; mediaRec=new MediaRecorder(stream);
    mediaRec.ondataavailable=e=>{ if(e.data.size) recChunks.push(e.data); };
    mediaRec.onstop=()=>{ pending.push({type:"audio",blob:new Blob(recChunks,{type:"audio/webm"})});
      stream.getTracks().forEach(t=>t.stop()); if(btn){btn.textContent="🎤 سجّل مجدّدًا";btn.classList.remove("rec");btn.classList.add("done");} updateCapStatus(); };
    mediaRec.start(); if(btn){btn.textContent="■ إيقاف التسجيل";btn.classList.add("rec");}
  }catch(e){ const el=document.getElementById("capStatus"); if(el) el.textContent="تعذّر الوصول إلى الميكروفون (التوثيق اختياريّ)."; }
}

async function heal(){
  const m=current, r=m.heal.reward, ts=Date.now();
  if(!progress.completed.includes(m.id)) progress.completed.push(m.id);
  if(r.type==="robo_part") progress.parts[r.target]=r.color||"#E0566B";
  else if(r.type==="world") progress.world[r.target]=r.color||"#7BB661";
  recordMastery("M:"+m.id, true);
  const entry={id:m.id,title:m.title,domain:m.domain,age_band:m.age_band,ts,hasAudio:false,hasPhoto:false,hasNote:false};
  let i=0;
  for(const c of pending){
    try{ await putCapture({key:ts+"-"+(i++)+"-"+c.type,ts,memId:m.id,title:m.title,type:c.type,blob:c.blob});
      if(c.type==="audio")entry.hasAudio=true; if(c.type==="photo")entry.hasPhoto=true; }catch(e){}
  }
  if(pendingNote.trim()){
    try{ await putCapture({key:ts+"-"+(i++)+"-note",ts,memId:m.id,title:m.title,type:"note",text:pendingNote.trim()}); entry.hasNote=true; }catch(e){}
  }
  progress.log.push(entry); pending=[]; pendingNote=""; saveProgress();
  if(coopMode && coopPartnerId) creditSibling(coopPartnerId, m, r, entry); // وضعُ الإخوة: النقاطُ للحسابين معًا
  logEvent("memory_heal");
  if(m.mode==="pair") logEvent("coop_done"); // وسام رفيق الإخوة
  state="heal"; renderRobo(); renderWorld(); renderProgress(); renderMap(); renderCard();
  // شفاءٌ مرئيّ فرديّ: أبرِزِ الجزء/العنصر الذي أُضيء الآن
  const sel = r.type==="world" ? `.we[data-w="${r.target}"]` : `.part[data-part="${r.target}"]`;
  document.querySelectorAll(sel).forEach(el=>{ el.classList.add("just-lit"); setTimeout(()=>el.classList.remove("just-lit"),900); });
  if(progress.completed.length>=THRESH) sfx.heal(); else sfx.success();
}

function bkMsg(t, ok){ const el=document.getElementById("bkMsg"); if(el){ el.textContent=t; el.style.color=ok?"#2f7d32":"#c0392b"; } }

// سجلُّ الألعابِ التنافسيّة (لوحةُ الأهل): إجماليّاتُ الفوزِ لكلِّ طرف + آخرُ المباريات + تصفير.
function vsOppLabel(opp){
  if(!opp) return "—";
  if(opp.role==="ai") return "🤖 الآليّ";
  if(opp.role==="parent") return opp.female ? "👩 الأمّ" : "👨 الأب";
  return "🧒 "+(opp.name||"أخ");   // sibling
}
function vsFmtDate(ts){ try{ const d=new Date(ts); const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }catch(e){ return ""; } }
function vsHistoryHtml(){
  const hist=(getVsHistory()||[]).slice().reverse();   // الأحدثُ أوّلًا
  const head=`<h3>🏆 سجلُّ الألعاب التنافسيّة</h3>`;
  if(!hist.length) return `<div class="sec" id="sec-vshistory">${head}<p class="muted" style="font-size:13px">لا ألعابَ تنافسيّةً بعد — ستظهرُ هنا نتائجُ الألعابِ ضدّ الآليِّ أو الإخوةِ أو الوالدين (مع تحديدِ أب/أم).</p></div>`;
  const agg={};
  for(const e of hist){
    const oppKey=e.opp ? (e.opp.role==="ai"?"ai":e.opp.role==="parent"?(e.opp.female?"mom":"dad"):"sib:"+(e.opp.name||"")) : "?";
    const key=(e.me||"?")+"|"+oppKey;
    const a=agg[key]||(agg[key]={me:e.me||"?", opp:e.opp, meWins:0, oppWins:0, ties:0});
    if(!e.winner) a.ties++; else if(e.winner===e.me) a.meWins++; else a.oppWins++;
  }
  // مطويّةٌ لكلِّ طرفَين: عنوانُها الطرفانِ وحصيلةُ الفوز، وداخلَها مبارياتُهما وحدَها (لا قائمةٌ مسطّحةٌ مختلطة).
  // وهي **حصريّة**: فتحُ واحدةٍ يطوي الأخرى — يُدارُ في wireVsHistory كي يعملَ على كلِّ المتصفّحات.
  const oppKeyOf=e=> e.opp ? (e.opp.role==="ai"?"ai":e.opp.role==="parent"?(e.opp.female?"mom":"dad"):"sib:"+(e.opp.name||"")) : "?";
  const groups=Object.entries(agg).map(([key,a])=>{
    const mine=hist.filter(e=>(e.me||"?")+"|"+oppKeyOf(e)===key);
    const rows=mine.map(e=>`<div class="dom-row" style="align-items:flex-start">
      <span style="flex:1;font-size:12.5px"><b>${e.game||"لعبة"}</b>${e.diff?` <span class="muted">· ${e.diff}</span>`:""}<br>
        <span class="muted">${vsFmtDate(e.ts)}</span></span>
      <span style="font-size:12.5px;white-space:nowrap">${!e.winner?"🤝 تعادُل":`🏆 ${e.winner}`}</span>
    </div>`).join("");
    return `<details class="vsgrp"><summary>
        <span class="vsg-t">${a.me} <span class="muted">ضدّ</span> ${vsOppLabel(a.opp)}</span>
        <span class="vsg-s">${AR(a.meWins)} — ${AR(a.oppWins)}${a.ties?` <span class="muted">(تعادُل ${AR(a.ties)})</span>`:""}</span>
      </summary>
      <div class="vsg-b">
        <div class="muted" style="font-size:12px;margin-bottom:4px">فاز ${a.me}: <b>${AR(a.meWins)}</b> · فاز ${vsOppLabel(a.opp)}: <b>${AR(a.oppWins)}</b>${a.ties?` · تعادُل: <b>${AR(a.ties)}</b>`:""} — ${AR(mine.length)} مباراة:</div>
        ${rows}
      </div></details>`;
  }).join("");
  return `<div class="sec" id="sec-vshistory">${head}
    <div class="muted" style="font-size:12px;margin-bottom:6px">اضغطْ على أيِّ سجلٍّ لعرضِ مبارياتِه (يُطوى الآخرُ تلقائيًّا):</div>${groups}

      <div id="profList">${listProfiles().length?listProfiles().map(p=>`<div class="dom-row"><span style="flex:1;font-size:13px">${p.avatar||"🙂"} ${p.name} <span class="muted">· ${p.ageGroup}${p.password?" · 🔒":""}</span></span><button class="acctEdit" data-pid="${p.id}" title="تعديل الحساب" style="background:none;border:none;cursor:pointer;font-size:16px">✏️</button><button class="capdel" data-pid="${p.id}" title="حذف الحساب">🗑️</button></div>`).join(""):'<p class="muted" style="font-size:12px">لا حسابات بعد.</p>'}</div>
      <button class="topbtn" id="addChild" style="margin-top:6px">➕ إضافة حساب طفل</button>

      <div id="voiceMgmt"><p class="muted" style="font-size:12px">…</p></div>
      <div id="sec-backup" style="border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin:12px 0 4px;scroll-margin-top:12px">
        <div style="font-size:13px;margin-bottom:4px">💾 نسخةٌ احتياطيّة — تصدير/استيراد الحسابات</div>
        <div class="muted" style="font-size:12px;margin-bottom:8px">صدّرْ ملفَّ JSON يحفظُ كلَّ الحساباتِ والتقدّمِ وإعداداتِ اللوحة، أو استوردْه على جهازٍ جديدٍ لئلّا تفقدَ بياناتِك. (الاستيرادُ يستبدلُ البياناتِ الحاليّةَ على هذا الجهاز.)</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="topbtn" id="bkExport" style="font-size:13px">⬇️ تصدير JSON</button>
          <button class="topbtn" id="bkImport" style="font-size:13px">⬆️ استيراد JSON</button>
          <input id="bkFile" type="file" accept="application/json,.json" hidden>
        </div>
        <div id="bkMsg" style="font-size:12px;min-height:16px;margin-top:6px"></div>
      </div>
      `; })()}
    </div>

    <div class="sec"><h3>أدوات</h3>
      <a class="topbtn" href="print.html" target="_blank" style="text-decoration:none;display:inline-block;margin-inline-end:8px">🖨️ المطبوعات (بطاقات + ملصق)</a>
      <button class="danger" id="wipe">🗑️ مسح كل التقدّم والتسجيلات</button>
    </div>
    <details class="sec" id="sec-about">
      <summary style="cursor:pointer;font-weight:800;font-size:16px;list-style:none">ℹ️ حول المشروع</summary>
      <div style="font-size:13px;color:var(--muted);line-height:1.9;margin-top:10px">
        <b style="color:var(--ink)">مِشكاةُ الطفلِ والآليّ 🪔</b> — الطفلُ يُعلّم، والآليُّ يَستنير.<br/>
        تطبيقٌ تعليميٌّ إسلاميٌّ للأطفال (4–10): <b>محلّيٌّ بالكامل</b> · يعمل دون اتصال · بلا ذكاءٍ اصطناعيٍّ وقتَ التشغيل · بياناتُ طفلِك لا تغادر جهازك.<br/>
        الإصدار <b>v1.5.5</b> · الرخصة GPL-3.0 · تطوير SalehGNUTUX.<br/>
        <a href="https://salehgnutux.github.io/GT-MISHKATKIDS/" target="_blank" rel="noopener" style="color:var(--primary-d);font-weight:700;text-decoration:none">🌐 الموقع الرسميّ</a>
        · <a href="https://github.com/SalehGNUTUX/GT-MISHKATKIDS" target="_blank" rel="noopener" style="color:var(--primary-d);font-weight:700;text-decoration:none">📦 المستودع</a>

      </div>
    </details>`;

  panel.querySelectorAll(".toggle[data-dom]").forEach(t=>t.addEventListener("click",()=>{
    const d=t.getAttribute("data-dom");
    progress.settings.enabledDomains[d]=!(progress.settings.enabledDomains[d]!==false);
    t.classList.toggle("on", progress.settings.enabledDomains[d]!==false);
    saveProgress(); renderMap(); if(state==="idle") renderIdle();
  }));
  const pt=document.getElementById("pairToggle");
  if(pt) pt.addEventListener("click",()=>{
    progress.settings.showPair = !(progress.settings.showPair!==false);
    pt.classList.toggle("on", progress.settings.showPair!==false);
    saveProgress(); if(state==="idle") renderIdle();
  });
  const tt=document.getElementById("tonesToggle");
  if(tt) tt.addEventListener("click",()=>{ const on=!isTonesOn(); setTonesOn(on); tt.classList.toggle("on",on); syncMuteIcon(); if(on) sfx.tap(); });
  const vt=document.getElementById("voiceToggle");
  if(vt) vt.addEventListener("click",()=>{ const on=!isVoiceOn(); setVoiceOn(on); vt.classList.toggle("on",on); syncMuteIcon(); });
  const lh=document.getElementById("logHost");
  if(lh) lh.addEventListener("click",async e=>{ const b=e.target.closest(".capdel"); if(!b) return; if(await confirmWithPassword("حذف هذا التسجيل؟ ستظهر مهلةُ تراجعٍ بعد التأكيد.")) askDeleteCapture(b.getAttribute("data-key"), b.closest(".capwrap")); });
  panel.querySelectorAll("select.vset").forEach(sel=>sel.addEventListener("change",()=>{ setVoiceSet(sel.getAttribute("data-type"), sel.value); }));
  const svset=panel.querySelector("select.storyvset"); if(svset) svset.addEventListener("change",()=>setStoryVoice(svset.value));
  // تقارير الأبناء: زرّ «تفاصيل» يطوي/يبسط بطاقة الطفل.
  panel.querySelectorAll(".rep-toggle").forEach(b=>b.addEventListener("click",()=>{
    const d=panel.querySelector('.rep-detail[data-pid="'+b.getAttribute("data-pid")+'"]'); if(!d) return;
    const show=d.style.display==="none"; d.style.display=show?"block":"none"; b.textContent=show?"تفاصيل ▴":"تفاصيل ▾";
  }));
  const srt=document.getElementById("storyReadToggle"); if(srt) srt.addEventListener("click",()=>{ const on=!isStoryReadOn(); setStoryReadOn(on); srt.classList.toggle("on",on); });
  const bkE=document.getElementById("bkExport"); if(bkE) bkE.addEventListener("click",()=>backupExport(bkMsg));
  const bkI=document.getElementById("bkImport"), bkF=document.getElementById("bkFile");
  if(bkI&&bkF){ bkI.addEventListener("click",()=>bkF.click()); bkF.addEventListener("change",()=>{ if(bkF.files&&bkF.files[0]) backupImport(bkF.files[0], bkMsg); bkF.value=""; }); }
  // تفريغُ حسابِ الضيف: تقدّمُه + التقاطاتُه + تسجيلاتُه. الالتقاطاتُ لا تحملُ هويّةَ حسابٍ فتُطابَقُ
  // بطوابعِ الوقتِ في سجلِّ تقدّمِ الضيفِ (قبلَ محوِه) — فلا تُمَسُّ التقاطاتُ الأبناء.
  const clrG=document.getElementById("clrGuest");
  if(clrG) clrG.addEventListener("click",async ()=>{
    const msg=document.getElementById("clrGuestMsg");
    if(!await confirmChoice("تفريغُ حسابِ الضيف: يُمحى تقدّمُه وصورُه وتسجيلاتُه نهائيًّا. حساباتُ الأبناءِ لا تتأثّر.","🧹 فرِّغْ","إلغاء")) return;
    let tss=[]; try{ const gp=JSON.parse(localStorage.getItem("tilmithi_progress_v1")||"{}"); tss=(gp.log||[]).map(e=>e.ts).filter(t=>t!=null); }catch(e){}
    try{ if(tss.length){ const set=new Set(tss); for(const c of await allCaptures()) if(set.has(c.ts)) await delCapture(c.key); } }catch(e){}
    try{ localStorage.removeItem("tilmithi_progress_v1"); }catch(e){}
    try{ await clearPracticeAccount("guest"); }catch(e){}
    if(msg) msg.textContent="✓ فُرِّغَ حسابُ الضيف";
  });
  const savePw=document.getElementById("savePw");
  if(savePw) savePw.addEventListener("click",()=>{
    const oldv=document.getElementById("oldPw").value, nv=document.getElementById("newPw").value.trim(), nv2=document.getElementById("newPw2").value.trim();
    const msg=document.getElementById("pwMsg"); const set=(t,ok)=>{ msg.textContent=t; msg.style.color=ok?"#5E9A47":"#B5482F"; };
    if(!verifyParentPassword(oldv)) return set("كلمة المرور القديمة غير صحيحة.",false);
    if(nv.length<3) return set("الكلمة الجديدة قصيرةٌ جدًّا (3 أحرف فأكثر).",false);
    if(nv!==nv2) return set("الكلمة الجديدة وتأكيدها غير متطابقين.",false);
    changeParentPassword(nv); document.getElementById("oldPw").value=document.getElementById("newPw").value=document.getElementById("newPw2").value=""; set("✓ حُفِظت كلمة المرور الجديدة.",true);
  });
  // سؤال الاستعادة مخفيٌّ: لا يظهر سؤالُه/جوابُه إلّا بعد إدخال كلمة المرور (لمراجعته أو تغييره).
  const sqReveal=document.getElementById("sqReveal");
  if(sqReveal) sqReveal.addEventListener("click",async ()=>{
    if(!await confirmWithPassword("لعرض سؤال الاستعادة أو تغييره، أدخِلْ كلمة مرور اللوحة.")) return;
    const cur=getSecurityQuestion(), box=document.getElementById("sqBox"), e=s=>String(s||"").replace(/"/g,"&quot;");
    box.innerHTML=`<div style="display:flex;gap:6px;flex-wrap:wrap">
        <input id="sqQ" placeholder="السؤال" value="${cur?e(cur.question):''}" style="flex:1;min-width:120px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-family:inherit">
        <input id="sqA" placeholder="الإجابة" value="${cur?e(cur.answer):''}" style="flex:1;min-width:90px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-family:inherit">
        <button class="topbtn" id="saveSq" style="font-size:13px">حفظ</button></div>
      <div id="sqMsg" style="font-size:12px;min-height:16px;margin-top:4px"></div>`;
    document.getElementById("saveSq").onclick=()=>{ const q=document.getElementById("sqQ").value.trim(), a=document.getElementById("sqA").value.trim();
      const m=document.getElementById("sqMsg");
      if(!q||!a){ m.style.color="#B5482F"; m.textContent="أدخِلِ السؤالَ والإجابةَ معًا."; return; }
      setSecurityQuestion(q,a); m.style.color="#5E9A47"; m.textContent="✓ حُفِظ سؤالُ الاستعادة."; };
  });
  const gt2=document.getElementById("guestToggle");
  if(gt2) gt2.addEventListener("click",()=>{ const on=!(getSettings().guestEnabled!==false); updateSettings({guestEnabled:on}); gt2.classList.toggle("on",on); });
  const addCh=document.getElementById("addChild"); if(addCh) addCh.addEventListener("click",()=>openAcctForm(null));
  const pl=document.getElementById("profList");
  if(pl) pl.addEventListener("click",e=>{ const eb=e.target.closest(".acctEdit[data-pid]"); if(eb) openAcctForm(eb.getAttribute("data-pid")); });
  if(pl) pl.addEventListener("click",async e=>{ const b=e.target.closest(".capdel[data-pid]"); if(!b) return;
    const pid=b.getAttribute("data-pid"), row=b.closest(".dom-row");
    if(await confirmWithPassword("حذف حساب هذا الطفل وتقدّمه نهائيًّا؟")){
      if(row) row.style.opacity=".4";
      undoable("سيُحذف الحساب…", ()=>{ deleteProfile(pid); openDashboard(); }, 6000, ()=>{ if(row) row.style.opacity=""; });
    }
  });
  panel.querySelectorAll("button[data-age]").forEach(b=>b.addEventListener("click",()=>{
    const a=b.getAttribute("data-age"); setChildAge(a); filter=a;
    document.querySelectorAll("#filters button").forEach(x=>x.classList.toggle("on", x.getAttribute("data-f")===a));
    if(state==="idle"||state==="heal") renderIdle();
    openDashboard();
  }));
  document.getElementById("wipe").addEventListener("click", async ()=>{
    if(await confirmWithPassword("مسح كل تقدّم الآليّ والتسجيلات نهائيًّا؟ ستظهر مهلةُ تراجع.")){
      undoable("سيُمسَح كلُّ التقدّم…", async ()=>{
        progress={completed:[],parts:{},world:{},log:[],settings:{enabledDomains:{},showPair:true}};
        DOMAINS.forEach(d=>progress.settings.enabledDomains[d]=true);
        saveProgress(); await clearCaptures();
        renderRobo(); renderWorld(); renderProgress(); renderMap(); renderIdle(); openDashboard();
      });
    }
  });
  renderVoiceMgmt();
  { const vsRst=document.getElementById("vsHistReset"); if(vsRst) vsRst.onclick=async(e)=>{ e.stopPropagation(); if(await confirmChoice("تصفيرُ سجلِّ الألعابِ التنافسيّة نهائيًّا؟","↺ صفّر","إبقاء")){ clearVsHistory(); openDashboard(); } }; }
  // مطويّاتُ سجلِّ التنافسِ حصريّة: فتحُ سجلِّ طرفَينِ يطوي المفتوحَ قبلَه (بـJS لا بخاصّيّةِ name كي يعملَ على كلِّ المتصفّحاتِ وWebView).
  { const vsg=[...document.querySelectorAll("details.vsgrp")];
    vsg.forEach(d=>d.addEventListener("toggle",()=>{ if(d.open) vsg.forEach(o=>{ if(o!==d) o.open=false; }); })); }
  // مطويات: كلُّ قسمٍ يُطوى افتراضاً (لوحةٌ مرتّبةٌ غيرُ مزدحمة)، والعنوانُ يفتحه/يطويه.
  const hash = location.hash;
  panel.querySelectorAll(".sec").forEach(sec=>{
    const h=sec.querySelector("h3"); if(!h) return;
    sec.classList.add("collapsible","collapsed");
    if(hash && sec.id && ("#"+sec.id)===hash) sec.classList.remove("collapsed"); // افتح المقصودَ بالرابط
    h.addEventListener("click",()=>{ sec.classList.toggle("collapsed"); armIdle(); });
  });
  overlay.classList.add("show");
  armIdle(); // بدءُ عدّاد الخمول (30ث)
  // تمريرٌ تلقائيٌّ للقسم المقصود (#sec-reports / #sec-accounts / #sec-backup). نُعيدُه مرّاتٍ لأنّ
  // محتوًى يُحمَّلُ لاحقًا (تسجيلاتُ الأصوات) يُزيحُ الموضعَ بعدَ التمريرِ الأوّل. توسيطٌ ليَظهرَ الهدفُ كاملًا.
  if(hash){ const block = hash==="#sec-backup" ? "center" : "start";
    const scrollTo=()=>{ const t=panel.querySelector(hash); if(t) t.scrollIntoView({behavior:"smooth",block}); };
    [120,500,1000].forEach(ms=>setTimeout(scrollTo,ms)); }
}

/* إدارةُ تسجيلات تمرّنِ الأطفال من لوحة الأهل: عددُ تسجيلاتِ كلِّ حسابٍ + حذفٌ بكلمة مرورٍ ومهلةِ تراجع. */
async function renderVoiceMgmt(){
  const host=document.getElementById("voiceMgmt"); if(!host) return;
  let rows=[]; try{ rows=await practiceByAccount(); }catch(e){}
  rows=rows.filter(r=>r.count>0);
  const nameOf=id=>{ if(id==="guest") return "👋 ضيف (مؤقّت)"; if(id==="default") return "🙂 بلا حساب"; const p=listProfiles().find(x=>x.id===id); return p?`${p.avatar||"🙂"} ${p.name}`:("📂 "+id); };
  if(!rows.length){ host.innerHTML='<p class="muted" style="font-size:12px">لا تسجيلاتِ تمرّنٍ بعد.</p>'; return; }
  host.innerHTML=rows.map(r=>`<div class="dom-row"><span style="flex:1;font-size:13px">${nameOf(r.account)} <span class="muted">· ${r.count} تسجيلًا</span></span><button class="capdel" data-acct="${r.account}" title="حذف تسجيلات تمرّن هذا الحساب">🗑️</button></div>`).join("");
  host.querySelectorAll(".capdel[data-acct]").forEach(b=>b.onclick=async ()=>{
    const id=b.getAttribute("data-acct");
    if(await confirmWithPassword(`حذف كلّ تسجيلاتِ تمرّنِ حساب «${nameOf(id)}»؟`))
      undoable("ستُحذف التسجيلات…", async ()=>{ await clearPracticeAccount(id); renderVoiceMgmt(); });
  });
}

/* زرّ الكتم الفوري في الشريط العلوي — يتشارك مفتاح الصوت نفسه مع إعدادات لوحة الأهل */
const muteBtn=document.getElementById("muteBtn");
function syncMuteIcon(){ if(muteBtn) muteBtn.textContent = isSoundOn() ? "🔊" : "🔇"; }
if(muteBtn) muteBtn.addEventListener("click",()=>{ const on=toggleSound(); syncMuteIcon(); if(on) sfx.tap(); });
syncMuteIcon();

Object.assign(window,{spark,surprise,toggleCoop,go,goTeach,askRoboWrong,fixRoboWrong,heal,toggleRec,closePanel,renderIdle,viewMyWorks});
init();
</script>
