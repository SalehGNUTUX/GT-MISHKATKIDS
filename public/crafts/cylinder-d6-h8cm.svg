<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="297mm" viewBox="0 0 210 297" font-family="Arial,sans-serif">
  <rect width="210" height="297" fill="#ffffff"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#E0566B"/></marker>
  </defs>
  <text x="105" y="22" text-anchor="middle" font-size="6" font-weight="bold" fill="#000">شبكة أسطوانة — قطر 6 سم، ارتفاع 8 سم</text>
  <text x="105" y="32" text-anchor="middle" font-size="3.3" fill="#555">قُصّ على المتقطّع الأحمر · لُفَّ المستطيل ثم ألصِق القاعدتَين</text>

  <!-- الجانب: مستطيل 188.5×80 مم -->
  <rect x="11" y="55" width="188.5" height="80" fill="#E9F5E0" stroke="#E0566B" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- لسان لصق على اليمين -->
  <rect x="199.5" y="55" width="5" height="80" fill="#FFE9C2" stroke="#F4A03A" stroke-width="0.5" stroke-dasharray="1.5,1"/>

  <!-- مقصّ -->
  <text x="3" y="58" font-size="9" fill="#E0566B">✂</text>
  <line x1="12" y1="55" x2="40" y2="55" stroke="#E0566B" stroke-width="0.6" marker-end="url(#arr)"/>
  <text x="28" y="51" text-anchor="middle" font-size="3" fill="#E0566B">ابدأ من هنا</text>

  <text x="105" y="50" text-anchor="middle" font-size="4.5" fill="#C7613F">المحيط ≈ 18.85 سم (= π × 6)</text>
  <text x="9" y="98" text-anchor="end" font-size="4.5" fill="#C7613F">8</text>
  <text x="202" y="98" text-anchor="start" font-size="3" fill="#C7613F" transform="rotate(-90 202 98)">ألصِق</text>
  <text x="105" y="100" text-anchor="middle" font-size="4" fill="#3a4250">الجانب المنحني</text>

  <!-- القاعدتان -->
  <circle cx="60"  cy="195" r="30" fill="#FFF6DD" stroke="#E0566B" stroke-width="1" stroke-dasharray="4,2"/>
  <circle cx="150" cy="195" r="30" fill="#FBEFF4" stroke="#E0566B" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- مقصّ لكلّ قاعدة -->
  <text x="25" y="195" font-size="7" fill="#E0566B">✂</text>
  <text x="115" y="195" font-size="7" fill="#E0566B">✂</text>

  <line x1="30" y1="195" x2="90" y2="195" stroke="#C7613F" stroke-width="0.3" stroke-dasharray="1.5,1"/>
  <text x="60" y="193" text-anchor="middle" font-size="3.5" fill="#C7613F">قطر 6 سم</text>
  <text x="60" y="235" text-anchor="middle" font-size="4" fill="#3a4250">القاعدة العلويّة</text>
  <text x="150" y="235" text-anchor="middle" font-size="4" fill="#3a4250">القاعدة السفليّة</text>

  <!-- ═══════════════ رسوم التجميع بالخيط ═══════════════ -->
  <text x="105" y="248" text-anchor="middle" font-size="5" font-weight="bold" fill="#000">كيف تُجمّعها وتُعلّقها بخيط؟</text>

  <!-- لوحة 1: لُفّ -->
  <g transform="translate(8,252)">
    <text x="22" y="5" text-anchor="middle" font-size="3.3" font-weight="bold" fill="#C7613F">1 لُفّ الجانب</text>
    <g transform="translate(0,8)">
      <ellipse cx="22" cy="8" rx="14" ry="3" fill="#D9E8C8" stroke="#3a4250" stroke-width="0.5"/>
      <rect x="8" y="8" width="28" height="20" fill="#E9F5E0" stroke="none"/>
      <ellipse cx="22" cy="28" rx="14" ry="3" fill="#C2D9AE" stroke="#3a4250" stroke-width="0.5"/>
      <line x1="8" y1="8" x2="8" y2="28" stroke="#3a4250" stroke-width="0.5"/>
      <line x1="36" y1="8" x2="36" y2="28" stroke="#3a4250" stroke-width="0.5"/>
      <path d="M36,4 q4,-2 6,2" fill="none" stroke="#E0566B" stroke-width="0.5" marker-end="url(#arr)"/>
    </g>
  </g>

  <!-- لوحة 2: ألصِق القاعدتَين -->
  <g transform="translate(60,252)">
    <text x="22" y="5" text-anchor="middle" font-size="3.3" font-weight="bold" fill="#C7613F">2 ألصِق القاعدتَين</text>
    <g transform="translate(0,8)">
      <ellipse cx="22" cy="8" rx="14" ry="3" fill="#FFF6DD" stroke="#3a4250" stroke-width="0.5"/>
      <rect x="8" y="8" width="28" height="20" fill="#E9F5E0" stroke="none"/>
      <ellipse cx="22" cy="28" rx="14" ry="3" fill="#FBEFF4" stroke="#3a4250" stroke-width="0.5"/>
      <line x1="8" y1="8" x2="8" y2="28" stroke="#3a4250" stroke-width="0.5"/>
      <line x1="36" y1="8" x2="36" y2="28" stroke="#3a4250" stroke-width="0.5"/>
      <text x="34" y="20" font-size="5">💧</text>
    </g>
  </g>

  <!-- لوحة 3: اثقب القاعدة العلويّة -->
  <g transform="translate(112,252)">
    <text x="22" y="5" text-anchor="middle" font-size="3.3" font-weight="bold" fill="#C7613F">3 اثقب الأعلى</text>
    <g transform="translate(0,8)">
      <ellipse cx="22" cy="8" rx="14" ry="3" fill="#FFF6DD" stroke="#3a4250" stroke-width="0.5"/>
      <rect x="8" y="8" width="28" height="20" fill="#E9F5E0" stroke="none"/>
      <ellipse cx="22" cy="28" rx="14" ry="3" fill="#FBEFF4" stroke="#3a4250" stroke-width="0.5"/>
      <line x1="8" y1="8" x2="8" y2="28" stroke="#3a4250" stroke-width="0.5"/>
      <line x1="36" y1="8" x2="36" y2="28" stroke="#3a4250" stroke-width="0.5"/>
      <circle cx="22" cy="8" r="1.2" fill="none" stroke="#5E9A47" stroke-width="0.5"/>
      <text x="26" y="3" font-size="3" fill="#5E9A47">ثقب</text>
    </g>
  </g>

  <!-- لوحة 4: مرّر الخيط -->
  <g transform="translate(164,252)">
    <text x="22" y="5" text-anchor="middle" font-size="3.3" font-weight="bold" fill="#C7613F">4 علّق بالخيط 🧵</text>
    <g transform="translate(0,8)">
      <line x1="22" y1="-5" x2="22" y2="8" stroke="#3a4250" stroke-width="0.4" stroke-dasharray="1.5,1"/>
      <ellipse cx="22" cy="8" rx="14" ry="3" fill="#FFF6DD" stroke="#3a4250" stroke-width="0.5"/>
      <rect x="8" y="8" width="28" height="20" fill="#E9F5E0" stroke="none"/>
      <ellipse cx="22" cy="28" rx="14" ry="3" fill="#FBEFF4" stroke="#3a4250" stroke-width="0.5"/>
      <line x1="8" y1="8" x2="8" y2="28" stroke="#3a4250" stroke-width="0.5"/>
      <line x1="36" y1="8" x2="36" y2="28" stroke="#3a4250" stroke-width="0.5"/>
      <circle cx="22" cy="8" r="0.8" fill="#5E9A47"/>
    </g>
  </g>

  <text x="105" y="288" text-anchor="middle" font-size="3" fill="#5E9A47">💡 لُفَّ المستطيل أوّلًا والصق اللسان، ثمّ ألصق القاعدتَين، ثمّ اثقب الأعلى للخيط</text>
</svg>
