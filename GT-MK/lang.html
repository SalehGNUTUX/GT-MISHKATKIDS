<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<script>/* منعُ وميض السمة */(function(){try{var t=localStorage.getItem('tilmithi_theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<style id="theme-crit">html[data-theme="dark"]{--bg:#15151b;--card:#23232c;--ink:#ECE7DD;--muted:#A39E94;--line:#34343f;--primary-d:#E8987E;--shadow:0 6px 20px rgba(0,0,0,.45)}html[data-theme="dark"] body{background:var(--bg);color:var(--ink)}</style>
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="مِشكاة" />
<meta name="theme-color" content="#6FB3D6" />
<title>مِشكاة — لغات أجنبيّة</title>
<style>
  :root{ --bg:#FBF7EF; --card:#FFFFFF; --ink:#2B2B2B; --muted:#6B6B6B; --line:#ECE6DA;
    --primary:#6FB3D6; --primary-d:#3a7da0; --good:#7BB661; --shadow:0 6px 20px rgba(0,0,0,.07);
    font-family:"Noto Sans Arabic","Segoe UI",Tahoma,system-ui,sans-serif; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:760px;margin:0 auto;padding:16px 16px 56px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 12px}
  header h1{font-size:21px;margin:0}
  header .sub{color:var(--muted);font-size:13px}
  .topbtn{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;font-size:14px;cursor:pointer;text-decoration:none;color:var(--ink);font-family:inherit}

  /* اختيار اللغة */
  .pick{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:10px}
  .langcard{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;cursor:pointer;
    background:var(--card);border:1.5px solid var(--line);border-radius:22px;padding:24px 14px;box-shadow:var(--shadow);
    font-family:inherit;color:var(--ink);transition:transform .16s cubic-bezier(.34,1.56,.64,1),box-shadow .16s}
  .langcard:hover{transform:translateY(-5px);box-shadow:0 12px 26px rgba(0,0,0,.16)}
  .langcard .fl{font-size:54px;line-height:1;transition:transform .25s}
  .langcard:hover .fl{transform:scale(1.15) rotate(-6deg)}
  .langcard .nm{font-size:20px;font-weight:800}
  .langcard .na{font-size:13px;color:var(--muted)}

  /* قائمة أقسام اللغة */
  .secs{display:flex;gap:10px;flex-wrap:wrap;margin:12px 2px}
  .secbtn{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 16px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--ink)}
  .secbtn.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .secbtn.soon{opacity:.55;cursor:default}

  /* شريطُ الرجوع + شبكةُ بطاقات التنقّل (أقسام/فئات) — بطاقاتٌ مدمجةٌ ملوّنةٌ متحرّكة */
  .topnav{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 2px 6px}
  .backbtn{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:2px solid var(--primary);border-radius:999px;padding:9px 16px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--primary-d);box-shadow:0 3px 10px rgba(0,0,0,.10);transition:transform .12s,background .12s,color .12s}
  .backbtn:hover{background:var(--primary);color:#fff}
  .backbtn:active{transform:scale(.96)}
  .reveal{background:color-mix(in srgb,var(--primary) 12%,var(--card));border:1.5px dashed var(--primary);color:var(--primary-d);border-radius:14px;padding:11px 16px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;width:100%;margin:6px 0 10px;transition:background .12s,transform .08s}
  .reveal:hover{background:color-mix(in srgb,var(--primary) 20%,var(--card))}
  .reveal:active{transform:scale(.98)}
  .grid.hidden{display:none}
  .topnav .cur{font-size:16px;font-weight:800;color:var(--primary-d)}
  .lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;margin-top:6px}
  .lcard{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    background:var(--cc,var(--card));border:1.5px solid var(--cb,var(--line));border-radius:20px;padding:18px 8px;
    cursor:pointer;font-family:inherit;color:var(--ink);aspect-ratio:1/1;box-shadow:var(--shadow);
    transition:transform .16s cubic-bezier(.34,1.56,.64,1),box-shadow .16s}
  .lcard:hover{transform:translateY(-5px);box-shadow:0 12px 26px rgba(0,0,0,.16)}
  .lcard:hover .ic{transform:scale(1.22) rotate(-8deg)}
  .lcard:active{transform:scale(.97)}
  .lcard:active .ic{animation:icpop .45s ease}
  .lcard .ic{font-size:40px;line-height:1;transition:transform .25s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 2px 4px rgba(0,0,0,.12))}
  .lcard .lt{font-size:13.5px;font-weight:800;transition:opacity .26s ease;min-height:1.2em}
  .lcard .lt.fg{direction:ltr;unicode-bidi:isolate}
  .lcard.vs{border-color:color-mix(in srgb,var(--primary) 45%,var(--cb,var(--line)))}
  .sgopt.ok{border-color:var(--good)!important;background:color-mix(in srgb,var(--good) 16%,var(--card))!important}
  .sgopt.bad{border-color:#E0566B!important;background:color-mix(in srgb,#E0566B 14%,var(--card))!important}
  /* بطاقاتُ الأصوات (Les sons) */
  .sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:14px;margin-top:8px}
  .scard{position:relative;background:var(--card);border:1.5px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}
  .ssnd{position:absolute;top:0;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;font-size:14px;font-weight:800;padding:3px 16px;border:none;border-radius:0 0 13px 13px;letter-spacing:.5px;box-shadow:0 2px 6px rgba(0,0,0,.15);cursor:pointer;font-family:inherit;z-index:2;transition:transform .12s}
  .ssnd:hover{background:var(--primary-d)} .ssnd:active{transform:translateX(-50%) scale(.9)}
  .sbody{width:100%;display:flex;flex-direction:column;align-items:center;gap:5px;padding:26px 10px 12px;background:none;border:none;border-radius:20px;cursor:pointer;font-family:inherit;color:var(--ink);transition:transform .16s cubic-bezier(.34,1.56,.64,1)}
  .sbody:hover{transform:translateY(-4px)} .sbody:active{transform:scale(.97)}
  .sem{font-size:44px;line-height:1;margin-top:6px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.12))}
  .swd{font-size:18px;font-weight:800;direction:ltr;unicode-bidi:isolate}
  .swd .shi{color:var(--primary-d);background:color-mix(in srgb,var(--primary) 20%,transparent);border-radius:5px;padding:0 3px}
  .sar{font-size:13px;color:var(--muted)}
  html[data-theme="dark"] .scard{background:#23232c;border-color:#3a3a45}
  /* خرائطُ المقاطع */
  .sylwrap{display:flex;flex-direction:column;gap:9px;margin-top:8px}
  .sylrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:8px 10px;box-shadow:var(--shadow)}
  .syllab{flex:none;min-width:46px;text-align:center;font-size:16px;font-weight:800;color:#fff;background:var(--primary);border-radius:10px;padding:8px 6px;white-space:nowrap}
  .sylchips{display:flex;flex-wrap:wrap;gap:6px}
  .sylchip{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:6px 11px;font-size:15px;font-weight:800;color:var(--ink);cursor:pointer;font-family:inherit;transition:transform .1s,border-color .1s,background .1s}
  .sylchip:hover{border-color:var(--primary)} .sylchip:active{transform:scale(.9);background:color-mix(in srgb,var(--primary) 16%,var(--card))}
  html[data-theme="dark"] .sylrow{background:#23232c;border-color:#3a3a45}
  html[data-theme="dark"] .sylchip{background:#2b2b34;border-color:#3a3a45}
  .introrep{background:var(--card);border:1.5px solid var(--line);border-radius:999px;padding:1px 9px;font-size:13px;line-height:1.5;cursor:pointer;font-family:inherit;color:var(--ink);vertical-align:middle;margin-inline-start:4px}
  .introrep:hover{border-color:var(--primary)} .introrep:active{transform:scale(.92)}
  .vsbadge{position:absolute;top:5px;inset-inline-start:5px;z-index:2;background:var(--primary);color:#fff;font-size:8.5px;font-weight:800;padding:2px 5px;border-radius:999px;box-shadow:0 2px 6px rgba(0,0,0,.18);white-space:nowrap}
  .newbadge{position:absolute;top:5px;inset-inline-end:5px;z-index:3;background:#E8912D;color:#fff;font-size:8.5px;font-weight:800;padding:2px 5px;border-radius:999px;box-shadow:0 2px 8px rgba(232,145,45,.5);white-space:nowrap;animation:newpulse 1.5s ease-in-out infinite}
  @keyframes newpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  @media(prefers-reduced-motion:reduce){ .newbadge{animation:none} }
  .lcard.vs,.lcard.hasnew{padding-top:24px}
  /* العبارات والجمل المركّبة */
  .plist{display:flex;flex-direction:column;gap:10px;max-width:580px;margin:0 auto}
  .pcard{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:16px;background:var(--card);
    border:1.5px solid var(--line);cursor:pointer;text-align:right;transition:transform .15s,box-shadow .2s,border-color .2s}
  .pcard:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.1);border-color:var(--primary,#E07B54)}
  .pcard:active{transform:scale(.985)}
  .pcard .spk{font-size:19px;flex:none}
  .pcard .ptx{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
  .pcard .pt{font-size:17px;font-weight:800;color:var(--ink);direction:ltr;text-align:left;unicode-bidi:isolate}
  .pcard .pa{font-size:13.5px;color:var(--muted)}
  html[data-theme="dark"] .pcard{background:#23232c;border-color:#3a3a45}
  @keyframes icpop{0%{transform:scale(1)}35%{transform:scale(1.4) rotate(10deg)}70%{transform:scale(.9)}100%{transform:scale(1)}}
  @media(prefers-reduced-motion:reduce){ .lcard,.lcard .ic{transition:none} .lcard:active .ic{animation:none} }
  .lcard:nth-child(8n+1){--cc:#FDEBE7;--cb:#F1C7BA} .lcard:nth-child(8n+2){--cc:#E8F3EC;--cb:#BCDFC8}
  .lcard:nth-child(8n+3){--cc:#E7F0FB;--cb:#BBD6EE} .lcard:nth-child(8n+4){--cc:#FBF1DD;--cb:#EED8AB}
  .lcard:nth-child(8n+5){--cc:#F1EAF7;--cb:#D6C2E7} .lcard:nth-child(8n+6){--cc:#FCEAEF;--cb:#F1C4D1}
  .lcard:nth-child(8n+7){--cc:#E6F4F3;--cb:#B9DFDD} .lcard:nth-child(8n){--cc:#F0F0E4;--cb:#D6D6BE}
  html[data-theme="dark"] .lcard{background:#23232c;border-color:#3a3a45}

  /* شبكة الأحرف/الأرقام */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:12px;margin-top:8px}
  .gcard{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:14px 8px;cursor:pointer;
    box-shadow:var(--shadow);font-family:inherit;color:var(--ink);aspect-ratio:1/1;
    transition:transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow .15s}
  .gcard:hover{transform:translateY(-4px);box-shadow:0 10px 22px rgba(0,0,0,.14);border-color:var(--primary)}
  .gcard:active{transform:scale(.96)}
  .gcard .big{font-size:34px;font-weight:800;line-height:1;color:var(--primary-d)}
  .gcard .em{font-size:26px;line-height:1}
  .gcard .wd{font-size:12px;color:var(--muted)}
  .gcard .spk{position:absolute;inset-inline-start:6px;top:6px;font-size:13px;opacity:.6}
  .ltr{direction:ltr;unicode-bidi:isolate}
  /* خليّةٌ تجمعُ بطاقةَ النطق + زرّ تسجيل نُطق الطفل */
  .gcell,.pcell{display:flex;flex-direction:column;gap:6px}
  .gcell .gcard{width:100%}
  .lrec{background:var(--card);border:1.5px solid #E0A88F;color:#C7613F;border-radius:12px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
  html[data-theme="dark"] .lrec{border-color:#7a4a38;color:#E8987E}
  .rrHost{width:100%} .rrHost .rr{margin:4px 0}
  .hint{text-align:center;color:var(--muted);font-size:13px;margin:10px 2px}
  /* القصص */
  .storycard .cover{width:100%;height:64px;overflow:hidden}
  .storycard .cover svg{width:100%;height:100%}
  .storyview{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:14px;margin-top:8px;text-align:center}
  .storyview .cover.big{max-width:320px;margin:0 auto;position:relative}
  .storyview .cover.big svg{width:100%;height:auto;border-radius:12px;display:block}
  .scaption{position:absolute;left:10px;right:10px;bottom:10px;background:rgba(255,255,255,.94);color:#23314a;border-radius:12px;padding:7px 12px;font-size:14px;font-weight:800;box-shadow:0 3px 10px rgba(0,0,0,.25);line-height:1.4}
  .storytext{font-size:17px;line-height:1.7;margin:12px 4px;text-align:start}
  .snav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}
  .snav .secbtn[disabled]{opacity:.4;cursor:default}
  .lesson{background:#EEF6E9;border-radius:12px;padding:8px 12px;margin-top:10px;font-weight:700;color:#3f6b2c}
  .dots{display:flex;gap:6px;justify-content:center;margin-top:10px}
  .dots span{width:8px;height:8px;border-radius:50%;background:var(--line)}
  .dots span.on{background:var(--primary)}
  /* اختبار + ألعاب */
  .qzn{text-align:center;color:var(--muted);font-size:13px;margin:4px}
  .qzprompt{text-align:center;margin:10px 2px}
  .qzemoji{font-size:64px;display:block;line-height:1}
  .qzar{font-size:20px;font-weight:800}
  .qzopt.ok{background:#EEF6E9;border-color:var(--good)}
  .qzopt.bad,.mcard.bad{background:#FCEBEE;border-color:#E0566B;animation:shk .4s}
  /* خياراتُ اختبارِ اللغة الموسَّع (صنفٌ مستقلٌّ لا مربّعٌ، لا يتداخلُ مع خيارات الألعاب) */
  .qopt{display:flex;align-items:center;justify-content:center;text-align:center;min-height:58px;padding:12px;background:var(--card);border:1.5px solid var(--line);border-radius:16px;font-size:16px;font-weight:800;color:var(--ink);cursor:pointer;font-family:inherit;box-shadow:var(--shadow);transition:transform .14s cubic-bezier(.34,1.56,.64,1),border-color .14s}
  .qopt:hover{transform:translateY(-3px);border-color:var(--primary)} .qopt:active{transform:scale(.97)} .qopt:disabled{cursor:default}
  .qopt.sel{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary) inset}
  .qopt.ok{background:#EEF6E9;border-color:var(--good);color:#2f5a1f} .qopt.bad{background:#FCEBEE;border-color:#E0566B;animation:shk .4s}
  html[data-theme="dark"] .qopt{background:#23232c;border-color:#3a3a45}
  html[data-theme="dark"] .qopt.ok{background:color-mix(in srgb,var(--good) 22%,#23232c);color:var(--ink)} html[data-theme="dark"] .qopt.bad{background:color-mix(in srgb,#E0566B 22%,#23232c)}
  @keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .qzdone{text-align:center;font-size:22px;font-weight:800;margin:16px 2px}
  .qzdone .secbtn{display:inline-block;margin-top:10px;font-size:15px}
  .matchwrap{display:flex;gap:14px;justify-content:center;margin-top:8px}
  .mcol{display:flex;flex-direction:column;gap:10px;flex:1;max-width:200px}
  .mcard{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:12px;font-size:22px;cursor:pointer;font-family:inherit;color:var(--ink);min-height:52px}
  .mcard .ltr{font-size:16px;font-weight:800}
  .mcard.sel{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary) inset}
  .mcard.done{background:#EEF6E9;border-color:var(--good);opacity:.6;cursor:default}
  .mcard.mar{font-size:18px;font-weight:800}
  /* إملاء: خاناتُ الحروف وأزرارُها */
  .spslot{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 2px}
  .spslot span{width:42px;height:50px;border:2px dashed var(--line);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--ink)}
  .spslot span.full{border-style:solid;border-color:var(--primary);background:color-mix(in srgb,var(--primary) 12%,var(--card))}
  .splet{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:6px 2px}
  .lchip{min-width:46px;height:50px;border:2px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);font-size:24px;font-weight:800;cursor:pointer;font-family:inherit}
  .lchip:disabled{opacity:.32;cursor:default}
  .lchip:not(:disabled):active{transform:scale(.94)}
  /* الأفعال والأزمنة */
  .vcard{display:flex;flex-direction:column;align-items:center;gap:4px}
  .vtenses{display:flex;flex-direction:column;gap:10px;margin-top:10px}
  .vrow{display:flex;align-items:center;gap:10px;width:100%;text-align:start;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:12px 14px;cursor:pointer;font-family:inherit;color:var(--ink)}
  .vrow .vt{background:var(--primary);color:#fff;border-radius:999px;padding:3px 12px;font-size:13px;font-weight:800;white-space:nowrap}
  .vrow .vf{font-size:18px;font-weight:800;flex:1}
  .vrow .va{font-size:15px;color:var(--muted)}
  .vrow:active{transform:scale(.99)}
  .vsec{font-weight:800;font-size:14px;color:var(--primary-d);margin:16px 2px 4px;text-align:start}
  .vrec{margin-top:14px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div><h1 id="hTitle">🌍 لغات أجنبيّة</h1><div class="sub" id="hSub">تعلّمِ الإنجليزيّةَ والفرنسيّةَ بالنطق</div></div>
    <span class="topbtns">
      <button class="iconbtn" id="themeBtn" title="الوضع الداكن" aria-label="الوضع الداكن">🌙</button>
      <a class="topbtn" href="home.html">🏠 الفهرس</a>
    </span>
  </header>
  <div id="view"></div>
</div>

<script type="module">
import { wireThemeToggle } from "./src/theme.js";
import { iconHtml } from "./src/icons.js";
wireThemeToggle(document.getElementById("themeBtn"));
import EN from "./content/lang-en.js";
import FR from "./content/lang-fr.js";
import { STORY_ART } from "./src/story-art.js";
import { playClipForSet, playClipForSetAsync, stopClip } from "./src/tts-clips.js";
import { logEvent } from "./src/progress.js";
import { speak } from "./src/speak.js";              // للترجمة العربيّة (تُوجَّه للنموذج العصبيّ)
import { GAME_INTROS as GI } from "./src/robo-phrases.js"; // تعليماتُ الألعاب (Piper)
import { attachReader } from "./src/reader-recorder.js"; // تسجيلُ نُطق الطفل (لكلّ حساب)
import { robo } from "./src/robo-companion.js";       // الآليُّ الظاهرُ + فقاعةُ ردوده
import { vsSetup, vsMakePlayers, vsReact, vsScoreHtml, vsEndRound, vsTurnHtml, VS, vP, GAME as GR, sfx } from "./src/versus.js"; // الإطارُ التنافسيّ المشترك (v1.4)

const LANGS = { en: EN, fr: FR };
const view = document.getElementById("view");
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");

/* ---------- النطق: مقطع Piper المُدمج إن وُجد، وإلّا Web Speech بلغة القسم ---------- */
let voicesPrimed = false;
function primeWS(){ try{ if("speechSynthesis" in window){ speechSynthesis.getVoices(); voicesPrimed=true; } }catch(e){} }
function webSpeak(text, code){
  if(!("speechSynthesis" in window)) return;
  const u = new SpeechSynthesisUtterance(String(text));
  u.lang = code; u.rate = 0.85;
  const vs = speechSynthesis.getVoices() || [];
  const pre = code.slice(0,2).toLowerCase();
  const v = vs.find(x => (x.lang||"").toLowerCase().replace("_","-").startsWith(pre));

}
function say(text, L){
  if(!text) return;
  try{ if(playClipForSet(text, L.voice)) return; }catch(e){} // مقطع Piper العصبيّ المُدمج (أحرفٌ وكلماتٌ وجمل)
  webSpeak(text, L.code);
}
// نسخةٌ وعديّة (لقراءة القصّة كاملةً): تُحَلّ عند انتهاء النطق.
function sayAsync(text, L){
  if(!text) return Promise.resolve();
  return playClipForSetAsync(text, L.voice).then(ok=>{
    if(ok) return; // عُزِف المقطعُ حتى نهايته
    return new Promise(res=>{ webSpeak(text, L.code); setTimeout(res, Math.min(7000, 1400 + text.length*55)); });
  });
}
// ردُّ فعلِ الآلي (يظهرُ الآليُّ وفقاعتُه) ثنائيُّ اللغة: كلُّ ردٍّ أجنبيٍّ مقرونٌ بترجمته العربيّة المقابلة:
// تُنطَق العبارةُ بلغة القسم (Piper alba/tom) ثمّ ترجمتُها العربيّةُ بالنموذج العصبيّ (kareem).
const _pick = a => (a && a.length) ? a[Math.floor(Math.random() * a.length)] : null;
function react(L, good){
  const r = _pick(good ? (L.reactions || []) : (L.encourage || []));
  if(!r) return Promise.resolve();
  robo.show(r.t + " · " + r.ar, good ? "happy" : "sad", { good });  // الآليُّ + الفقاعةُ (بلا نطقٍ آليّ)
  return sayAsync(r.t, L).then(() => speak(r.ar));                   // لغةُ القسم ثمّ ترجمتُها العربيّة (عصبيّ) — يُرجِعُ وعدًا لِيُنتظَر اكتمالُه
}

const encourageReact = L => react(L, false);

const shuffle = a => { const r=a.slice(); for(let k=r.length-1;k>0;k--){ const j=Math.floor(Math.random()*(k+1)); [r[k],r[j]]=[r[j],r[k]]; } return r; };

function quizPick(a){ return a[Math.floor(Math.random()*a.length)]; }
function quizDistinct(pool, keyOf, exclude, count){ const seen=new Set([exclude]); const out=[];
  for(const x of shuffle(pool)){ const k=keyOf(x); if(seen.has(k)) continue; seen.add(k); out.push(x); if(out.length>=count) break; } return out; }
function makeQuizQ(type, L, words){

    const pool=[]; (L.verbs||[]).forEach(vv=>["past","present","future"].forEach(k=>{ const t=vv.tenses&&vv.tenses[k]; if(t&&t.w&&t.w!==c.w) pool.push(t); }));

function renderQuiz(L, host){
  const words=allWords(L), N=10; let i=0, score=0;
  const types=["pic2word","word2ar","listen"];
  if((L.verbs||[]).length>=4) types.push("verbtense");
  if((L.phrases||[]).some(c=>(c.items||[]).length)) types.push("phrase");
  if((L.sounds||[]).length) types.push("sound"); // أسئلةُ الصوتيّات (للغاتٍ فيها sounds)
  const qs=Array.from({length:N},()=>makeQuizQ(quizPick(types), L, words));
  function ask(){
    if(i>=N){ const pct=Math.round(score/N*100), msg=pct>=80?"ممتازٌ، ما شاء الله!":pct>=50?"جيّدٌ، واصِلْ!":"لا بأس، حاوِلْ ثانيةً!";

      host.querySelector("#qzAgain").onclick=()=>renderQuiz(L, host); return; }

      <div class="qzprompt">${q.prompt}</div>
      <div ${optWrap}>${q.opts.map(o=>`<button class="qopt" data-v="${esc(o.v)}" data-spk="${o.fg?1:0}">${o.html}</button>`).join("")}</div>
      <div id="qzfb"></div>`;
    const sb=host.querySelector("[data-qsay]"); if(sb) sb.onclick=()=>say(sb.getAttribute("data-qsay"), L);
    if(q.autosay) say(q.autosay, L);
    host.querySelectorAll(".qopt").forEach(b=>b.onclick=()=>{
      const v=b.getAttribute("data-v"); if(b.getAttribute("data-spk")==="1") say(v, L); // نطقُ الخيارِ الأجنبيّ عند الضغط
      if(locked) return; locked=true;
      const ok=v===q.answer;
      host.querySelectorAll(".qopt").forEach(x=>{ x.disabled=true; if(x.getAttribute("data-v")===q.answer) x.classList.add("ok"); }); // كشفُ الصحيحة
      if(ok) score++; else b.classList.add("bad");
      const fb=host.querySelector("#qzfb"); if(fb) fb.innerHTML=`<div class="hint">${ok?"✅ صحيح!":`الصحيح: ${q.reveal}`}</div>`;
      if(ok) praise(L); else encourageReact(L); // ردُّ فعلٍ ثنائيُّ اللغة
      setTimeout(()=>{ i++; ask(); }, ok?2200:2800);
    });
  }
  ask();
}

// 🎯 اختبارُ المقاطع (داخلَ خرائط المقاطع): أنماطٌ مختلطة —
//   مقطعٌ منطوقٌ←خياراتٌ مكتوبة · مكتوبٌ←خياراتٌ صوتيّة (تُسمَعُ ثمّ تُؤكَّد) · صوتٌ داخلَ كلمةٍ منطوقة (والعكس).
const sylSimilar = (syls, c) => syls.filter(s => s!==c && (s[0]===c[0] || s.slice(-1)===c.slice(-1)));
function makeSylQ(type, syls, sounds){
  if(type==="s_r2l"){ const c=quizPick(syls), pool=sylSimilar(syls,c), ds=quizDistinct(pool.length>=3?pool:syls,x=>x,c,3), opts=shuffle([c,...ds]);
    return { badge:"👀→🔊", audioOpts:1, prompt:`<div class="qzprompt"><span class="qzar ltr" style="font-size:38px">${esc(c)}</span><div class="hint">اضغطِ الخياراتِ لسماعِها، ثمّ أكّدِ المقطعَ المطابقَ للمكتوب</div></div>`,
      opts:opts.map((o,idx)=>({v:o, html:`🔊 <b>${idx+1}</b>`})), answer:c, reveal:`المقطعُ المكتوبُ: <b class="ltr">${esc(c)}</b>` }; }
  if(type==="w_l2r"){ const c=quizPick(sounds), opts=shuffle([c,...quizDistinct(sounds,x=>x.s,c.s,3)]);
    return { badge:"🔊→👀", prompt:`<div style="margin-bottom:4px"><button class="secbtn on" data-qsay="${esc(c.w)}">🔊 استمعْ للكلمة</button></div><div class="hint">أيُّ مقطعٍ (صوت) فيها؟</div>`, autosay:c.w,
      opts:opts.map(o=>({v:o.s, html:`<span class="ltr">${esc(o.s)}</span>`})), answer:c.s, reveal:`<b class="ltr">${esc(c.s)}</b> — ${esc(c.w)}` }; }
  if(type==="w_r2l"){ const c=quizPick(sounds), opts=shuffle([c,...quizDistinct(sounds,x=>x.w,c.w,3)]);
    return { badge:"👀→🔊", audioOpts:1, prompt:`<div class="qzprompt"><span class="qzar ltr" style="font-size:32px">${esc(c.s)}</span><div class="hint">اضغطِ الكلماتِ لسماعِها، ثمّ أكّدِ التي فيها هذا الصوت</div></div>`,
      opts:opts.map(o=>({v:o.w, html:`🔊 ${o.e}`})), answer:c.w, reveal:`${c.e} <b class="ltr">${esc(c.w)}</b>` }; }
  const c=quizPick(syls), pool=sylSimilar(syls,c), ds=quizDistinct(pool.length>=3?pool:syls,x=>x,c,3), opts=shuffle([c,...ds]); // s_l2r
  return { badge:"🔊→👀", prompt:`<div style="margin-bottom:4px"><button class="secbtn on" data-qsay="${esc(c)}">🔊 استمعْ للمقطع</button></div><div class="hint">اختَرِ المقطعَ الذي سمعتَه</div>`, autosay:c,
    opts:opts.map(o=>({v:o, html:`<span class="ltr" style="font-size:19px">${esc(o)}</span>`})), answer:c, reveal:`<b class="ltr">${esc(c)}</b>` };
}
function renderSylQuiz(L, host){
  const syls=[...new Set((L.syllabaries||[]).flatMap(ch=>ch.groups.flatMap(g=>g.syl)))], sounds=L.sounds||[], N=10; let i=0, score=0;
  const types=["s_l2r","s_r2l"]; if(sounds.length) types.push("w_l2r","w_r2l");
  const qs=Array.from({length:N},()=>makeSylQ(quizPick(types), syls, sounds));
  function ask(){
    if(i>=N){ const pct=Math.round(score/N*100), msg=pct>=80?"ممتازٌ، ما شاء الله!":pct>=50?"جيّدٌ، واصِلْ!":"لا بأس، حاوِلْ ثانيةً!";
      host.innerHTML=`<div class="qzdone">🎉 <b>${score}/${N}</b><div class="hint">${msg}</div><button class="secbtn on" id="sqAgain">🔁 أعِدِ الاختبار</button></div>`;
      host.querySelector("#sqAgain").onclick=()=>renderSylQuiz(L, host); return; }
    const q=qs[i]; let locked=false, sel=null;
    const commit=(v, btn)=>{ if(locked) return; locked=true; const ok=v===q.answer;
      host.querySelectorAll(".qopt").forEach(x=>{ x.disabled=true; x.classList.remove("sel"); if(x.getAttribute("data-v")===q.answer) x.classList.add("ok"); });
      if(!ok && btn) btn.classList.add("bad"); if(ok) score++;
      const cf=host.querySelector("#sqConfirm"); if(cf) cf.disabled=true;
      const fb=host.querySelector("#sqfb"); if(fb) fb.innerHTML=`<div class="hint">${ok?"✅ صحيح!":`الصحيح: ${q.reveal}`}</div>`;
      if(ok) praise(L); else encourageReact(L);
      setTimeout(()=>{ i++; ask(); }, ok?1900:2600);
    };
    host.innerHTML=`<div class="qzn">سؤال ${i+1}/${N} · ⭐ ${score} · <span style="color:var(--primary-d);font-weight:800">${q.badge}</span></div>
      <div class="qzprompt">${q.prompt}</div>
      <div id="sqopts" class="grid">${q.opts.map(o=>`<button class="qopt" data-v="${esc(o.v)}">${o.html}</button>`).join("")}</div>
      ${q.audioOpts?`<div style="text-align:center;margin-top:10px"><button class="secbtn on" id="sqConfirm" disabled>✅ أكّدِ الاختيار</button></div>`:""}
      <div id="sqfb"></div>`;
    const sb=host.querySelector("[data-qsay]"); if(sb) sb.onclick=()=>say(sb.getAttribute("data-qsay"), L);
    if(q.autosay) say(q.autosay, L);
    if(q.audioOpts){
      host.querySelectorAll(".qopt").forEach(b=>b.onclick=()=>{ if(locked) return; say(b.getAttribute("data-v"), L);
        host.querySelectorAll(".qopt").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); sel=b;
        const cf=host.querySelector("#sqConfirm"); if(cf) cf.disabled=false; });
      const cf=host.querySelector("#sqConfirm"); if(cf) cf.onclick=()=>{ if(sel) commit(sel.getAttribute("data-v"), sel); };
    } else host.querySelectorAll(".qopt").forEach(b=>b.onclick=()=>commit(b.getAttribute("data-v"), b));
  }
  ask();
}

/* ============================================================================

   • ثنائيّةُ اللغة: الجملةُ الافتتاحيّةُ تُعرَضُ وتُنطَقُ بالعربيّةِ ثمّ بلغةِ القسم (الآليُّ ينطقُ اللغتين).
   • بطاقاتُ الأجوبةِ (حيثما كانت نصًّا) تتبدّلُ لغتُها كلَّ 5ث عبر startTitleAlt (كبطاقات الكلمات).
   • كلُّها تنافسيّةٌ عبر versus.js (ضدّ الآليّ بثلاث صعوبات/الإخوة/الوالد + «وحدي»).
============================================================================ */
const QZ_DIFF = { easy:{opts:3,ms:7000,pr:0.55,d:1900}, medium:{opts:4,ms:5500,pr:0.72,d:1400}, hard:{opts:4,ms:4000,pr:0.88,d:1000} };
let trRun=false;          // حارسٌ مشترك: يوقفُ أيَّ لعبةٍ عند الرجوع (يُصفَّرُ في render())
let qz=null;              // حالةُ اللعبةِ الجاريةِ عبر المحرّك العامّ
let qzTimed=true;         // اللعبُ ضدّ الوقت (يُفعَّل/يُعطَّل من شاشةِ الإعداد)

// ينطقُ الآليُّ الجملةَ الافتتاحيّةَ بالعربيّةِ ثمّ بلغةِ القسم (تعزيزٌ ثنائيّ).
function sayIntro(arText, fgText, L){
  if(!fgText){ try{ speak(arText); }catch(e){} return; }
  // ننتظرُ انتهاءَ العربيّةِ (onend) ثمّ ننطقُ الأجنبيّةَ — فلا تُقطَعُ العربيّةُ قبلَ تمامها.
  try{ speak(arText, { onend:()=>{ try{ say(fgText, L); }catch(e){} } }); }
  catch(e){ try{ say(fgText, L); }catch(e2){} }
}
// نصُّ الجملةِ الافتتاحيّةِ ثنائيّاً (يُعرَضُ في شاشةِ الإعداد): عربيٌّ فوق، وأجنبيٌّ تحته.
// نصُّ الجملةِ الافتتاحيّةِ + زرُّ إعادةِ سماعٍ لكلِّ لغةٍ على حدة (عربيٌّ فوق، وأجنبيٌّ تحته).
const introRep = (k,title)=>`<button type="button" class="introrep" data-replay="${k}" title="${esc(title)}" aria-label="${esc(title)}">🔊</button>`;
function introHtml(arText, fgText){
  return `<span>${esc(arText)}</span> ${introRep("ar","إعادةُ سماعِ العربيّة")}`
    + (fgText?`<div class="ltr" style="margin-top:6px;font-size:14px;color:var(--muted)">${esc(fgText)} ${introRep("fg","إعادةُ سماعِ الأجنبيّة")}</div>`:"");
}
// زرُّ الإعادةِ داخلَ شاشةِ الإعداد: تفويضٌ على host الثابتِ (يبقى رغمَ إعادةِ رسمِ vsSetup لمحتواه).
function wireIntroReplay(host, arText, fgText, L){
  if(host._introWired) return; host._introWired = true;
  host.addEventListener("click", e=>{ const b=e.target.closest("[data-replay]"); if(!b) return;
    e.stopPropagation();
    if(b.getAttribute("data-replay")==="ar"){ try{ speak(arText); }catch(err){} }
    else { try{ say(fgText, L); }catch(err){} }
  });
}
function vsQuizStart(cfg){ cfg.diff = cfg.diff || "easy"; qz=null;
  const fg=(cfg.L.intros||{})[cfg.key];
  vsSetup(cfg.host, { say:introHtml(cfg.intro, fg), soloOk:true,
    diffs:[{v:"easy",label:"سهل"},{v:"medium",label:"متوسّط"},{v:"hard",label:"صعب"}],
    getDiff:()=>cfg.diff, setDiff:v=>{cfg.diff=v;},
    toggle:{ label:"⏱️ اللعبُ ضدّ الوقت", get:()=>qzTimed, set:v=>{qzTimed=v;} },
    start:()=>vsQuizNew(cfg) });
  wireIntroReplay(cfg.host, cfg.intro, fg, cfg.L);
  sayIntro(cfg.intro, fg, cfg.L);
}
function vsQuizNew(cfg){ trRun=true; qz={cfg, ps:vsMakePlayers(), turn:0, lock:false, q:null, raf:null}; qz.ps.forEach(p=>p.score=0); vsQuizNext(); }
function vsQuizNext(){ if(!trRun||!qz) return;
  const cfg=qz.cfg, target=cfg.target||5;
  if(qz.ps.some(p=>p.score>=target)){ vsQuizEnd(); return; }
  const d=QZ_DIFF[cfg.diff]; qz.q=cfg.makeQ(cfg.L, d.opts); qz.lock=false; vsQuizRender();
  const cur=qz.ps[qz.turn];
  if(cur.cpu) vsQuizAI(); else { if(cfg.sayPrompt) cfg.sayPrompt(qz.q, cfg.L); if(qzTimed) vsQuizTimer(d.ms, ()=>{ if(!qz.lock){ qz.lock=true; vsQuizResolve(false,null); } }); }
}
function vsQuizRender(){ const cfg=qz.cfg, q=qz.q, cur=qz.ps[qz.turn], k=curLng();
  cfg.host.innerHTML = `<div class="clue" style="padding:10px"><div class="say">${cfg.icon} ${esc(cfg.title)} — أوّلُ من يبلغُ ${cfg.target||5} يفوز!</div></div>`
    + vsScoreHtml(qz.ps) + vsTurnHtml(cur)
    + cfg.promptHtml(q, cfg.L)
    + (qzTimed?`<div class="hubar" style="height:9px;background:var(--line);border-radius:99px;overflow:hidden;max-width:320px;margin:6px auto 12px"><span id="qzBar" style="display:block;height:100%;background:var(--primary);width:100%"></span></div>`:"")
    + `<div class="${cfg.optWrap||'grid'}" id="qzOpts">${cfg.optionsHtml(q, cfg.L, k)}</div>`
    + `<div id="qzFb"></div>`;
  const sb=cfg.host.querySelector("#qzSay"); if(sb&&cfg.sayPrompt) sb.onclick=()=>cfg.sayPrompt(q, cfg.L);
  cfg.host.querySelector("#qzOpts").addEventListener("click",e=>{ const b=e.target.closest("[data-opt]"); if(!b) return; vsQuizTap(b); });
  startTitleAlt(); // تبديلُ لغةِ بطاقاتِ الأجوبةِ كلَّ 5ث (تُلتَقَطُ عبر [data-fg])
}
function vsQuizTimer(ms,onEnd){ if(!qz) return; const start=Date.now(), bar=document.getElementById("qzBar"); cancelAnimationFrame(qz.raf);
  const tick=()=>{ if(!trRun||!qz) return; const left=ms-(Date.now()-start); if(bar) bar.style.width=Math.max(0,left/ms*100)+"%"; if(left<=0){ onEnd&&onEnd(); return; } qz.raf=requestAnimationFrame(tick); }; tick(); }
function vsQuizTap(btn){ if(!qz||qz.lock||qz.ps[qz.turn].cpu) return; cancelAnimationFrame(qz.raf); qz.lock=true; sfx.tap(); vsQuizResolve(btn.getAttribute("data-opt")===qz.cfg.optVal(qz.q.correct), btn); }
function vsQuizAI(){ if(!qz) return; qz.lock=true; const cfg=qz.cfg, d=QZ_DIFF[cfg.diff], ok=Math.random()<d.pr, cv=cfg.optVal(qz.q.correct);
  qz.aiPick = ok ? cv : (shuffle(qz.q.opts.map(cfg.optVal).filter(v=>v!==cv))[0] ?? cv); // بطاقةُ اختيارِ الآليّ (تُلوَّنُ عند الحلّ)
  if(cfg.sayPrompt) cfg.sayPrompt(qz.q, cfg.L);
  if(qzTimed) vsQuizTimer(d.d, ()=>vsQuizResolve(ok,null)); else setTimeout(()=>vsQuizResolve(ok,null), d.d); }
function vsQuizResolve(ok,btn){ if(!qz) return;
  cancelAnimationFrame(qz.raf); const cfg=qz.cfg, cur=qz.ps[qz.turn], human=!cur.cpu, target=cfg.target||5, cv=cfg.optVal(qz.q.correct);
  const mark=(val,cls)=>{ if(val==null) return; cfg.host.querySelectorAll("#qzOpts [data-opt]").forEach(b=>{ if(b.getAttribute("data-opt")===String(val)) b.classList.add(cls); }); };
  if(human){ if(btn) btn.classList.add(ok?"ok":"bad"); } else mark(qz.aiPick, ok?"ok":"bad"); // بطاقةُ مختارِ اللاعب/الآليّ: خضراءُ إن صحّ، حمراءُ إن خطأ
  if(!ok) mark(cv,"ok");                                                                    // وتُظهَرُ الإجابةُ الصحيحةُ خضراءَ عند الخطأ
  // ردُّ فعلِ الآليّ ثنائيُّ اللغة للإنسان (أجنبيٌّ + عربيٌّ عبر react)، وقُويْمةٌ عربيّةٌ قصيرةٌ للآليّ.
  if(ok){ cur.score++; const won=cur.score>=target;
    if(won) sfx.success(); else if(human) praise(cfg.L); else { sfx.success(); if(Math.random()<0.4) robo.say(vP(GR.aiok),"happy"); } }
  else { if(human) encourageReact(cfg.L); else sfx.nope(); }
  const fb=cfg.host.querySelector("#qzFb"); if(fb) fb.innerHTML=`<div class="hint" style="text-align:center">${ok?"✅ صحيح!":cfg.correctLabel(qz.q)}</div>`;
  // مهلةٌ أطولُ للإنسان لتكتملَ ردّةُ الفعلِ باللغتين قبلَ السؤالِ التالي.
  setTimeout(()=>{ if(!trRun||!qz) return; qz.turn=(qz.turn+1)%qz.ps.length; vsQuizNext(); }, human ? 2600 : 1150);
}
function vsQuizEnd(){ const cfg=qz.cfg; try{ logEvent(cfg.logKey||"lang_game_win"); }catch(e){}
  vsEndRound(qz.ps, { onAgain:()=>vsQuizNew(cfg), onExit:()=>{ const u=new URL(location.href); u.searchParams.delete("g"); history.replaceState(null,"",u); render(); } }); }

// ---- إعداداتُ الألعابِ (كلٌّ منها إعدادٌ للمحرّك أعلاه) ----
// 🏃 سباقُ الترجمة: كلمةٌ أجنبيّةٌ (تُنطَقُ وتُعرَض) ← اختَرْ معناها العربيّ (بطاقاتٌ تتبدّلُ عربيٌّ↔أجنبيّ).
function cfgTransRace(L, host){ return { L, host, key:"transrace", logKey:"lang_transrace_win", icon:"🏃", title:"سباقُ الترجمة", intro:GI.transrace, optWrap:"grid",
  makeQ:(L,n)=>{ const pool=shuffle(allWords(L)), correct=pool[0]; const opts=shuffle([correct, ...pool.filter(w=>w.ar!==correct.ar).slice(0,n-1)]); return {correct, opts}; },
  promptHtml:q=>`<div class="qzprompt" style="text-align:center;margin:6px 0"><button class="secbtn on" id="qzSay">🔊 <span class="ltr">${esc(q.correct.w)}</span></button></div>`,
  sayPrompt:(q,L)=>say(q.correct.w, L),
  optionsHtml:q=>q.opts.map(o=>`<button class="gcard qzopt" data-opt="${esc(o.w)}"><span data-ar="${esc(o.ar)}" data-fg="${esc(o.w)}">${esc(o.ar)}</span></button>`).join(""),
  optVal:o=>o.w, correctLabel:q=>`المعنى: <b>${esc(q.correct.ar)}</b>` }; }

// ⚖️ صنّفِ الكلمات: كلمةٌ أجنبيّة ← اختَرْ فئتَها (بطاقاتُ الفئاتِ تتبدّلُ عربيٌّ↔أجنبيّ عبر CAT_I18N).
function cfgSortWords(L, host){ return { L, host, key:"sortwords", logKey:"lang_sort_win", icon:"⚖️", title:"صنّفِ الكلمات", intro:GI.sortwords, optWrap:"lgrid",
  makeQ:(L,n)=>{ const cats=(L.words||[]).filter(c=>(c.items||[]).length).map(c=>({id:c.id,ar:c.ar})); const w=shuffle(allWords(L))[0], correct=cats.find(c=>c.id===w.cat);
    const opts=shuffle([correct, ...shuffle(cats.filter(c=>c.id!==w.cat)).slice(0,n-1)]); return {w, correct, opts}; },
  promptHtml:q=>`<div class="qzprompt" style="text-align:center;margin:6px 0"><button class="secbtn on" id="qzSay">🔊 <span class="ltr">${esc(q.w.w)}</span> ${q.w.emoji}</button></div>`,
  sayPrompt:(q,L)=>say(q.w.w, L),
  optionsHtml:(q,L,k)=>q.opts.map(o=>`<button class="lcard sgopt qzopt" data-opt="${esc(o.id)}"><span class="ic">${iconHtml(CAT_ICON[o.id]||"📝")}</span><span class="lt" data-ar="${esc(o.ar)}" data-fg="${esc((CAT_I18N[o.id]||{})[k]||o.ar)}">${esc(o.ar)}</span></button>`).join(""),
  optVal:o=>o.id, correctLabel:q=>`الفئةُ الصحيحة: <b>${esc(q.correct.ar)}</b>` }; }

// 🃏 مطابقةُ الصور: كلمةٌ أجنبيّة (تُنطَقُ وتُعرَض) ← اختَرِ الصورةَ المطابقة (خياراتٌ مصوّرة).
function cfgMatch(L, host){ return { L, host, key:"match", logKey:"lang_match_win", icon:"🃏", title:"مطابقةُ الصور", intro:GI.match, optWrap:"grid",
  makeQ:(L,n)=>{ const pool=shuffle(allWords(L)), correct=pool[0]; const opts=shuffle([correct, ...pool.filter(w=>w.emoji!==correct.emoji).slice(0,n-1)]); return {correct, opts}; },
  promptHtml:q=>`<div class="qzprompt" style="text-align:center;margin:6px 0"><button class="secbtn on" id="qzSay">🔊 <span class="ltr">${esc(q.correct.w)}</span></button></div>`,
  sayPrompt:(q,L)=>say(q.correct.w, L),
  optionsHtml:q=>q.opts.map(o=>`<button class="gcard qzopt" data-opt="${esc(o.w)}"><span style="font-size:40px">${o.emoji}</span></button>`).join(""),
  optVal:o=>o.w, correctLabel:q=>`الصحيحة: ${q.correct.emoji} <b>${esc(q.correct.ar)}</b>` }; }

// 🔗 مطابقةُ المعنى (عكسيّة): معنًى عربيٌّ + صورة ← اختَرِ الكلمةَ الأجنبيّةَ الصحيحة (بطاقاتٌ أجنبيٌّ↔عربيّ).
function cfgMatchAr(L, host){ return { L, host, key:"matchar", logKey:"lang_matchar_win", icon:"🔗", title:"مطابقةُ المعنى", intro:GI.matchar, optWrap:"grid",
  makeQ:(L,n)=>{ const pool=shuffle(allWords(L)), correct=pool[0]; const opts=shuffle([correct, ...pool.filter(w=>w.w!==correct.w).slice(0,n-1)]); return {correct, opts}; },
  promptHtml:q=>`<div class="qzprompt" style="text-align:center;margin:6px 0"><span class="qzemoji">${q.correct.emoji}</span><span class="qzar">${esc(q.correct.ar)}</span></div>`,
  sayPrompt:null, // لا نُنطِقُ الكلمةَ الأجنبيّةَ لئلّا نكشفَ الجواب (لعبةُ قراءةٍ)
  optionsHtml:q=>q.opts.map(o=>`<button class="gcard qzopt" data-opt="${esc(o.w)}"><span dir="ltr" data-fgprimary data-ar="${esc(o.ar)}" data-fg="${esc(o.w)}">${esc(o.w)}</span></button>`).join(""),
  optVal:o=>o.w, correctLabel:q=>`الكلمةُ الصحيحة: <b class="ltr">${esc(q.correct.w)}</b>` }; }

// 👂 استماعٌ واختيار: تُنطَقُ الكلمةُ (صوتٌ فقط) ← اختَرِ الصورةَ الصحيحة (خياراتٌ مصوّرة).
function cfgListen(L, host){ return { L, host, key:"listen", logKey:"lang_listen_win", icon:"👂", title:"استماعٌ واختيار", intro:GI.listen, optWrap:"grid",
  makeQ:(L,n)=>{ const pool=shuffle(allWords(L)), correct=pool[0]; const opts=shuffle([correct, ...pool.filter(w=>w.emoji!==correct.emoji).slice(0,n-1)]); return {correct, opts}; },
  promptHtml:()=>`<div class="qzprompt" style="text-align:center;margin:6px 0"><button class="secbtn on" id="qzSay">🔊 استمعْ ثمّ اختَرِ الصورة</button></div>`,
  sayPrompt:(q,L)=>say(q.correct.w, L),
  optionsHtml:q=>q.opts.map(o=>`<button class="gcard qzopt" data-opt="${esc(o.w)}"><span style="font-size:40px">${o.emoji}</span></button>`).join(""),
  optVal:o=>o.w, correctLabel:q=>`الصحيحة: ${q.correct.emoji} <b>${esc(q.correct.ar)}</b>` }; }

// أغلفةُ البدءِ (يستدعيها الموجّه): كلٌّ يُشغّلُ المحرّكَ العامّ بإعدادِ لعبته.
function startTransRace(L,host){ vsQuizStart(cfgTransRace(L,host)); }
function startSortGame(L,host){ vsQuizStart(cfgSortWords(L,host)); }
function startMatch(L,host){ vsQuizStart(cfgMatch(L,host)); }
function startMatchAr(L,host){ vsQuizStart(cfgMatchAr(L,host)); }
function startListen(L,host){ vsQuizStart(cfgListen(L,host)); }

// 🔡 الإملاء (تنافسيّ): في دورِك، استمعْ للكلمةِ ثمّ رتّبْ حروفَها المبعثرة؛ أوّلُ من يبلغُ الهدفَ يفوز.
let sp_diff="easy", sp_ps=[], sp_turn=0, sp_L=null, sp_host=null, sp_timed=true, sp_raf=null; const SP_TARGET=5;
const SP_DIFF={ easy:{max:5, ai:0.5, ms:13000}, medium:{max:7, ai:0.7, ms:10000}, hard:{max:9, ai:0.9, ms:8000} };
function startSpell(L, host){ sp_L=L; sp_host=host; const fg=(L.intros||{}).spell;
  vsSetup(host, { say:introHtml(GI.spell, fg), soloOk:true,
    diffs:[{v:"easy",label:"سهل"},{v:"medium",label:"متوسّط"},{v:"hard",label:"صعب"}],
    getDiff:()=>sp_diff, setDiff:v=>{sp_diff=v;},
    toggle:{ label:"⏱️ اللعبُ ضدّ الوقت", get:()=>sp_timed, set:v=>{sp_timed=v;} },
    start:()=>newSpell() });
  wireIntroReplay(host, GI.spell, fg, L);
  sayIntro(GI.spell, fg, L);
}
function newSpell(){ trRun=true; sp_ps=vsMakePlayers(); sp_ps.forEach(p=>p.score=0); sp_turn=0; spNext(); }
function spPool(){ const m=SP_DIFF[sp_diff].max; return shuffle(allWords(sp_L)).filter(w=>w.w && !w.w.includes(" ") && w.w.length>=2 && w.w.length<=m); }
function spHead(cur){ return `<div class="clue" style="padding:10px"><div class="say">🔡 الإملاء — أوّلُ من يبلغُ ${SP_TARGET} يفوز!</div></div>`+vsScoreHtml(sp_ps)+vsTurnHtml(cur); }
function spNext(){ if(!trRun) return;
  if(sp_ps.some(p=>p.score>=SP_TARGET)){ spEnd(); return; }
  const cur=sp_ps[sp_turn], word=spPool()[0]; if(!word){ spEnd(); return; }
  if(cur.cpu){ spRobot(word, cur); return; }
  const target=word.w, letters=shuffle(target.split("")); let built=[], done=false;
  cancelAnimationFrame(sp_raf);
  const finish=(solved)=>{ if(done) return; done=true; cancelAnimationFrame(sp_raf);
    if(solved){ cur.score++; const won=cur.score>=SP_TARGET; if(won) sfx.success(); else praise(sp_L); // ردٌّ ثنائيُّ اللغة
      setTimeout(()=>{ if(!trRun) return; sp_turn=(sp_turn+1)%sp_ps.length; spNext(); }, won?700:2600); }
    else { sfx.nope(); encourageReact(sp_L); // نفادُ الوقت ⇒ ردٌّ ثنائيُّ اللغة ثمّ يمرُّ الدور للخصم
      const fb=sp_host.querySelector("#spfb"); if(fb) fb.innerHTML=`<div class="hint">⌛ نفدَ الوقت — الكلمةُ: <b class="ltr">${esc(target)}</b></div>`;
      setTimeout(()=>{ if(!trRun) return; sp_turn=(sp_turn+1)%sp_ps.length; spNext(); }, 2400); }
  };
  function redraw(solved){
    sp_host.innerHTML = spHead(cur)
      + `<div class="qzprompt"><span class="qzemoji">${word.emoji}</span><span class="qzar">${esc(word.ar)}</span><div><button class="secbtn" id="spSay">🔊 استمعْ</button></div></div>`
      + (sp_timed && !solved ? `<div class="hubar" style="height:9px;background:var(--line);border-radius:99px;overflow:hidden;max-width:320px;margin:6px auto 12px"><span id="spbar" style="display:block;height:100%;background:var(--primary);width:100%"></span></div>` : "")
      + `<div class="spslot ltr">${target.split("").map((_,i)=>`<span class="${solved?'full ok':(built[i]?'full':'')}">${built[i]?esc(built[i].ch):''}</span>`).join("")}</div>`
      + (solved ? `<div class="hint">🎉 أحسنت! الكلمةُ: <b class="ltr">${esc(target)}</b></div>`
        : `<div class="splet">${letters.map((ch,idx)=>`<button class="lchip ltr" data-idx="${idx}" ${built.find(b=>b.idx===idx)?'disabled':''}>${esc(ch)}</button>`).join("")}</div>
           <div class="snav"><button class="secbtn" id="spClear">↺ امسحْ</button></div>`)
      + `<div id="spfb"></div>`;
    const sy=sp_host.querySelector("#spSay"); if(sy) sy.onclick=()=>say(target, sp_L);
    const cl=sp_host.querySelector("#spClear"); if(cl) cl.onclick=()=>{ built=[]; redraw(false); };
    sp_host.querySelectorAll(".lchip").forEach(b=>b.onclick=()=>{ if(!trRun||done) return;
      const idx=+b.getAttribute("data-idx"); if(built.find(x=>x.idx===idx)) return;
      built.push({idx, ch:letters[idx]});
      if(built.length<target.length){ redraw(false); return; }
      if(built.map(x=>x.ch).join("")===target){ redraw(true); finish(true); }
      else { sfx.nope(); robo.encourage(vP(GR.no)); built=[]; redraw(false); }
    });
  }
  redraw(false); say(target, sp_L);
  if(sp_timed){ const ms=SP_DIFF[sp_diff].ms, start=Date.now();               // مؤقّتُ الدور: نفادُه ⇒ خسارةُ الدور
    const tick=()=>{ if(!trRun||done) return; const left=ms-(Date.now()-start); const bar=document.getElementById("spbar"); if(bar) bar.style.width=Math.max(0,left/ms*100)+"%"; if(left<=0){ finish(false); return; } sp_raf=requestAnimationFrame(tick); }; tick(); }
}
// دورُ الآليّ في الإملاء: تظهرُ الحروفُ المبعثرةُ والخاناتُ، ويرتّبُها الآليُّ حرفًا حرفًا أمامَ الطفلِ (يُصيبُ أو يُخطئ حسبَ الصعوبة).
function spRobot(word, cur){ const target=word.w, ok=Math.random()<SP_DIFF[sp_diff].ai, letters=shuffle(target.split(""));
  const used=new Set(), order=[];
  for(const ch of target){ let idx=letters.findIndex((c,i)=>c===ch && !used.has(i)); if(idx<0) idx=letters.findIndex((_,i)=>!used.has(i)); used.add(idx); order.push(idx); }
  if(!ok && order.length>=2){ const j=order.length-1; [order[j],order[j-1]]=[order[j-1],order[j]]; } // خطأٌ متعمَّد: قلبُ آخرِ حرفين
  let built=[];
  function draw(done){
    sp_host.innerHTML = spHead(cur)
      + `<div class="qzprompt"><span class="qzemoji">${word.emoji}</span><span class="qzar">${esc(word.ar)}</span><div class="hint">🤖 يُرتّبُ الآليُّ الحروف…</div></div>`
      + `<div class="spslot ltr">${target.split("").map((_,i)=>`<span class="${done&&ok?'full ok':(built[i]?'full':'')}">${built[i]?esc(built[i].ch):''}</span>`).join("")}</div>`
      + `<div class="splet">${letters.map((ch,idx)=>`<button class="lchip ltr" disabled ${built.find(b=>b.idx===idx)?'style="opacity:.3"':''}>${esc(ch)}</button>`).join("")}</div>`;
  }
  draw(false); say(target, sp_L);
  let step=0;
  function place(){ if(!trRun) return;
    if(step>=order.length){ setTimeout(()=>{ if(!trRun) return;
        if(ok){ cur.score++; sfx.success(); if(Math.random()<0.4) robo.say(vP(GR.aiok),"happy"); } else { sfx.nope(); robo.say(vP(GR.no),"sad"); }
        sp_turn=(sp_turn+1)%sp_ps.length; spNext(); }, 950);
      return; }
    const idx=order[step++]; built.push({idx, ch:letters[idx]}); sfx.tap(); draw(step>=order.length); setTimeout(place, 620);
  }
  setTimeout(place, 850);
}
function spEnd(){ try{ logEvent("lang_spell_win"); }catch(e){} vsEndRound(sp_ps, { onAgain:()=>newSpell(), onExit:()=>{ const u=new URL(location.href); u.searchParams.delete("g"); history.replaceState(null,"",u); render(); } }); }

// 🔤 رتّبِ الأبجديّة (تنافسيّ): في دورِك، رتّبِ الحروفَ المبعثرةَ حسبَ ترتيبِ الأبجديّةِ قبلَ خصمِك.
let ao_diff="easy", ao_ps=[], ao_turn=0, ao_L=null, ao_host=null, ao_timed=true, ao_raf=null; const AO_TARGET=5;
const AO_DIFF={ easy:{n:3, ai:0.55, ms:11000}, medium:{n:4, ai:0.72, ms:9000}, hard:{n:5, ai:0.9, ms:7000} };
function startAlphaOrder(L, host){ ao_L=L; ao_host=host; const fg=(L.intros||{}).alphaorder;
  vsSetup(host, { say:introHtml(GI.alphaorder, fg), soloOk:true,
    diffs:[{v:"easy",label:"سهل"},{v:"medium",label:"متوسّط"},{v:"hard",label:"صعب"}],
    getDiff:()=>ao_diff, setDiff:v=>{ao_diff=v;},
    toggle:{ label:"⏱️ اللعبُ ضدّ الوقت", get:()=>ao_timed, set:v=>{ao_timed=v;} },
    start:()=>newAlphaOrder() });
  wireIntroReplay(host, GI.alphaorder, fg, L);
  sayIntro(GI.alphaorder, fg, L);
}
function newAlphaOrder(){ trRun=true; ao_ps=vsMakePlayers(); ao_ps.forEach(p=>p.score=0); ao_turn=0; aoNext(); }
function aoHead(cur){ return `<div class="clue" style="padding:10px"><div class="say">🔤 رتّبِ الأبجديّة — أوّلُ من يبلغُ ${AO_TARGET} يفوز!</div></div>`+vsScoreHtml(ao_ps)+vsTurnHtml(cur); }
// يختارُ n حروفٍ عشوائيّةً من أبجديّةِ القسمِ ويرتّبُها أبجديّاً (حسبَ ترتيبِها في المصفوفة) — هذا هو الهدف.
function aoPick(){ const L=(ao_L.letters||[]), n=Math.min(AO_DIFF[ao_diff].n, L.length);
  return shuffle(L.map((_,i)=>i)).slice(0,n).sort((a,b)=>a-b).map(i=>({ ch:L[i].ch, i })); }
function aoNext(){ if(!trRun) return;
  if(ao_ps.some(p=>p.score>=AO_TARGET)){ aoEnd(); return; }
  const cur=ao_ps[ao_turn], target=aoPick(); if(target.length<2){ aoEnd(); return; }
  if(cur.cpu){ aoRobot(target, cur); return; }
  const chips=shuffle(target.slice()); let progress=0, done=false; const used=new Set();
  cancelAnimationFrame(ao_raf);
  const finish=(ok)=>{ if(done) return; done=true; cancelAnimationFrame(ao_raf);
    if(ok){ cur.score++; const won=cur.score>=AO_TARGET; if(won) sfx.success(); else praise(ao_L); // ردٌّ ثنائيُّ اللغة
      setTimeout(()=>{ if(!trRun) return; ao_turn=(ao_turn+1)%ao_ps.length; aoNext(); }, won?700:2600); }
    else { sfx.nope(); encourageReact(ao_L);
      const fb=ao_host.querySelector("#aofb"); if(fb) fb.innerHTML=`<div class="hint">⌛ الترتيبُ الصحيح: <b class="ltr">${esc(target.map(t=>t.ch).join(" "))}</b></div>`;
      setTimeout(()=>{ if(!trRun) return; ao_turn=(ao_turn+1)%ao_ps.length; aoNext(); }, 2400); }
  };
  function redraw(solved){
    ao_host.innerHTML = aoHead(cur)
      + `<div class="hint" style="text-align:center;margin:6px 2px">رتّبِ الحروفَ حسبَ الأبجديّة — اضغطْها من <b class="ltr">${esc(target[0].ch)}</b> إلى <b class="ltr">${esc(target[target.length-1].ch)}</b></div>`
      + (ao_timed && !solved ? `<div class="hubar" style="height:9px;background:var(--line);border-radius:99px;overflow:hidden;max-width:320px;margin:6px auto 12px"><span id="aobar" style="display:block;height:100%;background:var(--primary);width:100%"></span></div>` : "")
      + `<div class="spslot ltr">${target.map((t,i)=>`<span class="${solved?'full ok':(i<progress?'full':'')}">${i<progress?esc(target[i].ch):''}</span>`).join("")}</div>`
      + (solved ? `<div class="hint">🎉 أحسنت! (<span class="ltr">${esc(target.map(t=>t.ch).join(" "))}</span>)</div>`
        : `<div class="splet">${chips.map((c,idx)=>`<button class="lchip ltr" data-idx="${idx}" ${used.has(idx)?'disabled':''}>${esc(c.ch)}</button>`).join("")}</div>`)
      + `<div id="aofb"></div>`;
    ao_host.querySelectorAll(".lchip").forEach(b=>b.onclick=()=>{ if(!trRun||done) return;
      const idx=+b.getAttribute("data-idx"); if(used.has(idx)) return;
      if(chips[idx].i===target[progress].i){ used.add(idx); progress++; sfx.tap();
        if(progress>=target.length){ redraw(true); finish(true); } else redraw(false); }
      else { sfx.nope(); b.classList.add("bad"); setTimeout(()=>b.classList.remove("bad"), 400); } // نقرةٌ خاطئةٌ: لا تُنهي الدورَ (يُتاحُ التصحيحُ حتى نفادِ الوقت)
    });
  }
  redraw(false);
  if(ao_timed){ const ms=AO_DIFF[ao_diff].ms, start=Date.now();
    const tick=()=>{ if(!trRun||done) return; const left=ms-(Date.now()-start); const bar=document.getElementById("aobar"); if(bar) bar.style.width=Math.max(0,left/ms*100)+"%"; if(left<=0){ finish(false); return; } ao_raf=requestAnimationFrame(tick); }; tick(); }
}
// دورُ الآليّ: يُرتّبُ الحروفَ حرفًا حرفًا أمامَ الطفلِ (يُصيبُ أو يُخطئ بقلبِ آخرِ حرفين حسبَ الصعوبة).
function aoRobot(target, cur){ const ok=Math.random()<AO_DIFF[ao_diff].ai, chips=shuffle(target.slice());
  let seq=target.map(t=>chips.findIndex(c=>c.i===t.i)); // مؤشّراتُ الرقائقِ بالترتيبِ الأبجديّ الصحيح
  if(!ok && seq.length>=2){ const j=seq.length-1; [seq[j],seq[j-1]]=[seq[j-1],seq[j]]; } // خطأٌ متعمَّد
  let placed=[]; const used=new Set();
  function draw(finalOk){
    ao_host.innerHTML = aoHead(cur)
      + `<div class="hint" style="text-align:center;margin:6px 2px">🤖 يُرتّبُ الآليُّ الحروف…</div>`
      + `<div class="spslot ltr">${target.map((_,i)=>`<span class="${finalOk?'full ok':(placed[i]!=null?'full':'')}">${placed[i]!=null?esc(placed[i]):''}</span>`).join("")}</div>`
      + `<div class="splet">${chips.map((c,idx)=>`<button class="lchip ltr" disabled ${used.has(idx)?'style="opacity:.3"':''}>${esc(c.ch)}</button>`).join("")}</div>`;
  }
  draw(false);
  let step=0;
  function place(){ if(!trRun) return;
    if(step>=seq.length){ setTimeout(()=>{ if(!trRun) return;
        if(ok){ cur.score++; sfx.success(); if(Math.random()<0.4) robo.say(vP(GR.aiok),"happy"); } else { sfx.nope(); robo.say(vP(GR.no),"sad"); }
        ao_turn=(ao_turn+1)%ao_ps.length; aoNext(); }, 950); return; }
    const idx=seq[step]; placed[step]=chips[idx].ch; used.add(idx); step++; sfx.tap(); draw(step>=seq.length && ok); setTimeout(place, 620);
  }
  setTimeout(place, 850);
}
function aoEnd(){ try{ logEvent("lang_alphaorder_win"); }catch(e){} vsEndRound(ao_ps, { onAgain:()=>newAlphaOrder(), onExit:()=>{ const u=new URL(location.href); u.searchParams.delete("g"); history.replaceState(null,"",u); render(); } }); }

      const pg = Math.max(0, Math.min(+qp.get("pg")||0, st.pages.length-1));
      const p = st.pages[pg], last = pg===st.pages.length-1;
      topnav = nav("↩ القصص","stlist")+`<span class="cur ltr">${esc(st.title)}</span>`;
      body = `<div class="storyview"><div class="cover big">${STORY_ART[p.art]||""}${p.caption?`<div class="scaption ltr">${esc(p.caption)}</div>`:""}</div>
          <p class="storytext ltr">${esc(p.text)}</p>
          ${last?`<div class="lesson ltr">⭐ ${esc(st.lesson)}</div>`:""}
          <div class="snav">
            <button class="secbtn" data-pg="${pg-1}" ${pg===0?"disabled":""}>السابق</button>
            <button class="secbtn" id="stRead">🔊 اقرأ الصفحة</button>
            <button class="secbtn on" id="stReadAll">📖 القصّة كاملةً</button>
            <button class="secbtn" data-pg="${pg+1}" ${last?"disabled":""}>التالي ▶</button>
          </div>
          <div class="dots">${st.pages.map((_,i)=>`<span class="${i===pg?'on':''}"></span>`).join("")}</div></div>`;
    }
  } else if(sec==="verbs"){
    topnav = nav("↩ الأقسام","secs")+`<span class="cur">🕰️ الأفعال والأزمنة</span>`; body = `<div id="vb"></div>`;
  } else if(sec==="quiz"){
    topnav = nav("↩ الأقسام","secs")+`<span class="cur">🎯 اختبار</span>`; body = `<div id="qz"></div>`;
  } else if(sec==="games"){
    const g = qp.get("g");
    if(!g){
      topnav = nav("↩ الأقسام","secs")+`<span class="cur">🎮 ألعاب</span>`;
      const GAMES=[
        {g:"transrace",ic:"🏃",ar:"سباقُ الترجمة",en:"Translation Race",fr:"Course de traduction",vs:1,nw:1},
        {g:"sortwords",ic:"⚖️",ar:"صنّفِ الكلمات",en:"Sort the Words",fr:"Classe les mots",vs:1,nw:1},
        {g:"alphaorder",ic:"🔤",ar:"رتّبِ الأبجديّة",en:"Alphabetical Order",fr:"Ordre alphabétique",vs:1,nw:1},
        {g:"match",ic:"🃏",ar:"مطابقةُ الصور",en:"Picture Match",fr:"Associe les images",vs:1},
        {g:"matchar",ic:"🔗",ar:"مطابقةُ المعنى",en:"Meaning Match",fr:"Associe le sens",vs:1},
        {g:"spell",ic:"🔡",ar:"الإملاء",en:"Spelling",fr:"Épellation",vs:1},
        {g:"listen",ic:"👂",ar:"استماعٌ واختيار",en:"Listen & Choose",fr:"Écoute et choisis",vs:1}];
      const newWord = k==="fr"?"Nouveau":"New";
      body = `<div class="lgrid">${GAMES.map(x=>`<button class="lcard${x.vs?" vs":""}" data-g="${x.g}">${x.vs?'<span class="vsbadge">⚔️ تنافسيّة</span>':''}${x.nw?`<span class="newbadge" data-ar="🆕 جديد" data-fg="🆕 ${newWord}">🆕 جديد</span>`:''}<span class="ic">${iconHtml(x.ic)}</span><span class="lt" data-ar="${esc(x.ar)}" data-fg="${esc(x[k]||x.ar)}">${esc(x.ar)}</span></button>`).join("")}</div>`;
    } else {
      const T={transrace:"🏃 سباقُ الترجمة",sortwords:"⚖️ صنّفِ الكلمات",alphaorder:"🔤 رتّبِ الأبجديّة",match:"🃏 مطابقةُ الصور",matchar:"🔗 مطابقةُ المعنى",spell:"🔡 الإملاء",listen:"👂 استماعٌ واختيار"};
      topnav = nav("↩ الألعاب","games")+`<span class="cur">${T[g]||"🎮 ألعاب"}</span>`; body = `<div id="gm"></div>`;
    }
  }
  view.innerHTML = `<div class="topnav">${topnav}</div>${body}`;
  // التنقّل بالرجوع
  view.querySelectorAll(".backbtn[data-go]").forEach(b=>b.onclick=()=>{ const a=b.getAttribute("data-go"); cancelRead();
    if(a==="langs"){ goHome(); return; }
    const u=new URL(location.href);
    if(a==="secs") ["sec","cat","story","pg","g","chart"].forEach(p=>u.searchParams.delete(p));
    else if(a==="cats") u.searchParams.delete("cat");
    else if(a==="charts") u.searchParams.delete("chart");
    else if(a==="games") u.searchParams.delete("g");
    else if(a==="stlist"){ u.searchParams.delete("story"); u.searchParams.delete("pg"); }
    history.replaceState(null,"",u); render(); });
  view.querySelectorAll(".lcard[data-sec]").forEach(b=>b.onclick=()=>setParam("sec", b.getAttribute("data-sec")));
  view.querySelectorAll(".lcard[data-cat]").forEach(b=>b.onclick=()=>setParam("cat", b.getAttribute("data-cat")));
  view.querySelectorAll(".lcard[data-chart]").forEach(b=>b.onclick=()=>setParam("chart", b.getAttribute("data-chart")));
  view.querySelectorAll(".sylchip").forEach(b=>b.onclick=()=>say(b.getAttribute("data-say"), L));
  view.querySelectorAll(".lcard[data-g]").forEach(b=>b.onclick=()=>setParam("g", b.getAttribute("data-g")));
  // النطق: الكلمةُ عند الضغط على الاسم أو الصورة، والحرفُ عند الضغط على الحرف أو أيّ مكانٍ آخر.
  view.querySelectorAll(".gcard").forEach(b=>{
    b.onclick=(e)=>{ const sayWord = e.target.closest(".wd") || e.target.closest(".em");
      say(sayWord ? (b.getAttribute("data-word") || b.getAttribute("data-say")) : b.getAttribute("data-say"), L); };
  });
  // العبارات: انطق العبارة عند الضغط
  view.querySelectorAll(".pcard").forEach(b=>b.onclick=()=>say(b.getAttribute("data-say"), L));
  // بطاقاتُ الأصوات: الشارةُ تنطقُ الصوتَ وحده، والبطاقةُ تنطقُ الكلمةَ المثال
  view.querySelectorAll(".ssnd[data-snd]").forEach(b=>b.onclick=()=>say(b.getAttribute("data-snd"), L));
  view.querySelectorAll(".sbody").forEach(b=>b.onclick=()=>say(b.getAttribute("data-say"), L));
  // تسجيلُ نُطق الطفل (لكلّ حساب) للكلمة/العبارة، مع زرّ استماعٍ للنطق المرجعيّ.
  view.querySelectorAll(".lrec").forEach(b=>b.onclick=async()=>{
    const host=document.getElementById("rr-"+b.getAttribute("data-id")); if(!host) return;
    const t=b.getAttribute("data-rec"); b.hidden=true; host.hidden=false;
    await attachReader(host, t, { label:"نُطقك", helpLabel:"🔊 النطق الصحيح", onHelp:()=>say(t, L) });
  });
  // فتحُ قصّة
  view.querySelectorAll(".storycard").forEach(b=>b.onclick=()=>{ cancelRead(); const u=new URL(location.href); u.searchParams.set("story", b.getAttribute("data-story")); u.searchParams.set("pg","0"); history.replaceState(null,"",u); render(); });
  view.querySelectorAll(".snav [data-pg]").forEach(b=>{ if(b.disabled)return; b.onclick=()=>setParam("pg", b.getAttribute("data-pg")); });
  if(sec==="stories" && qp.get("story")){
    const st=(L.stories||[]).find(x=>x.id===qp.get("story"))||(L.stories||[])[0];
    const pg=Math.max(0,Math.min(+qp.get("pg")||0, st.pages.length-1));
    const rd=document.getElementById("stRead"); if(rd) rd.onclick=()=>{ cancelRead(); say(st.pages[pg].text, L); };
    const showPage=i=>{ const sv=view.querySelector(".storyview"); if(!sv)return;
      const c=sv.querySelector(".cover.big"); if(c) c.innerHTML=(STORY_ART[st.pages[i].art]||"")+(st.pages[i].caption?`<div class="scaption ltr">${esc(st.pages[i].caption)}</div>`:"");
      const t=sv.querySelector(".storytext"); if(t) t.textContent=st.pages[i].text;
      sv.querySelectorAll(".dots span").forEach((d,j)=>d.classList.toggle("on", j===i));
      const u=new URL(location.href); u.searchParams.set("pg", i); history.replaceState(null,"",u); };
    const rdAll=document.getElementById("stReadAll");
    async function readWhole(){ const my=++storyTok; reading=true; if(rdAll) rdAll.textContent="⏹ إيقاف";
      for(let i=pg;i<st.pages.length;i++){ if(my!==storyTok) return; showPage(i); await sayAsync(st.pages[i].text, L); if(my!==storyTok) return; await new Promise(r=>setTimeout(r,550)); }
      reading=false; render(); }
    if(rdAll) rdAll.onclick=()=>{ if(reading){ cancelRead(); render(); } else readWhole(); };
  }
  if(sec==="verbs"){ const h=document.getElementById("vb"); if(h) renderVerbs(L, h); }
  if(sec==="quiz"){ const h=document.getElementById("qz"); if(h) renderQuiz(L, h); }
  if(sec==="syllables" && qp.get("chart")==="quiz"){ const h=document.getElementById("sq"); if(h) renderSylQuiz(L, h); }
  if(sec==="games" && qp.get("g")){ const g=qp.get("g"), h=document.getElementById("gm");
    if(h){ ({transrace:startTransRace, sortwords:startSortGame, alphaorder:startAlphaOrder, match:startMatch, matchar:startMatchAr, spell:startSpell, listen:startListen}[g]||startTransRace)(L, h); } }
  startTitleAlt();
  try{ logEvent("lang_open", {add:{}}); }catch(e){}
}

// تبديلُ عنوانِ بطاقاتِ الأقسام/الفئات بين العربيّة ولغة القسم كلَّ 5ث (تعزيزٌ للتعلّم)
let altTimer=null, altFg=false;
function startTitleAlt(){
  if(altTimer){ clearInterval(altTimer); altTimer=null; }
  altFg=false;
  const lts=()=>view.querySelectorAll("[data-fg]");   // عناوينُ الأقسام/الفئات + بطاقاتُ الكلمات
  if(!lts().length) return;
  altTimer=setInterval(()=>{
    const els=lts(); if(!els.length){ clearInterval(altTimer); altTimer=null; return; }
    altFg=!altFg;
    els.forEach(el=>{ el.style.opacity="0";
      setTimeout(()=>{ const fg = el.hasAttribute("data-fgprimary") ? !altFg : altFg; el.textContent = fg ? el.getAttribute("data-fg") : el.getAttribute("data-ar");
        el.classList.toggle("fg", fg); el.dir = fg ? "ltr" : "rtl"; el.style.opacity="1"; }, 260);
    });
  }, 5000);
}

function render(){ trRun=false;
  if(altTimer){ clearInterval(altTimer); altTimer=null; }
  const k = curLng();
  if(k && LANGS[k]) renderLang(k); else renderPick();
}
primeWS();
if("speechSynthesis" in window) speechSynthesis.onvoiceschanged = primeWS;
try{ robo.mount(); }catch(e){}   // الآليُّ الظاهرُ (كبقيّة الأقسام)

// زرُّ الرجوع في الهاتف (Capacitor، عبر theme.js): يتراجعُ مستوًى واحدًا في هرم اللغات
// (قصّة→فئات · لعبة→ألعاب · فئة→فئات · قسم→أقسام · لغة→مُنتقي) — فلا يخرجُ ولا يفقدُ الطفلُ موضعَه.
window.appBack = () => {
  const u = new URL(location.href), p = u.searchParams;
  if(p.has("story")){ p.delete("story"); p.delete("pg"); }
  else if(p.has("g")){ p.delete("g"); }
  else if(p.has("cat")){ p.delete("cat"); }
  else if(p.has("chart")){ p.delete("chart"); }
  else if(p.has("sec")){ ["sec","cat","story","pg","g","chart"].forEach(k=>p.delete(k)); }
  else if(p.has("lng")){ p.delete("lng"); }
  else return false; // عند مُنتقي اللغة → دعِ الرجوعَ الأصليَّ يأخذُه للفهرس
  try{ cancelRead(); }catch(e){}
  history.replaceState(null,"",u); render(); return true;
};
render();
</script>
</body>
</html>
