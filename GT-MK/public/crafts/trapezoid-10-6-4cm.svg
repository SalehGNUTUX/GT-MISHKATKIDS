<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="297mm" viewBox="0 0 210 297" font-family="Arial,sans-serif">
  <rect width="210" height="297" fill="#ffffff"/>
  <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#E0566B"/></marker></defs>
  <text x="105" y="22" text-anchor="middle" font-size="6" font-weight="bold" fill="#000">شبه منحرف — قاعدة 10، علوي 6، ارتفاع 4 سم</text>
  <text x="105" y="32" text-anchor="middle" font-size="3.5" fill="#555">قُصَّ على الخطّ المتقطّع · ضلعان متوازيان غير متساويين</text>

  <polygon points="75,110 135,110 155,150 55,150" fill="#E4F0F8" stroke="#E0566B" stroke-width="1" stroke-dasharray="4,2"/>

