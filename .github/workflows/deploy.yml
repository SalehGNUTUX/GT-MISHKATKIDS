# نشرُ «مِشكاة» على GitHub Pages:
#   /        ← الموقع الرسميّ (index.html + assets) في جذر المستودع
#   /app/    ← التطبيق (PWA) مبنيّاً من GT-MK/ بـVite
name: نشر مِشكاة (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: GT-MK/package-lock.json

      # بناء التطبيق داخل GT-MK ← GT-MK/dist
      - name: تثبيت وبناء التطبيق
        working-directory: GT-MK
        run: |
          npm ci
          npm run build

      # تجميع موقع النشر: الموقع الرسميّ في الجذر + التطبيق تحت /app
      - name: تجميع _site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets _site/
          cp -r GT-MK/dist _site/app

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
