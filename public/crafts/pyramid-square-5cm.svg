<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="297mm" viewBox="0 0 210 297" font-family="Arial,sans-serif">
  <rect width="210" height="297" fill="#ffffff"/>
  <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#E0566B"/></marker></defs>
  <text x="105" y="22" text-anchor="middle" font-size="6" font-weight="bold" fill="#000">شبكة هرم رباعي — قاعدة 5 سم، ارتفاع جانبيّ 6 سم</text>
  <text x="105" y="32" text-anchor="middle" font-size="3.3" fill="#555">قُصّ على المتقطّع الأحمر · اطوِ المثلّثات إلى الأعلى لتلتقي في القمّة</text>

  <!-- القاعدة المربّعة -->
  <rect x="80" y="105" width="50" height="50" fill="#FFF6DD"/>
  <!-- المثلّث العلويّ -->
  <polygon points="80,105 130,105 105,45" fill="#FBEFF4"/>
  <!-- المثلّث الأيمن -->
  <polygon points="130,105 130,155 190,130" fill="#E9F5E0"/>
  <!-- المثلّث السفلي -->
  <polygon points="80,155 130,155 105,215" fill="#E4F0F8"/>
  <!-- المثلّث الأيسر -->
  <polygon points="80,105 80,155 20,130" fill="#F0E9F7"/>

  <!-- خطوط الطيّ (متقطّعة خضراء) — أضلاع المربّع الداخلية -->
  <g stroke="#7BB661" stroke-width="0.5" stroke-dasharray="2,1.5" fill="none">
    <line x1="80" y1="105" x2="130" y2="105"/>
    <line x1="130" y1="105" x2="130" y2="155"/>
    <line x1="80" y1="155" x2="130" y2="155"/>
    <line x1="80" y1="105" x2="80" y2="155"/>
  </g>

  <!-- محيط القصّ (متقطّع أحمر) -->
  <polygon points="105,45 130,105 190,130 130,155 105,215 80,155 20,130 80,105"
           fill="none" stroke="#E0566B" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- مقصّ + سهم -->
  <text x="95" y="40" font-size="9" fill="#E0566B">✂</text>
  <line x1="106" y1="48" x2="120" y2="80" stroke="#E0566B" stroke-width="0.6" marker-end="url(#arr)"/>
  <text x="125" y="42" text-anchor="start" font-size="3" fill="#E0566B">ابدأ من القمّة</text>

  <!-- وسوم الوجوه -->
  <g font-size="4" fill="#3a4250" text-anchor="middle">
    <text x="105" y="80">وجه</text>
    <text x="105" y="135">قاعدة</text>
    <text x="160" y="132">وجه</text>
    <text x="105" y="185">وجه</text>
    <text x="50"  y="132">وجه</text>
  </g>
  <text x="105" y="142" text-anchor="middle" font-size="3" fill="#5E9A47">5×5 cm</text>

  <!-- مفتاح -->
  <g transform="translate(15,80)" font-size="3" fill="#555">
    <rect x="0" y="-3" width="3" height="3" fill="none" stroke="#E0566B" stroke-width="0.5" stroke-dasharray="1.5,1"/><text x="4" y="-0.5">قُصّ</text>
    <rect x="0" y="3" width="3" height="3" fill="none" stroke="#7BB661" stroke-width="0.5" stroke-dasharray="1.5,1"/><text x="4" y="5.5">اطوِ</text>
  </g>

  <!-- ═══════════════ رسوم التجميع بالخيط ═══════════════ -->
  <text x="105" y="232" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#000">كيف تُجمّعه وتُعلّقه بخيط؟</text>

  <g transform="translate(8,238)">
    <text x="22" y="6" text-anchor="middle" font-size="3.5" font-weight="bold" fill="#C7613F">1 بعد القصّ</text>
    <g transform="translate(0,9) scale(0.22)">
      <rect x="40" y="40" width="40" height="40" fill="#FFF6DD" stroke="#3a4250" stroke-width="2"/>
      <polygon points="40,40 80,40 60,-10" fill="#FBEFF4" stroke="#3a4250" stroke-width="2"/>
      <polygon points="80,40 80,80 130,60" fill="#E9F5E0" stroke="#3a4250" stroke-width="2"/>
      <polygon points="40,80 80,80 60,130" fill="#E4F0F8" stroke="#3a4250" stroke-width="2"/>
      <polygon points="40,40 40,80 -10,60" fill="#F0E9F7" stroke="#3a4250" stroke-width="2"/>
    </g>
  </g>

  <g transform="translate(60,238)">
    <text x="22" y="6" text-anchor="middle" font-size="3.5" font-weight="bold" fill="#C7613F">2 اطوِ المثلّثات</text>
    <g transform="translate(0,12)">
      <rect x="6" y="20" width="28" height="14" fill="#FFF6DD" stroke="#3a4250" stroke-width="0.6"/>
      <polygon points="6,20 34,20 20,4" fill="#FBEFF4" stroke="#3a4250" stroke-width="0.6"/>
      <polygon points="34,20 34,34 44,28" fill="#E9F5E0" stroke="#3a4250" stroke-width="0.6"/>
      <path d="M22,6 q4,-2 6,4" fill="none" stroke="#E0566B" stroke-width="0.5" marker-end="url(#arr)"/>
    </g>
  </g>

  <g transform="translate(112,238)">
    <text x="22" y="6" text-anchor="middle" font-size="3.5" font-weight="bold" fill="#C7613F">3 ألصِق القمّة</text>
    <g transform="translate(0,12)">
      <polygon points="6,32 38,32 22,2" fill="#FBEFF4" stroke="#3a4250" stroke-width="0.6"/>
      <polygon points="22,2 38,32 28,28" fill="#E9F5E0" stroke="#3a4250" stroke-width="0.6"/>
      <polygon points="6,32 22,2 16,28" fill="#F0E9F7" stroke="#3a4250" stroke-width="0.6"/>
      <text x="34" y="14" font-size="6">💧</text>
    </g>
  </g>

  <g transform="translate(164,238)">
    <text x="22" y="6" text-anchor="middle" font-size="3.5" font-weight="bold" fill="#C7613F">4 علّق 🧵</text>
    <g transform="translate(0,12)">
      <line x1="22" y1="-12" x2="22" y2="2" stroke="#3a4250" stroke-width="0.4" stroke-dasharray="1.5,1"/>
      <polygon points="6,32 38,32 22,2" fill="#FBEFF4" stroke="#3a4250" stroke-width="0.6"/>
      <polygon points="22,2 38,32 28,28" fill="#E9F5E0" stroke="#3a4250" stroke-width="0.6"/>
      <polygon points="6,32 22,2 16,28" fill="#F0E9F7" stroke="#3a4250" stroke-width="0.6"/>
      <circle cx="22" cy="2" r="0.8" fill="none" stroke="#5E9A47" stroke-width="0.4"/>
    </g>
  </g>

  <text x="105" y="288" text-anchor="middle" font-size="3" fill="#5E9A47">💡 اثقب القمّة قبل اللصق، مرّر الخيطَ من خارجها، واربط عُقدةً داخلَ الهرم</text>
</svg>
